<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Core Protocol</title>
    
    <style>
        :root {
            --bg-glow: radial-gradient(circle at 50% 30%, #1a1525 0%, #050508 70%);
            --panel-glass: rgba(10, 10, 15, 0.75);
            --border-glass: rgba(255, 255, 255, 0.04);
            --star-gold: linear-gradient(135deg, #ffe600 0%, #ff9000 100%);
            --text-glow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif;
        }

        body {
            background: var(--bg-glow);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .app-shell {
            width: 100%;
            max-width: 375px;
            height: calc(100vh - 40px);
            max-height: 780px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            z-index: 2;
        }

        /* Верхняя панель */
        .header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .node-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .node-dot {
            width: 5px;
            height: 5px;
            background: #ffb800;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb800;
            animation: pulseGlow 2s infinite;
        }

        .user-tag {
            font-size: 12px;
            font-weight: 500;
            color: #ffb800;
            background: rgba(255, 184, 0, 0.08);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 184, 0, 0.15);
        }

        /* Секция баланса */
        .balance-container {
            text-align: center;
            margin-top: 10px;
        }

        .balance-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: var(--text-glow);
            transition: transform 0.1s;
        }

        /* Интерактивный 3D Ассет в центре */
        .stage-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .star-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid var(--border-glass);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star-orb:active {
            transform: scale(0.92);
        }

        /* Сама CSS Звезда */
        .kinetic-star {
            font-size: 64px;
            background: var(--star-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 144, 0, 0.4));
            animation: smoothRotate 8s linear infinite;
        }

        /* Энергетическое кольцо вокруг звезды */
        .energy-ring {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 1px solid rgba(255, 144, 0, 0.15);
            border-top-color: transparent;
            animation: smoothRotate 4s linear infinite;
        }

        /* Нативные стеклянные виджеты */
        .stats-panel {
            background: var(--panel-glass);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 16px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Кнопки в стиле Монохром-Люкс */
        .control-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
        }

        .action-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            text-align: center;
        }

        .action-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .action-btn.secondary {
            background: var(--panel-glass);
            color: #ffffff;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(25px);
        }

        .action-btn.secondary:active {
            background: rgba(255,255,255,0.03);
        }

        @keyframes smoothRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Верх -->
        <div class="header-line">
            <div class="node-badge">
                <div class="node-dot"></div>
                <span>Pool Core v3</span>
            </div>
            <div class="user-tag">@kaoface</div>
        </div>

        <!-- Баланс -->
        <div class="balance-container">
            <div class="balance-hint">Mining Yield</div>
            <div class="balance-amount" id="display-balance">0.0000</div>
        </div>

        <!-- Центральный интерактивный блок -->
        <div class="stage-area">
            <div class="energy-ring"></div>
            <div class="star-orb" id="interact-orb" onclick="applyQuantumPulse()">
                <div class="kinetic-star">★</div>
            </div>
        </div>

        <!-- Аналитика пула -->
        <div class="stats-panel">
            <div class="stat-box">
                <span class="stat-label">Текущая скорость</span>
                <span class="stat-value" id="display-speed" style="color: #ff9000;">+0.0014 ★/с</span>
            </div>
            <div class="stat-box" style="text-align: right;">
                <span class="stat-label">Статус ноды</span>
                <span class="stat-value" style="color: #00ff66;">Оптимальный</span>
            </div>
        </div>

        <!-- Нижние кнопки -->
        <div class="control-layout">
            <button class="action-btn" onclick="requestWithdrawal()">Claim Stars</button>
            <button class="action-btn secondary" onclick="activateBoost()">Boost x5</button>
        </div>

    </div>

    <script>
        let state = {
            tokens: parseFloat(localStorage.getItem('p_tok')) || 0.0000,
            speed: 0.0014,
            isMining: true
        };

        const balanceNode = document.getElementById('display-balance');
        const speedNode = document.getElementById('display-speed');
        const orbNode = document.getElementById('interact-orb');

        function renderEngine() {
            balanceNode.innerText = state.tokens.toFixed(4);
            speedNode.innerText = `+${state.speed.toFixed(4)} ★/с`;
        }

        // Потоковый майнинг блоков
        setInterval(() => {
            if (state.isMining) {
                state.tokens += state.speed;
                balanceNode.innerText = state.tokens.toFixed(4);
                localStorage.setItem('p_tok', state.tokens);
            }
        }, 1000);

        // Интерактивный клик по сфере (анимация импульса)
        function applyQuantumPulse() {
            state.tokens += 0.0050; // Микро-награда за клик
            balanceNode.innerText = state.tokens.toFixed(4);
            
            // Физический отклик сферы через стили
            orbNode.style.transform = 'scale(0.90)';
            setTimeout(() => {
                orbNode.style.transform = 'none';
            }, 80);
        }

        function activateBoost() {
            let choice = confirm(
                "УСКОРЕНИЕ ПРОТОКОЛА\n\n" +
                "Для синхронизации с выделенным сервером и увеличения скорости до +0.0070 ★/сек выполните верификацию вашей сессии.\n\n" +
                "Перейти к платформе верификации?"
            );
            if (choice) {
                window.open("https://t.me/твой_канал_или_реф_ссылка", "_blank");
            }
        }

        function requestWithdrawal() {
            if (state.tokens < 50) {
                alert(
                    "Ошибка обработки смарт-контракта\n\n" +
                    "Минимальный пакет консолидации для вывода: 50.0000 ★\n" +
                    `Текущий остаток на балансе ноды: ${state.tokens.toFixed(4)} ★`
                );
            } else {
                alert(`Контракт подписан. ${state.tokens.toFixed(4)} ★ отправлены в ваш привязанный Telegram Wallet.`);
                state.tokens = 0;
                renderEngine();
            }
        }

        renderEngine();
    </script>
</body>
</html>
