<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Pro Clone</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; z-index: 10; }
        #score { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #best { font-size: 18px; color: #94a3b8; margin-top: -5px; }
        canvas { background: #1e293b; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 100px; cursor: pointer; }
        #game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { background: #3b82f6; border: none; padding: 15px 40px; color: white; font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div id="best">РЕКОРД: 0</div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 48px; margin-bottom: 10px;">GAME OVER</h1>
        <div id="final-score" style="font-size: 24px;">Счёт: 0</div>
        <button class="btn" onclick="resetGame()">ИГРАТЬ ЕЩЕ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const gameOverScreen = document.getElementById('game-over');

// --- НАСТРОЙКИ ---
const GRID = 8;
const CELL = 45;
const GAP = 4;
const OFFSET_Y = 80;
canvas.width = (CELL + GAP) * GRID + 20;
canvas.height = canvas.width + 200;

let score = 0;
let bestScore = localStorage.getItem('blockBlastBest') || 0;
bestEl.innerText = `РЕКОРД: ${bestScore}`;

let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [];
let particles = [];
let floatingTexts = [];
let dragging = null;
let dragX = 0, dragY = 0;

const COLORS = {
    orange: "#fb923c", blue: "#3b82f6", green: "#4ade80", 
    yellow: "#facc15", purple: "#a855f7", cyan: "#22d3ee", red: "#f87171"
};

const SHAPES_DATA = [
    { m: [[1,1],[1,1]], c: 'orange' }, // Квадрат
    { m: [[1,1,1,1]], c: 'blue' },    // Линия 4
    { m: [[1],[1],[1]], c: 'cyan' },  // Линия 3 верт
    { m: [[1,1,1]], c: 'cyan' },      // Линия 3 гор
    { m: [[1,1,0],[0,1,1]], c: 'red' },
    { m: [[1,0],[1,1],[0,1]], c: 'green' },
    { m: [[1,1,1],[0,1,0]], c: 'purple' },
    { m: [[1,0],[1,0],[1,1]], c: 'yellow' },
    { m: [[1]], c: 'green' }          // Точка
];

// --- КЛАССЫ ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.alpha = 1;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 6, 6);
        ctx.globalAlpha = 1;
    }
}

// --- ЛОГИКА ---
function spawnShapes() {
    shapes = [];
    for (let i = 0; i < 3; i++) {
        const data = SHAPES_DATA[Math.floor(Math.random() * SHAPES_DATA.length)];
        shapes.push({
            ...data,
            x: 40 + i * (canvas.width / 3),
            y: canvas.height - 100,
            origX: 40 + i * (canvas.width / 3),
            origY: canvas.height - 100,
            scale: 0.6
        });
    }
    if (checkGameOver()) showGameOver();
}

function checkGameOver() {
    return shapes.length > 0 && shapes.every(shape => !canPlace(shape));
}

function canPlace(shape, gridX, gridY) {
    if (gridX === undefined) { // Проверка возможности хода вообще
        for (let r = 0; r <= GRID - shape.m.length; r++) {
            for (let c = 0; c <= GRID - shape.m[0].length; c++) {
                if (canPlace(shape, c, r)) return true;
            }
        }
        return false;
    }
    // Проверка конкретной позиции
    for (let r = 0; r < shape.m.length; r++) {
        for (let c = 0; c < shape.m[0].length; c++) {
            if (shape.m[r][c] && (board[gridY + r]?.[gridX + c] !== null)) return false;
        }
    }
    return true;
}

function clearLines() {
    let rows = [], cols = [];
    for (let r = 0; r < GRID; r++) if (board[r].every(c => c !== null)) rows.push(r);
    for (let c = 0; c < GRID; c++) if (board.every(r => r[c] !== null)) cols.push(c);

    rows.forEach(r => {
        for(let c=0; c<GRID; c++) createExplosion(c, r, board[r][c]);
        board[r].fill(null);
    });
    cols.forEach(c => {
        for(let r=0; r<GRID; r++) if(board[r][c]) createExplosion(c, r, board[r][c]);
        for(let r=0; r<GRID; r++) board[r][c] = null;
    });

    if (rows.length || cols.length) {
        let combo = rows.length + cols.length;
        score += combo * 150;
        if (combo > 1) floatingTexts.push({ x: canvas.width/2, y: 200, text: `COMBO x${combo}`, a: 1 });
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('blockBlastBest', bestScore);
            bestEl.innerText = `РЕКОРД: ${bestScore}`;
        }
        scoreEl.innerText = score;
    }
}

function createExplosion(gridX, gridY, color) {
    const x = 10 + gridX * (CELL + GAP) + CELL/2;
    const y = OFFSET_Y + gridY * (CELL + GAP) + CELL/2;
    for (let i = 0; i < 8; i++) particles.push(new Particle(x, y, color));
}

// --- ОТРИСОВКА ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Сетка (фон)
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            ctx.fillStyle = board[r][c] || "#2d3748";
            ctx.beginPath();
            ctx.roundRect(10 + c * (CELL + GAP), OFFSET_Y + r * (CELL + GAP), CELL, CELL, 6);
            ctx.fill();
            // Блик
            if (board[r][c]) {
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                ctx.fillRect(10 + c * (CELL + GAP), OFFSET_Y + r * (CELL + GAP), CELL, CELL/3);
            }
        }
    }

    // Фигуры
    shapes.forEach(s => {
        ctx.fillStyle = COLORS[s.c];
        const size = s === dragging ? CELL : CELL * s.scale;
        const gap = s === dragging ? GAP : GAP * s.scale;
        s.m.forEach((row, ri) => {
            row.forEach((v, ci) => {
                if (v) {
                    ctx.beginPath();
                    ctx.roundRect(s.x + ci * (size + gap), s.y + ri * (size + gap), size, size, 4);
                    ctx.fill();
                }
            });
        });
    });

    // Частицы
    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    // Тексты комбо
    floatingTexts = floatingTexts.filter(t => t.a > 0);
    floatingTexts.forEach(t => {
        ctx.globalAlpha = t.a;
        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(t.text, t.x, t.y);
        t.y -= 1; t.a -= 0.02;
        ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
}

// --- УПРАВЛЕНИЕ ---
function handleStart(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;

    shapes.forEach(s => {
        const w = s.m[0].length * CELL * s.scale;
        const h = s.m.length * CELL * s.scale;
        if (x > s.x && x < s.x + w && y > s.y && y < s.y + h) {
            dragging = s;
            dragX = x - s.x;
            dragY = y - s.y;
            s.scale = 1;
        }
    });
}

function handleMove(e) {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    dragging.x = (e.clientX || e.touches[0].clientX) - rect.left - dragX;
    dragging.y = (e.clientY || e.touches[0].clientY) - rect.top - dragY;
}

function handleEnd() {
    if (!dragging) return;
    const gx = Math.round((dragging.x - 10) / (CELL + GAP));
    const gy = Math.round((dragging.y - OFFSET_Y) / (CELL + GAP));

    if (canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row, r) => {
            row.forEach((v, c) => {
                if (v) board[gy + r][gx + c] = COLORS[dragging.c];
            });
        });
        score += 20;
        scoreEl.innerText = score;
        shapes = shapes.filter(s => s !== dragging);
        if (shapes.length === 0) spawnShapes();
        clearLines();
        if (checkGameOver()) showGameOver();
    } else {
        dragging.x = dragging.origX;
        dragging.y = dragging.origY;
        dragging.scale = 0.6;
    }
    dragging = null;
}

function showGameOver() {
    document.getElementById('final-score').innerText = `Твой счёт: ${score}`;
    gameOverScreen.style.display = 'flex';
}

function resetGame() {
    board = Array(GRID).fill().map(() => Array(GRID).fill(null));
    score = 0;
    scoreEl.innerText = 0;
    gameOverScreen.style.display = 'none';
    spawnShapes();
}

canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', handleStart);
window.addEventListener('touchmove', handleMove);
window.addEventListener('touchend', handleEnd);

spawnShapes();
draw();
</script>
</body>
</html>
