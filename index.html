<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarsCase Elite</title>
    <style>
        :root {
            --bg: #080a0d;
            --card-bg: #12161c;
            --blue: #248bf2;
            --gold: #febd2d;
            --text: #ffffff;
            --hint: #6c7683;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        /* Шапка как в приложении */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance {
            background: #1a1f26;
            padding: 5px 15px;
            border-radius: 20px;
            display: flex; gap: 10px;
            font-weight: bold;
            border: 1px solid #2d343d;
        }

        /* Главная: Сетка кейсов */
        .container { padding: 20px; height: 80vh; overflow-y: auto; }
        
        .case-card {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            border: 1px solid #232a35;
            position: relative;
            margin-bottom: 20px;
        }

        .case-img {
            width: 160px;
            filter: drop-shadow(0 0 20px rgba(36, 139, 242, 0.5));
        }

        .case-title { font-size: 18px; font-weight: 800; margin: 15px 0; text-transform: uppercase; }

        .btn-price {
            background: #1a1f26;
            padding: 10px 30px;
            border-radius: 14px;
            display: inline-block;
            font-weight: bold;
            border: 1px solid #2d343d;
        }

        /* Экран открытия (Рулетка) */
        .roulette-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; align-items: center;
            z-index: 100; padding-top: 40px;
        }

        .roulette-view {
            width: 100%; height: 180px;
            position: relative; margin: 50px 0;
            overflow: hidden;
        }

        .indicator {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            z-index: 10;
        }
        .ind-top { top: 0; border-top: 15px solid var(--blue); }
        .ind-bottom { bottom: 0; border-bottom: 15px solid var(--blue); }

        .track {
            display: flex; align-items: center;
            padding-left: calc(50% - 70px);
            will-change: transform;
        }

        .item {
            min-width: 140px; height: 140px;
            background: #1a1f26; margin: 0 10px;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #2d343d;
        }

        /* Карточка продажи (image_1.png) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: flex-end; z-index: 200;
        }

        .modal-content {
            background: #12161c; width: 100%;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .stats-table {
            width: 100%; border-collapse: collapse; margin: 20px 0;
        }

        .stats-table td { padding: 12px 0; border-bottom: 1px solid #222; }
        .s-label { color: var(--hint); font-size: 14px; }
        .s-val { text-align: right; font-weight: bold; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 18px;
            border: none; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        .btn-sell { background: #ffffff; color: #000000; }
        .btn-swipe { background: var(--blue); color: #fff; margin-top: 30px; }

        .nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold;">Mark</div>
        <div class="balance">
            <span id="bal">1000</span> <span style="color:var(--gold)">⭐️</span>
        </div>
    </div>

    <div class="container">
        <div class="case-card" onclick="openCase()">
            <img src="https://i.imgur.com/8QG3j8G.png" class="case-img"> <div class="case-title">Премиум Кейс</div>
            <div class="btn-price">149 ⭐️</div>
        </div>
    </div>

    <div class="roulette-overlay" id="roulette">
        <button onclick="closeRoulette()" style="position:absolute; left:20px; top:20px; background:none; border:none; color:white; font-size:18px;">✕ Закрыть</button>
        
        <div class="roulette-view">
            <div class="indicator ind-top"></div>
            <div class="indicator ind-bottom"></div>
            <div class="track" id="track"></div>
        </div>

        <button class="btn-action btn-swipe" id="spin-btn">СВАЙПНИТЕ ЗА 149 ⭐️</button>
    </div>

    <div class="modal" id="sell-modal">
        <div class="modal-content">
            <div style="text-align:center; font-size:80px; margin-bottom:10px;" id="win-icon">🔥</div>
            <h2 id="win-name" style="text-align:center; margin:0;">Chill Flame</h2>
            <p style="text-align:center; color:var(--hint);">Los Angeles</p>

            <table class="stats-table">
                <tr><td class="s-label">Модель</td><td class="s-val">Los Angeles</td></tr>
                <tr><td class="s-label">Узор</td><td class="s-val">Straw Hat 0.4%</td></tr>
                <tr><td class="s-label">Фон</td><td class="s-val">Tactical Pine</td></tr>
            </table>

            <button class="btn-action btn-sell" onclick="sellItem()">Продать за <span id="price-val">381</span> ⭐️</button>
            <button class="btn-action" style="background:none; color:var(--hint);" onclick="closeModal()">Оставить в инвентаре</button>
        </div>
    </div>

    <nav class="nav">
        <div style="color:var(--blue)">🏠 ГЛАВНАЯ</div>
        <div>🏆 КОНКУРСЫ</div>
        <div>👤 ПРОФИЛЬ</div>
    </nav>

<script>
    const ITEMS = [
        { name: "Chill Flame", icon: "🔥", price: 381 },
        { name: "Blue Torch", icon: "💎", price: 500 },
        { name: "Lava Lamp", icon: "🏮", price: 200 },
        { name: "Golden Star", icon: "⭐️", price: 1500 }
    ];

    let balance = 1000;
    let currentWin = null;

    function openCase() {
        document.getElementById('roulette').style.display = 'flex';
        initTrack();
    }

    function initTrack() {
        const track = document.getElementById('track');
        track.innerHTML = '';
        for(let i=0; i<60; i++) {
            const it = ITEMS[Math.floor(Math.random() * ITEMS.length)];
            track.innerHTML += `<div class="item"><div style="font-size:50px;">${it.icon}</div></div>`;
        }
    }

    document.getElementById('spin-btn').onclick = function() {
        if(balance < 149) return alert("Мало звезд!");
        balance -= 149; updateBal();
        
        const track = document.getElementById('track');
        const winIdx = 50;
        const winner = ITEMS[Math.floor(Math.random() * ITEMS.length)];
        currentWin = winner;

        const cards = track.querySelectorAll('.item');
        cards[winIdx].innerHTML = `<div style="font-size:50px;">${winner.icon}</div>`;
        
        const offset = winIdx * 160; // 140 ширина + 20 марджин
        track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
        track.style.transform = `translateX(-${offset}px)`;

        setTimeout(() => {
            showSellModal(winner);
        }, 5500);
    }

    function showSellModal(item) {
        document.getElementById('win-icon').innerText = item.icon;
        document.getElementById('win-name').innerText = item.name;
        document.getElementById('price-val').innerText = item.price;
        document.getElementById('sell-modal').style.display = 'flex';
    }

    function sellItem() {
        balance += currentWin.price;
        updateBal();
        closeModal();
        closeRoulette();
    }

    function updateBal() { document.getElementById('bal').innerText = balance; }
    function closeModal() { document.getElementById('sell-modal').style.display = 'none'; }
    function closeRoulette() { 
        document.getElementById('roulette').style.display = 'none'; 
        document.getElementById('track').style.transition = 'none';
        document.getElementById('track').style.transform = 'translateX(0)';
    }
</script>
</body>
</html>
