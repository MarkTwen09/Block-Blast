<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAKEN | Elite Digital Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030914;
            --panel-bg: rgba(6, 18, 36, 0.45);
            --border-color: rgba(0, 242, 254, 0.15);
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --text-gold: #e5c158;
            --text-light: #f0f4f8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        body {
            background: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #0a2240 0%, var(--bg-color) 70%);
        }

        /* Атмосферный задний фон с эффектом глубины */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1551244072-5d12893278ab?q=80&w=1920') center/cover no-repeat;
            opacity: 0.04;
            z-index: -1;
            pointer-events: none;
        }

        /* Хедер */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            border-bottom: 1px solid var(--border-color);
            background: rgba(3, 9, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 4px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .balance-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.05);
        }

        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #8a99ad;
            letter-spacing: 1px;
        }

        .balance-value {
            font-weight: 600;
            color: var(--text-gold);
            text-shadow: 0 0 10px rgba(229, 193, 88, 0.2);
        }

        /* Главный контейнер */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        /* Стеклянные панели (Glassmorphic Card) */
        .casino-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 
                        inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .casino-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, transparent 70%);
            pointer-events: none;
            transition: 0.5s;
        }

        .casino-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 30px 50px rgba(0, 242, 254, 0.1);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--accent-cyan);
        }

        /* Инпуты и кнопки управления ставок */
        .bet-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-weight: 600;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            border: none;
            border-radius: 12px;
            color: #030914;
            font-weight: 600;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 242, 254, 0.5);
        }

        .btn:disabled {
            background: #202b3a;
            color: #52657d;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Интерфейс Слотов */
        .slots-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slot-reel {
            width: 60px;
            height: 70px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s ease;
        }

        /* Интерфейс Кубиков (Dice) */
        .dice-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .dice-cube {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Колесо Фортуны */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }

        .wheel {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 6px solid #1e293b;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.3, 1);
            background: conic-gradient(
                #ff4b5c 0deg 60deg, 
                #1f4068 60deg 120deg, 
                #00b4d8 120deg 180deg, 
                #ffb703 180deg 240deg, 
                #9d4edd 240deg 300deg,
                #2ec4b6 300deg 360deg
            );
        }

        .wheel-pointer {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid var(--accent-cyan);
            position: absolute;
            top: -10px;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,242,254,0.5));
        }

        /* Системные уведомления */
        .result-log {
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .win-text { color: #2ecc71; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .lose-text { color: #e74c3c; text-shadow: 0 0 10px rgba(231, 76, 60, 0.3); }

        /* Футер */
        footer {
            text-align: center;
            padding: 40px;
            color: #4a5a70;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.02);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Kraken</div>
        <div class="balance-container">
            <span class="balance-label">Ваша казна:</span>
            <span class="balance-value" id="balance-display">10,000 🪙</span>
        </div>
    </header>

    <main>
        <div class="games-grid">

            <div class="casino-card">
                <div class="card-title">⚓ Кракен-Слоты</div>
                <div class="slots-display">
                    <div class="slot-reel" id="slot1">🐙</div>
                    <div class="slot-reel" id="slot2">🐙</div>
                    <div class="slot-reel" id="slot3">🐙</div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="slot-bet" value="100" min="10">
                </div>
                <button class="btn" onclick="playSlots()" id="slot-btn">Испытать удачу</button>
                <div class="result-log" id="slot-res" style="margin-top: 15px;"></div>
            </div>

            <div class="casino-card">
                <div class="card-title">🎲 Кости Бездны</div>
                <div class="dice-display">
                    <div class="dice-cube" id="dice1">1</div>
                    <div class="dice-cube" id="dice2">1</div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="dice-bet" value="100" min="10">
                </div>
                <button class="btn" onclick="playDice()" id="dice-btn">Бросить кости</button>
                <div class="result-log" id="dice-res" style="margin-top: 15px;"></div>
            </div>

            <div class="casino-card">
                <div class="card-title">🎡 Колесо Судьбы</div>
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div class="wheel" id="wheel"></div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="wheel-bet" value="100" min="10">
                </div>
                <button class="btn" onclick="spinWheel()" id="wheel-btn">Вращать</button>
                <div class="result-log" id="wheel-res" style="margin-top: 15px;"></div>
            </div>

        </div>
    </main>

    <footer>
        © 2026 KRAKEN ENTERTAINMENT | Designed for Premium Experience
    </footer>

    <script>
        // Инициализация баланса игроков
        let balance = parseInt(localStorage.getItem('kraken_balance')) || 10000;
        const emojis = ['🐙', '💎', '🪙', '🔱', '🏴‍☠️', '⚔️'];
        const wheelMultipliers = [2, 0, 5, 0.5, 3, 0]; // Соответствует секторам колеса

        function updateBalanceDisplay() {
            document.getElementById('balance-display').textContent = balance.toLocaleString() + " 🪙";
            localStorage.setItem('kraken_balance', balance);
        }
        updateBalanceDisplay();

        function checkBet(betAmount) {
            if (isNaN(betAmount) || betAmount <= 0) {
                alert("Введите корректную сумму ставки!");
                return false;
            }
            if (betAmount > balance) {
                alert("Недостаточно монет в казне Кракена!");
                return false;
            }
            return true;
        }

        // Логика Слотов
        function playSlots() {
            const bet = parseInt(document.getElementById('slot-bet').value);
            if (!checkBet(bet)) return;

            balance -= bet;
            updateBalanceDisplay();
            
            const btn = document.getElementById('slot-btn');
            btn.disabled = true;
            
            let intervals = [];
            // Эффект вращения барабанов
            for(let i=1; i<=3; i++) {
                intervals.push(setInterval(() => {
                    document.getElementById(`slot${i}`).textContent = emojis[Math.floor(Math.random() * emojis.length)];
                }, 70));
            }

            setTimeout(() => {
                intervals.forEach(clearInterval);
                
                // Финальные результаты
                const res1 = emojis[Math.floor(Math.random() * emojis.length)];
                const res2 = emojis[Math.floor(Math.random() * emojis.length)];
                const res3 = emojis[Math.floor(Math.random() * emojis.length)];

                document.getElementById('slot1').textContent = res1;
                document.getElementById('slot2').textContent = res2;
                document.getElementById('slot3').textContent = res3;

                const log = document.getElementById('slot-res');

                if (res1 === res2 && res2 === res3) {
                    let win = bet * 10;
                    balance += win;
                    log.innerHTML = `<span class="win-text">ДЖЕКПОТ КРАКЕНА! +${win} 🪙</span>`;
                } else if (res1 === res2 || res2 === res3 || res1 === res3) {
                    let win = Math.floor(bet * 2);
                    balance += win;
                    log.innerHTML = `<span class="win-text">Малый выигрыш! +${win} 🪙</span>`;
                } else {
                    log.innerHTML = `<span class="lose-text">Морская бездна забрала ставку</span>`;
                }

                updateBalanceDisplay();
                btn.disabled = false;
            }, 1200);
        }

        // Логика Костей
        function playDice() {
            const bet = parseInt(document.getElementById('dice-bet').value);
            if (!checkBet(bet)) return;

            balance -= bet;
            updateBalanceDisplay();

            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;

            document.getElementById('dice1').textContent = d1;
            document.getElementById('dice2').textContent = d2;

            const total = d1 + d2;
            const log = document.getElementById('dice-res');

            if (total >= 8) {
                let win = Math.floor(bet * 1.8);
                balance += win;
                log.innerHTML = `<span class="win-text">Победа (${total})! Вы выиграли ${win} 🪙</span>`;
            } else {
                log.innerHTML = `<span class="lose-text">Увы, выпало ${total}. Нужно 8 или больше!</span>`;
            }
            updateBalanceDisplay();
        }

        // Логика Колеса Судьбы
        let currentRotation = 0;
        function spinWheel() {
            const bet = parseInt(document.getElementById('wheel-bet').value);
            if (!checkBet(bet)) return;

            balance -= bet;
            updateBalanceDisplay();

            const btn = document.getElementById('wheel-btn');
            btn.disabled = true;

            const randomDegrees = Math.floor(Math.random() * 360);
            // Делаем 5 полных оборотов + случайный сектор
            currentRotation += (360 * 5) + randomDegrees; 
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg) `;

            setTimeout(() => {
                // Высчитываем на какой сектор указывает стрелка (сверху, т.е. 0 градусов)
                const normalizedDegrees = (360 - (currentRotation % 360)) % 360;
                const sectorIndex = Math.floor(normalizedDegrees / 60);
                const mult = wheelMultipliers[sectorIndex];
                
                const log = document.getElementById('wheel-res');
                let win = Math.floor(bet * mult);
                balance += win;

                if (mult > 1) {
                    log.innerHTML = `<span class="win-text">Множитель x${mult}! Получено ${win} 🪙</span>`;
                } else if (mult === 1 || mult === 0.5) {
                    log.innerHTML = `<span class="win-text">Возврат x${mult}: ${win} 🪙</span>`;
                } else {
                    log.innerHTML = `<span class="lose-text">Сектор ZERO! Ставка потеряна</span>`;
                }

                updateBalanceDisplay();
                btn.disabled = false;
            }, 3000); // Синхронизировано с CSS animation
        }
    </script>
</body>
</html>
