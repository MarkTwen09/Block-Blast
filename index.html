<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baza NFT Store</title>
    <style>
        :root {
            --bg-color: #010101;
            --card-bg: #1c1c1e;
            --accent: #0088cc;
            --star-gold: #febd2d;
            --rarity-common: #4a4a4a;
            --rarity-rare: #007aff;
            --rarity-epic: #af52de;
            --rarity-legend: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        /* --- UI Elements --- */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }

        .balance-card {
            background: #1c1c1e;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        /* --- Tabs Logic --- */
        .content-section {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .content-section.active { display: block; }

        /* --- Roulette (Case Tab) --- */
        .case-preview {
            text-align: center;
            margin-bottom: 30px;
        }

        .roulette-container {
            position: relative;
            width: 100%;
            height: 180px;
            background: #111;
            margin: 20px 0;
            overflow: hidden;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .roulette-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--star-gold);
            z-index: 5;
            box-shadow: 0 0 15px var(--star-gold);
        }

        .track {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
        }

        /* --- NFT Card Style (как на скринах) --- */
        .nft-card {
            min-width: 130px;
            height: 150px;
            margin: 0 10px;
            background: #2c2c2e;
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 4px solid var(--rarity-common);
        }

        .nft-card.rare { border-bottom-color: var(--rarity-rare); }
        .nft-card.epic { border-bottom-color: var(--rarity-epic); box-shadow: inset 0 0 20px rgba(175, 82, 222, 0.2); }
        .nft-card.legend { border-bottom-color: var(--rarity-legend); box-shadow: 0 0 20px rgba(255, 149, 0, 0.3); }

        .nft-image {
            font-size: 50px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .nft-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .nft-name {
            font-size: 13px;
            font-weight: bold;
        }

        /* --- Navigation --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #1c1c1e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #888;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* --- Market/Inventory Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .market-item {
            background: #1c1c1e;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-sell { background: #ff3b30; }

        /* --- Win Overlay --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glow-effect {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px var(--star-gold)); }
            50% { filter: drop-shadow(0 0 20px var(--star-gold)); }
            100% { filter: drop-shadow(0 0 5px var(--star-gold)); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="font-weight: 900; font-size: 20px;">BAZA <span style="color:var(--accent)">SHOP</span></div>
        <div class="balance-card">
            <span id="stars-balance">1000</span> <span style="color:var(--star-gold)">⭐️</span>
        </div>
    </div>

    <section id="tab-cases" class="content-section active">
        <div class="case-preview">
            <h1 style="margin-bottom: 5px;">Chill Flame Case</h1>
            <p style="color:#666">Содержит редкие факелы и лампы</p>
        </div>

        <div class="roulette-container">
            <div class="roulette-line"></div>
            <div class="track" id="roulette-track"></div>
        </div>

        <button class="btn-action" id="spin-button" style="height: 60px; font-size: 18px;">Открыть за 100 ⭐️</button>
    </section>

    <section id="tab-inventory" class="content-section">
        <h2>Твоя Коллекция</h2>
        <div class="grid" id="inventory-grid">
            </div>
    </section>

    <section id="tab-market" class="content-section">
        <h2>Рынок NFT</h2>
        <p style="color:#888">Здесь ты можешь продать свои предметы и вернуть звезды.</p>
        <div class="grid" id="market-grid">
            </div>
    </section>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab('cases', this)">
            <span class="nav-icon">📦</span>
            <span>Кейсы</span>
        </div>
        <div class="nav-item" onclick="showTab('inventory', this)">
            <span class="nav-icon">🎒</span>
            <span>Инвентарь</span>
        </div>
        <div class="nav-item" onclick="showTab('market', this)">
            <span class="nav-icon">🏦</span>
            <span>Маркет</span>
        </div>
    </nav>
</div>

<div class="overlay" id="win-overlay">
    <h2 style="color: var(--star-gold); margin-bottom: 30px;">ВЫ ВЫБИЛИ NFT!</h2>
    <div id="winner-container"></div>
    <button class="btn-action" style="width: 200px; margin-top: 40px;" onclick="closeWin()">ЗАБРАТЬ</button>
</div>

<script>
    const NFT_DATA = [
        { id: 1, name: "Chill Flame", model: "Los Angeles", icon: "🔥", rarity: "common", chance: 65, sellPrice: 40 },
        { id: 2, name: "Blue Torch", model: "Tactical", icon: "💎", rarity: "rare", chance: 20, sellPrice: 150 },
        { id: 3, name: "Lava Lamp", model: "Retro", icon: "🏮", rarity: "epic", chance: 10, sellPrice: 500 },
        { id: 4, name: "Golden Star", model: "Legendary", icon: "⭐️", rarity: "legend", chance: 5, sellPrice: 2500 }
    ];

    let balance = 1000;
    let myNFTs = [];

    const track = document.getElementById('roulette-track');
    const spinBtn = document.getElementById('spin-button');

    function showTab(tabName, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        el.classList.add('active');
        if(tabName === 'inventory') renderInventory();
        if(tabName === 'market') renderMarket();
    }

    function createCard(nft) {
        return `
            <div class="nft-card ${nft.rarity}">
                <div class="nft-label">${nft.model}</div>
                <div class="nft-image">${nft.icon}</div>
                <div class="nft-name">${nft.name}</div>
            </div>
        `;
    }

    function initRoulette() {
        track.innerHTML = '';
        for(let i=0; i<60; i++) {
            const randomNFT = NFT_DATA[Math.floor(Math.random() * NFT_DATA.length)];
            track.innerHTML += createCard(randomNFT);
        }
    }

    async function spin() {
        if (balance < 100) return alert("Недостаточно звезд!");
        
        balance -= 100;
        updateBalance();
        spinBtn.disabled = true;

        initRoulette();
        
        // Математика шансов
        const rand = Math.random() * 100;
        let cumulative = 0;
        let winner = NFT_DATA[0];
        for(let n of NFT_DATA) {
            cumulative += n.chance;
            if(rand <= cumulative) { winner = n; break; }
        }

        // Подменяем 55-ю карточку на победителя
        const cards = track.querySelectorAll('.nft-card');
        cards[55].className = `nft-card ${winner.rarity}`;
        cards[55].innerHTML = `<div class="nft-label">${winner.model}</div><div class="nft-image glow-effect">${winner.icon}</div><div class="nft-name">${winner.name}</div>`;

        const cardWidth = 150; 
        const offset = (55 * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);

        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        
        setTimeout(() => {
            track.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.1, 1)';
            track.style.transform = `translateX(-${offset}px)`;
        }, 50);

        setTimeout(() => {
            myNFTs.push(winner);
            showWinnerOverlay(winner);
            spinBtn.disabled = false;
        }, 5500);
    }

    function showWinnerOverlay(nft) {
        const overlay = document.getElementById('win-overlay');
        document.getElementById('winner-container').innerHTML = createCard(nft);
        overlay.style.display = 'flex';
    }

    function closeWin() {
        document.getElementById('win-overlay').style.display = 'none';
    }

    function renderInventory() {
        const container = document.getElementById('inventory-grid');
        container.innerHTML = myNFTs.map(nft => `
            <div class="market-item">
                ${createCard(nft)}
                <div style="margin-top:10px; font-size:12px; color:#aaa">В коллекции</div>
            </div>
        `).join('');
    }

    function renderMarket() {
        const container = document.getElementById('market-grid');
        container.innerHTML = myNFTs.map((nft, index) => `
            <div class="market-item">
                ${createCard(nft)}
                <button class="btn-action btn-sell" onclick="sellNFT(${index})">Продать за ${nft.sellPrice} ⭐️</button>
            </div>
        `).join('');
    }

    function sellNFT(index) {
        const nft = myNFTs[index];
        balance += nft.sellPrice;
        myNFTs.splice(index, 1);
        updateBalance();
        renderMarket();
    }

    function updateBalance() {
        document.getElementById('stars-balance').innerText = balance;
    }

    spinBtn.addEventListener('click', spin);
    initRoulette();
    updateBalance();
</script>

</body>
</html>
