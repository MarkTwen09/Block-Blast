<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Strategic Warfare</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #0b0c10; color: #1f2833;
        }
        #map { width: 100%; height: 100%; background: #000; }
        
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1f2833; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #66fcf1;
        }
        .faction-btn {
            background: #0b0c10; border: 2px solid #66fcf1; padding: 15px 35px;
            color: #66fcf1; font-size: 18px; cursor: pointer; margin: 12px;
            font-weight: bold; width: 240px;
        }
        .faction-btn:hover { background: #66fcf1; color: #000; box-shadow: 0 0 20px #66fcf1; }

        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px;
            z-index: 1000; background: rgba(11, 12, 16, 0.95); border: 2px solid #66fcf1;
            padding: 12px; display: flex; justify-content: space-between;
            font-size: 11px; font-weight: bold; pointer-events: none; color: #66fcf1;
        }
        #hud-top span { color: #fff; }

        #control-panel {
            position: absolute; bottom: 12px; left: 12px; right: 12px;
            z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }
        .btn-row { display: flex; gap: 8px; width: 100%; }
        .btn {
            flex: 1; background: #0b0c10; color: #66fcf1; border: 2px solid #66fcf1;
            padding: 14px 5px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold;
        }
        .btn.active { background: #66fcf1; color: #000; box-shadow: 0 0 15px #66fcf1; }
        .btn-attack { border-color: #ffaa00; color: #ffaa00; background: rgba(30,20,10,0.9); }
        .btn-attack.active { background: #ffaa00; color: #000; box-shadow: 0 0 15px #ffaa00; }
        .btn-heavy { border-color: #ff3333; color: #ff3333; background: rgba(40,10,10,0.9); }
        .btn-heavy.active { background: #ff3333; color: #000; box-shadow: 0 0 15px #ff3333; }

        #log-panel {
            position: absolute; bottom: 180px; left: 12px; right: 12px; z-index: 1000;
            height: 75px; background: rgba(11, 12, 16, 0.9); border: 1px solid #45f3ff;
            padding: 6px; font-size: 9px; overflow: hidden; color: #66fcf1;
            display: flex; flex-direction: column-reverse; pointer-events: none;
        }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #66fcf1; padding-left: 4px; }
        .log-entry.enemy { border-left-color: #ff4d4d; color: #ff6666; }
        
        .marker-ally {
            background: #0b0c10; border: 2px solid #00ff66; color: #00ff66;
            font-size: 9px; font-weight: bold; text-align: center; line-height: 18px; border-radius: 3px;
            cursor: pointer !important;
        }
        .marker-enemy {
            background: #0b0c10; border: 2px solid #ff3333; color: #ff3333;
            font-size: 9px; font-weight: bold; text-align: center; line-height: 18px; border-radius: 3px;
            cursor: pointer !important;
        }
        .marker-uav-ally { color: #00ff66; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #00ff66; text-align: center; }
        .marker-missile { color: #ffffff; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px #ffffff; text-align: center; }
        .marker-heavy-missile { color: #ff3333; font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #ff0000; text-align: center; }
        
        .marker-uav-enemy { 
            color: #ff3333; font-size: 18px; font-weight: bold; text-shadow: 0 0 8px #ff3333; text-align: center;
            animation: radar-pulse 0.8s infinite alternate;
        }
        @keyframes radar-pulse {
            from { transform: scale(0.9); opacity: 0.7; }
            to { transform: scale(1.3); opacity: 1; text-shadow: 0 0 15px #ff0000; }
        }
    </style>
</head>
<body>

    <div id="faction-screen">
        <h1 style="letter-spacing: 5px; margin-bottom: 5px;">SKY IN FLAMES</h1>
        <p style="color: #45f3ff; font-size: 11px; margin-top: 0; letter-spacing: 2px;">STRATEGIC WARFARE v8.0</p>
        <button class="faction-btn" onclick="selectFaction('UA')">УКРАИНА [UA]</button>
        <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff4d4d; color:#ff4d4d;">РОССИЯ [RU]</button>
    </div>

    <div id="hud-top">
        <div>БЮДЖЕТ: <span id="txt-money">600</span>$</div>
        <div>РЕЗЕРВ: <span id="txt-drones">0</span> БПЛА</div>
        <div>ОБОРОНА: <span id="txt-hp">100%</span></div>
    </div>

    <div id="log-panel"></div>

    <div id="control-panel">
        <div class="btn-row">
            <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД (200$)</button>
            <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО (250$)</button>
        </div>
        <button class="btn btn-attack" id="btn-attack-mode" onclick="toggleAttackMode()">ВЫПУСТИТЬ ПАРУ БПЛА (-45$ / ед)</button>
        <button class="btn btn-heavy" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">ЗАПУСТИТЬ СТРАТЕГИЧЕСКУЮ РАКЕТУ (400$)</button>
    </div>

    <div id="map"></div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 51.00, lng: 34.80, name: 'Сумская обл.', hp: 100 },
                { lat: 48.00, lng: 37.80, name: 'Донбасс', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'Санкт-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов-на-Дону', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 56.32, lng: 44.00, name: 'Нижний Новгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодарский край', hp: 100 },
                { lat: 45.04, lng: 41.96, name: 'Ставропольский край', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 350; 
        
        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyFactories = [], enemyPVO = [], enemyDrones = [];
        let missiles = []; 
        let map;

        // Переменные для двухэтапного выбора (Завод -> Цель)
        let selectedSelectedFactory = null;

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            let btnHeavy = document.getElementById('btn-heavy-mode');
            btnHeavy.innerText = playerFaction === 'UA' ? 'ПУСК КР «НЕПТУН-М» (400$)' : 'ПУСК БР «ОРЕШНИК» (400$)';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([51.0, 36.0], window.innerWidth < 600 ? 5 : 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©CartoDB' }).addTo(map);

            spawnCities();
            setupMapClicks();
            
            setInterval(economyTick, 2500);
            setInterval(tacticalTick, 40); 
            setInterval(enemyAI, 8000); 

            addLog("Центр боевого управления развернут. Экономика переведена на жесткий режим.");
        }

        function spawnCities() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-ally', html: 'СИТИ', iconSize: [36, 18], iconAnchor: [18, 9] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map).bindPopup(`<b>${c.name}</b>`);
                
                let r = L.circle([c.lat, c.lng], { radius: 45000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.01, weight: 1, dashArray: '5,5' }).addTo(map);
                playerPVO.push({ lat: c.lat, lng: c.lng, marker: null, range: r, rangeDist: 45000, ammo: 0, maxAmmo: 0, isCityRadar: true, radarLine: null, angle: 0 });
            });
            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-enemy', html: 'ЦЕЛЬ', iconSize: [40, 18], iconAnchor: [20, 9] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function() {
                    if (currentMode === 'attack_target' && selectedSelectedFactory) {
                        executeTargetedAttack(selectedSelectedFactory, c);
                    } else if (currentMode === 'heavy_missile') {
                        executeHeavyMissileStrike(c);
                    }
                }).bindPopup(`<b>${c.name}</b>`);
                
                enemyPVO.push({ lat: c.lat, lng: c.lng, marker: null, rangeDist: 45000, ammo: 0, maxAmmo: 0, isCityRadar: true, angle: 0 });
            });
        }

        function toggleBuildMode(mode) {
            resetAttackState();
            if (currentMode === mode) currentMode = null;
            else currentMode = mode;
            document.getElementById('btn-factory').classList.toggle('active', currentMode === 'factory');
            document.getElementById('btn-pvo').classList.toggle('active', currentMode === 'pvo');
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') {
                resetAttackState();
            } else {
                if (droneInventory <= 0) { addLog("На складах нет готовых БПЛА для отправки."); return; }
                currentMode = 'attack_source';
                document.getElementById('btn-attack-mode').classList.add('active');
                document.getElementById('btn-factory').classList.remove('active');
                document.getElementById('btn-pvo').classList.remove('active');
                document.getElementById('btn-heavy-mode').classList.remove('active');
                addLog("ВЫБОР ИСТОЧНИКА: Кликните по вашему ЗАВОДУ (ЗАВ) или СИТИ на карте.");
            }
        }

        function toggleHeavyMissileMode() {
            if (currentMode === 'heavy_missile') {
                resetAttackState();
            } else {
                if (money < 400) { addLog("Недостаточно средств для стратегического пуска (Нужно 400$)."); return; }
                currentMode = 'heavy_missile';
                document.getElementById('btn-heavy-mode').classList.add('active');
                document.getElementById('btn-factory').classList.remove('active');
                document.getElementById('btn-pvo').classList.remove('active');
                document.getElementById('btn-attack-mode').classList.remove('active');
                addLog("🚨 ТАКТИЧЕСКОЕ НАВЕДЕНИЕ: Выберите КРАСНЫЙ маркер цели для ракетного удара!");
            }
        }

        function resetAttackState() {
            currentMode = null;
            selectedSelectedFactory = null;
            document.getElementById('btn-attack-mode').classList.remove('active');
            document.getElementById('btn-heavy-mode').classList.remove('active');
            document.getElementById('btn-factory').classList.remove('active');
            document.getElementById('btn-pvo').classList.remove('active');
        }

        function setupMapClicks() {
            map.on('click', function(e) {
                if (!currentMode || currentMode === 'attack_target' || currentMode === 'heavy_missile') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 200) {
                    money -= 200;
                    let icon = L.divIcon({ className: 'marker-ally', html: 'ЗАВ', iconSize: [32, 18], iconAnchor: [16, 9] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let factoryObj = { lat, lng, marker: m };
                    m.on('click', function() {
                        if (currentMode === 'attack_source') {
                            selectFactoryForAttack(factoryObj);
                        }
                    });
                    
                    playerFactories.push(factoryObj);
                    addLog("Построен новый завод БПЛА.");
                    toggleBuildMode(null);
                } else if (currentMode === 'pvo' && money >= 250) {
                    money -= 250;
                    let icon = L.divIcon({ className: 'marker-ally', html: 'ПВО', iconSize: [32, 18], iconAnchor: [16, 9] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let r = L.circle([lat, lng], { radius: 110000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.01, weight: 1 }).addTo(map);
                    let radarLine = L.polyline([[lat, lng], [lat, lng]], {color: '#00ff66', weight: 1.5, opacity: 0.6}).addTo(map);

                    playerPVO.push({ 
                        lat, lng, marker: m, range: r, rangeDist: 110000, 
                        ammo: 6, maxAmmo: 6, reloadTimer: 0, 
                        radarLine: radarLine, angle: Math.random() * 360, lastShot: 0
                    });
                    addLog("Батарея ПВО развернута на позиции.");
                    toggleBuildMode(null);
                }
            });
        }

        function selectFactoryForAttack(factoryObj) {
            selectedSelectedFactory = factoryObj;
            currentMode = 'attack_target';
            addLog("🏭 Завод выбран! Теперь кликните по КРАСНОМУ маркеру региона врага для удара.");
        }

        function executeTargetedAttack(source, targetCity) {
            let attackSize = Math.min(droneInventory, 2);
            let cost = attackSize * 45; 
            
            if (money < cost) { addLog(`Ошибка бюджета! Требуется: ${cost}$.`); resetAttackState(); return; }

            money -= cost;
            droneInventory -= attackSize;
            addLog(`Пара БПЛА успешно поднята с выбранного завода. Цель: [${targetCity.name}].`);

            for(let i=0; i < attackSize; i++) {
                createDroneTrack(source, targetCity, playerDrones, true, false);
            }
            resetAttackState();
        }

        function executeHeavyMissileStrike(targetCity) {
            money -= 400;
            let nameMissile = playerFaction === 'UA' ? 'Нептун-М' : 'Орешник';
            addLog(`🚀 КРИТИЧЕСКИЙ ПУСК: Стратегическая ракета «${nameMissile}» ушла на [${targetCity.name}]! (-400$)`);

            let startPoint = CITIES[playerFaction][0]; // Запуск из столицы
            createDroneTrack(startPoint, targetCity, playerDrones, true, true);
            resetAttackState();
        }

        function enemyAI() {
            enemyMoney += 60 + (enemyFactories.length * 15); // Тяжелая экономика и для бота

            // Бот покупает ПВО
            let activeEnemyPVO = enemyPVO.filter(p => !p.isCityRadar);
            if (activeEnemyPVO.length < 3 && enemyMoney >= 250 && playerFactories.length > 0) {
                enemyMoney -= 250;
                let targetFactory = playerFactories[Math.floor(Math.random() * playerFactories.length)];
                let protectedCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let lat = protectedCity.lat + (targetFactory.lat - protectedCity.lat) * 0.4;
                let lng = protectedCity.lng + (targetFactory.lng - protectedCity.lng) * 0.4;
                
                let icon = L.divIcon({ className: 'marker-enemy', html: 'ПВО', iconSize: [32, 18], iconAnchor: [16, 9] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                let r = L.circle([lat, lng], { radius: 110000, color: '#ff3333', fillColor: '#ff3333', fillOpacity: 0.01, weight: 1 }).addTo(map);
                
                enemyPVO.push({ lat, lng, marker: m, range: r, rangeDist: 110000, ammo: 4, maxAmmo: 4, reloadTimer: 0, angle: Math.random()*360, lastShot: 0 });
                return;
            }

            // Бот строит заводы
            if (enemyFactories.length < 2 && enemyMoney >= 200) {
                enemyMoney -= 200;
                let city = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let lat = city.lat + (Math.random() - 0.5) * 0.12;
                let lng = city.lng + (Math.random() - 0.5) * 0.12;
                let icon = L.divIcon({ className: 'marker-enemy', html: 'ЗАВ', iconSize: [32, 18], iconAnchor: [16, 9] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                enemyFactories.push({ lat, lng, marker: m, stock: 0 });
                return;
            }

            if (enemyFactories.length > 0) {
                enemyFactories[Math.floor(Math.random() * enemyFactories.length)].stock++;
            }

            let totalEnemyDrones = enemyFactories.reduce((acc, f) => acc + f.stock, 0);
            
            // Если у бота много денег, он может запустить стратегическую ракету!
            if (enemyMoney >= 450 && Math.random() < 0.3) {
                enemyMoney -= 400;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                let start = CITIES[enemyFaction][0];
                let nameMissile = enemyFaction === 'UA' ? 'Нептун-М' : 'Орешник';
                addLog(`⚠️ СТРАТЕГИЧЕСКАЯ ТРЕВОГА: Зафиксирован пуск ракеты «${nameMissile}» по нашему региону!`, true);
                createDroneTrack(start, target, enemyDrones, false, true);
                return;
            }

            // Обычный налет дронов ИИ
            if (totalEnemyDrones >= 3) {
                let launchSize = Math.min(totalEnemyDrones, 4);
                enemyMoney -= (launchSize * 45);
                addLog(`Внимание: Вражеские заводы запустили группу БПЛА из ${launchSize} единиц.`, true);

                let launched = 0;
                enemyFactories.forEach(f => {
                    while (f.stock > 0 && launched < launchSize) {
                        let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                        createDroneTrack(f, target, enemyDrones, false, false);
                        f.stock--; launched++;
                    }
                });
            }
        }

        function createDroneTrack(start, target, collection, isPlayer, isHeavyMissile) {
            let symbol = isHeavyMissile ? '🚀' : (isPlayer ? '▲' : '▼');
            let cls = isHeavyMissile ? 'marker-heavy-missile' : (isPlayer ? 'marker-uav-ally' : 'marker-uav-enemy');
            let icon = L.divIcon({ className: cls, html: symbol, iconSize: [20, 20], iconAnchor: [10, 10] });
            
            let marker = L.marker([start.lat, start.lng], { icon: icon });
            
            // Тяжелые ракеты и союзные дроны видны сразу всегда
            if (isPlayer || isHeavyMissile) marker.addTo(map);

            let curve = (Math.random() * 0.15) * (Math.random() > 0.5 ? 1 : -1); 
            // Тяжелая ракета летит ОЧЕНЬ быстро
            let baseSpeed = isHeavyMissile ? 0.0016 : 0.00012; 

            collection.push({
                id: Math.random().toString(36).substr(2, 9),
                marker: marker, lat: start.lat, lng: start.lng,
                currentLat: start.lat, currentLng: start.lng,
                targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                progress: 0, 
                speed: baseSpeed + (Math.random() * 0.00005), 
                curve: curve,
                isDetected: isHeavyMissile ? true : false, // Тяжелые ракеты не скрыть
                isHeavyMissile: isHeavyMissile,
                hitCount: 0 // Потребуется 2 попадания вблизи, чтобы сбить обычным ПВО (или близкий радиус рубежа)
            });
        }

        function economyTick() {
            // Заработок снижен: 25$ базовый, 10$ с заводов
            money += 25 + (playerFactories.length * 10);
            playerFactories.forEach(() => droneInventory++);
            reloadPVOList(playerPVO);
            reloadPVOList(enemyPVO);
            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
        }

        function reloadPVOList(list) {
            list.forEach(p => {
                if (!p.isCityRadar && p.ammo < p.maxAmmo) {
                    p.reloadTimer++;
                    if (p.reloadTimer >= 7) { p.ammo++; p.reloadTimer = 0; }
                }
            });
        }

        function tacticalTick() {
            updateRadarLines();
            processPlayerDrones();
            processEnemyDrones();
            processMissiles();
        }

        function updateRadarLines() {
            playerPVO.forEach(p => {
                if (p.radarLine) {
                    p.angle = (p.angle + 0.8) % 360; // МЕДЛЕННОЕ вращение радара для кинематографичности
                    let rad = p.angle * Math.PI / 180;
                    let endLat = p.lat + Math.sin(rad) * 1.1;
                    let endLng = p.lng + Math.cos(rad) * 1.1;
                    p.radarLine.setLatLngs([[p.lat, p.lng], [endLat, endLng]]);
                }
            });
        }

        function processPlayerDrones() {
            for (let i = playerDrones.length - 1; i >= 0; i--) {
                let d = playerDrones[i];
                d.progress += d.speed;

                if (d.progress >= 1) {
                    createExplosion(d.targetLat, d.targetLng, '#ff3333', d.isHeavyMissile ? 35000 : 20000);
                    map.removeLayer(d.marker);
                    playerDrones.splice(i, 1);
                    
                    let dmg = d.isHeavyMissile ? 40 : 20;
                    addLog(`УДАР: Цель [${d.targetName}] поражена! Нанесен урон ${dmg}%.`);
                    continue;
                }

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;
                d.currentLat = cLat; d.currentLng = cLng;
                d.marker.setLatLng([cLat, cLng]);

                // Вражеский автоматический огонь ПВО
                let now = Date.now();
                for (let j = enemyPVO.length - 1; j >= 0; j--) {
                    let pvo = enemyPVO[j];
                    if (!pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 5000) && map.distance([cLat, cLng], [pvo.lat, pvo.lng]) <= pvo.rangeDist) {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        // Бот стреляет только если это второй рубеж (близко к ПВО) или если ракета тяжелая
                        if (dist < 45000 || d.isHeavyMissile) {
                            pvo.ammo--; pvo.lastShot = now;
                            launchVisualMissile(pvo, d, false);
                            break;
                        }
                    }
                }
            }
        }

        function processEnemyDrones() {
            for (let i = enemyDrones.length - 1; i >= 0; i--) {
                let d = enemyDrones[i];
                d.progress += d.speed;

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;
                d.currentLat = cLat; d.currentLng = cLng;

                // Механика обнаружения ЛУЧОМ радара
                let detectedByBeam = false;
                let activeRadar = null;

                for (let j = 0; j < playerPVO.length; j++) {
                    let pvo = playerPVO[j];
                    let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                    
                    if (dist <= pvo.rangeDist) {
                        activeRadar = pvo;
                        if (pvo.isCityRadar) {
                            detectedByBeam = true; // Радары городов видят всё, но не стреляют
                        } else if (pvo.radarLine) {
                            // Проверяем, совпадает ли угол луча ПВО с углом на дрон
                            let angleToDrone = Math.atan2(cLat - pvo.lat, cLng - pvo.lng) * 180 / Math.PI;
                            if (angleToDrone < 0) angleToDrone += 360;
                            let diff = Math.abs(pvo.angle - angleToDrone);
                            if (diff < 12 || diff > 348) { // Луч пересек дрон!
                                detectedByBeam = true;
                            }
                        }
                    }
                }

                // Включаем видимость только если луч коснулся дрона
                if (detectedByBeam || d.isHeavyMissile) {
                    if (!d.isDetected) {
                        d.isDetected = true;
                        d.marker.addTo(map); // ПОЯВЛЯЕТСЯ на карте в реальном времени!
                        addLog(`📡 РЛС: Засечен сигнал! Объект движется на [${d.targetName}].`, true);
                    }
                    d.marker.setLatLng([cLat, cLng]);
                }

                if (d.progress >= 1) {
                    createExplosion(d.targetLat, d.targetLng, '#ff3333', d.isHeavyMissile ? 35000 : 20000);
                    if (d.isDetected) map.removeLayer(d.marker);
                    enemyDrones.splice(i, 1);
                    damagePlayerCity(d.targetName, d.isHeavyMissile);
                    continue;
                }

                // ПВО ИГРОКА: Медленный двухэтапный отстрел
                if (d.isDetected) {
                    let now = Date.now();
                    for (let j = playerPVO.length - 1; j >= 0; j--) {
                        let pvo = playerPVO[j];
                        if (!pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 6000)) {
                            let distanceToPVO = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                            
                            // УСЛОВИЕ: Стреляем ТОЛЬКО если дрон подошел близко (Внутренний рубеж обороны < 50 км)
                            if (distanceToPVO <= 55000 || d.isHeavyMissile) {
                                pvo.ammo--;
                                pvo.lastShot = now;
                                launchVisualMissile(pvo, d, true);
                                addLog(`🚀 ПВО: Объект вошел в зону поражения! Пуск перехватчика!`);
                                break; 
                            }
                        }
                    }
                }
            }
        }

        function launchVisualMissile(pvo, targetDrone, isAlly) {
            let icon = L.divIcon({ className: 'marker-missile', html: '○', iconSize: [12, 12], iconAnchor: [6, 6] });
            let marker = L.marker([pvo.lat, pvo.lng], { icon: icon }).addTo(map);

            missiles.push({
                marker: marker, lat: pvo.lat, lng: pvo.lng,
                droneId: targetDrone.id,
                targetCollection: isAlly ? enemyDrones : playerDrones,
                isAlly: isAlly, progress: 0,
                speed: 0.025 
            });
        }

        function processMissiles() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.progress += m.speed;

                let drone = m.targetCollection.find(d => d.id === m.droneId);
                if (!drone || m.progress >= 1) {
                    map.removeLayer(m.marker); missiles.splice(i, 1); continue;
                }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                if (map.distance([mLat, mLng], [drone.currentLat, drone.currentLng]) < 18000) {
                    map.removeLayer(m.marker);
                    missiles.splice(i, 1);

                    // Баланс шансов сбития:
                    // Если это тяжелая ракета (Орешник), шанс сбить всего 20%. Если дрон — 70%.
                    let baseChance = drone.isHeavyMissile ? 0.20 : 0.70;

                    if (Math.random() <= baseChance) {
                        createExplosion(drone.currentLat, drone.currentLng, m.isAlly ? '#00ffff' : '#ff3333', 14000);
                        if (drone.isDetected || !m.isAlly) map.removeLayer(drone.marker);
                        
                        let idx = m.targetCollection.indexOf(drone);
                        if (idx > -1) m.targetCollection.splice(idx, 1);

                        if (m.isAlly) addLog("💥 ПВО: Цель успешно уничтожена противоракетой!");
                        else addLog("🔥 Потеря: Наш БПЛА перехвачен системой ПВО противника.", true);
                    } else {
                        if (m.isAlly) addLog("⚠️ ПВО: Промах перехватчика! Объект продолжает движение!");
                        else addLog("Инфо: Наш объект прорвал противоракетный заслон!");
                    }
                    break;
                }
            }
        }

        function damagePlayerCity(name, isHeavy) {
            let city = CITIES[playerFaction].find(c => c.name === name);
            if (city) {
                let damage = isHeavy ? 40 : 20;
                city.hp -= damage; 
                if (city.hp < 0) city.hp = 0;
                addLog(`КРИТИЧЕСКИЙ УДАР: Регион [${name}] понес потери. Целостность: ${city.hp}%`, true);
                
                let total = 0;
                CITIES[playerFaction].forEach(c => total += c.hp);
                let avg = Math.round(total / 7); 
                document.getElementById('txt-hp').innerText = avg + "%";
                
                if (avg <= 0) {
                    alert("Все оборонные регионы стерты. Стратегическое поражение.");
                    location.reload();
                }
            }
        }

        function createExplosion(lat, lng, color, maxR) {
            let exp = L.circle([lat, lng], { radius: 1000, color: color, fillColor: color, fillOpacity: 0.6 }).addTo(map);
            let r = 1000;
            let int = setInterval(() => {
                r += 4000; exp.setRadius(r);
                if(r > maxR) { clearInterval(int); map.removeLayer(exp); }
            }, 30);
        }

        function addLog(text, isEnemy = false) {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${isEnemy ? 'enemy' : ''}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
