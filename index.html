<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Snap Elite</title>
    <style>
        :root { --bg: #050509; --panel: rgba(11, 11, 20, 0.95); --violet: #a78bfa; --gold: #ffd700; --rainbow: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; height: 100vh; width: 100vw; }

        /* ТРЯСКА */
        .shake { animation: shakeAnim 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, -1px, 0); } 40%, 60% { transform: translate3d(3px, 1px, 0); } }

        /* FEVER MODE PULSE */
        @keyframes feverPulse { 0% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.2); } 50% { box-shadow: 0 0 50px rgba(167, 139, 250, 0.6); border-color: var(--violet); } 100% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.2); } }
        .fever-active { animation: feverPulse 1.5s infinite ease-in-out !important; }

        #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.8s; }
        .icon-main { width: 80px; height: 80px; background: linear-gradient(135deg, #ffd700, #b8860b); border-radius: 18px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.4); animation: iconFloat 2s infinite ease-in-out; }
        .splash-title { margin-top: 30px; font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: 5px; }
        @keyframes iconFloat { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.1) translateY(-15px); } }

        .particle { position: absolute; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 10; }
        .score-popup { position: fixed; transform: translate(-50%, -100%); font-size: 24px; font-weight: 900; color: var(--gold); pointer-events: none; z-index: 100; animation: scorePop 0.8s forwards; }
        @keyframes scorePop { from { opacity: 1; transform: translate(-50%, -100%) scale(0.5); } to { opacity: 0; transform: translate(-50%, -300%) scale(1.5); } }

        .praise-popup { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); font-size: 42px; font-weight: 900; font-style: italic; text-shadow: 0 0 20px rgba(255,255,255,0.5); pointer-events: none; z-index: 150; animation: praiseAnim 1s ease-out forwards; }
        @keyframes praiseAnim { 0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, 0) scale(1.2); } 80% { opacity: 1; transform: translate(-50%, -40px) scale(1); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); } }

        #combo-popup { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0.5); font-size: 48px; font-weight: 900; background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; z-index: 200; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #combo-popup.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #ambient-bg { position: absolute; inset: 0; z-index: -1; transition: background 2s ease; background: radial-gradient(circle at 50% 50%, rgba(109, 40, 217, 0.2), transparent 70%); }
        #header { margin-top: env(safe-area-inset-top, 20px); text-align: center; width: 100%; z-index: 5; }
        #score { font-size: 64px; font-weight: 900; background: linear-gradient(#fff, var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        canvas { background: var(--panel); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); max-width: 95vw; margin-top: 5px; transition: all 0.3s; transform-origin: center center; }

        /* --- ОБНОВЛЕННЫЙ ЭКРАН ПОРАЖЕНИЯ --- */
        #game-over { 
            position: fixed; inset: 0; 
            background: rgba(5, 5, 9, 0.8); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 500; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .go-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 80%; max-width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .go-title { 
            color: #ff4d4d; font-size: 42px; font-weight: 900; margin: 0; 
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.5); letter-spacing: 2px;
        }
        #final-score { 
            font-size: 72px; font-weight: 900; margin: 10px 0;
            background: linear-gradient(#fff, #ccc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .go-best { font-size: 14px; color: var(--gold); opacity: 0.8; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-restart { 
            background: linear-gradient(135deg, #6d28d9, #a78bfa); 
            border: none; padding: 18px 50px; color: white; font-size: 20px; 
            border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 25px rgba(109, 40, 217, 0.4);
            transition: transform 0.2s; animation: btnPulse 2s infinite;
        }
        .btn-restart:active { transform: scale(0.95); }
        @keyframes btnPulse { 0% { box-shadow: 0 0 0 0 rgba(109, 40, 217, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(109, 40, 217, 0); } 100% { box-shadow: 0 0 0 0 rgba(109, 40, 217, 0); } }
    </style>
</head>
<body>
    <div id="splash"><div class="icon-main"></div><div class="splash-title">Block Snap</div></div>
    <div id="combo-popup">COMBO!</div>
    <div id="ambient-bg"></div>
    <div id="header"><div id="score">0</div><div style="font-size: 12px; opacity: 0.4;">BEST: <span id="best-val">0</span></div></div>
    <canvas id="gameCanvas"></canvas>

    <div id="game-over">
        <div class="go-card">
            <h1 class="go-title">ФИНИШ</h1>
            <div id="final-score">0</div>
            <div class="go-best">РЕКОРД: <span id="go-best-val">0</span></div>
            <button class="btn-restart" onclick="resetGame()">ЗАНОВО</button>
        </div>
    </div>

<script>
window.addEventListener('load', () => { setTimeout(() => { const s = document.getElementById('splash'); s.style.opacity = '0'; setTimeout(() => s.style.visibility = 'hidden', 800); }, 2000); });

const AudioEngine = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) { try { this.init(); const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const g = this.ctx.createGain(); osc.connect(g); g.connect(this.ctx.destination); if(type==='pick'){ osc.frequency.setValueAtTime(400,now); g.gain.setValueAtTime(0.1,now); g.gain.linearRampToValueAtTime(0,now+0.1); osc.start(); osc.stop(now+0.1); } if(type==='place'){ osc.type='triangle'; osc.frequency.setValueAtTime(150,now); g.gain.setValueAtTime(0.2,now); g.gain.linearRampToValueAtTime(0,now+0.1); osc.start(); osc.stop(now+0.1); } if(type==='clear'){ osc.frequency.setValueAtTime(800,now); g.gain.setValueAtTime(0.1,now); g.gain.linearRampToValueAtTime(0,now+0.3); osc.start(); osc.stop(now+0.3); } } catch(e){} }
};

function createFirework(x, y) { for (let i = 0; i < 6; i++) { const p = document.createElement('div'); p.className = 'particle'; document.body.appendChild(p); const angle = Math.random() * Math.PI * 2; const vel = 1 + Math.random() * 3; let px = x, py = y, op = 1; const vx = Math.cos(angle) * vel, vy = Math.sin(angle) * vel; const anim = () => { px += vx; py += vy; op -= 0.04; p.style.left = px+'px'; p.style.top = py+'px'; p.style.opacity = op; if(op > 0) requestAnimationFrame(anim); else p.remove(); }; requestAnimationFrame(anim); } }
function showFloatingScore(text, x, y) { const p = document.createElement('div'); p.className = 'score-popup'; p.innerText = text; p.style.left = x + 'px'; p.style.top = y + 'px'; document.body.appendChild(p); setTimeout(() => p.remove(), 800); }

function showPraise(lines, streak) {
    const praises = ["NICE!", "GREAT!", "AMAZING!", "EPIC!", "UNBELIEVABLE!", "INSANE!", "UNSTOPPABLE!"];
    let index = Math.min(lines + streak - 1, praises.length - 1);
    const p = document.createElement('div');
    p.className = 'praise-popup';
    p.innerText = praises[index];
    p.style.color = (streak >= 3) ? "#ffd700" : "#fff";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
}

const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); const GRID = 8;
let CELL = Math.floor(window.innerWidth * 0.11); const GAP = 5, BOARD_PAD = 10; canvas.width = (CELL + GAP) * GRID + BOARD_PAD * 2; canvas.height = canvas.width + 150;

let score = 0, best = localStorage.getItem('bb_apk_best') || 0;
let feverStreak = 0, dragStartTime = 0, dragTrails = []; 
document.getElementById('best-val').innerText = best;
let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [], dragging = null, dragOff = {x:0, y:0};

const COLORS = { r: ["#ff7f7f", "#ff4d4d"], g: ["#86efac", "#4ade80"], b: ["#7dd3fc", "#3b82f6"], y: ["#fef08a", "#facc15"], p: ["#d8b4fe", "#a855f7"], c: ["#a5f3fc", "#22d3ee"], o: ["#fdba74", "#fb923c"] };

function drawBlock(x, y, size, colorKey, alpha = 1, special = null) {
    ctx.save(); ctx.globalAlpha = alpha;
    if(special==='hint'){ ctx.shadowBlur=15; ctx.shadowColor="#ffd700"; ctx.fillStyle="rgba(255,215,0,0.4)"; }
    else if(special==='grid-hit'){ ctx.shadowBlur=20; ctx.shadowColor=COLORS[colorKey][1]; ctx.fillStyle="rgba(255, 255, 255, 0.6)"; }
    else { 
        let grad = ctx.createLinearGradient(x, y, x + size, y + size); grad.addColorStop(0, COLORS[colorKey][0]); grad.addColorStop(1, COLORS[colorKey][1]);
        ctx.shadowBlur = 10; ctx.shadowColor = COLORS[colorKey][1]; ctx.fillStyle = grad;
    }
    ctx.beginPath(); ctx.roundRect(x, y, size, size, 8); ctx.fill(); 

    if(special !== 'hint' && special !== 'grid-hit') {
        let glarePos = (Date.now() / 1500) % 2; 
        if(glarePos > 1) glarePos = 2 - glarePos; 
        ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
        ctx.beginPath(); ctx.roundRect(x + (size * 0.2), y + (size * glarePos), size * 0.6, size * 0.1, 8); ctx.fill();
    }
    ctx.restore();
}

function spawn() {
    shapes = []; const step = canvas.width/3;
    const defs = [{m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1,1]], c:'b'}, {m:[[1,1,1]], c:'c'}, {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'}];
    for(let i=0; i<3; i++) {
        let p = defs[Math.floor(Math.random()*defs.length)]; let w = p.m[0].length*(CELL*0.5);
        shapes.push({ ...p, x:(step*i)+(step-w)/2, y:canvas.height-110, ox:(step*i)+(step-w)/2, oy:canvas.height-110, scale:0.5, targetScale:0.5 });
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    for(let r=0; r<GRID; r++) for(let c=0; c<GRID; c++) {
        let bx=BOARD_PAD+c*(CELL+GAP), by=BOARD_PAD+r*(CELL+GAP);
        if(board[r][c]) drawBlock(bx, by, CELL, board[r][c]);
        else { ctx.fillStyle="rgba(255,255,255,0.03)"; ctx.beginPath(); ctx.roundRect(bx, by, CELL, CELL, 8); ctx.fill(); }
    }
    let idlePulse = 1 + Math.sin(Date.now() / 1000) * 0.02;

    dragTrails.forEach((t) => {
        ctx.save(); ctx.globalAlpha = t.a; ctx.shadowBlur = 8; ctx.shadowColor = t.color; ctx.fillStyle = t.color;
        ctx.beginPath(); let currentR = t.r * (t.a / 0.6); ctx.arc(t.x, t.y, currentR > 0 ? currentR : 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        t.a -= 0.025; t.x += t.vx; t.y += t.vy;
    });
    dragTrails = dragTrails.filter(t => t.a > 0);

    if(dragging) {
        let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
        let centerX = dragging.x + (dragging.m[0].length * (CELL) / 2);
        let centerY = dragging.y + (dragging.m.length * (CELL) / 2);
        for(let i=0; i<3; i++) { dragTrails.push({ x: centerX + (Math.random()-0.5)*30, y: centerY + (Math.random()-0.5)*30, vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5, r: Math.random()*4 + 2, a: 0.6, color: COLORS[dragging.c][0] }); }
        if(Date.now() - dragStartTime > 1500) {
            let canBe = false; for(let r=0; r<=GRID-dragging.m.length; r++) { for(let c=0; c<=GRID-dragging.m[0].length; c++) { if(canPlace(dragging,c,r)) canBe = true; } }
            if(canBe) { dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(dragging.x+ci*(CELL+GAP), dragging.y+ri*(CELL+GAP), CELL, dragging.c, 0.4, 'hint'); })); }
        }
        if(canPlace(dragging, gx, gy)) { dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(BOARD_PAD+(gx+ci)*(CELL+GAP), BOARD_PAD+(gy+ri)*(CELL+GAP), CELL, dragging.c, 0.3); })); }
        dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(dragging.x+ci*(CELL+GAP), dragging.y+ri*(CELL+GAP), CELL, dragging.c, 1); }));
    }

    shapes.forEach(s => { 
        if(s!==dragging) {
            s.scale+=(s.targetScale-s.scale)*0.2; 
            let sz=(CELL*s.scale) * (s.scale < 0.6 ? idlePulse : 1); let g=(GAP*s.scale); 
            s.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(s.x+ci*(sz+g), s.y+ri*(sz+g), sz, s.c); })); 
        }
    });
    requestAnimationFrame(draw);
}

function canPlace(sh, gx, gy) {
    if(gx<0 || gy<0 || gx+sh.m[0].length>GRID || gy+sh.m.length>GRID) return false;
    for(let r=0; r<sh.m.length; r++) for(let c=0; c<sh.m[0].length; c++) if(sh.m[r][c] && board[gy+r][gx+c]) return false;
    return true;
}

const getP = e => { let r=canvas.getBoundingClientRect(); let cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; return { x:(cx-r.left)*(canvas.width/r.width), y:(cy-r.top)*(canvas.height/r.height) }; };

canvas.addEventListener('touchstart', e => {
    let p=getP(e); AudioEngine.init();
    shapes.forEach(s => { if(p.x>s.x-20 && p.x<s.x+80 && p.y>s.y-20 && p.y<s.y+100) { 
        dragging=s; s.targetScale=1; dragOff={x:p.x-s.x, y:p.y-s.y}; AudioEngine.play('pick'); dragStartTime = Date.now(); 
    } });
});
window.addEventListener('touchmove', e => { if(dragging){ e.preventDefault(); let p=getP(e); dragging.x=p.x-dragOff.x; dragging.y=p.y-dragOff.y; } }, {passive:false});
window.addEventListener('touchend', () => {
    if(!dragging) return; let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
    if(canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v) { board[gy+r][gx+c]=dragging.c; drawBlock(BOARD_PAD+(gx+c)*(CELL+GAP), BOARD_PAD+(gy+r)*(CELL+GAP), CELL, dragging.c, 1, 'grid-hit'); } }));
        AudioEngine.play('place'); if(navigator.vibrate) navigator.vibrate(20); score+=20; updateS(); shapes=shapes.filter(s=>s!==dragging); if(shapes.length===0) spawn(); checkL(); checkGameOver();
    } else { dragging.x=dragging.ox; dragging.y=dragging.oy; dragging.targetScale=0.5; } dragging=null;
});

function triggerShake() { canvas.classList.remove('shake'); void canvas.offsetWidth; canvas.classList.add('shake'); setTimeout(() => canvas.classList.remove('shake'), 200); }

function updateS() {
    document.getElementById('score').innerText=score;
    if(score>best){ best=score; localStorage.setItem('bb_apk_best', best); document.getElementById('best-val').innerText=best; }
}

function checkL() {
    let rc=[], cc=[]; const comboText = document.getElementById('combo-popup');
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rc.push(r); for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cc.push(c);
    let clearedLines = rc.length + cc.length;
    if(clearedLines > 0) {
        feverStreak++; triggerShake();
        if(clearedLines >= 2 || feverStreak >= 3) { showPraise(clearedLines, feverStreak); }
        if(feverStreak >= 3) { canvas.classList.add('fever-active'); }
        if(clearedLines > 1 || feverStreak > 1) { comboText.innerText = feverStreak >= 3 ? `FEVER x${feverStreak}!` : `COMBO x${clearedLines}`; comboText.classList.add('active'); setTimeout(() => comboText.classList.remove('active'), 600); }
        AudioEngine.play('clear'); const rect = canvas.getBoundingClientRect();
        let points = clearedLines * 150; if(feverStreak >= 3) points *= 2; 
        rc.forEach(r => { const by = rect.top + BOARD_PAD + r*(CELL+GAP); for(let c=0; c<GRID; c++) createFirework(rect.left + BOARD_PAD + c*(CELL+GAP) + CELL/2, by + CELL/2); showFloatingScore(`+${points}`, rect.left + rect.width/2, by); board[r].fill(null); });
        cc.forEach(c => { const bx = rect.left + BOARD_PAD + c*(CELL+GAP); showFloatingScore(`+${points}`, bx + CELL/2, rect.top + rect.height/2); board.forEach((r, ri) => { if(board[ri][c]) createFirework(rect.left + BOARD_PAD + c*(CELL+GAP) + CELL/2, rect.top + BOARD_PAD + ri*(CELL+GAP) + CELL/2); board[ri][c]=null; }); });
        score += points; updateS();
    } else { feverStreak = 0; canvas.classList.remove('fever-active'); }
}

function checkGameOver() {
    let canMove = false; if(shapes.length === 0) return;
    shapes.forEach(sh => { for(let r=0; r<=GRID-sh.m.length; r++) { for(let c=0; c<=GRID-sh.m[0].length; c++) { if(canPlace(sh, c, r)) canMove = true; } } });
    if(!canMove) {
        document.getElementById('final-score').innerText = score;
        document.getElementById('go-best-val').innerText = best;
        document.getElementById('game-over').style.display = 'flex';
    }
}

function resetGame() { board=board.map(r=>r.fill(null)); score=0; feverStreak=0; canvas.classList.remove('fever-active'); updateS(); document.getElementById('game-over').style.display='none'; spawn(); }
spawn(); draw();
</script>
</body>
</html>
