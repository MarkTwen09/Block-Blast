<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Cyber Tactical Interface</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --glow-ua: #00f2fe;
            --glow-ru: #ff0055;
            --glow-pvo: #38bdf8;
            --glow-bomber: #a855f7;
            --bg-cyber: rgba(10, 15, 30, 0.85);
            --border-cyber: 1px solid rgba(56, 189, 248, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #060913; color: #00f2fe; -webkit-user-select: none; user-select: none;
        }
        
        /* Главный контейнер для симуляции тряски всей карты */
        #viewport-wrapper {
            width: 100%; height: 100%; transition: transform 0.1s ease;
        }
        #map { width: 100%; height: 100%; background: #05070f; }
        
        /* Эффект виньетки и старого ЭЛТ-монитора */
        #monitor-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }

        /* Экран выбора фракции */
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070f; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: var(--bg-cyber); border: 1px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15); border-radius: 4px; padding: 30px;
            text-align: center; max-width: 400px; width: 100%; backdrop-filter: blur(10px);
        }
        .faction-btn {
            background: transparent; border: 1px solid var(--glow-ua); padding: 14px;
            color: var(--glow-ua); font-size: 12px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; letter-spacing: 2px; font-family: inherit;
            transition: all 0.3s; box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
        }
        .faction-btn:hover { background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 20px var(--glow-ua); text-shadow: 0 0 5px #fff; }

        /* Верхний Высокотехнологичный HUD */
        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
            background: var(--bg-cyber); border: var(--border-cyber);
            backdrop-filter: blur(12px); border-radius: 4px; padding: 12px;
            font-size: 11px; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .hud-value { font-weight: bold; color: #fff; text-shadow: 0 0 8px var(--glow-ua); }
        .hp-bar-container { width: 100%; background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; overflow: hidden; margin-top: 3px; }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hp-player { background: var(--glow-ua); box-shadow: 0 0 10px var(--glow-ua); }
        .hp-enemy { background: var(--glow-ru); box-shadow: 0 0 10px var(--glow-ru); }

        /* Логгер терминала */
        #log-container {
            position: absolute; bottom: 185px; left: 12px; right: 12px; z-index: 1010;
            background: var(--bg-cyber); border: var(--border-cyber); border-radius: 4px;
            transition: all 0.3s ease; overflow: hidden; backdrop-filter: blur(8px);
        }
        #log-header {
            background: rgba(255,255,255,0.03); padding: 8px 12px; font-size: 10px; font-weight: bold;
            color: #64748b; border-bottom: var(--border-cyber); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; pointer-events: auto;
        }
        #log-panel {
            height: 45px; padding: 6px 12px; font-size: 10px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; pointer-events: none;
            transition: height 0.3s ease; line-height: 1.4;
        }
        #log-container.expanded #log-panel { height: 120px; pointer-events: auto; }
        .log-entry { margin-bottom: 2px; color: var(--glow-ua); }
        .log-entry.enemy { color: var(--glow-ru); }
        .log-entry.system { color: #eab308; }

        /* Премиум Пульт Управления */
        #control-panel {
            position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000;
            display: flex; flex-direction: column; gap: 6px; pointer-events: auto;
        }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn {
            background: rgba(15, 23, 42, 0.7); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
            padding: 13px 4px; cursor: pointer; font-size: 10px; font-weight: bold;
            border-radius: 4px; font-family: inherit; transition: all 0.2s; letter-spacing: 1px;
        }
        .btn:hover:not(.disabled) { background: rgba(255,255,255,0.05); color: #fff; }
        .btn.active { background: rgba(0, 242, 254, 0.1); color: #fff; border-color: var(--glow-ua); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .btn.disabled { opacity: 0.15; cursor: not-allowed; border-color: transparent; }
        
        .btn-orange { border-color: rgba(249, 115, 22, 0.4); color: #f97316; }
        .btn-orange.active { background: rgba(249,115,22,0.15); border-color: #f97316; box-shadow: 0 0 15px #f97316; }
        
        .btn-purple { border-color: rgba(168, 85, 247, 0.4); color: #a855f7; }
        .btn-purple.active { background: rgba(168,85,247,0.15); border-color: #a855f7; box-shadow: 0 0 20px #a855f7; color: #fff; }
        
        .btn-red { border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
        .btn-red.active { background: rgba(239,68,68,0.15); border-color: #ef4444; box-shadow: 0 0 15px #ef4444; color: #fff; }

        /* ВЕКТОРНЫЕ НЕОНОВЫЕ СИЛУЭТЫ (ПРОЦЕДУРНЫЙ ДИЗАЙН) */
        .neon-uav-player {
            width: 0; height: 0;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 14px solid var(--glow-ua);
            filter: drop-shadow(0 0 5px var(--glow-ua));
        }
        .neon-uav-enemy {
            width: 0; height: 0;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 14px solid var(--glow-ru);
            filter: drop-shadow(0 0 5px var(--glow-ru));
        }
        /* Неоновый перехватчик ПВО */
        .neon-missile {
            width: 2px; height: 12px; background: var(--glow-pvo);
            box-shadow: 0 0 8px var(--glow-pvo), 0 0 2px #fff;
        }
        /* Стратегическая ракета ОТРК */
        .neon-heavy {
            width: 4px; height: 16px; background: #f97316;
            box-shadow: 0 0 10px #f97316; border-radius: 1px;
        }
        /* Тяжелый стелс-бомбардировщик Су */
        .neon-bomber {
            width: 0; height: 0;
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-bottom: 22px solid var(--glow-bomber);
            filter: drop-shadow(0 0 12px var(--glow-bomber)) blur(0.3px);
            animation: thrust-pulse 0.15s infinite alternate;
        }

        /* Высокотехнологичные маркеры городов */
        .city-marker {
            background: rgba(6, 9, 19, 0.85); border: 1px solid rgba(56, 189, 248, 0.4);
            color: #e2e8f0; font-size: 9px; font-weight: bold; border-radius: 2px; padding: 3px 6px;
            white-space: nowrap; box-shadow: 0 0 8px rgba(0,0,0,0.8);
            letter-spacing: 0.5px; transition: all 0.15s;
        }
        .city-marker.enemy { border-color: rgba(255, 0, 85, 0.4); color: #fecdd3; }
        
        /* Жесткая тряска при попадании */
        .shake-hit { animation: hard-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; border-color: #ff0055 !important; box-shadow: 0 0 15px #ff0055 !important; }

        .build-marker {
            background: #060913; border: 1px solid var(--glow-pvo); color: var(--glow-pvo);
            font-size: 8px; font-weight: bold; border-radius: 2px; text-align: center; line-height: 12px;
            box-shadow: 0 0 8px rgba(56,189,248,0.3); padding: 0 2px;
        }

        /* Всплывающий текст цифрового урона */
        .damage-popup {
            font-size: 12px; font-weight: bold; color: var(--glow-ru); font-family: monospace;
            text-shadow: 0 0 6px rgba(255,0,85,0.6); animation: float-damage 0.7s ease-out forwards;
        }

        @keyframes hard-shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        @keyframes float-damage {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-30px) scale(0.8); opacity: 0; }
        }
        @keyframes thrust-pulse {
            from { filter: drop-shadow(0 0 10px var(--glow-bomber)); }
            to { filter: drop-shadow(0 0 16px var(--glow-bomber)); }
        }
        @keyframes global-screen-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="monitor-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h2 style="letter-spacing: 3px; margin: 0 0 8px 0; font-size: 16px; color: #fff; text-shadow: 0 0 10px var(--glow-ua);">STRATEGIC VECTOR LINK</h2>
            <p style="color: #475569; font-size: 9px; margin: 0 0 30px 0; letter-spacing: 1px;">MILITARY GRID INITIALIZATION</p>
            <button class="faction-btn" onclick="selectFaction('UA')">STRIKE COMMAND [WEST-UA]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:var(--glow-ru); color:var(--glow-ru);">STRIKE COMMAND [EAST-RU]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>GRID FUNDS: <span id="txt-money" class="hud-value">600</span>$</div>
                <div>AIR HARDPOINTS: <span id="txt-drones" class="hud-value">0</span> UNITS</div>
            </div>
            <div class="hud-row" style="margin-top: 4px;">
                <div style="width: 48%;">
                    <div style="font-size:9px; color:#64748b; letter-spacing:0.5px;">HQ INTEGRITY: <span id="lbl-hp">100%</span></div>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player"></div></div>
                </div>
                <div style="width: 48%; text-align: right;">
                    <div style="font-size:9px; color:#64748b; letter-spacing:0.5px;">NODE DESTRUCTION: <span id="lbl-enemy-hp">100%</span></div>
                    <div class="hp-bar-container" style="margin-left: auto;"><div id="bar-enemy" class="hp-bar-fill hp-enemy"></div></div>
                </div>
            </div>
        </div>

        <div id="log-container">
            <div id="log-header" onclick="toggleLogHeight()">
                <span>📟 SECURE VECTOR DATA FEED</span>
                <span id="log-arrow">▲ EXPAND</span>
            </div>
            <div id="log-panel"></div>
        </div>

        <div id="control-panel">
            <div class="btn-row">
                <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] INTEL FAB ($400)</button>
                <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] PVO MATRIX ($500) <span id="pvo-counter">0/4</span></button>
            </div>
            <div class="btn-row">
                <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 LAUNCH DRONE PAIR (-$150)</button>
                <button class="btn btn-purple" id="btn-bomber-mode" onclick="toggleBomberMode()">💥 AVIA STRIKE: FAB-1500 (-$1500)</button>
            </div>
            <button class="btn btn-red" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">🚀 STRATEGIC KINETIC STRIKE (-$2000)</button>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 46.97, lng: 31.99, name: 'Николаев', hp: 100 },
                { lat: 48.62, lng: 22.28, name: 'Ужгород', hp: 100 },
                { lat: 50.91, lng: 34.80, name: 'Сумы', hp: 100 },
                { lat: 46.63, lng: 32.61, name: 'Херсон', hp: 100 },
                { lat: 47.83, lng: 35.13, name: 'Запорожье', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'С.-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 50.59, lng: 36.58, name: 'Белгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодар', hp: 100 },
                { lat: 44.61, lng: 33.52, name: 'Севастополь', hp: 100 },
                { lat: 48.01, lng: 37.80, name: 'Донецк', hp: 100 },
                { lat: 48.57, lng: 39.31, name: 'Луганск', hp: 100 },
                { lat: 45.04, lng: 41.97, name: 'Ставрополье', hp: 100 },
                { lat: 53.25, lng: 34.37, name: 'Брянск', hp: 100 },
                { lat: 51.73, lng: 36.19, name: 'Курск', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 300;

        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyPVO = [], enemyDrones = [];
        let missiles = [];
        let map, selectedFactory = null;
        
        const MAX_PVO_LIMIT = 4;

        function toggleLogHeight() {
            const container = document.getElementById('log-container');
            const arrow = document.getElementById('log-arrow');
            if (container.classList.contains('expanded')) {
                container.classList.remove('expanded');
                arrow.innerText = "▲ COLLAPSE";
            } else {
                container.classList.add('expanded');
                arrow.innerText = "▼ EXPAND";
            }
        }

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            document.getElementById('btn-heavy-mode').innerText = playerFaction === 'UA' ? '🚀 OTRK CRUISE LAUNCH (-$2000)' : '🚀 ICBM BALLISTIC LAUNCH (-$2000)';
            document.getElementById('btn-bomber-mode').innerText = playerFaction === 'UA' ? '💥 SQUADRON ATTACK: FAB-1500 (-$1500)' : '💥 TACTICAL BOMBER: FAB-1500 (-$1500)';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([50.5, 34.5], 5);
            
            // Абсолютно пустая кибер-карта без лишнего мусора для премиум контраста
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            renderOperationalRadar();
            setupRadarClicks();

            setInterval(economyCycle, 2500);
            setInterval(radarTick, 35); 
            setInterval(enemyAILogic, 5000);

            addLog("TACTICAL MATRIX ONLINE. READY FOR INPUT.", 'system');
            updateUIButtons();
        }

        function renderOperationalRadar() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker', html: `${c.name} [${c.hp}%]`, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map);
                
                // Вращающиеся линии сканирования радаров
                L.circle([c.lat, c.lng], { radius: 75000, color: 'rgba(0, 242, 254, 0.2)', fillColor: 'transparent', weight: 1, dashArray: '4,8' }).addTo(map);
                playerPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 75000, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0 });
            });

            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker enemy', html: c.name, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function() {
                    if (currentMode === 'attack_target' && selectedFactory) {
                        dispatchDroneStrike(selectedFactory, c);
                    } else if (currentMode === 'heavy_missile') {
                        dispatchHeavyStrike(c);
                    } else if (currentMode === 'bomber_strike') {
                        dispatchBomberStrike(c);
                    }
                });
                enemyPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 90000, ammo: 4, maxAmmo: 4, lastShot: 0, isCityRadar: true });
            });
        }

        function toggleBuildMode(mode) {
            if (mode === 'factory' && money < 400) return;
            if (mode === 'pvo' && (money < 500 || getPlacedPVOCount() >= MAX_PVO_LIMIT)) return;

            let last = currentMode; dropModes();
            if (last !== mode) {
                currentMode = mode;
                document.getElementById(`btn-${mode}`).classList.add('active');
            }
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') { dropModes(); return; }
            if (money < 150 || droneInventory < 2) { addLog("HARDPOINTS EMPTY.", 'enemy'); return; }
            
            dropModes(); currentMode = 'attack_source';
            document.getElementById('btn-attack-mode').classList.add('active');
            addLog("SELECT ORIGIN INTEL FAB FOR WING DEPLOYMENT.");
        }

        function toggleBomberMode() {
            if (currentMode === 'bomber_strike') { dropModes(); return; }
            if (money < 1500) { addLog("INSUFFICIENT FUNDS FOR BOMBER DEPLOYMENT.", 'enemy'); return; }
            
            dropModes(); currentMode = 'bomber_strike';
            document.getElementById('btn-bomber-mode').classList.add('active');
            addLog("TARGET LOCK REQUIRED: SELECT HOSTILE URBAN CENTER FOR FAB IMPACT.");
        }

        function toggleHeavyMissileMode() {
            if (currentMode === 'heavy_missile') { dropModes(); return; }
            if (money < 2000) { addLog("ORBITAL/KINETIC MATRIX LOCKED: NEED MORE FUNDS.", 'enemy'); return; }
            
            dropModes(); currentMode = 'heavy_missile';
            document.getElementById('btn-heavy-mode').classList.add('active');
            addLog("CHOOSE TARGET FOR STRATEGIC BALLISTIC IMPACT.");
        }

        function dropModes() {
            currentMode = null; selectedFactory = null;
            document.getElementById('btn-factory').classList.remove('active');
            document.getElementById('btn-pvo').classList.remove('active');
            document.getElementById('btn-attack-mode').classList.remove('active');
            document.getElementById('btn-bomber-mode').classList.remove('active');
            document.getElementById('btn-heavy-mode').classList.remove('active');
            updateUIButtons();
        }

        function getPlacedPVOCount() {
            return playerPVO.filter(p => !p.isCityRadar).length;
        }

        function updateUIButtons() {
            let pvoCount = getPlacedPVOCount();
            document.getElementById('pvo-counter').innerText = `${pvoCount}/${MAX_PVO_LIMIT}`;

            document.getElementById('btn-factory').classList.toggle('disabled', money < 400);
            document.getElementById('btn-pvo').classList.toggle('disabled', money < 500 || pvoCount >= MAX_PVO_LIMIT);
            document.getElementById('btn-attack-mode').classList.toggle('disabled', money < 150 || droneInventory < 2);
            document.getElementById('btn-bomber-mode').classList.toggle('disabled', money < 1500);
            document.getElementById('btn-heavy-mode').classList.toggle('disabled', money < 2000);
        }

        function setupRadarClicks() {
            map.on('click', function(e) {
                if (currentMode === 'attack_target' || currentMode === 'heavy_missile' || currentMode === 'bomber_strike') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 400) {
                    money -= 400;
                    let icon = L.divIcon({ className: 'build-marker', html: 'FAB', iconSize: [28, 14], iconAnchor: [14, 7] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    let fObj = { lat, lng, marker: m };
                    m.on('click', function(event) { 
                        L.DomEvent.stopPropagation(event);
                        if (currentMode === 'attack_source') selectFactoryForLaunch(fObj); 
                    });
                    playerFactories.push(fObj);
                    addLog("NEW SSEMBLY CELL CONSTRUCTED.");
                    dropModes();
                } else if (currentMode === 'pvo' && money >= 500 && getPlacedPVOCount() < MAX_PVO_LIMIT) {
                    money -= 500;
                    let icon = L.divIcon({ className: 'build-marker', html: 'PVO', iconSize: [28, 14], iconAnchor: [14, 7] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    L.circle([lat, lng], { radius: 140000, color: 'rgba(56, 189, 248, 0.4)', fillColor: 'transparent', weight: 1 }).addTo(map);
                    playerPVO.push({ lat, lng, marker: m, rangeDist: 140000, ammo: 5, maxAmmo: 5, lastShot: 0, isCityRadar: false });
                    addLog(`ANTI-AIR BATTERY ACTIVE (${getPlacedPVOCount()}/${MAX_PVO_LIMIT}).`);
                    dropModes();
                }
            });
        }

        function selectFactoryForLaunch(fObj) {
            selectedFactory = fObj; currentMode = 'attack_target';
            addLog("TARGET COORDINATES REQUIRED.");
        }

        function dispatchDroneStrike(source, targetCity) {
            money -= 150; droneInventory -= 2;
            addLog(`UAV VECTOR LOCK: TARGET AREA [${targetCity.name}].`);
            for(let i=0; i<2; i++) injectAirTarget(source, targetCity, playerDrones, true, 'drone');
            dropModes();
        }

        function dispatchBomberStrike(targetCity) {
            money -= 1500;
            addLog(`⚡ STRATEGIC PENETRATOR DEPLOYED. EN-ROUTE TO [${targetCity.name}].`, 'system');
            let start = CITIES[playerFaction][0]; 
            injectAirTarget(start, targetCity, playerDrones, true, 'bomber');
            dropModes();
        }

        function dispatchHeavyStrike(targetCity) {
            money -= 2000;
            addLog(`KINETIC BALLISTIC MISSILE TUBE DISCHARGED -> [${targetCity.name}].`);
            injectAirTarget(CITIES[playerFaction][0], targetCity, playerDrones, true, 'heavy');
            dropModes();
        }

        function enemyAILogic() {
            enemyMoney += 140;

            if (enemyMoney >= 2000) {
                enemyMoney -= 2000;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[🚨 DEEP THREAT] BALLISTIC TRAJECTORY DETECTED -> [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'heavy');
                return;
            }

            if (enemyMoney >= 240) {
                enemyMoney -= 150;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                let startPoint = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                addLog(`[⚠️ INBOUND] HOSTILE DRONE HARASSMENT TO [${target.name}]!`, 'enemy');
                for(let i=0; i<2; i++) {
                    injectAirTarget(startPoint, target, enemyDrones, false, 'drone');
                }
            }
        }

        function injectAirTarget(start, target, collection, isPlayer, type) {
            let angle = Math.atan2(target.lng - start.lng, target.lat - start.lat) * (180 / Math.PI);
            let cssClass = "";
            let speed = 0.0022;
            let hp = 1;

            if (type === 'heavy') {
                cssClass = "neon-heavy"; speed = 0.006;
            } else if (type === 'bomber') {
                cssClass = "neon-bomber"; speed = 0.0016; hp = 4; 
            } else {
                cssClass = isPlayer ? "neon-uav-player" : "neon-uav-enemy";
                speed = isPlayer ? 0.0028 : 0.0014;
            }

            // Рендер полностью через чистый CSS-дизайн без дешевых картинок/эмодзи
            let htmlContent = `<div class="${cssClass}" style="transform: rotate(${angle - 90}deg)"></div>`;

            let marker = L.marker([start.lat, start.lng], {
                icon: L.divIcon({ className: 'custom-track', html: htmlContent, iconSize: [24, 24], iconAnchor: [12, 12] })
            }).addTo(map);

            let curve = (Math.random() * 0.05) * (Math.random() > 0.5 ? 1 : -1);

            collection.push({
                id: Math.random().toString(36).substr(2, 9), marker: marker, angle: angle, type: type, hp: hp,
                lat: start.lat, lng: start.lng, targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                currentLat: start.lat, currentLng: start.lng, trails: [], progress: 0, speed: speed, curve: curve, detected: isPlayer
            });
        }

        function economyCycle() {
            money += 45 + (playerFactories.length * 35);
            playerFactories.forEach(() => droneInventory++);
            
            let all = [...CITIES['UA'], ...CITIES['RU']];
            all.forEach(c => { if(c.hp > 0 && c.hp < 100) c.hp = Math.min(100, c.hp + 1); });

            playerPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });
            enemyPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });

            CITIES[playerFaction].forEach(c => {
                c.markerInstance.setIcon(L.divIcon({ className: 'city-marker', html: `${c.name.toUpperCase()} [${c.hp}%]` }));
            });

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
            updateUIButtons();
        }

        function radarTick() {
            processTracks(playerDrones, true);
            processTracks(enemyDrones, false);
            processInterceptors();
        }

        function processTracks(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i]; d.progress += d.speed;

                if (d.progress >= 1) {
                    if (d.type === 'bomber') {
                        triggerCarpetBombing(d.targetLat, d.targetLng);
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, 60, isPlayer);
                    } else {
                        triggerPremiumExplosion(d.targetLat, d.targetLng, d.type === 'heavy' ? 35000 : 15000, d.type === 'heavy' ? '#f97316' : (isPlayer ? varColor('ua') : varColor('ru')));
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, d.type === 'heavy' ? 40 : 15, isPlayer);
                    }
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1);
                    continue;
                }

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;
                
                d.currentLat = cLat; d.currentLng = cLng; d.marker.setLatLng([cLat, cLng]);

                // Неоновые хвосты-шлейфы
                if (Math.random() > 0.4) {
                    let dot = L.circle([cLat, cLng], {
                        radius: d.type === 'bomber' ? 2500 : 800, 
                        color: isPlayer ? 'rgba(0, 242, 254, 0.4)' : 'rgba(255, 0, 85, 0.4)', 
                        fillColor: isPlayer ? varColor('ua') : varColor('ru'), fillOpacity: 0.2, weight: 0
                    }).addTo(map);
                    d.trails.push(dot);
                    if (d.trails.length > 8) map.removeLayer(d.trails.shift());
                }

                if (!isPlayer) {
                    playerPVO.forEach(pvo => {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        if (dist <= pvo.rangeDist) {
                            if (!pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 1500)) {
                                pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, true);
                            }
                        }
                    });
                } else {
                    enemyPVO.forEach(pvo => {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        if (dist <= pvo.rangeDist && pvo.ammo > 0 && (now - pvo.lastShot > 1700)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, false);
                        }
                    });
                }
            }
        }

        function fireInterceptor(pvo, target, isPlayerPVO) {
            let html = `<div class="neon-missile"></div>`;
            let marker = L.marker([pvo.lat, pvo.lng], {
                icon: L.divIcon({ className: 'interceptor-track', html: html, iconSize: [4, 12], iconAnchor: [2, 6] })
            }).addTo(map);

            missiles.push({
                marker: marker, lat: pvo.lat, lng: pvo.lng, droneId: target.id,
                targetCollection: isPlayerPVO ? enemyDrones : playerDrones, progress: 0, speed: 0.15, isPlayer: isPlayerPVO
            });
        }

        function processInterceptors() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.progress += m.speed;
                let drone = m.targetCollection.find(d => d.id === m.droneId);

                if (!drone || m.progress >= 1) { map.removeLayer(m.marker); missiles.splice(i, 1); continue; }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                let rot = Math.atan2(drone.currentLng - mLng, drone.currentLat - mLat) * (180 / Math.PI);
                m.marker.getElement().style.transform = `rotate(${rot - 90}deg)`;

                if (map.distance([mLat, mLng], [drone.currentLat, drone.currentLng]) < 15000) {
                    map.removeLayer(m.marker); missiles.splice(i, 1);
                    
                    let hitChance = drone.type === 'heavy' ? 0.4 : 0.85;
                    if (Math.random() <= hitChance) {
                        drone.hp--;
                        triggerPremiumExplosion(drone.currentLat, drone.currentLng, 8000, '#38bdf8'); // Осколочная вспышка ПВО
                        
                        if (drone.hp <= 0) {
                            map.removeLayer(drone.marker);
                            drone.trails.forEach(t => map.removeLayer(t));
                            let idx = m.targetCollection.indexOf(drone); if (idx > -1) m.targetCollection.splice(idx, 1);
                            
                            if (m.isPlayer) addLog("INTERCEPT RESOLVED. TARGET COLD.", 'system');
                            else addLog("HARDPOINT LOST IN HOSTILE VECTOR INTERCEPT.", 'enemy');
                        } else {
                            if (m.isPlayer) addLog(`TARGET DAMAGE SUSTAINED. INTEGRITY: ${drone.hp}/4`, 'system');
                        }
                    }
                    break;
                }
            }
        }

        function applyRadarDamage(faction, cityName, dmg, isPlayerAttacking) {
            let city = CITIES[faction].find(c => c.name === cityName);
            if (city && city.markerInstance) {
                city.hp = Math.max(0, city.hp - dmg);
                
                let el = city.markerInstance.getElement();
                if (el) {
                    let container = el.querySelector('.city-marker');
                    if (container) {
                        container.classList.add('shake-hit');
                        setTimeout(() => container.classList.remove('shake-hit'), 500);
                    }
                }

                // Всплывающий неоновый дамаг
                let popupIcon = L.divIcon({ className: 'damage-popup', html: `-${dmg}%` });
                let pMarker = L.marker([city.lat + 0.1, city.lng], { icon: popupIcon }).addTo(map);
                setTimeout(() => map.removeLayer(pMarker), 700);

                if (faction === playerFaction) {
                    addLog(`CRITICAL STRUCTURE HIT AT [${cityName.toUpperCase()}]: -${dmg}%`, 'enemy');
                } else {
                    let reward = dmg * 7;
                    money += reward;
                    addLog(`DESTRUCTION SECURED AT [${cityName.toUpperCase()}]. REWARD: +$${reward}`, 'system');
                }
                recalcRadarHUD();
            }
        }

        function recalcRadarHUD() {
            let pTotal = 0, eTotal = 0;
            CITIES[playerFaction].forEach(c => pTotal += c.hp);
            CITIES[enemyFaction].forEach(c => eTotal += c.hp);

            let pAvg = Math.round(pTotal / CITIES[playerFaction].length);
            let eAvg = Math.round(eTotal / CITIES[enemyFaction].length);

            document.getElementById('lbl-hp').innerText = pAvg + "%";
            document.getElementById('lbl-enemy-hp').innerText = eAvg + "%";
            document.getElementById('bar-player').style.width = pAvg + "%";
            document.getElementById('bar-enemy').style.width = eAvg + "%";

            if (pAvg <= 0) { alert("HQ MATRIX OFFLINE. CRITICAL FAILURE."); location.reload(); }
            if (eAvg <= 0) { alert("TACTICAL VICTORY. ALL HOSTILE NODES NEUTRALIZED."); location.reload(); }
        }

        // КИНЕМАТОГРАФИЧНЫЙ ЭФФЕКТ: Взрыв с ударной волной и разлетом осколков
        function triggerPremiumExplosion(lat, lng, maxR, color) {
            let flash = L.circle([lat, lng], { radius: 300, color: color, fillColor: color, fillOpacity: 0.9, weight: 1 }).addTo(map);
            
            // Физика разлета частиц/осколков
            let shards = [];
            for(let i=0; i<6; i++) {
                let sAngle = Math.random() * Math.PI * 2;
                let sDist = (Math.random() * 0.04) + 0.01;
                let sLat = lat + Math.sin(sAngle) * sDist;
                let sLng = lng + Math.cos(sAngle) * sDist;
                let shard = L.circle([lat, lng], { radius: 200, color: color, fillColor: color, fillOpacity: 0.7, weight: 0 }).addTo(map);
                shards.push({ instance: shard, tLat: sLat, tLng: sLng });
            }

            let r = 300;
            let step = 0;
            let loop = setInterval(() => {
                step++;
                r += 2400; 
                let ratio = r / maxR;
                flash.setRadius(r);
                flash.setStyle({ fillOpacity: 0.9 * (1 - ratio) });
                
                // Анимация разлетающихся частиц
                shards.forEach(s => {
                    let curLat = lat + (s.tLat - lat) * (step/12);
                    let curLng = lng + (s.tLng - lng) * (step/12);
                    s.instance.setLatLng([curLat, curLng]);
                    s.instance.setStyle({ fillOpacity: 0.7 * (1 - step/12) });
                });

                if(r > maxR) { 
                    clearInterval(loop); 
                    map.removeLayer(flash); 
                    shards.forEach(s => map.removeLayer(s.instance));
                }
            }, 25);
        }

        // КИНЕМАТОГРАФИЧНЫЙ ЭФФЕКТ: Тряска всей карты при ковровом ударе ФАБ-1500
        function triggerCarpetBombing(lat, lng) {
            let wrapper = document.getElementById('viewport-wrapper');
            wrapper.style.animation = "global-screen-shake 0.5s ease-in-out infinite"; // Трясем весь экран

            let steps = 4;
            for(let i = 0; i < steps; i++) {
                setTimeout(() => {
                    let randLat = lat + (Math.random() - 0.5) * 0.07;
                    let randLng = lng + (Math.random() - 0.5) * 0.07;
                    triggerPremiumExplosion(randLat, randLng, 45000, varColor('bomber'));
                }, i * 200);
            }

            setTimeout(() => { wrapper.style.animation = "none"; }, 800);
        }

        function varColor(type) {
            if (type === 'ua') return '#00f2fe';
            if (type === 'ru') return '#ff0055';
            if (type === 'bomber') return '#a855f7';
            return '#fff';
        }

        function addLog(text, type = '') {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `> ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
