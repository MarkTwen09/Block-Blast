<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Tactical Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: monospace;
            background: #04060a; color: #00f2fe; -webkit-user-select: none; user-select: none;
        }
        
        #viewport-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #map { flex-grow: 1; width: 100%; height: 100%; background: #05070f; z-index: 1; position: relative; }
        
        /* Эффект свечения монитора */
        #monitor-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
            box-shadow: inset 0 0 100px rgba(0, 242, 254, 0.15), inset 0 0 40px rgba(0,0,0,0.8);
        }

        /* КЛИМАТИЧЕСКИЕ И ВРЕМЕННЫЕ ОВЕРЛЕИ */
        #weather-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; transition: all 1s ease-in-out;
        }
        
        .weather-rain {
            background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
            opacity: 0; animation: rain-anim 0.3s linear infinite;
        }
        @keyframes rain-anim {
            0% { background-position: 0px 0px; }
            100% { background-position: 20px 400px; }
        }

        .weather-fog {
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            opacity: 0; animation: fog-pulse 4s ease-in-out infinite alternate;
        }
        @keyframes fog-pulse {
            0% { opacity: 0.2; filter: blur(2px); }
            100% { opacity: 0.5; filter: blur(5px); }
        }

        #time-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9; transition: background 2s ease-in-out;
            background: rgba(0, 0, 0, 0);
        }

        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070f; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: rgba(10, 15, 30, 0.95); border: 1px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.25); border-radius: 6px; padding: 30px;
            text-align: center; max-width: 400px; width: 100%; backdrop-filter: blur(10px);
        }
        .faction-btn {
            background: transparent; border: 1px solid #00f2fe; padding: 14px;
            color: #00f2fe; font-size: 12px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; letter-spacing: 2px; font-family: inherit; transition: all 0.2s;
            border-radius: 4px;
        }
        .faction-btn:hover { background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 15px #00f2fe; }

        /* ВЕРХНИЙ HUD */
        #hud-top {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(6, 10, 23, 0.9); border: 1px solid rgba(0, 242, 254, 0.4);
            backdrop-filter: blur(10px); border-radius: 6px; padding: 10px; font-size: 11px; pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .hud-value { font-weight: bold; color: #fff; text-shadow: 0 0 8px #00f2fe; }
        
        .hp-bar-container { width: 100%; background: rgba(255,255,255,0.05); height: 5px; border-radius: 3px; overflow: hidden; margin-top: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hp-player { background: linear-gradient(90deg, #0072ff, #00f2fe); box-shadow: 0 0 8px #00f2fe; }
        .hp-enemy { background: linear-gradient(90deg, #ff0055, #990033); box-shadow: 0 0 8px #ff0055; }
        
        #weather-widget { font-weight: bold; padding: 3px 8px; border-radius: 4px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,242,254,0.25); font-size: 10px; }

        /* НИЖНЯЯ ИНТЕРФЕЙСНАЯ ПАНЕЛЬ */
        #bottom-ui-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            display: flex; flex-direction: column; background: rgba(5, 8, 18, 0.96);
            border-top: 1px solid rgba(0, 242, 254, 0.4); backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }
        
        .ui-collapsed { transform: translateY(calc(100% - 38px)); }

        #toggle-ui-btn {
            height: 38px; background: rgba(8, 12, 28, 0.95); color: #00f2fe;
            border: none; border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            font-family: inherit; font-size: 11px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; letter-spacing: 2px;
            transition: background 0.2s;
        }
        #toggle-ui-btn:hover { background: rgba(0, 242, 254, 0.05); }

        #inner-ui-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        #target-selector-panel {
            display: none; background: rgba(255, 0, 85, 0.07); border: 1px dashed #ff0055;
            padding: 8px; border-radius: 4px; text-align: center;
        }
        .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .target-btn {
            background: rgba(10, 16, 32, 0.95); border: 1px solid #ff0055; color: #fecdd3;
            font-size: 10px; padding: 10px 2px; font-family: inherit; cursor: pointer; border-radius: 4px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background 0.1s;
        }
        .target-btn:active { background: #ff0055; color: #fff; }

        #log-container {
            background: rgba(4, 6, 14, 0.7); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 4px; overflow: hidden;
        }
        #log-panel {
            height: 65px; padding: 6px 10px; font-size: 10px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; pointer-events: none; line-height: 1.4;
        }
        .log-entry { margin-bottom: 3px; color: #00f2fe; padding-left: 6px; border-left: 2px solid #00f2fe; animation: fade-in-entry 0.2s ease-out forwards; }
        .log-entry.enemy { color: #ff0055; border-left-color: #ff0055; }
        .log-entry.system { color: #eab308; border-left-color: #eab308; }

        @keyframes fade-in-entry {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Кнопки управления */
        #control-panel { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn {
            background: rgba(12, 19, 38, 0.85); color: #94a3b8; border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 12px 4px; cursor: pointer; font-size: 10px; font-weight: bold;
            border-radius: 4px; font-family: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn:hover:not(.disabled) { background: rgba(0, 242, 254, 0.12); color: #fff; border-color: #00f2fe; }
        .btn.active { background: rgba(0, 242, 254, 0.2); color: #fff; border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.4); }
        .btn.disabled { opacity: 0.15; cursor: not-allowed; border-color: transparent; }
        
        .btn-orange { border-color: rgba(249, 115, 22, 0.4); color: #f97316; }
        .btn-orange.active { background: rgba(249,115,22,0.2); border-color: #f97316; box-shadow: 0 0 10px #f97316; }
        
        .btn-purple { border-color: rgba(168, 85, 247, 0.4); color: #a855f7; }
        .btn-purple.active { background: rgba(168,85,247,0.2); border-color: #a855f7; box-shadow: 0 0 12px #a855f7; }
        
        .btn-red { border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
        .btn-red.active { background: rgba(239,68,68,0.2); border-color: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .btn-cyan { border-color: rgba(6, 182, 212, 0.4); color: #06b6d4; }
        .btn-blue { border-color: rgba(56, 189, 248, 0.5); color: #38bdf8; }
        .btn-blue.active { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; box-shadow: 0 0 10px #38bdf8; }

        .drone-container { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; will-change: transform; }
        .rotator { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        /* МАРКЕРЫ НА КАРТЕ */
        .city-marker {
            background: rgba(4, 7, 16, 0.95); border: 1px solid rgba(56, 189, 248, 0.6);
            color: #e2e8f0; font-size: 10px; font-weight: bold; border-radius: 4px; padding: 3px 6px;
            white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.9); z-index: 500 !important;
            transition: all 0.3s;
        }
        .city-marker.enemy { border-color: rgba(255, 0, 85, 0.7); color: #fecdd3; }
        .city-marker.repair-highlight { border-color: #38bdf8 !important; box-shadow: 0 0 15px #38bdf8 !important; background: rgba(14, 116, 144, 0.45); }
        
        .shake-hit { animation: hard-shake 0.3s ease-in-out; border-color: #ff0055 !important; }

        .build-marker {
            background: #040712; border: 1px solid #38bdf8; color: #38bdf8;
            font-size: 9px; font-weight: bold; border-radius: 3px; text-align: center; line-height: 15px;
            padding: 0 5px; box-shadow: 0 0 8px rgba(56,189,248,0.5); z-index: 500 !important;
            animation: pulse-blue 2s infinite alternate;
        }
        
        @keyframes pulse-blue {
            from { box-shadow: 0 0 4px rgba(56,189,248,0.4); }
            to { box-shadow: 0 0 12px rgba(56,189,248,0.8); border-color: #00f2fe; }
        }

        .damage-popup {
            font-size: 12px; font-weight: bold; color: #ff0055; text-shadow: 0 0 4px #000;
            animation: float-damage 0.7s ease-out forwards;
        }
        .heal-popup {
            font-size: 12px; font-weight: bold; color: #10b981; text-shadow: 0 0 4px #000;
            animation: float-damage 0.7s ease-out forwards;
        }

        @keyframes hard-shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 1.5px); }
            40% { transform: translate(3px, -1.5px); }
            60% { transform: translate(-1.5px, -3px); }
            80% { transform: translate(1.5px, 1.5px); }
        }
        @keyframes float-damage {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-25px); opacity: 0; }
        }
        @keyframes global-screen-shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-4px, 2px); }
            40% { transform: translate(4px, -2px); }
            60% { transform: translate(-2px, -4px); }
            80% { transform: translate(3px, 3px); }
        }
    </style>
</head>
<body>

    <div id="monitor-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h2 style="letter-spacing: 2px; margin: 0 0 8px 0; font-size: 15px; color: #fff;">СТРАТЕГИЧЕСКАЯ МАТРИЦА</h2>
            <p style="color: #475569; font-size: 10px; margin: 0 0 25px 0;">ВЫБЕРИТЕ СВОЮ ФРАКЦИЮ</p>
            <button class="faction-btn" onclick="selectFaction('UA')">КОМАНДОВАНИЕ [UA]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff0055; color:#ff0055;">КОМАНДОВАНИЕ [RU]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>БЮДЖЕТ: <span id="txt-money" class="hud-value">600</span>$</div>
                <div id="weather-widget">☀️ ЯСНО | ДЕНЬ</div>
                <div>АНГАР БПЛА: <span id="txt-drones" class="hud-value">0</span> ЕД</div>
            </div>
            <div class="hud-row" style="margin-top: 3px;">
                <div style="width: 48%;">
                    <div style="font-size: 9px; color: #64748b;">НАШИ БАЗЫ: <span id="lbl-hp">100%</span></div>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player" style="width: 100%;"></div></div>
                </div>
                <div style="width: 48%; text-align: right;">
                    <div style="font-size: 9px; color: #64748b;">ПРОТИВНИК: <span id="lbl-enemy-hp">100%</span></div>
                    <div class="hp-bar-container" style="margin-left: auto;"><div id="bar-enemy" class="hp-bar-fill hp-enemy" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>

        <div id="map">
            <div id="weather-overlay"></div>
            <div id="time-overlay"></div>
        </div>

        <div id="bottom-ui-wrapper" class="ui-collapsed">
            <button id="toggle-ui-btn" onclick="toggleUIPanel()">🎛️ ПУЛЬТ УПРАВЛЕНИЯ (НАЖАТЬ)</button>
            <div id="inner-ui-content">
                
                <div id="target-selector-panel">
                    <div id="target-title-text" style="font-size: 10px; font-weight: bold; color: #ff0055;">ВЫБЕРИТЕ ЦЕЛЬ ДЛЯ АТАКЫ:</div>
                    <div class="target-grid" id="target-buttons-container"></div>
                </div>

                <div id="log-container">
                    <div id="log-panel"></div>
                </div>

                <div id="control-panel">
                    <div class="btn-row">
                        <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД ($450)</button>
                        <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО ($600) <span id="pvo-counter">0/5</span></button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 НАЛЕТ ПАРЫ (-$250)</button>
                        <button class="btn btn-purple" id="btn-bomber-mode" onclick="toggleBomberMode()">💥 АВИАЦИЯ (-$2500)</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-red" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">🚀 РАКЕТНЫЙ УДАР (-$4000)</button>
                        <button class="btn btn-cyan" id="btn-interceptor" onclick="buyInterceptorRocket()">🛡️ РАКЕТА-ПЕРЕХВАТ (-$2200)</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-blue" id="btn-repair-mode" onclick="toggleRepairMode()">🛠️ РЕМОНТ СЕКТОРA (-$2700)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 46.97, lng: 31.99, name: 'Николаев', hp: 100 },
                { lat: 48.62, lng: 22.28, name: 'Ужгород', hp: 100 },
                { lat: 50.91, lng: 34.80, name: 'Сумы', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'С.-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 50.59, lng: 36.58, name: 'Белгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодар', hp: 100 },
                { lat: 44.61, lng: 33.52, name: 'Севастополь', hp: 100 },
                { lat: 48.01, lng: 37.80, name: 'Донецк', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 600;

        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyPVO = [], enemyDrones = [];
        let missiles = [];
        let map, selectedFactory = null;
        
        const MAX_PVO_LIMIT = 5;

        // Погода и Тайминги ИИ
        let currentWeather = 'clear'; 
        let currentPeriod = 'day';     
        let aiActive = false;
        let safeStartCountdown = 40;

        const SHAHED_SVG = `<svg viewBox="0 0 100 100" width="28" height="28" style="filter: drop-shadow(0 0 5px #ff0055); fill: #1e293b; stroke: #ff0055; stroke-width: 5;"><path d="M50,5 L95,85 L70,85 L50,65 L30,85 L5,85 Z"/></svg>`;
        const PLAYER_DRONE_SVG = `<svg viewBox="0 0 100 100" width="24" height="24" style="filter: drop-shadow(0 0 5px #00f2fe); fill: rgba(0,242,254,0.2); stroke: #00f2fe; stroke-width: 6;"><path d="M50,5 L90,85 L50,60 L10,85 Z"/></svg>`;
        const HEAVY_SVG = `<svg viewBox="0 0 100 100" width="26" height="26"><path d="M50,2 L65,35 L98,50 L65,65 L50,98 L35,65 L2,50 L35,35 Z" fill="#f97316" style="filter: drop-shadow(0 0 6px #f97316);"/></svg>`;
        const BOMBER_SVG = `<svg viewBox="0 0 100 100" width="28" height="28"><path d="M50,5 L95,55 L50,40 L5,55 Z" fill="#a855f7" style="filter: drop-shadow(0 0 8px #a855f7);"/></svg>`;

        function toggleUIPanel() {
            const panel = document.getElementById('bottom-ui-wrapper');
            panel.classList.toggle('ui-collapsed');
        }

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([50.5, 34.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            renderOperationalRadar();
            setupRadarClicks();
            buildMobileTargetPanel();

            setInterval(economyCycle, 2500);
            setInterval(radarTick, 50); 
            setInterval(enemyAILogic, 4000); 
            setInterval(changeWeatherCycle, 40000);

            // Обратный отсчет подготовки ИИ врага (Шаг 5 сек)
            addLog(`ПОДГОТОВКА СИСТЕМ: ДО ПЕРВОЙ АТАКИ ВРАГА ${safeStartCountdown} СЕК.`, 'system');
            let countdownTimer = setInterval(() => {
                safeStartCountdown -= 5;
                if (safeStartCountdown > 0) {
                    addLog(`ДО СТАРТА БОЕВЫХ ОПЕРАЦИЙ ВРАГА: ${safeStartCountdown} СЕК.`, 'system');
                } else {
                    aiActive = true;
                    addLog("🚨 БЕЗОПАСНАЯ ФАЗА ЗАВЕРШЕНА! ВРАГ НАЧАЛ РАЗВЕРТЫВАНИЕ СИСТЕМ.", 'enemy');
                    clearInterval(countdownTimer);
                }
            }, 5000);

            updateUIButtons();
        }

        function changeWeatherCycle() {
            const weathers = ['clear', 'rain', 'fog'];
            const periods = ['day', 'night'];
            
            currentWeather = weathers[Math.floor(Math.random() * weathers.length)];
            currentPeriod = periods[Math.floor(Math.random() * periods.length)];

            const wOverlay = document.getElementById('weather-overlay');
            const tOverlay = document.getElementById('time-overlay');
            const widget = document.getElementById('weather-widget');

            wOverlay.className = ''; 
            
            let weatherText = '☀️ ЯСНО';
            if (currentWeather === 'rain') {
                wOverlay.classList.add('weather-rain');
                weatherText = '🌧️ ЛИВЕНЬ';
                addLog("⚠️ ФРОНТ ПЛОХОЙ ПОГОДЫ: СКОРОСТЬ БПЛА СНИЖЕНА.", 'system');
            } else if (currentWeather === 'fog') {
                wOverlay.classList.add('weather-fog');
                weatherText = '🌫️ ТУМАН';
                addLog("⚠️ ГУСТОЙ ТУМАН: РАДИУС ДЕЙСТВИЯ ПВО СНИЖЕН.", 'system');
            }

            let periodText = 'ДЕНЬ';
            if (currentPeriod === 'night') {
                tOverlay.style.background = 'rgba(6, 12, 36, 0.45)';
                periodText = 'НОЧЬ';
                addLog("🌙 НАСТУПИЛА НОЧЬ: ЭФФЕКТИВНОСТЬ ПВО СНИЖЕНА НА 40%.", 'system');
            } else {
                tOverlay.style.background = 'rgba(0,0,0,0)';
            }

            widget.innerText = `${weatherText} | ${periodText}`;
        }

        function renderOperationalRadar() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker', html: `${c.name} [100%]`, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if (currentMode === 'repair_sector') {
                        executeSectorRepair(c);
                    }
                });
                
                let visualCircle = L.circle([c.lat, c.lng], {
                    radius: 75000, color: '#38bdf8', weight: 1, fillOpacity: 0.02, dashArray: '4,4'
                }).addTo(map);

                playerPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.1, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0, circle: visualCircle });
            });

            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker enemy', html: c.name, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    handleTargetSelection(c);
                });
                
                let visualCircle = L.circle([c.lat, c.lng], {
                    radius: 90000, color: '#ff0055', weight: 1, fillOpacity: 0.01, dashArray: '4,4'
                }).addTo(map);

                enemyPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.3, ammo: 4, maxAmmo: 4, lastShot: 0, isCityRadar: true, circle: visualCircle });
            });
        }

            updateTargetPanelGrid();
        }

        function updateTargetPanelGrid() {
            const container = document.getElementById('target-buttons-container');
            const title = document.getElementById('target-title-text');
            container.innerHTML = '';

            if (currentMode === 'repair_sector') {
                title.innerText = "ВЫБЕРИТЕ СВОЙ ГОРОД ДЛЯ РЕМОНТА (+35% HP):";
                title.style.color = "#38bdf8";

                    const btn = document.createElement('button');
                    btn.className = 'target-btn';
                    btn.style.borderColor = '#38bdf8';

                title.innerText = "ВЫБЕРИТЕ ЦЕЛЬ ДЛЯ АТАКЫ:";

            if (currentMode === 'attack_target' && selectedFactory) {
                dispatchDroneStrike(selectedFactory, city);
            } else if (currentMode === 'heavy_missile') {
                dispatchHeavyStrike(city);
            } else if (currentMode === 'bomber_strike') {
                dispatchBomberStrike(city);
            }
        }

        function toggleRepairMode() {
            if (money < 2700) { addLog("НЕДОСТАТОЧНО СРЕДСТВ ДЛЯ ПРОВЕДЕНИЯ РЕМОНТА.", 'enemy'); return; }
            if (currentMode === 'repair_sector') { dropModes(); return; }

            dropModes();
            currentMode = 'repair_sector';
            document.getElementById('btn-repair-mode').classList.add('active');
            
            CITIES[playerFaction].forEach(c => {
                if(c.markerInstance && c.markerInstance.getElement()) {
                    c.markerInstance.getElement().classList.add('repair-highlight');
                }
            });

            addLog("РЕЖИМ ВОССТАНОВЛЕНИЯ. ВЫБЕРИТЕ ПОВРЕЖДЕННЫЙ ГОРОД.");
            updateTargetPanelGrid();
            showTargetSelector(true);
        }

        function executeSectorRepair(city) {
            if (money < 2700) return;
            if (city.hp >= 100) {
                addLog(`СЕКТОР [${city.name.toUpperCase()}] НЕ НУЖДАЕТСЯ В РЕМОНТЕ.`, 'system');

            }

            money -= 2700;
            city.hp = Math.min(100, city.hp + 35);
            addLog(`🛠️ ИНЖЕНЕРЫ ПРОВЕЛИ РЕМОНТ [${city.name.toUpperCase()}]: +35% HP`, 'system');

            let pMarker = L.marker([city.lat + 0.05, city.lng], { icon: L.divIcon({ className: 'heal-popup', html: `+35%` }) }).addTo(map);
            setTimeout(() => map.removeLayer(pMarker), 600);

            dropModes();
            recalcRadarHUD();
        }

            document.getElementById('btn-interceptor').classList.toggle('disabled', money < 2200 || enemyDrones.length === 0);
            document.getElementById('btn-repair-mode').classList.toggle('disabled', money < 2700);

        function buyInterceptorRocket() {
            if (money < 2200) return;
            if (enemyDrones.length === 0) {
                addLog("НЕТ АКТИВНЫХ ЦЕЛЕЙ ДЛЯ СВЕРХДАЛЬНЕГО ПЕРЕХВАТА.", 'system');
                return;
            }

            let closestDrone = null;
            let minDist = Infinity;
            let sampleCity = CITIES[playerFaction][0];

            enemyDrones.forEach(d => {
                let dist = Math.abs(d.currentLat - sampleCity.lat) + Math.abs(d.currentLng - sampleCity.lng);
                if (dist < minDist) {
                    minDist = dist;
                    closestDrone = d;
                }
            });

            if (closestDrone) {
                money -= 2200;
                addLog("🚀 ЗАПУЩЕНА СВЕРХДАЛЬНЯЯ РАКЕТА ПЕРЕХВАТЧИК!", 'system');
                
                triggerBlast(closestDrone.currentLat, closestDrone.currentLng, 15000, '#00f2fe');
                map.removeLayer(closestDrone.marker);
                closestDrone.trails.forEach(t => map.removeLayer(t));
                
                let idx = enemyDrones.indexOf(closestDrone);
                if (idx > -1) enemyDrones.splice(idx, 1);
                
                let reward = closestDrone.type === 'heavy' ? 200 : 50;
                money += reward;
                addLog(`ЦЕЛЬ УНИЧТОЖЕНА ПЕРЕХВАТЧИКОМ. МИЛ-БОНУС: +$${reward}`, 'system');
            }
            dropModes();
        }

                    let visualCircle = L.circle([lat, lng], {

                    }).addTo(map);

        function selectFactoryForLaunch(fObj) {

        function dispatchDroneStrike(source, targetCity) {
            money -= 250; droneInventory -= 2;
            addLog(`МАРШРУТ ПОСТРОЕН. ВЫЛЕТ К [${targetCity.name}].`);
            for(let i=0; i<2; i++) injectAirTarget(source, targetCity, playerDrones, true, 'drone');
            dropModes();
        }

        function dispatchBomberStrike(targetCity) {
            money -= 2500;
            addLog(`💥 ВЫЛЕТ ИСТРЕБИТЕЛЯ К [${targetCity.name}].`, 'system');
            let start = CITIES[playerFaction][0]; 
            injectAirTarget(start, targetCity, playerDrones, true, 'bomber');
            dropModes();
        }

        function dispatchHeavyStrike(targetCity) {
            money -= 4000;
            addLog(`🚀 СТРАТЕГИЧЕСКИЙ ПУСК ТЯЖЕЛОЙ КР ПО [${targetCity.name}].`);
            injectAirTarget(CITIES[playerFaction][0], targetCity, playerDrones, true, 'heavy');
            dropModes();
        }

        function enemyAILogic() {
            if (!aiActive) return; 

            enemyMoney += 380;

            if (enemyMoney >= 4000 && Math.random() > 0.4) {
                enemyMoney -= 4000;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[🚨] РАКЕТНАЯ ОПАСНОСТЬ: ТЯЖЕЛАЯ КР ИДЕТ НА [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'heavy');
                return;
            }
            if (enemyMoney >= 2500 && Math.random() > 0.5) {
                enemyMoney -= 2500;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[⚡] ВРАЖЕСКАЯ АВИАЦИЯ НАПРАВЛЯЕТСЯ К [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'bomber');
                return;
            }
            if (enemyMoney >= 250) {
                enemyMoney -= 250;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[⚠️] ОБНАРУЖЕНЫ ШАХЕДЫ В НАПРАВЛЕНИИ [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'drone');
            }
        }

        function injectAirTarget(start, target, collection, isPlayer, type) {
            let dLng = target.lng - start.lng;
            let dLat = target.lat - start.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);
            
            let speed = type === 'heavy' ? 0.007 : (type === 'bomber' ? 0.002 : 0.003);
            if (currentWeather === 'rain') speed *= 0.7;

            let hp = type === 'bomber' ? 4 : 1;

            let svgMarkup = (type === 'drone') ? (isPlayer ? PLAYER_DRONE_SVG : SHAHED_SVG) : (type === 'heavy' ? HEAVY_SVG : BOMBER_SVG);
            let modelHtml = `<div class="drone-container"><div class="rotator" style="transform: rotate(${angle}deg);">${svgMarkup}</div></div>`;

            let marker = L.marker([start.lat, start.lng], {
                icon: L.divIcon({ className: 'custom-track', html: modelHtml, iconSize: [32, 32], iconAnchor: [16, 16] })
            }).addTo(map);

            collection.push({
                id: Math.random().toString(36).substr(2, 9), marker: marker, type: type, hp: hp, angle: angle,
                lat: start.lat, lng: start.lng, targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                currentLat: start.lat, currentLng: start.lng, progress: 0, speed: speed, trails: []
            });
            updateUIButtons();
        }

        function economyCycle() {
            let exportBonus = playerFactories.length * 40;
            money += 50 + (playerFactories.length * 35) + exportBonus;
            
            playerFactories.forEach(() => droneInventory++);
            
            let all = [...CITIES['UA'], ...CITIES['RU']];
            all.forEach(c => { if(c.hp > 0 && c.hp < 100) c.hp = Math.min(100, c.hp + 1); });

            playerPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });
            enemyPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });

            CITIES[playerFaction].forEach(c => {
                if (c.markerInstance) {
                    c.markerInstance.setIcon(L.divIcon({ className: 'city-marker', html: `${c.name.toUpperCase()} [${c.hp}%]` }));
                }
            });

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
            updateUIButtons();
        }

        function radarTick() {
            processTracks(playerDrones, true);
            processTracks(enemyDrones, false);
            processInterceptors();
        }

        function processTracks(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i]; d.progress += d.speed;

                if (d.progress >= 1) {
                    if (d.type === 'bomber') {
                        triggerCarpetBombing(d.targetLat, d.targetLng);
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, 60);
                    } else if (d.type === 'heavy') {
                        triggerBlast(d.targetLat, d.targetLng, 35000, '#f97316');
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, 80); 
                    } else {
                        triggerBlast(d.targetLat, d.targetLng, 12000, '#ff0055');
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, 15);
                    }
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1);
                    continue;
                }

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                d.currentLat = cLat; d.currentLng = cLng; d.marker.setLatLng([cLat, cLng]);

                if (Math.random() > 0.85) {
                    let dot = L.circle([cLat, cLng], { radius: 600, color: isPlayer ? '#00f2fe' : '#ff0055', weight: 0, fillOpacity: 0.15 }).addTo(map);
                    d.trails.push(dot); if (d.trails.length > 2) map.removeLayer(d.trails.shift());
                }

                let shootDelay = 1400;
                if (currentWeather === 'rain') shootDelay = 1900; 

                if (!isPlayer) {
                    playerPVO.forEach(pvo => {
                        let dLat = cLat - pvo.lat; let dLng = cLng - pvo.lng;
                        let approxDist = (dLat * dLat) + (dLng * dLng);
                        
                        let currentRange = pvo.rangeDist;
                        if (currentWeather === 'fog') currentRange *= 0.75;

                        if (approxDist <= (currentRange * currentRange) && !pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > shootDelay)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, true);
                        }
                    });
                } else {
                    enemyPVO.forEach(pvo => {
                        let dLat = cLat - pvo.lat; let dLng = cLng - pvo.lng;
                        let approxDist = (dLat * dLat) + (dLng * dLng);
                        
                        let currentRange = pvo.rangeDist;
                        if (currentWeather === 'fog') currentRange *= 0.75;

                        if (approxDist <= (currentRange * currentRange) && pvo.ammo > 0 && (now - pvo.lastShot > shootDelay + 200)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, false);
                        }
                    });
                }
            }
        }

        function fireInterceptor(pvo, target, isPlayerPVO) {
            let marker = L.marker([pvo.lat, pvo.lng], {
                icon: L.divIcon({ className: 'interceptor-track', html: `<div style="width:4px; height:4px; background:#38bdf8; border-radius:50%; box-shadow:0 0 6px #38bdf8;"></div>`, iconSize: [4, 4] })
            }).addTo(map);
            missiles.push({ marker: marker, lat: pvo.lat, lng: pvo.lng, droneId: target.id, targetCollection: isPlayerPVO ? enemyDrones : playerDrones, progress: 0, speed: 0.2, isPlayer: isPlayerPVO });
        }

        function processInterceptors() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.progress += m.speed;
                let drone = m.targetCollection.find(d => d.id === m.droneId);

                if (!drone || m.progress >= 1) { map.removeLayer(m.marker); missiles.splice(i, 1); continue; }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                if (Math.abs(mLat - drone.currentLat) < 0.1 && Math.abs(mLng - drone.currentLng) < 0.1) {
                    map.removeLayer(m.marker); missiles.splice(i, 1);
                    
                    let hitChance = drone.type === 'heavy' ? 0.45 : 0.85;
                    if (currentPeriod === 'night') hitChance -= 0.40;

                    if (Math.random() <= hitChance) {
                        drone.hp--;
                        triggerBlast(drone.currentLat, drone.currentLng, 6000, '#38bdf8');
                        if (drone.hp <= 0) {
                            map.removeLayer(drone.marker); drone.trails.forEach(t => map.removeLayer(t));
                            let idx = m.targetCollection.indexOf(drone); if (idx > -1) m.targetCollection.splice(idx, 1);
                            
                            if (m.isPlayer) {
                                let reward = drone.type === 'heavy' ? 200 : (drone.type === 'bomber' ? 150 : 50);
                                money += reward;
                                addLog(`ПВО ПЕРЕХВАТИЛО ЦЕЛЬ. БОНУС К БЮДЖЕТУ: +$${reward}`, 'system');
                            } else {
                                addLog("НАШ БПЛА СБИТ ПВО ПРОТИВНИКА.", 'enemy');
                            }
                        }
                    } else {
                        if (m.isPlayer) addLog("РАДАР ПОТЕРЯЛ ЦЕЛЬ В ТЕМНОТЕ/ОБЛАКАХ (ПРОМАХ).", 'enemy');
                    }
                    break;
                }
            }
        }

        function applyRadarDamage(faction, cityName, dmg) {
            let city = CITIES[faction].find(c => c.name === cityName);
            if (city && city.markerInstance) {
                city.hp = Math.max(0, city.hp - dmg);
                let el = city.markerInstance.getElement();
                if (el) { el.classList.add('shake-hit'); setTimeout(() => el.classList.remove('shake-hit'), 400); }

                let pMarker = L.marker([city.lat + 0.05, city.lng], { icon: L.divIcon({ className: 'damage-popup', html: `-${dmg}%` }) }).addTo(map);
                setTimeout(() => map.removeLayer(pMarker), 600);

                if (faction === playerFaction) addLog(`УДАР ПО СЕКТОРУ [${cityName.toUpperCase()}]: -${dmg}%`, 'enemy');
                else { money += dmg * 6; addLog(`ЦЕЛЬ ПОРАЖЕНА: +$${dmg * 6}`, 'system'); }
                recalcRadarHUD();
            }
        }

        function recalcRadarHUD() {
            let pTotal = 0, eTotal = 0;
            CITIES[playerFaction].forEach(c => pTotal += c.hp);
            CITIES[enemyFaction].forEach(c => eTotal += c.hp);
            let pAvg = Math.round(pTotal / CITIES[playerFaction].length);
            let eAvg = Math.round(eTotal / CITIES[enemyFaction].length);

            document.getElementById('lbl-hp').innerText = pAvg + "%";
            document.getElementById('lbl-enemy-hp').innerText = eAvg + "%";
            document.getElementById('bar-player').style.width = pAvg + "%";
            document.getElementById('bar-enemy').style.width = eAvg + "%";

            if (pAvg <= 0) { alert("КОМАНДНЫЙ ЦЕНТР СМЯТ. КОНЕЦ СВЯЗИ."); location.reload(); }
            if (eAvg <= 0) { alert("ЦЕЛИ УНИЧТОЖЕНЫ. ПОБЕДА."); location.reload(); }
        }

        function triggerBlast(lat, lng, maxR, color) {
            let flash = L.circle([lat, lng], { radius: 300, color: color, fillColor: color, fillOpacity: 0.8, weight: 1 }).addTo(map);
            let r = 300;
            let loop = setInterval(() => {
                r += 3000; flash.setRadius(r); flash.setStyle({ fillOpacity: 0.8 * (1 - r/maxR) });
                if(r >= maxR) { clearInterval(loop); map.removeLayer(flash); }
            }, 30);
        }

        function triggerCarpetBombing(lat, lng) {
            let w = document.getElementById('viewport-wrapper');
            w.style.animation = "global-screen-shake 0.4s ease-in-out infinite";
            for(let i = 0; i < 4; i++) {
                setTimeout(() => {
                    let rLat = lat + (Math.random() - 0.5) * 0.05;
                    let rLng = lng + (Math.random() - 0.5) * 0.05;
                    triggerBlast(rLat, rLng, 35000, '#a855f7');
                }, i * 150);
            }
            setTimeout(() => { w.style.animation = "none"; }, 700);
        }

        function addLog(text, type = '') {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div'); entry.className = `log-entry ${type}`; entry.innerText = `> ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
