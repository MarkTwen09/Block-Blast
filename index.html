<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Tactical Duel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #0b0c10; color: #1f2833;
        }
        #map { width: 100%; height: 100%; background: #000; }
        
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1f2833; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #66fcf1;
        }
        .faction-btn {
            background: #0b0c10; border: 2px solid #66fcf1; padding: 15px 35px;
            color: #66fcf1; font-size: 18px; cursor: pointer; margin: 12px;
            font-weight: bold; width: 240px;
        }
        .faction-btn:hover { background: #66fcf1; color: #000; box-shadow: 0 0 20px #66fcf1; }

        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px;
            z-index: 1000; background: rgba(11, 12, 16, 0.95); border: 2px solid #66fcf1;
            padding: 12px; display: flex; flex-direction: column; gap: 6px;
            font-size: 11px; font-weight: bold; pointer-events: none; color: #66fcf1;
        }
        .hud-row { display: flex; justify-content: space-between; width: 100%; }
        #hud-top span { color: #fff; }
        .hp-player { color: #00ff66 !important; }
        .hp-enemy { color: #ff3333 !important; }

        #control-panel {
            position: absolute; bottom: 12px; left: 12px; right: 12px;
            z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }
        .btn-row { display: flex; gap: 8px; width: 100%; }
        .btn {
            flex: 1; background: #0b0c10; color: #66fcf1; border: 2px solid #66fcf1;
            padding: 14px 5px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold;
        }
        .btn.active { background: #66fcf1; color: #000; box-shadow: 0 0 15px #66fcf1; }
        .btn-attack { border-color: #ffaa00; color: #ffaa00; background: rgba(30,20,10,0.9); }
        .btn-attack.active { background: #ffaa00; color: #000; box-shadow: 0 0 15px #ffaa00; }
        .btn-heavy { border-color: #ff3333; color: #ff3333; background: rgba(40,10,10,0.9); }
        .btn-heavy.active { background: #ff3333; color: #000; box-shadow: 0 0 15px #ff3333; }

        #log-panel {
            position: absolute; bottom: 180px; left: 12px; right: 12px; z-index: 1000;
            height: 75px; background: rgba(11, 12, 16, 0.9); border: 1px solid #45f3ff;
            padding: 6px; font-size: 9px; overflow: hidden; color: #66fcf1;
            display: flex; flex-direction: column-reverse; pointer-events: none;
        }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #66fcf1; padding-left: 4px; }
        .log-entry.enemy { border-left-color: #ff4d4d; color: #ff6666; }
        
        .marker-board {
            background: #0b0c10; border: 2px solid #00ff66; color: #00ff66;
            font-size: 10px; font-weight: bold; text-align: center; line-height: 20px; border-radius: 4px;
        }
        .marker-board.enemy-board {
            border-color: #ff3333; color: #ff3333;
        }
    </style>
</head>
<body>

    <div id="faction-screen">
        <h1 style="letter-spacing: 5px; margin-bottom: 5px;">SKY IN FLAMES</h1>
        <p style="color: #45f3ff; font-size: 11px; margin-top: 0; letter-spacing: 2px;">STRATEGIC WAR v11.0</p>
        <button class="faction-btn" onclick="selectFaction('UA')">УКРАИНА [UA]</button>
        <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff4d4d; color:#ff4d4d;">РОССИЯ [RU]</button>
    </div>

    <div id="hud-top">
        <div class="hud-row">
            <div>БЮДЖЕТ: <span id="txt-money">600</span>$</div>
            <div>РЕЗЕРВ: <span id="txt-drones">0</span> БПЛА</div>
        </div>
        <div class="hud-row" style="border-top: 1px solid #1f2833; padding-top: 4px;">
            <div>НАША ОБОРОНА: <span id="txt-hp" class="hp-player">100%</span></div>
            <div>ОБОРОНА ВРАГА: <span id="txt-enemy-hp" class="hp-enemy">100%</span></div>
        </div>
    </div>

    <div id="log-panel"></div>

    <div id="control-panel">
        <div class="btn-row">
            <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД (200$)</button>
            <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО (250$)</button>
        </div>
        <button class="btn btn-attack" id="btn-attack-mode" onclick="toggleAttackMode()">ВЫПУСТИТЬ ПАРУ БПЛА (-45$ / ед)</button>
        <button class="btn btn-heavy" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">ЗАПУСТИТЬ СТРАТЕГИЧЕСКУЮ РАКЕТУ (1500$)</button>
    </div>

    <div id="map"></div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 51.00, lng: 34.80, name: 'Сумская обл.', hp: 100 },
                { lat: 48.00, lng: 37.80, name: 'Донбасс', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'Санкт-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов-на-Дону', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 56.32, lng: 44.00, name: 'Нижний Новгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодарский край', hp: 100 },
                { lat: 45.04, lng: 41.96, name: 'Ставропольский край', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 400; 
        
        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyDrones = [];
        let missiles = []; 
        let map;

        let selectedFactory = null;

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            let btnHeavy = document.getElementById('btn-heavy-mode');
            btnHeavy.innerText = playerFaction === 'UA' ? 'ПУСК КР «НЕПТУН-М» (1500$)' : 'ПУСК БР «ОРЕШНИК» (1500$)';

            // Полная свобода перемещения, без отскоков границ
            map = L.map('map', { 
                zoomControl: false, 
                minZoom: 4, 
                maxZoom: 8
            }).setView([50.0, 36.0], 5);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©CartoDB' }).addTo(map);

            spawnCities();
            setupMapClicks();
            
            setInterval(economyTick, 2500);
            setInterval(tacticalTick, 40); 
            setInterval(enemyAI, 6000); // ИИ стал чуть быстрее принимать решения

            addLog("Разведка: Разверните радарные зоны ПВО для обнаружения целей.");
        }

        function spawnCities() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-board', html: 'СИТИ', iconSize: [42, 20], iconAnchor: [21, 10] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map);
                
                // Каждому городу даем базовый радар обнаружения
                let r = L.circle([c.lat, c.lng], { radius: 80000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.01, weight: 1, dashArray: '3,3' }).addTo(map);
                playerPVO.push({ lat: c.lat, lng: c.lng, marker: null, range: r, rangeDist: 80000, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0 });
            });
            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-board enemy-board', html: 'ЦЕЛЬ', iconSize: [42, 20], iconAnchor: [21, 10] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function() {
                    if (currentMode === 'attack_target' && selectedFactory) {
                        executeTargetedAttack(selectedFactory, c);
                    } else if (currentMode === 'heavy_missile') {
                        executeHeavyMissileStrike(c);
                    }
                });
            });
        }

        function toggleBuildMode(mode) {
            resetAttackState();
            if (currentMode === mode) currentMode = null;
            else currentMode = mode;
            document.getElementById('btn-factory').classList.toggle('active', currentMode === 'factory');
            document.getElementById('btn-pvo').classList.toggle('active', currentMode === 'pvo');
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') {
                resetAttackState();
            } else {
                if (droneInventory <= 0) { addLog("Склады пусты. Дождитесь производства БПЛА на заводах."); return; }
                currentMode = 'attack_source';
                document.getElementById('btn-attack-mode').classList.add('active');
                document.getElementById('btn-factory').classList.remove('active');
                document.getElementById('btn-pvo').classList.remove('active');
                document.getElementById('btn-heavy-mode').classList.remove('active');
                addLog("🎯 Нажмите на ваш построенный завод [ЗАВ] на карте.");
            }
        }

        function toggleHeavyMissileMode() {
            if (currentMode === 'heavy_missile') {
                resetAttackState();
            } else {
                if (money < 1500) { addLog("Недостаточно средств. Требуется 1500$."); return; }
                currentMode = 'heavy_missile';
                document.getElementById('btn-heavy-mode').classList.add('active');
                document.getElementById('btn-factory').classList.remove('active');
                document.getElementById('btn-pvo').classList.remove('active');
                document.getElementById('btn-attack-mode').classList.remove('active');
                addLog("🚀 ВЫБОР ЦЕЛИ УДАРА: Кликните по любой вражеской кнопке [ЦЕЛЬ].");
            }
        }

        function resetAttackState() {
            currentMode = null;
            selectedFactory = null;
            document.getElementById('btn-attack-mode').classList.remove('active');
            document.getElementById('btn-heavy-mode').classList.remove('active');
            document.getElementById('btn-factory').classList.remove('active');
            document.getElementById('btn-pvo').classList.remove('active');
        }

        function setupMapClicks() {
            map.on('click', function(e) {
                if (!currentMode || currentMode === 'attack_target' || currentMode === 'heavy_missile') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 200) {
                    money -= 200;
                    let icon = L.divIcon({ className: 'marker-board', html: 'ЗАВ', iconSize: [36, 20], iconAnchor: [18, 10] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let factoryObj = { lat, lng, marker: m };
                    m.on('click', function() {
                        if (currentMode === 'attack_source') selectFactoryForAttack(factoryObj);
                    });
                    
                    playerFactories.push(factoryObj);
                    addLog("Построен новый промышленный комплекс БПЛА.");
                    toggleBuildMode(null);
                } else if (currentMode === 'pvo' && money >= 250) {
                    money -= 250;
                    let icon = L.divIcon({ className: 'marker-board', html: 'ПВО', iconSize: [36, 20], iconAnchor: [18, 10] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    // Радиус ПВО и одновременно радарной видимости
                    let r = L.circle([lat, lng], { radius: 140000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.03, weight: 1.5 }).addTo(map);

                    playerPVO.push({ 
                        lat, lng, marker: m, range: r, rangeDist: 140000, 
                        ammo: 4, maxAmmo: 4, reloadTimer: 0, lastShot: 0, isCityRadar: false
                    });
                    addLog("Зенитный комплекс развернут. Сектор взят под контроль РЛС.");
                    toggleBuildMode(null);
                }
            });
        }

        function selectFactoryForAttack(factoryObj) {
            selectedFactory = factoryObj;
            currentMode = 'attack_target';
            addLog("🏭 Точка вылета подтверждена. Теперь укажите [ЦЕЛЬ] на территории врага.");
        }

        function executeTargetedAttack(source, targetCity) {
            let attackSize = Math.min(droneInventory, 2);
            let cost = attackSize * 45; 
            if (money < cost) { addLog("Недостаточно средств для заправки!"); resetAttackState(); return; }

            money -= cost;
            droneInventory -= attackSize;
            addLog(`Эскадрилья БПЛА направлена на регион [${targetCity.name}].`);

            for(let i=0; i < attackSize; i++) {
                createDroneTrack(source, targetCity, playerDrones, true, false);
            }
            resetAttackState();
        }

        function executeHeavyMissileStrike(targetCity) {
            money -= 1500;
            let nameMissile = playerFaction === 'UA' ? 'Нептун-М' : 'Орешник';
            addLog(`🚀 СТРАТЕГИЧЕСКИЙ УДАР: Ракета «${nameMissile}» ушла на цель [${targetCity.name}]! (-1500$)`);

            let startPoint = CITIES[playerFaction][0]; 
            createDroneTrack(startPoint, targetCity, playerDrones, true, true);
            resetAttackState();
        }

        function enemyAI() {
            enemyMoney += 90; 
            
            // Если игрок активно строит заводы, ИИ начинает копить на тяжелую ракету
            if (enemyMoney >= 1500 && Math.random() < 0.6) {
                enemyMoney -= 1500;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                let start = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let nameMissile = enemyFaction === 'UA' ? 'Нептун-М' : 'Орешник';
                addLog(`⚠️ КРИТИЧЕСКАЯ УГРОЗА: Разведка зафиксировала пуск стратегической ракеты «${nameMissile}»!`, true);
                createDroneTrack(start, target, enemyDrones, false, true);
                return;
            }

            // Налет стандартных БПЛА врага
            if (enemyMoney >= 135) {
                let launchSize = Math.floor(Math.random() * 2) + 2; // 2-3 дрона в волне
                enemyMoney -= (launchSize * 45);
                addLog(`РЛС: Замечена подозрительная активность в воздушном пространстве.`, true);

                for (let i = 0; i < launchSize; i++) {
                    let start = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                    let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                    createDroneTrack(start, target, enemyDrones, false, false);
                }
            }
        }

        function createDroneTrack(start, target, collection, isPlayer, isHeavyMissile) {
            // Геометрические объекты гарантируют стабильность рендеринга на любых экранах
            let visualMarker;
            if (isHeavyMissile) {
                visualMarker = L.circle([start.lat, start.lng], {
                    radius: 20000, color: '#ff0000', fillColor: '#ffffff', fillOpacity: 0.9, weight: 3
                }).addTo(map);
            } else {
                // Вражеские дроны сначала создаются маленькими и незаметными (серыми), имитируя скрытность
                visualMarker = L.circle([start.lat, start.lng], {
                    radius: isPlayer ? 9000 : 4000, 
                    color: isPlayer ? '#00ff66' : '#555555', 
                    fillColor: isPlayer ? '#00ff66' : '#555555', 
                    fillOpacity: 0.7, weight: 2
                }).addTo(map);
            }

            let curve = (Math.random() * 0.15) * (Math.random() > 0.5 ? 1 : -1); 
            // Скорость аппаратов игрока увеличена, ракеты летят мгновенно
            let baseSpeed = isHeavyMissile ? 0.0038 : (isPlayer ? 0.0016 : 0.0006); 

            collection.push({
                id: Math.random().toString(36).substr(2, 9),
                marker: visualMarker, lat: start.lat, lng: start.lng,
                currentLat: start.lat, currentLng: start.lng,
                targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                progress: 0, 
                speed: baseSpeed + (Math.random() * 0.0001), 
                curve: curve,
                isHeavyMissile: isHeavyMissile,
                detected: isPlayer // Свои видны всегда, враги — по радарной зоне
            });
        }

        function economyTick() {
            money += 40 + (playerFactories.length * 20);
            playerFactories.forEach(() => droneInventory++);
            
            playerPVO.forEach(p => {
                if (!p.isCityRadar && p.ammo < p.maxAmmo) {
                    p.reloadTimer++; if (p.reloadTimer >= 4) { p.ammo++; p.reloadTimer = 0; }
                }
            });
            
            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
        }

        function tacticalTick() {
            processDronesList(playerDrones, true);
            processDronesList(enemyDrones, false);
            processMissiles();
        }

        function processDronesList(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i];
                d.progress += d.speed;

                // Если цель достигнута
                if (d.progress >= 1) {
                    createExplosion(d.targetLat, d.targetLng, '#ff3333', d.isHeavyMissile ? 45000 : 20000);
                    map.removeLayer(d.marker);
                    list.splice(i, 1);
                    
                    if (!isPlayer) {
                        damageCity(playerFaction, d.targetName, d.isHeavyMissile);
                    } else {
                        damageCity(enemyFaction, d.targetName, d.isHeavyMissile);
                    }
                    continue;
                }

                // Расчет текущих координат по дуге
                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;
                
                d.currentLat = cLat; d.currentLng = cLng;
                d.marker.setLatLng([cLat, cLng]);

                if (!isPlayer) {
                    // Механика обнаружения радарами ПВО игрока
                    let insideRadar = false;
                    playerPVO.forEach(pvo => {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        if (dist <= pvo.rangeDist) {
                            insideRadar = true;
                            // Если зашел в зону реального ПВО — открываем огонь
                            if (!pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 3500)) {
                                pvo.ammo--; pvo.lastShot = now;
                                launchVisualMissile(pvo, d, true);
                            }
                        }
                    });

                    // Динамическое изменение внешнего вида при обнаружении
                    if (insideRadar && !d.detected) {
                        d.detected = true;
                        d.marker.setStyle({ color: '#ff3333', fillColor: '#ff3333', radius: 12000 });
                        addLog(`📡 РЛС: Обнаружен и взят на сопровождение вражеский объект!`);
                    }
                }
            }
        }

        function launchVisualMissile(pvo, targetDrone, isAlly) {
            let marker = L.circle([pvo.lat, pvo.lng], {
                radius: 4000, color: '#ffffff', fillColor: '#ffffff', fillOpacity: 1
            }).addTo(map);

            missiles.push({
                marker: marker, lat: pvo.lat, lng: pvo.lng,
                droneId: targetDrone.id,
                targetCollection: isAlly ? enemyDrones : playerDrones,
                progress: 0, speed: 0.045
            });
        }

        function processMissiles() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.progress += m.speed;

                let drone = m.targetCollection.find(d => d.id === m.droneId);
                if (!drone || m.progress >= 1) {
                    map.removeLayer(m.marker); missiles.splice(i, 1); continue;
                }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                if (map.distance([mLat, mLng], [drone.currentLat, drone.currentLng]) < 22000) {
                    map.removeLayer(m.marker);
                    missiles.splice(i, 1);

                    let chance = drone.isHeavyMissile ? 0.20 : 0.80; // Ракету сбить сложнее
                    if (Math.random() <= chance) {
                        createExplosion(drone.currentLat, drone.currentLng, '#00ffff', 15000);
                        map.removeLayer(drone.marker);
                        let idx = m.targetCollection.indexOf(drone);
                        if (idx > -1) m.targetCollection.splice(idx, 1);
                        addLog("💥 Перехват: Вражеская воздушная цель ликвидирована.");
                    }
                    break;
                }
            }
        }

        function damageCity(faction, name, isHeavy) {
            let city = CITIES[faction].find(c => c.name === name);
            if (city) {
                let dmg = isHeavy ? 35 : 15;
                city.hp -= dmg; if (city.hp < 0) city.hp = 0;
                
                // Пересчет общего здоровья фракции
                let total = 0;
                CITIES[faction].forEach(c => total += c.hp);
                let avg = Math.round(total / 7); 
                
                if (faction === playerFaction) {
                    document.getElementById('txt-hp').innerText = avg + "%";
                    addLog(`🔥 ПОВРЕЖДЕНИЕ: Наш сектор [${name}] понес урон. Оборона: ${city.hp}%`, true);
                    if (avg <= 0) { alert("Критическое поражение. Ваша оборона полностью смята."); location.reload(); }
                } else {
                    document.getElementById('txt-enemy-hp').innerText = avg + "%";
                    addLog(`⚔️ РЕЗУЛЬТАТ: Нанесен удар по сектору врага [${name}]. Оборона ИИ: ${city.hp}%`);
                    if (avg <= 0) { alert("ПОБЕДА! Стратегические силы противника капитулировали!"); location.reload(); }
                }
            }
        }

        function createExplosion(lat, lng, color, maxR) {
            let exp = L.circle([lat, lng], { radius: 1000, color: color, fillColor: color, fillOpacity: 0.6 }).addTo(map);
            let r = 1000;
            let int = setInterval(() => {
                r += 5000; exp.setRadius(r);
                if(r > maxR) { clearInterval(int); map.removeLayer(exp); }
            }, 30);
        }

        function addLog(text, isEnemy = false) {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${isEnemy ? 'enemy' : ''}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
