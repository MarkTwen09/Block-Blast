<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Forge | Telegram Mining Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-glow: #0a0516;
            --bg-card: rgba(17, 12, 28, 0.65);
            --border-line: rgba(255, 255, 255, 0.07);
            --accent-star: #00f0ff;
            --accent-purple: #8a2be2;
            --text-main: #f3f1f6;
            --text-muted: #8a8795;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 30%, #1a0b36 0%, var(--bg-glow) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            padding: 24px 16px;
        }

        /* Хедер профиля */
        .header {
            width: 100%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-badge {
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Секция баланса */
        .balance-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .balance-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent-star) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .balance-amount span.star-icon {
            -webkit-text-fill-color: initial;
            background: none;
            font-size: 36px;
        }

        .passive-income {
            font-size: 13px;
            color: #00ffa3;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Игровое Кликер-Ядро */
        .core-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
        }

        .core-node {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, rgba(138,43,226,0.05) 70%);
            border: 2px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2), inset 0 0 30px rgba(0, 240, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            position: relative;
        }

        .core-node:active {
            transform: scale(0.96);
        }

        .core-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple) 0%, #05020a 100%);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 25px var(--accent-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(138, 43, 226, 0.6); }
            50% { box-shadow: 0 0 45px rgba(0, 240, 255, 0.8); }
        }

        /* Всплывающий урон/клики */
        .click-pop {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--accent-star);
            text-shadow: 0 0 8px rgba(0,240,255,0.6);
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        /* Энергопанель */
        .energy-section {
            width: 100%;
            max-width: 380px;
            margin-bottom: 24px;
        }

        .energy-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .energy-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-line);
        }

        .energy-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-star));
            box-shadow: 0 0 10px var(--accent-star);
            transition: width 0.1s linear;
        }

        /* Навигационная панель (Таббар) */
        .nav-bar {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 8px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px 0;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 16px;
        }

        .nav-item.active {
            color: var(--accent-star);
            background: rgba(255, 255, 255, 0.03);
            text-shadow: 0 0 10px rgba(0,240,255,0.2);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <!-- Хедер профиля -->
    <div class="header">
        <div class="user-badge">⚡ Node: Mainnet</div>
        <div class="user-badge" style="color: var(--accent-star);">kaoface</div>
    </div>

    <!-- Секция баланса -->
    <div class="balance-container">
        <div class="balance-label">Mining Balance</div>
        <div class="balance-amount">
            <span class="star-icon">🌌</span>
            <span id="balance-display">0</span>
        </div>
        <div class="passive-income">+<span id="income-display">0</span> $STAR/s</div>
    </div>

    <!-- Кликер Ядро -->
    <div class="core-wrapper">
        <div class="core-node" id="click-core">
            <div class="core-inner">⭐</div>
        </div>
    </div>

    <!-- Энергопанель -->
    <div class="energy-section">
        <div class="energy-meta">
            <span>Energy Terminal</span>
            <span><span id="energy-current">1000</span>/1000</span>
        </div>
        <div class="energy-bar-bg">
            <div class="energy-bar-fill" id="energy-fill"></div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="nav-bar">
        <button class="nav-item active">
            <span class="nav-icon">🛸</span>
            <span>Forge</span>
        </button>
        <button class="nav-item" onclick="alert('Магазин улучшений будет в следующем апдейте!')">
            <span class="nav-icon">⚡</span>
            <span>Upgrades</span>
        </button>
        <button class="nav-item" onclick="alert('Задания будут доступны в следующем апдейте!')">
            <span class="nav-icon">💎</span>
            <span>Tasks</span>
        </button>
        <button class="nav-item" onclick="alert('Реферальная сеть в разработке!')">
            <span class="nav-icon">👑</span>
            <span>Ref</span>
        </button>
    </div>

    <script>
        // Инициализация дефолтных данных игры
        let gameState = {
            balance: parseFloat(localStorage.getItem('sf_balance')) || 0,
            incomePerSecond: parseFloat(localStorage.getItem('sf_income')) || 0,
            clickPower: parseInt(localStorage.getItem('sf_clickPower')) || 1,
            energy: parseInt(localStorage.getItem('sf_energy')) || 1000,
            maxEnergy: 1000
        };

        const balanceDisplay = document.getElementById('balance-display');
        const incomeDisplay = document.getElementById('income-display');
        const energyCurrent = document.getElementById('energy-current');
        const energyFill = document.getElementById('energy-fill');
        const clickCore = document.getElementById('click-core');

        // Обновление интерфейса при старте
        function updateUI() {
            balanceDisplay.innerText = Math.floor(gameState.balance).toLocaleString();
            incomeDisplay.innerText = gameState.incomePerSecond;
            energyCurrent.innerText = gameState.energy;
            
            const energyPercent = (gameState.energy / gameState.maxEnergy) * 100;
            energyFill.style.width = `${energyPercent}%`;
        }

        // Логика клика
        clickCore.addEventListener('click', (e) => {
            if (gameState.energy >= gameState.clickPower) {
                gameState.balance += gameState.clickPower;
                gameState.energy -= gameState.clickPower;
                
                // Создаем премиальный эффект вылетающей цифры
                createClickPop(e, `+${gameState.clickPower}★`);
                updateUI();
                saveData();
            }
        });

        function createClickPop(e, text) {
            const pop = document.createElement('div');
            pop.classList.add('click-pop');
            pop.innerText = text;
            
            // Рассчитываем позицию клика относительно центра ядра
            const rect = clickCore.getBoundingClientRect();
            const x = e.clientX - rect.left - 15;
            const y = e.clientY - rect.top - 20;
            
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            
            clickCore.appendChild(pop);
            
            setTimeout(() => {
                pop.remove();
            }, 600);
        }

        // Пассивный майнинг (каждую секунду)
        setInterval(() => {
            if (gameState.incomePerSecond > 0) {
                gameState.balance += gameState.incomePerSecond;
                updateUI();
                saveData();
            }
        }, 1000);

        // Регенерация энергии (+3 энергии в сек)
        setInterval(() => {
            if (gameState.energy < gameState.maxEnergy) {
                gameState.energy = Math.min(gameState.maxEnergy, gameState.energy + 3);
                updateUI();
            }
        }, 1000);

        // Сохранение в LocalStorage
        function saveData() {
            localStorage.setItem('sf_balance', gameState.balance);
            localStorage.setItem('sf_income', gameState.incomePerSecond);
            localStorage.setItem('sf_clickPower', gameState.clickPower);
            localStorage.setItem('sf_energy', gameState.energy);
        }

        // Первый запуск
        updateUI();
    </script>
</body>
</html>
