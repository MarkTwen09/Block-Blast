<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Advanced Neural AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #0b0c10; color: #1f2833;
        }
        #map { width: 100%; height: 100%; background: #000; }
        
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1f2833; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #66fcf1;
        }
        .faction-btn {
            background: #0b0c10; border: 2px solid #66fcf1; padding: 15px 35px;
            color: #66fcf1; font-size: 18px; cursor: pointer; margin: 12px;
            font-weight: bold; width: 240px;
        }
        .faction-btn:hover { background: #66fcf1; color: #000; box-shadow: 0 0 20px #66fcf1; }

        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px;
            z-index: 1000; background: rgba(11, 12, 16, 0.95); border: 2px solid #66fcf1;
            padding: 12px; display: flex; justify-content: space-between;
            font-size: 11px; font-weight: bold; pointer-events: none; color: #66fcf1;
        }
        #hud-top span { color: #fff; }

        #control-panel {
            position: absolute; bottom: 12px; left: 12px; right: 12px;
            z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }
        .btn-row { display: flex; gap: 8px; width: 100%; }
        .btn {
            flex: 1; background: #0b0c10; color: #66fcf1; border: 2px solid #66fcf1;
            padding: 14px 5px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold;
        }
        .btn.active { background: #66fcf1; color: #000; box-shadow: 0 0 15px #66fcf1; }
        .btn-attack { border-color: #ff4d4d; color: #ff4d4d; background: rgba(30,10,10,0.9); }
        .btn-attack:hover { background: #ff4d4d; color: #000; }

        #log-panel {
            position: absolute; bottom: 135px; left: 12px; right: 12px; z-index: 1000;
            height: 60px; background: rgba(11, 12, 16, 0.9); border: 1px solid #45f3ff;
            padding: 6px; font-size: 9px; overflow: hidden; color: #66fcf1;
            display: flex; flex-direction: column-reverse; pointer-events: none;
        }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #66fcf1; padding-left: 4px; }
        .log-entry.enemy { border-left-color: #ff4d4d; color: #ff6666; }
        
        .marker-ally {
            background: #0b0c10; border: 2px solid #00ff66; color: #00ff66;
            font-size: 9px; font-weight: bold; text-align: center; line-height: 18px; border-radius: 3px;
        }
        .marker-enemy {
            background: #0b0c10; border: 2px solid #ff3333; color: #ff3333;
            font-size: 9px; font-weight: bold; text-align: center; line-height: 18px; border-radius: 3px;
        }
        .marker-uav-ally { color: #00ff66; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #00ff66; text-align: center; }
        
        .marker-uav-enemy { 
            color: #ff3333; font-size: 18px; font-weight: bold; text-shadow: 0 0 8px #ff3333; text-align: center;
            animation: radar-pulse 1s infinite alternate;
        }
        @keyframes radar-pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.25); opacity: 1; text-shadow: 0 0 15px #ff0000; }
        }
    </style>
</head>
<body>

    <div id="faction-screen">
        <h1 style="letter-spacing: 5px; margin-bottom: 5px;">SKY IN FLAMES</h1>
        <p style="color: #45f3ff; font-size: 11px; margin-top: 0; letter-spacing: 2px;">NEURAL WARFARE v6.0</p>
        <button class="faction-btn" onclick="selectFaction('UA')">УКРАИНА [UA]</button>
        <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff4d4d; color:#ff4d4d;">РОССИЯ [RU]</button>
    </div>

    <div id="hud-top">
        <div>БЮДЖЕТ: <span id="txt-money">600</span>$</div>
        <div>РЕЗЕРВ: <span id="txt-drones">0</span> БПЛА</div>
        <div>ОБОРОНА: <span id="txt-hp">100%</span></div>
    </div>

    <div id="log-panel"></div>

    <div id="control-panel">
        <div class="btn-row">
            <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД (200$)</button>
            <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО (250$)</button>
        </div>
        <button class="btn btn-attack" onclick="launchDroneSwarm()">ВЫПУСТИТЬ РОЙ (МАКС 2 ШТ | -35$ / ед)</button>
    </div>

    <div id="map"></div>

    <script>
        // Обновленный пул из 7 стратегических локаций
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 51.00, lng: 34.80, name: 'Сумская обл.', hp: 100 },
                { lat: 48.00, lng: 37.80, name: 'Донбасс', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'Санкт-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов-на-Дону', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 56.32, lng: 44.00, name: 'Нижний Новгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодарский край', hp: 100 },
                { lat: 45.04, lng: 41.96, name: 'Ставропольский край', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 500; 
        
        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyFactories = [], enemyPVO = [], enemyDrones = [];
        let map;

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([51.0, 36.0], window.innerWidth < 600 ? 5 : 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©CartoDB' }).addTo(map);

            spawnCities();
            setupMapClicks();
            
            setInterval(economyTick, 2500);
            setInterval(tacticalTick, 50);   
            setInterval(enemyAI, 6000); // Повышенная частота просчета ИИ

            addLog("Архитектура ИИ обновлена. Налажен мониторинг 7 секторов обороны.");
        }

        function spawnCities() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-ally', html: 'СИТИ', iconSize: [36, 18], iconAnchor: [18, 9] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map).bindPopup(`<b>${c.name}</b>`);
                
                let r = L.circle([c.lat, c.lng], { radius: 45000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.01, weight: 1, dashArray: '5,5' }).addTo(map);
                playerPVO.push({ lat: c.lat, lng: c.lng, marker: null, range: r, rangeDist: 45000, ammo: 0, maxAmmo: 0, isCityRadar: true, radarLine: null, angle: 0 });
            });
            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'marker-enemy', html: 'ЦЕЛЬ', iconSize: [36, 18], iconAnchor: [18, 9] });
                L.marker([c.lat, c.lng], { icon: icon }).addTo(map).bindPopup(`<b>${c.name}</b>`);
                
                enemyPVO.push({ lat: c.lat, lng: c.lng, marker: null, rangeDist: 45000, ammo: 0, maxAmmo: 0, isCityRadar: true, angle: 0 });
            });
        }

        function toggleBuildMode(mode) {
            if (currentMode === mode) currentMode = null;
            else currentMode = mode;
            document.getElementById('btn-factory').classList.toggle('active', currentMode === 'factory');
            document.getElementById('btn-pvo').classList.toggle('active', currentMode === 'pvo');
        }

        function setupMapClicks() {
            map.on('click', function(e) {
                if (!currentMode) return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 200) {
                    money -= 200;
                    let icon = L.divIcon({ className: 'marker-ally', html: 'ЗАВ', iconSize: [32, 18], iconAnchor: [16, 9] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    playerFactories.push({ lat, lng, marker: m });
                    addLog("Построен завод БПЛА.");
                } else if (currentMode === 'pvo' && money >= 250) {
                    money -= 250;
                    let icon = L.divIcon({ className: 'marker-ally', html: 'ПВО', iconSize: [32, 18], iconAnchor: [16, 9] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let r = L.circle([lat, lng], { radius: 110000, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.02, weight: 1 }).addTo(map);
                    let radarLine = L.polyline([[lat, lng], [lat, lng]], {color: '#00ff66', weight: 1.5, opacity: 0.7}).addTo(map);

                    playerPVO.push({ 
                        lat, lng, marker: m, range: r, rangeDist: 110000, 
                        ammo: 6, maxAmmo: 6, reloadTimer: 0, 
                        radarLine: radarLine, angle: Math.random() * 360,
                        lockLine: null
                    });
                    addLog("Развернута система ПВО (6 ракет, эффективность 75%).");
                }
                toggleBuildMode(null);
            });
        }

        function launchDroneSwarm() {
            if (droneInventory <= 0) { addLog("На складах нет готовых БПЛА."); return; }
            
            // Жесткое усложнение: максимум 2 дрона за атаку!
            let attackSize = Math.min(droneInventory, 2);
            let cost = attackSize * 35; 
            
            if (money < cost) { addLog(`Недостаточно средств. Требуется: ${cost}$.`); return; }

            money -= cost;
            droneInventory -= attackSize;
            addLog(`Запуск штурмовой пары: ${attackSize} БПЛА ушли на цель (-${cost}$).`);

            const start = playerFactories.length > 0 ? playerFactories[Math.floor(Math.random() * playerFactories.length)] : CITIES[playerFaction][0];

            for(let i=0; i < attackSize; i++) {
                let targetCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                createDroneTrack(start, targetCity, playerDrones, true);
            }
        }

        // ВЫСОКОИНТЕЛЛЕКТУАЛЬНЫЙ ИИ ПРОТИВНИКА
        function enemyAI() {
            enemyMoney += 85 + (enemyFactories.length * 30); // Повышенный бюджет ИИ

            // 1. Умное выставление ПВО: бот анализирует, где стоят заводы игрока
            let activeEnemyPVO = enemyPVO.filter(p => !p.isCityRadar);
            if (activeEnemyPVO.length < 3 && enemyMoney >= 250 && playerFactories.length > 0) {
                enemyMoney -= 250;
                
                // Берем случайный завод игрока и случайный город ИИ
                let targetFactory = playerFactories[Math.floor(Math.random() * playerFactories.length)];
                let protectedCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                
                // Ставим ПВО строго на векторе между заводом игрока и своим городом (перехват линии атаки!)
                let lat = protectedCity.lat + (targetFactory.lat - protectedCity.lat) * 0.35;
                let lng = protectedCity.lng + (targetFactory.lng - protectedCity.lng) * 0.35;
                
                let icon = L.divIcon({ className: 'marker-enemy', html: 'ПВО', iconSize: [32, 18], iconAnchor: [16, 9] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                let r = L.circle([lat, lng], { radius: 110000, color: '#ff3333', fillColor: '#ff3333', fillOpacity: 0.01, weight: 1 }).addTo(map);
                
                enemyPVO.push({ lat, lng, marker: m, range: r, rangeDist: 110000, ammo: 6, maxAmmo: 6, reloadTimer: 0, angle: Math.random()*360 });
                addLog("Разведка: ИИ вычислил вектор атаки и развернул перехватывающее ПВО!", true);
                return;
            }

            // 2. Развитие инфраструктуры ИИ (до 3 заводов для массовых налетов)
            if (enemyFactories.length < 3 && enemyMoney >= 200) {
                enemyMoney -= 200;
                let city = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let lat = city.lat + (Math.random() - 0.5) * 0.15;
                let lng = city.lng + (Math.random() - 0.5) * 0.15;

                let icon = L.divIcon({ className: 'marker-enemy', html: 'ЗАВ', iconSize: [32, 18], iconAnchor: [16, 9] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                enemyFactories.push({ lat, lng, marker: m, stock: 0 });
                return;
            }

            // Накопление ударных групп у ИИ
            if (enemyFactories.length > 0) {
                enemyFactories[Math.floor(Math.random() * enemyFactories.length)].stock += 2;
            }

            let totalEnemyDrones = enemyFactories.reduce((acc, f) => acc + f.stock, 0);
            
            // Массированный удар: теперь бот выпускает КРУПНЫЕ волны (от 4 до 7 дронов)
            if (totalEnemyDrones >= 5 && enemyMoney >= (totalEnemyDrones * 35)) {
                let launchSize = Math.min(totalEnemyDrones, 7);
                enemyMoney -= (launchSize * 35);
                addLog(`⚠️ КРИТИЧЕСКАЯ УГРОЗА: ИИ запустил массированный рой из ${launchSize} БПЛА!`, true);

                let launched = 0;
                enemyFactories.forEach(f => {
                    while (f.stock > 0 && launched < launchSize) {
                        let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                        createDroneTrack(f, target, enemyDrones, false);
                        f.stock--;
                        launched++;
                    }
                });
            }
        }

        function createDroneTrack(start, target, collection, isPlayer) {
            let symbol = isPlayer ? '▲' : '▼';
            let cls = isPlayer ? 'marker-uav-ally' : 'marker-uav-enemy';
            let icon = L.divIcon({ className: cls, html: symbol, iconSize: [16, 16], iconAnchor: [8, 8] });
            
            let marker = L.marker([start.lat, start.lng], { icon: icon });
            if (isPlayer) marker.addTo(map);

            let curve = (Math.random() * 0.20) * (Math.random() > 0.5 ? 1 : -1); 

            collection.push({
                marker: marker, lat: start.lat, lng: start.lng,
                targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                progress: 0, 
                speed: 0.0004 + (Math.random() * 0.0002), 
                curve: curve,
                isDetected: false 
            });
        }

        function economyTick() {
            money += 45 + (playerFactories.length * 15);
            playerFactories.forEach(() => droneInventory++);
            
            reloadPVOList(playerPVO);
            reloadPVOList(enemyPVO);

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
        }

        function reloadPVOList(list) {
            list.forEach(p => {
                if (!p.isCityRadar && p.ammo < p.maxAmmo) {
                    p.reloadTimer++;
                    if (p.reloadTimer >= 5) { 
                        p.ammo++; p.reloadTimer = 0;
                        if (p.marker && p.marker.getPopup()) p.marker.setPopupContent(`Батарея ПВО (Ракет: ${p.ammo}/${p.maxAmmo})`);
                    }
                }
            });
        }

        function tacticalTick() {
            updateRadarLines();
            processPlayerDrones();
            processEnemyDrones();
        }

        function updateRadarLines() {
            playerPVO.forEach(p => {
                if (p.radarLine) {
                    p.angle = (p.angle + 3) % 360; 
                    let rad = p.angle * Math.PI / 180;
                    let endLat = p.lat + Math.sin(rad) * 1.0;
                    let endLng = p.lng + Math.cos(rad) * 1.0;
                    p.radarLine.setLatLngs([[p.lat, p.lng], [endLat, endLng]]);
                }
            });
        }

        function processPlayerDrones() {
            for (let i = playerDrones.length - 1; i >= 0; i--) {
                let d = playerDrones[i];
                d.progress += d.speed;

                if (d.progress >= 1) {
                    createExplosion(d.targetLat, d.targetLng, '#ff3333', 20000);
                    map.removeLayer(d.marker);
                    playerDrones.splice(i, 1);
                    addLog(`Удар: Цель в регионе [${d.targetName}] поражена!`);
                    continue;
                }

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;
                d.marker.setLatLng([cLat, cLng]);

                for (let j = enemyPVO.length - 1; j >= 0; j--) {
                    let pvo = enemyPVO[j];
                    if (!pvo.isCityRadar && pvo.ammo > 0 && map.distance([cLat, cLng], [pvo.lat, pvo.lng]) <= pvo.rangeDist) {
                        pvo.ammo--;
                        if (Math.random() <= 0.75) { 
                            createExplosion(cLat, cLng, '#ff3333', 12000);
                            map.removeLayer(d.marker);
                            playerDrones.splice(i, 1);
                            addLog(`Потеря: Наш БПЛА сбит умным ПВО врага на подлете.`, true);
                            break;
                        }
                    }
                }
            }
        }

        function processEnemyDrones() {
            for (let i = enemyDrones.length - 1; i >= 0; i--) {
                let d = enemyDrones[i];
                d.progress += d.speed;

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                cLat += offset; cLng -= offset;

                let detectingRadar = null;
                for (let j = 0; j < playerPVO.length; j++) {
                    if (map.distance([cLat, cLng], [playerPVO[j].lat, playerPVO[j].lng]) <= playerPVO[j].rangeDist) {
                        detectingRadar = playerPVO[j];
                        break; 
                    }
                }

                if (detectingRadar) {
                    if (!d.isDetected) {
                        d.isDetected = true;
                        d.marker.addTo(map); 
                        addLog(`🚨 РЛС: Засечен вражеский дрон, идущий на [${d.targetName}]!`, true);
                    }
                    
                    d.marker.setLatLng([cLat, cLng]);
                    
                    if (detectingRadar.range) {
                        detectingRadar.range.setStyle({ color: '#ff3333', fillColor: '#ff3333', fillOpacity: 0.05 });
                    }

                    if (!detectingRadar.isCityRadar && detectingRadar.ammo > 0) {
                        if (!detectingRadar.lockLine) {
                            detectingRadar.lockLine = L.polyline([[detectingRadar.lat, detectingRadar.lng], [cLat, cLng]], {
                                color: '#ff3333', weight: 1, dashArray: '4,4', opacity: 0.8
                            }).addTo(map);
                        } else {
                            detectingRadar.lockLine.setLatLngs([[detectingRadar.lat, detectingRadar.lng], [cLat, cLng]]);
                        }
                    }
                } else {
                    if (d.isDetected) {
                        d.isDetected = false;
                        map.removeLayer(d.marker);
                    }
                    playerPVO.forEach(p => {
                        if (p.range) p.range.setStyle({ color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.02 });
                        if (p.lockLine) { map.removeLayer(p.lockLine); p.lockLine = null; }
                    });
                }

                if (d.progress >= 1) {
                    createExplosion(d.targetLat, d.targetLng, '#ff3333', 20000);
                    if (d.isDetected) map.removeLayer(d.marker);
                    
                    playerPVO.forEach(p => { if (p.lockLine) { map.removeLayer(p.lockLine); p.lockLine = null; } });
                    
                    enemyDrones.splice(i, 1);
                    damagePlayerCity(d.targetName);
                    continue;
                }

                if (d.isDetected) {
                    for (let j = playerPVO.length - 1; j >= 0; j--) {
                        let pvo = playerPVO[j];
                        if (!pvo.isCityRadar && pvo.ammo > 0 && map.distance([cLat, cLng], [pvo.lat, pvo.lng]) <= pvo.rangeDist) {
                            pvo.ammo--; 
                            
                            if (pvo.lockLine) { map.removeLayer(pvo.lockLine); pvo.lockLine = null; }

                            if (Math.random() <= 0.75) { 
                                createExplosion(cLat, cLng, '#00ffff', 12000);
                                map.removeLayer(d.marker);
                                enemyDrones.splice(i, 1);
                                addLog(`ПВО: Воздушная цель успешно ликвидирована.`);
                                break;
                            } else {
                                addLog("⚠️ ПВО: Промах! Плотность роя снизила точность наведения!", true);
                            }
                        }
                    }
                }
            }
        }

        function damagePlayerCity(name) {
            let city = CITIES[playerFaction].find(c => c.name === name);
            if (city) {
                city.hp -= 20; 
                if (city.hp < 0) city.hp = 0;
                addLog(`КРИТИЧЕСКИЙ УДАР: Потери в регионе [${name}]. Целостность: ${city.hp}%`, true);
                
                let total = 0;
                CITIES[playerFaction].forEach(c => total += c.hp);
                let avg = Math.round(total / 7); // Расчет на 7 регионов
                document.getElementById('txt-hp').innerText = avg + "%";
                
                if (avg <= 0) {
                    alert("Все оборонные и промышленные регионы уничтожены. Игра окончена.");
                    location.reload();
                }
            }
        }

        function createExplosion(lat, lng, color, maxR) {
            let exp = L.circle([lat, lng], { radius: 1000, color: color, fillColor: color, fillOpacity: 0.6 }).addTo(map);
            let r = 1000;
            let int = setInterval(() => {
                r += 4000; exp.setRadius(r);
                if(r > maxR) { clearInterval(int); map.removeLayer(exp); }
            }, 30);
        }

        function addLog(text, isEnemy = false) {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${isEnemy ? 'enemy' : ''}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
