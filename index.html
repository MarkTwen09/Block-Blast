<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Snap</title>
    <style>
        :root {
            --bg: #0f0a1e;
            --grid: #1a152e;
            --active-block: #ffd700;
            --accent: #7b2ff7;
        }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* --- АНИМАЦИЯ ЗАПУСКА (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite ease-in-out;
        }

        .splash-logo::after {
            content: '';
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            transform: rotate(45deg);
            border-radius: 5px;
        }

        .splash-text {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--active-block);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInText 1s forwards 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* --- ИГРОВОЙ ИНТЕРФЕЙС --- */
        #game-content {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .visible #game-content {
            opacity: 1;
            transform: translateY(0);
        }

        .score-container {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            gap: 4px;
            background: var(--grid);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .pieces {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .piece {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(123, 47, 247, 0.3);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo"></div>
        <div class="splash-text">Block Snap</div>
    </div>

    <div id="game-content">
        <div class="score-container">0</div>
        <div class="grid" id="grid">
            </div>
        <div class="pieces">
            <div class="piece">BLOCK</div>
            <div class="piece">BLOCK</div>
            <div class="piece">BLOCK</div>
        </div>
    </div>

    <script>
        // Инициализация сетки
        const grid = document.getElementById('grid');
        for (let i = 0; i < 64; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }

        // Логика исчезновения заставки
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                document.body.classList.add('visible');
                
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 2500); // Заставка висит 2.5 секунды
        });

        // Сюда можно добавить остальную логику твоей игры (перетаскивание и т.д.)
    </script>
</body>
</html>
