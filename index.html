<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky in Flames - Tactical Map</title>
    <!-- Подключаем стили и скрипты карты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background: #000;
        }
        /* Стилизация самой карты под военный радар */
        #map {
            width: 100%;
            height: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
        /* Панель управления */
        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 15, 10, 0.85);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
            color: #00ff00;
            display: flex;
            gap: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }
        .btn {
            background: #111;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
        }
        .btn.active {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            border: 1px solid #00ff00;
            padding: 10px;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div id="stats">
        <div>ОБЪЕКТЫ ПВО: <span id="pvo-count">0</span></div>
        <div>ОБНАРУЖЕНО ЦЕЛЕЙ: <span id="drone-count">0</span></div>
    </div>

    <div id="control-panel">
        <button class="btn" id="btn-pvo" onclick="setMode('pvo')">РАЗВЕРНУТЬ ПВО</button>
        <button class="btn" id="btn-drone" onclick="setMode('drone')">ЗАПУСТИТЬ РОЙ</button>
        <button class="btn" onclick="clearMap()">СБРОС СИТУАЦИИ</button>
    </div>

    <div id="map"></div>

    <script>
        // Инициализация карты (по умолчанию центрируем на средние широты, зум 11)
        const map = L.map('map', {
            zoomControl: false 
        }).setView([44.63, 41.94], 11); 

        // Загружаем слой темных дорог/карт (используем бесплатный OSM)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let currentMode = null;
        let pvoSystems = [];
        let drones = [];

        // Переключение режимов установки объектов
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-pvo').classList.remove('active');
            document.getElementById('btn-drone').classList.remove('active');
            
            if (mode) {
                document.getElementById(`btn-${mode}`).classList.add('active');
            }
        }

        // Клик по карте
        map.on('click', function(e) {
            const { lat, lng } = e.latlng;

            if (currentMode === 'pvo') {
                deployPVO(lat, lng);
                setMode(null); // Сбрасываем режим после установки
            } else if (currentMode === 'drone') {
                spawnDroneSwarm(lat, lng);
                setMode(null);
            }
        });

        // Функция установки ПВО
        function deployPVO(lat, lng) {
            // Маркер комплекса ПВО (Зеленый круг)
            const pvoMarker = L.circleMarker([lat, lng], {
                radius: 8,
                fillColor: "#00ff00",
                color: "#00ff00",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // Радиус действия радара / поражения ракет
            const radarRange = L.circle([lat, lng], {
                radius: 7000, // 7 километров в метрах
                color: '#00ff00',
                fillColor: '#00ff00',
                fillOpacity: 0.05,
                weight: 1,
                dashArray: '5, 5'
            }).addTo(map);

            pvoSystems.push({ marker: pvoMarker, range: radarRange, lat, lng });
            document.getElementById('pvo-count').innerText = pvoSystems.length;
        }

        // Функция спавна дрона
        function spawnDroneSwarm(lat, lng) {
            // Создаем маркер вражеского БПЛА (Красный квадрат)
            const droneMarker = L.circleMarker([lat, lng], {
                radius: 6,
                fillColor: "#ff0000",
                color: "#ff0000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            // Случайная точка назначения (например, чуть в сторону или к ближайшему ПВО)
            // Для теста сделаем просто медленное движение на север/северо-запад
            const droneObj = {
                marker: droneMarker,
                lat: lat,
                lng: lng,
                speedLat: (Math.random() - 0.5) * 0.002 - 0.001, // Направление движения
                speedLng: (Math.random() - 0.5) * 0.002 - 0.001
            };

            drones.push(droneObj);
            document.getElementById('drone-count').innerText = drones.length;
        }

        // Тактический цикл (расчет перемещений и перехватов)
        function tacticalTick() {
            // Двигаем дроны
            for (let i = drones.length - 1; i >= 0; i--) {
                let d = drones[i];
                d.lat += d.speedLat;
                d.lng += d.speedLng;
                d.marker.setLatLng([d.lat, d.lng]);

                // Проверяем, вошел ли дрон в зону действия какого-либо ПВО
                for (let j = pvoSystems.length - 1; j >= 0; j--) {
                    let pvo = pvoSystems[j];
                    
                    // Считаем расстояние между координатами в метрах через метод встроенный в Leaflet
                    let distance = map.distance([d.lat, d.lng], [pvo.lat, pvo.lng]);

                    if (distance <= 7000) { // Если зашел в радиус 7км
                        // Имитация пуска ракеты и уничтожения
                        createExplosion(d.lat, d.lng);
                        map.removeLayer(d.marker);
                        drones.splice(i, 1);
                        break; 
                    }
                }
            }
            document.getElementById('drone-count').innerText = drones.length;
        }

        // Эффект уничтожения цели
        function createExplosion(lat, lng) {
            const exp = L.circle([lat, lng], {
                radius: 300,
                color: '#ff6600',
                fillColor: '#ff3300',
                fillOpacity: 0.4
            }).addTo(map);

            // Анимация затухания взрыва
            let radius = 300;
            const interval = setInterval(() => {
                radius += 100;
                exp.setRadius(radius);
                if (radius > 1500) {
                    clearInterval(interval);
                    map.removeLayer(exp);
                }
            }, 40);
        }

        // Очистить всё
        function clearMap() {
            pvoSystems.forEach(p => { map.removeLayer(p.marker); map.removeLayer(p.range); });
            drones.forEach(d => map.removeLayer(d.marker));
            pvoSystems = [];
            drones = [];
            document.getElementById('pvo-count').innerText = 0;
            document.getElementById('drone-count').innerText = 0;
        }

        // Запуск тактического таймера (обновление каждые 100мс)
        setInterval(tacticalTick, 100);
    </script>
</body>
</html>
