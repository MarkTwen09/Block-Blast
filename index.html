<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Tactical Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: monospace;
            background: #03060f; color: #00e5ff; -webkit-user-select: none; user-select: none;
        }
        
        #viewport-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #map { flex-grow: 1; width: 100%; height: 100%; background: #03060f; z-index: 1; }
        
        /* СИГНАЛЬНЫЕ ОВЕРЛЕИ */
        #screen-flash-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 99999; opacity: 0; background: #ffffff;
            transition: opacity 0.05s ease-out;
        }

        #weather-overlay, #time-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; transition: all 1s ease-in-out;
        }
        .weather-rain {
            background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
            opacity: 0.15; animation: rain-anim 0.25s linear infinite;
        }
        @keyframes rain-anim { 0% {background-position:0 0;} 100% {background-position:40px 400px;} }
        
        .weather-fog {
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 80%);
            opacity: 0.5; filter: blur(10px);
        }

        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a17; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: rgba(12, 22, 43, 0.9); border: 1px solid #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 8px; padding: 30px; text-align: center; max-width: 340px; width: 100%;
        }
        .faction-btn {
            background: rgba(0, 229, 255, 0.03); border: 1px solid #00e5ff; padding: 14px;
            color: #00e5ff; font-size: 13px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; font-family: inherit; transition: all 0.2s; border-radius: 4px;
        }
        .faction-btn:active { background: #00e5ff; color: #050a17; box-shadow: 0 0 10px #00e5ff; }

        /* ИНТЕРФЕЙС И ТАКТИЧЕСКИЙ КУПОЛ */
        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
            background: rgba(6, 12, 28, 0.85); border: 1px solid rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(10px); border-radius: 6px; padding: 10px 14px; font-size: 12px; pointer-events: none;
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; }
        .hud-value { font-weight: bold; color: #ff2a5f; }
        
        .hp-mini-wrapper { display: flex; gap: 14px; width: 100%; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(0,229,255,0.1); }
        .hp-mini-block { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .hp-bar-container { flex-grow: 1; background: rgba(255,255,255,0.03); height: 5px; border-radius: 2px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        .hp-player { background: #00e5ff; }
        .hp-enemy { background: #ff2a5f; }
        #weather-widget { font-size: 10px; color: #64748b; }

        #bottom-ui-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            display: flex; flex-direction: column; background: rgba(5, 10, 24, 0.95);
            border-top: 1px solid rgba(0, 229, 255, 0.25); backdrop-filter: blur(10px);
            transition: transform 0.25s ease-out;
        }
        .ui-collapsed { transform: translateY(calc(100% - 38px)); }

        #toggle-ui-btn {
            height: 38px; background: rgba(5, 10, 24, 0.98); color: #00e5ff;
            border: none; font-family: inherit; font-size: 12px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        #inner-ui-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        #target-selector-panel {
            display: none; background: rgba(255, 42, 95, 0.03); border: 1px dashed #ff2a5f;
            padding: 8px; border-radius: 4px; text-align: center;
        }
        .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; max-height: 120px; overflow-y: auto; }
        .target-btn {
            background: rgba(10, 18, 36, 0.9); border: 1px solid rgba(255, 42, 95, 0.3); color: #e2e8f0;
            font-size: 11px; padding: 8px 4px; font-family: inherit; cursor: pointer; border-radius: 3px;
        }
        .target-btn:active { background: #ff2a5f; border-color: #ff2a5f; color: #fff; }

        #log-container { background: rgba(0, 0, 0, 0.3); border-radius: 4px; border: 1px solid rgba(0, 229, 255, 0.1); }
        #log-panel {
            height: 50px; padding: 6px 10px; font-size: 11px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; pointer-events: none;
        }
        .log-entry { margin-bottom: 2px; color: #00e5ff; opacity: 0.8; }
        .log-entry.enemy { color: #ff2a5f; font-weight: bold; }
        .log-entry.system { color: #eab308; }

        #control-panel { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn {
            background: rgba(14, 26, 54, 0.8); color: #94a3b8; border: 1px solid rgba(0, 229, 255, 0.15);
            padding: 12px 6px; cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 4px; font-family: inherit;
        }
        .btn.active { background: #00e5ff; color: #050a17; border-color: #00e5ff; }
        .btn.disabled { opacity: 0.2; cursor: not-allowed; border-color: rgba(255,255,255,0.05); }
        
        .btn-orange.active { background: #f97316; color: #fff; border-color: #f97316; }
        .btn-red.active { background: #ff2a5f; color: #fff; border-color: #ff2a5f; }
        .btn-purple.active { background: #a855f7; color: #fff; border-color: #a855f7; }
        .btn-blue.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

        .drone-container { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .rotator { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; transition: transform 0.1s linear; }

        /* МАРКЕРЫ ОБЪЕКТОВ */
        .city-marker { background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .city-dot { width: 6px; height: 6px; background: #00e5ff; border-radius: 50%; border: 1.5px solid #fff; }
        .city-marker.enemy .city-dot { background: #ff2a5f; }
        .city-label { font-size: 10px; font-weight: bold; color: #fff; text-shadow: 0 1px 3px #000; margin-top: 4px; white-space: nowrap; }
        .city-marker.repair-highlight .city-dot { background: #a855f7; transform: scale(1.4); }

        .build-marker {
            background: #050a17; border: 1px solid #00e5ff; color: #00e5ff;
            font-size: 9px; font-weight: bold; border-radius: 3px; padding: 2px 5px; white-space: nowrap;
        }
        .build-marker.enemy-factory { border-color: #ff2a5f; color: #ff2a5f; }

        .damage-popup { font-size: 11px; font-weight: bold; color: #ff2a5f; text-shadow: 0 0 4px #000; animation: float-dmg 0.4s ease-out forwards; }
        .heal-popup { font-size: 11px; font-weight: bold; color: #00e5ff; text-shadow: 0 0 4px #000; animation: float-dmg 0.4s ease-out forwards; }
        @keyframes float-dmg { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-15px); opacity: 0; } }
        
        /* СТРАТЕГИЧЕСКАЯ ТРЯСКА ПРИ АВИАУДАРЕ И ОРЕШНИКЕ */
        .shake-heavy { animation: heavy-shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes heavy-shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 90% { transform: translate(-4px, 3px); }
            20%, 80% { transform: translate(4px, -3px); }
            30%, 50%, 70% { transform: translate(-5px, -3px); }
            40%, 60% { transform: translate(5px, 3px); }
        }

        /* АВИАБОМБЫ И БЛОКИ ОРЕШНИКА */
        .fab-bomb {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #ffaa00, 0 0 15px #ff3300;
        }

        /* КУПОЛ ПЕРЕХВАТА ПВО */
        .pvo-dome-blast {
            background: none; border: 1.5px solid #00e5ff; border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            animation: dome-out 0.3s ease-out forwards;
        }
        @keyframes dome-out { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }
    </style>
</head>
<body>

    <div id="screen-flash-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h3 style="margin: 0 0 20px 0; font-size: 14px; color: #fff; letter-spacing: 1px;">ТАКТИЧЕСКИЙ КОМАНДНЫЙ ЦЕНТР</h3>
            <button class="faction-btn" onclick="selectFaction('UA')">УПРАВЛЕНИЕ [UA]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff2a5f; color:#ff2a5f;">УПРАВЛЕНИЕ [RU]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>РЕСУРСЫ: <span id="txt-money" class="hud-value" style="color:#00e5ff;">400</span>$</div>
                <div id="weather-widget">☀️ СТАТУС: НОРМА</div>
                <div>РЕЗЕРВ БПЛА: <span id="txt-drones" class="hud-value" style="color:#eab308;">0</span> ЕД</div>
            </div>
            <div class="hp-mini-wrapper">
                <div class="hp-mini-block">
                    <span>СЕКТОР А: <span id="lbl-hp">100%</span></span>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player"></div></div>
                </div>
                <div class="hp-mini-block" style="justify-content: flex-end; text-align: right;">
                    <div class="hp-bar-container" style="margin-right: 8px;"><div id="bar-enemy" class="hp-bar-fill hp-enemy"></div></div>
                    <span>СЕКТОР Б: <span id="lbl-enemy-hp">100%</span></span>
                </div>
            </div>
        </div>

        <div id="map">
            <div id="weather-overlay"></div>
            <div id="time-overlay"></div>
        </div>

        <div id="bottom-ui-wrapper" class="ui-collapsed">
            <button id="toggle-ui-btn" onclick="toggleUIPanel()">📊 КОНТРОЛЬ ОГНЕВЫХ СРЕДСТВ</button>
            <div id="inner-ui-content">
                
                <div id="target-selector-panel">
                    <div id="target-title-text" style="font-size: 11px; font-weight: bold;">УКАЖИТЕ ЦЕЛЬ ДЛЯ УДАРА:</div>
                    <div class="target-grid" id="target-buttons-container"></div>
                </div>

                <div id="log-container">
                    <div id="log-panel"></div>
                </div>

                <div id="control-panel">
                    <div class="btn-row">
                        <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ПРОМ-ОБЪЕКТ ($500) <span id="factory-counter">0/10</span></button>
                        <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] МОДУЛЬ ПВО ($750) <span id="pvo-counter">0/5</span></button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 ПАРА БПЛА (-$250)</button>
                        <button class="btn btn-purple" id="btn-bomber-mode" onclick="toggleBomberMode()">✈️ АВИАУДАР Су-34 (-$2200)</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-red" id="btn-oreshnik-mode" onclick="toggleOreshnikMode()">🚀 КРК "ОРЕШНИК" (-$4500)</button>
                        <button class="btn btn-blue" id="btn-repair-mode" onclick="toggleRepairMode()">🛠️ РЕМОНТ СЕКТОРА (-$2400)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 46.97, lng: 31.99, name: 'Николаев', hp: 100 },
                { lat: 48.62, lng: 22.28, name: 'Ужгород', hp: 100 },
                { lat: 50.91, lng: 34.80, name: 'Сумы', hp: 100 },
                { lat: 47.84, lng: 35.13, name: 'Запорожье', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'С.-Петерб.', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 50.59, lng: 36.58, name: 'Белгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодар', hp: 100 },
                { lat: 44.61, lng: 33.52, name: 'Севастоп.', hp: 100 },
                { lat: 48.01, lng: 37.80, name: 'Донецк', hp: 100 },
                { lat: 45.04, lng: 41.97, name: 'Ставрополь', hp: 100 }, 
                { lat: 51.73, lng: 36.19, name: 'Курск', hp: 100 },
                { lat: 48.57, lng: 39.31, name: 'Луганск', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 400, droneInventory = 0, currentMode = null;
        let enemyMoney = 400;

        let playerDrones = [], enemyDrones = []; 
        let playerFactories = [], playerPVO = [];
        let enemyFactories = [], enemyPVO = []; 
        let missiles = [];
        let map, selectedFactory = null;
        
        const MAX_PVO_LIMIT = 5;
        const MAX_FACTORY_LIMIT = 10; 
        let currentWeather = 'clear'; 
        let currentPeriod = 'day';     

        const SHAHED_SVG = `<svg viewBox="0 0 100 100" width="18" height="18" style="fill: #94a3b8;"><path d="M50,5 L95,85 L70,85 L50,65 L30,85 L5,85 Z"/></svg>`;
        const PLAYER_DRONE_SVG = `<svg viewBox="0 0 100 100" width="16" height="16" style="fill: #38bdf8;"><path d="M50,5 L90,85 L50,60 L10,85 Z"/></svg>`;
        const BOMBER_SVG = `<svg viewBox="0 0 100 100" width="26" height="26" style="fill: #a855f7;"><path d="M50,2 L95,65 L70,55 L50,85 L30,55 L5,65 Z"/></svg>`;
        const ORESHNIK_SVG = `<svg viewBox="0 0 100 100" width="22" height="22" style="fill: #ff2a5f;"><path d="M50,2 L60,35 L90,35 L65,55 L75,90 L50,70 L25,90 L35,55 L10,35 L40,35 Z"/></svg>`;

        function toggleUIPanel() {
            document.getElementById('bottom-ui-wrapper').classList.toggle('ui-collapsed');
        }

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([50.5, 34.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { opacity: 0.8 }).addTo(map);

            renderOperationalRadar();
            setupRadarClicks();

            setInterval(economyCycle, 2000);
            setInterval(radarTick, 30); 
            setInterval(enemyAILogic, 2500); 
            setInterval(changeWeatherCycle, 40000);

            addLog(`МОНИТОР: СИНХРОНИЗАЦИЯ ТЕРМИНАЛА...`, 'system');
            updateUIButtons();
        }

        function changeWeatherCycle() {
            const weathers = ['clear', 'rain', 'fog'];
            const periods = ['day', 'night'];
            currentWeather = weathers[Math.floor(Math.random() * weathers.length)];
            currentPeriod = periods[Math.floor(Math.random() * periods.length)];

            const wOverlay = document.getElementById('weather-overlay');
            const tOverlay = document.getElementById('time-overlay');
            wOverlay.className = ''; 
            
            let wText = '☀️ МОНИТОР: ЯСНО';
            if (currentWeather === 'rain') { wOverlay.classList.add('weather-rain'); wText = '🌧️ МОНИТОР: ОСАДКИ'; }
            else if (currentWeather === 'fog') { wOverlay.classList.add('weather-fog'); wText = '🌫️ МОНИТОР: ТУМАН'; }

            if (currentPeriod === 'night') {
                tOverlay.style.background = 'rgba(2, 4, 12, 0.4)';
                wText += ' | НОЧЬ';
            } else {
                tOverlay.style.background = 'rgba(0,0,0,0)';
                wText += ' | ДЕНЬ';
            }
            document.getElementById('weather-widget').innerText = wText;
        }

        function renderOperationalRadar() {
            CITIES[playerFaction].forEach(c => {
                let html = `<div class="city-dot"></div><div class="city-label">${c.name}</div>`;
                let icon = L.divIcon({ className: 'city-marker', html: html, iconSize: [30, 30] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if (currentMode === 'repair_sector') executeSectorRepair(c);
                });
                playerPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.3, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0, circle: null });
            });

            CITIES[enemyFaction].forEach(c => {
                let html = `<div class="city-dot"></div><div class="city-label">${c.name}</div>`;
                let icon = L.divIcon({ className: 'city-marker enemy', html: html, iconSize: [30, 30] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    handleTargetSelection({lat: c.lat, lng: c.lng, name: c.name, type: 'city'});
                });
                enemyPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.5, ammo: 3, maxAmmo: 3, lastShot: 0, isCityRadar: true, circle: null });
            });
        }

        function updateTargetPanelGrid() {
            const container = document.getElementById('target-buttons-container');
            const title = document.getElementById('target-title-text');
            container.innerHTML = '';

            if (currentMode === 'repair_sector') {
                title.innerText = "ВЫБЕРИТЕ СЕКТОР ДЛЯ ИНЖЕНЕРНЫХ РАБОТ:";
                CITIES[playerFaction].forEach(city => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.style.borderColor = '#00e5ff';
                    btn.innerText = `${city.name} (${city.hp}%)`;
                    btn.onclick = () => executeSectorRepair(city);
                    container.appendChild(btn);
                });
            } else {
                title.innerText = "УКАЖИТЕ ЦЕЛЬ НА ТАКТИЧЕСКОЙ КАРТЕ:";
                
                CITIES[enemyFaction].forEach(city => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.innerText = city.name;
                    btn.onclick = () => handleTargetSelection({lat: city.lat, lng: city.lng, name: city.name, type: 'city'});
                    container.appendChild(btn);
                });

                enemyFactories.forEach((fac, idx) => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.style.borderColor = '#ff2a5f'; btn.style.color = '#ff6b8b';
                    btn.innerText = `Завод #${idx + 1}`;
                    btn.onclick = () => handleTargetSelection({lat: fac.lat, lng: fac.lng, name: `Завод #${idx + 1}`, type: 'factory', id: fac.id});
                    container.appendChild(btn);
                });
            }
        }

        function handleTargetSelection(targetObj) {
            if (currentMode === 'attack_target' && selectedFactory) dispatchDroneStrike(selectedFactory, targetObj);
            else if (currentMode === 'bomber_strike') dispatchBomberStrike(targetObj);
            else if (currentMode === 'oreshnik_strike') dispatchOreshnikStrike(targetObj);
        }

        function toggleRepairMode() {
            if (money < 2400) return; 
            if (currentMode === 'repair_sector') { dropModes(); return; }
            dropModes(); currentMode = 'repair_sector';
            document.getElementById('btn-repair-mode').classList.add('active');
            CITIES[playerFaction].forEach(c => {
                if(c.markerInstance && c.markerInstance.getElement()) c.markerInstance.getElement().classList.add('repair-highlight');
            });
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function executeSectorRepair(city) {
            if (money < 2400 || city.hp >= 100) return; 
            money -= 2400; city.hp = Math.min(100, city.hp + 25);
            addLog(`🛠️ Комплекс [${city.name}] восстановлен: +25% прочности`, 'system');

            let pMarker = L.marker([city.lat + 0.04, city.lng], { icon: L.divIcon({ className: 'heal-popup', html: `+25%` }) }).addTo(map);
            setTimeout(() => map.removeLayer(pMarker), 600);
            dropModes(); recalcRadarHUD();
        }

        function toggleBuildMode(mode) {
            if (mode === 'factory' && (money < 500 || playerFactories.length >= MAX_FACTORY_LIMIT)) return;
            if (mode === 'pvo' && (money < 750 || getPlacedPVOCount() >= MAX_PVO_LIMIT)) return;
            let last = currentMode; dropModes();
            if (last !== mode) {
                currentMode = mode;
                document.getElementById(`btn-${mode}`).classList.add('active');
            }
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') { dropModes(); return; }
            if (money < 250 || droneInventory < 2) return;
            dropModes(); currentMode = 'attack_source';
            document.getElementById('btn-attack-mode').classList.add('active');
            addLog("Выберите ваш промышленный объект для пуска ударной пары.");
        }

        function toggleBomberMode() {
            if (currentMode === 'bomber_strike') { dropModes(); return; }
            if (money < 2200) return;
            dropModes(); currentMode = 'bomber_strike';
            document.getElementById('btn-bomber-mode').classList.add('active');
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function toggleOreshnikMode() {
            if (currentMode === 'oreshnik_strike') { dropModes(); return; }
            if (money < 4500) return;
            dropModes(); currentMode = 'oreshnik_strike';
            document.getElementById('btn-oreshnik-mode').classList.add('active');
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function showTargetSelector(show) {
            document.getElementById('target-selector-panel').style.display = show ? 'block' : 'none';
        }

        function dropModes() {
            CITIES[playerFaction].forEach(c => {
                if(c.markerInstance && c.markerInstance.getElement()) c.markerInstance.getElement().classList.remove('repair-highlight');
            });
            currentMode = null; selectedFactory = null;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            showTargetSelector(false); updateUIButtons();
        }

        function getPlacedPVOCount() { return playerPVO.filter(p => !p.isCityRadar).length; }

        function updateUIButtons() {
            let pvoCount = getPlacedPVOCount();
            let factoryCount = playerFactories.length;
            
            document.getElementById('pvo-counter').innerText = `${pvoCount}/${MAX_PVO_LIMIT}`;
            document.getElementById('factory-counter').innerText = `${factoryCount}/${MAX_FACTORY_LIMIT}`;
            
            document.getElementById('btn-factory').classList.toggle('disabled', money < 500 || factoryCount >= MAX_FACTORY_LIMIT);
            document.getElementById('btn-pvo').classList.toggle('disabled', money < 750 || pvoCount >= MAX_PVO_LIMIT);
            document.getElementById('btn-attack-mode').classList.toggle('disabled', money < 250 || droneInventory < 2);
            document.getElementById('btn-bomber-mode').classList.toggle('disabled', money < 2200);
            document.getElementById('btn-oreshnik-mode').classList.toggle('disabled', money < 4500);
            document.getElementById('btn-repair-mode').classList.toggle('disabled', money < 2400); 
        }

        function setupRadarClicks() {
            map.on('click', function(e) {
                if (currentMode === 'attack_target' || currentMode === 'bomber_strike' || currentMode === 'oreshnik_strike' || currentMode === 'repair_sector') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 500 && playerFactories.length < MAX_FACTORY_LIMIT) {
                    money -= 500;
                    let icon = L.divIcon({ className: 'build-marker', html: 'ПРОМ', iconSize: [36, 16] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    let fObj = { id: Math.random().toString(36).substr(2, 5), lat, lng, marker: m };
                    m.on('click', function(event) { 
                        L.DomEvent.stopPropagation(event);
                        if (currentMode === 'attack_source') selectFactoryForLaunch(fObj); 
                    });
                    playerFactories.push(fObj);
                    dropModes();
                } else if (currentMode === 'pvo' && money >= 750 && getPlacedPVOCount() < MAX_PVO_LIMIT) {
                    money -= 750;
                    let icon = L.divIcon({ className: 'build-marker', html: 'ПВО', iconSize: [36, 16] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let visualCircle = L.circle([lat, lng], {
                        radius: 145000, color: '#00e5ff', weight: 1, fillOpacity: 0.01, dashArray: '4,4'
                    }).addTo(map);

                    playerPVO.push({ lat: lat, lng: lng, marker: m, rangeDist: 2.1, ammo: 6, maxAmmo: 6, lastShot: 0, isCityRadar: false, circle: visualCircle });
                    dropModes();
                }
            });
        }

        function selectFactoryForLaunch(fObj) {
            selectedFactory = fObj; currentMode = 'attack_target';
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function dispatchDroneStrike(source, targetObj) {
            money -= 250; droneInventory -= 2;
            for(let i=0; i<2; i++) injectAirTarget(source, targetObj, playerDrones, true, 'drone');
            dropModes();
        }

        function dispatchBomberStrike(targetObj) {
            money -= 2200;
            injectAirTarget(CITIES[playerFaction][0], targetObj, playerDrones, true, 'bomber');
            dropModes();
        }

        function dispatchOreshnikStrike(targetObj) {
            money -= 4500;
            addLog(`🚀 ЗАПУСК: Межконтинентальный комплекс "Орешник" отправлен на цель!`, 'system');
            injectAirTarget(CITIES[playerFaction][0], targetObj, playerDrones, true, 'oreshnik');
            dropModes();
        }

        function enemyAILogic() {
            enemyMoney += 220 + (enemyFactories.length * 60);

            if (enemyMoney >= 1400 && enemyFactories.length < 4) {
                enemyMoney -= 500;
                let randomCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let fLat = randomCity.lat + (Math.random() - 0.5) * 0.2;
                let fLng = randomCity.lng + (Math.random() - 0.5) * 0.2;
                let icon = L.divIcon({ className: 'build-marker enemy-factory', html: 'ПРОМ', iconSize: [36, 16] });
                let m = L.marker([fLat, fLng], { icon: icon }).addTo(map);
                
                enemyFactories.push({ id: Math.random().toString(36).substr(2, 5), lat: fLat, lng: fLng, marker: m });
                addLog(`МОНИТОР: Обнаружена новая инфраструктурная цель противника.`, 'enemy');
            }

            let brokenCity = CITIES[playerFaction].find(c => c.hp > 0 && c.hp < 50);
            let randomCityTarget = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
            let source = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];

            let target = { lat: randomCityTarget.lat, lng: randomCityTarget.lng, name: randomCityTarget.name, type: 'city' };

            // ИИ использует тяжелое вооружение при критических целях
            if (brokenCity && enemyMoney >= 4500 && Math.random() > 0.5) {
                enemyMoney -= 4500;
                addLog(`🚨 КРИТИЧЕСКАЯ УГРОЗА: Зафиксирован пуск БРСД "Орешник" противника!`, 'enemy');
                injectAirTarget(source, {lat: brokenCity.lat, lng: brokenCity.lng, name: brokenCity.name, type: 'city'}, enemyDrones, false, 'oreshnik');
                return;
            }

            if (brokenCity && enemyMoney >= 2200) {
                enemyMoney -= 2200;
                addLog(`🚨 ВНИМАНИЕ: Зафиксирован боевой вылет тактической авиации противника!`, 'enemy');
                injectAirTarget(source, {lat: brokenCity.lat, lng: brokenCity.lng, name: brokenCity.name, type: 'city'}, enemyDrones, false, 'bomber');
                return;
            }

            if (enemyMoney >= 800) {
                enemyMoney -= 250;
                injectAirTarget(source, target, enemyDrones, false, 'drone');
            }
        }

        function injectAirTarget(start, targetObj, collection, isPlayer, type) {
            let dLng = targetObj.lng - start.lng, dLat = targetObj.lat - start.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);
            
            // Настройка скоростей
            let speed = 0.0045; 
            if (type === 'bomber') speed = 0.0075;
            if (type === 'oreshnik') speed = 0.012; // Гиперзвук летит очень шустро
            if (type === 'kab_bomb' || type === 'submunition') speed = 0.04; 

            if (currentWeather === 'rain') speed *= 0.85;

            let svgMarkup = (type === 'drone') ? (isPlayer ? PLAYER_DRONE_SVG : SHAHED_SVG) : ((type === 'oreshnik') ? ORESHNIK_SVG : BOMBER_SVG);
            let modelHtml = `<div class="drone-container"><div class="rotator" style="transform: rotate(${angle}deg);">${svgMarkup}</div></div>`;

            let marker = L.marker([start.lat, start.lng], {
                icon: L.divIcon({ className: 'custom-track', html: modelHtml, iconSize: [28, 28], iconAnchor: [14, 14] })
            }).addTo(map);

            collection.push({
                id: Math.random().toString(36).substr(2, 9), marker: marker, type: type, hp: (type === 'bomber' || type === 'oreshnik') ? 5 : 1,
                lat: start.lat, lng: start.lng, targetLat: targetObj.lat, targetLng: targetObj.lng, 
                targetName: targetObj.name, targetType: targetObj.type || 'city', targetId: targetObj.id || null,
                currentLat: start.lat, currentLng: start.lng, progress: 0, speed: speed, trails: []
            });
            updateUIButtons();
        }

        function economyCycle() {
            money += 90 + (playerFactories.length * 60);
            playerFactories.forEach(() => droneInventory++);
            
            let all = [...CITIES['UA'], ...CITIES['RU']];
            all.forEach(c => { if(c.hp > 0 && c.hp < 100) c.hp = Math.min(100, c.hp + 1); });
            
            playerPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });

            CITIES[playerFaction].forEach(c => {
                if (c.markerInstance) {
                    c.markerInstance.setIcon(L.divIcon({ className: 'city-marker', html: `<div class="city-dot"></div><div class="city-label">${c.name} [${c.hp}%]</div>`, iconSize:[30,30] }));
                }
            });

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
            updateUIButtons();
        }

        function radarTick() {
            processTracks(playerDrones, true);
            processTracks(enemyDrones, false);
            processInterceptors();
        }

        function processTracks(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i]; d.progress += d.speed;

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                d.currentLat = cLat; d.currentLng = cLng; d.marker.setLatLng([cLat, cLng]);

                // Отрисовка кинетических трейлов
                if (d.type === 'kab_bomb' || d.type === 'submunition') {
                    if (Math.random() > 0.4) {
                        let spark = L.marker([cLat, cLng], {
                            icon: L.divIcon({ className: 'custom-spark', html: `<div class="fab-bomb"></div>`, iconSize:[8,8], iconAnchor:[4,4] })
                        }).addTo(map);
                        d.trails.push(spark);
                        if (d.trails.length > 6) map.removeLayer(d.trails.shift());
                    }
                } else {
                    if (Math.random() > 0.7) {
                        let dot = L.circle([cLat, cLng], { radius: 250, color: isPlayer ? '#00e5ff' : '#ff2a5f', weight: 0, fillOpacity: 0.15 }).addTo(map);
                        d.trails.push(dot); if (d.trails.length > 3) map.removeLayer(d.trails.shift());
                    }
                }

                // КАСКАДНЫЙ СБРОС АВИАБОМБ ПРИ ПОДЛЕТЕ АВИАЦИИ (На 82% дистанции)
                if (d.type === 'bomber' && d.progress >= 0.82) {
                    addLog(isPlayer ? `💥 СИСТЕМА: Бомбометание Су-34! Выпущен каскад управляемых ФАБ/КАБ.` : `🚨 КРИТИЧЕСКИЙ УРОВЕНЬ: Зафиксирован сброс серии авиабомб Су-34!`, 'system');
                    for (let k = 0; k < 4; k++) {
                        let delayOffsetLat = (Math.random() - 0.5) * 0.08;
                        let delayOffsetLng = (Math.random() - 0.5) * 0.08;
                        setTimeout(() => {
                            injectAirTarget(
                                { lat: cLat, lng: cLng },
                                { lat: d.targetLat + delayOffsetLat, lng: d.targetLng + delayOffsetLng, name: d.targetName, type: d.targetType, id: d.targetId },
                                list, isPlayer, 'kab_bomb'
                            );
                        }, k * 250);
                    }
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1); continue;
                }

                // РАЗДЕЛЕНИЕ БЛОКОВ ОРЕШНИКА В КОСМОСЕ (На 60% пути)
                if (d.type === 'oreshnik' && d.progress >= 0.60) {
                    addLog(`🚀 МОНИТОР: Вход в плотные слои атмосферы. Разделение головной части "Орешник" на 6 боевых блоков!`, 'system');
                    for (let k = 0; k < 6; k++) {
                        let scatterLat = (Math.random() - 0.5) * 0.12;
                        let scatterLng = (Math.random() - 0.5) * 0.12;
                        injectAirTarget(
                            { lat: cLat, lng: cLng },
                            { lat: d.targetLat + scatterLat, lng: d.targetLng + scatterLng, name: d.targetName, type: d.targetType, id: d.targetId },
                            list, isPlayer, 'submunition'
                        );
                    }
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1); continue;
                }

                // ЛОГИКА УДАРА И ДЕТОНАЦИИ
                if (d.progress >= 1) {
                    let isHeavy = (d.type === 'kab_bomb' || d.type === 'submunition');
                    let dmg = d.type === 'submunition' ? 20 : (d.type === 'kab_bomb' ? 25 : 15); 
                    
                    triggerTacticalExplosion(d.targetLat, d.targetLng, isHeavy ? '#ff2a5f' : (isPlayer ? '#00e5ff' : '#ff2a5f'), isHeavy);
                    
                    // Тряска и вспышка только от тяжелых прилетов (Орешник / Авиабомбы)
                    if (isHeavy) {
                        triggerStrategicImpact();
                    }

                    applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, d.targetLat, d.targetLng, dmg, d.targetType, d.targetId, isPlayer);
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1); continue;
                }

                // РАБОТА СИСТЕМ ПВО
                if (!isPlayer) {
                    playerPVO.forEach(pvo => {
                        let approxDist = Math.pow(cLat - pvo.lat, 2) + Math.pow(cLng - pvo.lng, 2);
                        let range = pvo.rangeDist; 
                        if (currentWeather === 'fog') range *= 0.7;

                        if (approxDist <= Math.pow(range, 2) && !pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 1000)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, true);
                        }
                    });
                }
            }
        }

        function fireInterceptor(pvo, target, isPlayerPVO) {
            let dLng = target.currentLng - pvo.lng, dLat = target.currentLat - pvo.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);

            let interceptorSVG = `<svg viewBox="0 0 100 100" style="fill: #00e5ff;" width="12" height="12"><path d="M50,5 L70,50 L50,40 L30,50 Z"/></svg>`;
            let modelHtml = `<div class="pvo-missile-container"><div style="transform: rotate(${angle}deg); display:flex;">${interceptorSVG}</div></div>`;

            let marker = L.marker([pvo.lat, pvo.lng], {
                icon: L.divIcon({ className: 'custom-interceptor', html: modelHtml, iconSize: [16, 16], iconAnchor: [8, 8] })
            }).addTo(map);

            missiles.push({ 
                marker: marker, lat: pvo.lat, lng: pvo.lng, droneId: target.id, 
                targetCollection: isPlayerPVO ? enemyDrones : playerDrones, progress: 0, speed: 0.2, 
                interceptorTrails: [] 
            });
        }

        function processInterceptors() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.progress += m.speed;
                let drone = m.targetCollection.find(d => d.id === m.droneId);

                if (!drone || m.progress >= 1) { 
                    map.removeLayer(m.marker); 
                    m.interceptorTrails.forEach(t => map.removeLayer(t));
                    missiles.splice(i, 1); 
                    continue; 
                }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                let smoke = L.circle([mLat, mLng], { radius: 140, color: '#475569', fillOpacity: 0.25, weight: 0 }).addTo(map);
                m.interceptorTrails.push(smoke);
                if (m.interceptorTrails.length > 8) map.removeLayer(m.interceptorTrails.shift());

                if (Math.abs(mLat - drone.currentLat) < 0.08 && Math.abs(mLng - drone.currentLng) < 0.08) {
                    let dome = L.marker([mLat, mLng], {
                        icon: L.divIcon({ className: 'pvo-dome-blast', iconSize: [40, 40], iconAnchor: [20, 20] })
                    }).addTo(map);
                    setTimeout(() => map.removeLayer(dome), 300);

                    map.removeLayer(m.marker); m.interceptorTrails.forEach(t => map.removeLayer(t));
                    missiles.splice(i, 1);
                    
                    let targetChance = 0.85;
                    if (drone.type === 'bomber' || drone.type === 'oreshnik') targetChance = 0.4; 
                    if (drone.type === 'kab_bomb') targetChance = 0.15; 
                    if (drone.type === 'submunition') targetChance = 0.05; // Гиперзвуковые блоки Орешника сбить практически невозможно!

                    if (Math.random() <= targetChance) {
                        drone.hp--;
                        if (drone.hp <= 0) {
                            map.removeLayer(drone.marker); drone.trails.forEach(t => map.removeLayer(t));
                            m.targetCollection.splice(m.targetCollection.indexOf(drone), 1);
                            let reward = (drone.type === 'bomber' || drone.type === 'oreshnik') ? 600 : (drone.type === 'kab_bomb' ? 150 : 100);
                            money += reward;
                            addLog(`🎯 ПВО: Воздушная цель поражена. Средства: +$${reward}`, 'system');
                        }
                    }
                    break;
                }
            }
        }

        function applyRadarDamage(faction, cityName, lat, lng, dmg, targetType, targetId, isPlayerAttacking) {
            if (targetType === 'factory' || cityName === 'Пром-Объект') {
                if (!isPlayerAttacking) {
                    let closeFactory = playerFactories.find(f => f.id === targetId || (Math.abs(f.lat - lat) < 0.06 && Math.abs(f.lng - lng) < 0.06));
                    if (closeFactory) {
                        map.removeLayer(closeFactory.marker);
                        playerFactories.splice(playerFactories.indexOf(closeFactory), 1);
                        addLog(`💥 СТРУКТУРНЫЙ УРОН: Разрушен промышленный объект!`, 'enemy');
                        recalcRadarHUD();
                    }
                } else {
                    let closeEnemyFactory = enemyFactories.find(f => f.id === targetId || (Math.abs(f.lat - lat) < 0.06 && Math.abs(f.lng - lng) < 0.06));
                    if (closeEnemyFactory) {
                        map.removeLayer(closeEnemyFactory.marker);
                        enemyFactories.splice(enemyFactories.indexOf(closeEnemyFactory), 1);
                        money += 600; 
                        addLog(`💥 ОПЕРАЦИЯ: Ликвидирован промышленный узел врага! (+$600)`, 'system');
                    }
                }
                return;
            }

            let city = CITIES[faction].find(c => c.name === cityName);
            if (city) {
                city.hp = Math.max(0, city.hp - dmg);
                
                let pMarker = L.marker([city.lat + 0.04, city.lng], { icon: L.divIcon({ className: 'damage-popup', html: `-${dmg}%` }) }).addTo(map);
                setTimeout(() => map.removeLayer(pMarker), 500);
                
                if (faction !== playerFaction) {
                    let attackReward = Math.round(dmg * 8); money += attackReward;
                    addLog(`Подтвержден урон по сектору: +$${attackReward}`, 'system');
                }
                recalcRadarHUD();
            }
        }

        function recalcRadarHUD() {
            let pTotal = 0, eTotal = 0;
            CITIES[playerFaction].forEach(c => pTotal += c.hp);
            CITIES[enemyFaction].forEach(c => eTotal += c.hp);
            let pAvg = Math.round(pTotal / CITIES[playerFaction].length);
            let eAvg = Math.round(eTotal / CITIES[enemyFaction].length);

            document.getElementById('lbl-hp').innerText = pAvg + "%";
            document.getElementById('lbl-enemy-hp').innerText = eAvg + "%";
            document.getElementById('bar-player').style.width = pAvg + "%";
            document.getElementById('bar-enemy').style.width = eAvg + "%";

            if (pAvg <= 0) { alert("Ваш сектор полностью разрушен."); location.reload(); }
            if (eAvg <= 0) { alert("Победа! Инфраструктура противника подавлена."); location.reload(); }
        }

        function triggerTacticalExplosion(lat, lng, color, isHeavy) {
            let blast = L.circle([lat, lng], {
                radius: 50, color: '#fff', fillColor: color, fillOpacity: 0.8, weight: 1.5
            }).addTo(map);
            
            let r = 50;
            let maxRadius = isHeavy ? 28000 : 15000; 
            let speed = isHeavy ? 3200 : 2200;

            let loop = setInterval(() => {
                r += speed;
                blast.setRadius(r);
                blast.setStyle({ fillOpacity: 0.6 * (1 - r/maxRadius), weight: 1.5 * (1 - r/maxRadius) });
                if (r >= maxRadius) { clearInterval(loop); map.removeLayer(blast); }
            }, 30);
        }

        function triggerStrategicImpact() {
            const mapEl = document.getElementById('map');
            mapEl.classList.add('shake-heavy');
            setTimeout(() => mapEl.classList.remove('shake-heavy'), 400);

            const overlay = document.getElementById('screen-flash-overlay');
            overlay.style.opacity = '0.25';
            setTimeout(() => overlay.style.opacity = '0', 80);
        }

        function addLog(text, type = '') {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div'); entry.className = `log-entry ${type}`; entry.innerText = `> ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
