<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Cyber Tactical</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #020408; color: #00ffcc; -webkit-user-select: none; user-select: none;
        }
        
        #viewport-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #map { flex-grow: 1; width: 100%; height: 100%; background: #020408; z-index: 1; }
        
        /* ЭФФЕКТЫ СВЕТА НА ЭКРАНЕ */
        #screen-flash-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 99999; opacity: 0; background: #ff3c00;
            transition: opacity 0.05s ease-out;
        }

        #weather-overlay, #time-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; transition: all 1s ease-in-out;
        }
        .weather-rain {
            background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
            opacity: 0.2; animation: rain-anim 0.3s linear infinite;
        }
        @keyframes rain-anim { 0% {background-position:0 0;} 100% {background-position:40px 400px;} }
        
        .weather-fog {
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 80%);
            opacity: 0.6; filter: blur(8px);
        }

        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #040814; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: rgba(10, 20, 38, 0.85); border: 1px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px; padding: 30px; text-align: center; max-width: 340px; width: 100%;
        }
        .faction-btn {
            background: rgba(0, 255, 204, 0.05); border: 1px solid #00ffcc; padding: 14px;
            color: #00ffcc; font-size: 14px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; font-family: inherit; transition: all 0.2s; border-radius: 6px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .faction-btn:active { background: #00ffcc; color: #040814; box-shadow: 0 0 15px #00ffcc; }

        /* HUD И СТИЛЬ GLASSMORPHISM */
        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
            background: rgba(4, 8, 20, 0.75); border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px); border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; }
        .hud-value { font-weight: bold; color: #ff0055; text-shadow: 0 0 5px #ff0055; }
        
        .hp-mini-wrapper { display: flex; gap: 14px; width: 100%; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(0,255,204,0.1); }
        .hp-mini-block { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .hp-bar-container { flex-grow: 1; background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        .hp-player { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .hp-enemy { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
        
        #weather-widget { font-size: 10px; color: #8892b0; }

        /* ИНТЕРФЕЙС ПРАВЛЕНИЯ */
        #bottom-ui-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            display: flex; flex-direction: column; background: rgba(4, 8, 20, 0.9);
            border-top: 1px solid rgba(0, 255, 204, 0.4); backdrop-filter: blur(15px);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .ui-collapsed { transform: translateY(calc(100% - 38px)); }

        #toggle-ui-btn {
            height: 38px; background: rgba(4, 8, 20, 0.95); color: #00ffcc;
            border: none; font-family: inherit; font-size: 12px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px; letter-spacing: 1px;
            text-shadow: 0 0 4px #00ffcc;
        }

        #inner-ui-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        #target-selector-panel {
            display: none; background: rgba(255, 0, 85, 0.05); border: 1px dashed #ff0055;
            padding: 8px; border-radius: 6px; text-align: center; box-shadow: inset 0 0 10px rgba(255,0,85,0.1);
        }
        .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; max-height: 120px; overflow-y: auto; }
        .target-btn {
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 0, 85, 0.4); color: #f1f5f9;
            font-size: 11px; padding: 8px 4px; font-family: inherit; cursor: pointer; border-radius: 4px;
            transition: all 0.15s;
        }
        .target-btn:active { background: #ff0055; border-color: #ff0055; box-shadow: 0 0 8px #ff0055; color: #fff; }

        #log-container { background: rgba(0, 0, 0, 0.5); border-radius: 6px; border: 1px solid rgba(0, 255, 204, 0.15); }
        #log-panel {
            height: 50px; padding: 6px 10px; font-size: 11px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; pointer-events: none; line-height: 1.4;
        }
        .log-entry { margin-bottom: 2px; color: #00ffcc; opacity: 0.8; }
        .log-entry.enemy { color: #ff0055; font-weight: bold; text-shadow: 0 0 4px rgba(255,0,85,0.3); }
        .log-entry.system { color: #ffcc00; }

        #control-panel { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn {
            background: rgba(20, 30, 55, 0.7); color: #a0aec0; border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 12px 6px; cursor: pointer; font-size: 12px; font-weight: bold;
            border-radius: 6px; font-family: inherit; transition: all 0.2s;
        }
        .btn.active { background: #00ffcc; color: #040814; border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .btn.disabled { opacity: 0.15; cursor: not-allowed; border-color: rgba(255,255,255,0.1); }
        
        .btn-orange.active { background: #ff6600; color: #fff; border-color: #ff6600; box-shadow: 0 0 10px #ff6600; }
        .btn-purple.active { background: #b026ff; color: #fff; border-color: #b026ff; box-shadow: 0 0 10px #b026ff; }
        .btn-red.active { background: #ff0044; color: #fff; border-color: #ff0044; box-shadow: 0 0 15px #ff0044; }
        .btn-blue.active { background: #0066ff; color: #fff; border-color: #0066ff; box-shadow: 0 0 10px #0066ff; }

        .drone-container { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .rotator { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        /* МАРКЕРЫ СЕТИ */
        .city-marker { background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .city-dot { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 8px #00ffcc; border: 2px solid #fff; }
        .city-marker.enemy .city-dot { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
        
        .city-label { font-size: 10px; font-weight: bold; color: #fff; text-shadow: 0 0 4px #000, 0 0 8px #00ffcc; margin-top: 4px; white-space: nowrap; }
        .city-marker.enemy .city-label { text-shadow: 0 0 4px #000, 0 0 8px #ff0055; }
        .city-marker.repair-highlight .city-dot { background: #b026ff; box-shadow: 0 0 15px #b026ff; transform: scale(1.5); }

        .build-marker {
            background: #040814; border: 1px solid #00ffcc; color: #00ffcc;
            font-size: 9px; font-weight: bold; border-radius: 4px; text-align: center;
            padding: 2px 5px; box-shadow: 0 0 8px rgba(0,255,204,0.3); white-space: nowrap;
        }
        .build-marker.enemy-factory { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 8px rgba(255,0,85,0.3); }

        .damage-popup { font-size: 12px; font-weight: bold; color: #ff0055; text-shadow: 0 0 6px #000; animation: float-dmg 0.5s ease-out forwards; }
        .heal-popup { font-size: 12px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 6px #000; animation: float-dmg 0.5s ease-out forwards; }
        @keyframes float-dmg { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 100% { transform: translateY(-20px) scale(1.2); opacity: 0; } }
        
        .shake-hit { animation: screen-shake 0.25s infinite; }
        @keyframes screen-shake { 0% { transform: translate(0,0); } 20% { transform: translate(-3px, 2px); } 40% { transform: translate(3px, -1px); } 60% { transform: translate(-2px, -2px); } 80% { transform: translate(2px, 2px); } 100% { transform: translate(0,0); } }

        /* ЭПИЧЕСКОЕ КИНЕМАТОГРАФИЧНОЕ РАЗДЕЛЕНИЕ ОРЕШНИКА */
        .separation-mega-burst {
            background: none;
            border: 4px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 40px #ff3c00, 0 0 80px #ff6600, inset 0 0 30px #fff;
            animation: mega-burst-out 0.6s cubic-bezier(0.05, 0.8, 0.1, 1) forwards;
        }
        @keyframes mega-burst-out {
            0% { transform: scale(0.1); opacity: 1; filter: blur(0px); }
            50% { filter: blur(2px); }
            100% { transform: scale(5); opacity: 0; filter: blur(6px); }
        }

        /* НЕОНОВЫЕ СЛЕДЫ И КОМЕТЫ */
        .heavy-plasma-core {
            width: 10px; height: 10px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px #ff3c00, 0 0 30px #ff6600;
        }

        /* НЕОНОВОЕ ПВО ПО РЕФЕРЕНСУ */
        .pvo-missile-container { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
        .pvo-interceptor-svg { fill: #00ffcc; filter: drop-shadow(0 0 6px #00ffcc); }
        
        .pvo-cyber-blast {
            background: none; border: 2px solid #00ffcc; border-radius: 50%;
            box-shadow: 0 0 25px #00ffcc, inset 0 0 10px rgba(0,255,204,0.5);
            animation: cyber-blast-out 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes cyber-blast-out {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="screen-flash-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h3 style="margin: 0 0 20px 0; font-size: 15px; color: #fff; letter-spacing: 1px;">ЦЕНТР СТРАТЕГИЧЕСКОГО ПЛАНИРОВАНИЯ</h3>
            <button class="faction-btn" onclick="selectFaction('UA')">ЛОКАЛИЗАЦИЯ [UA]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff0055; color:#ff0055; text-shadow: 0 0 5px #ff0055;">ЛОКАЛИЗАЦИЯ [RU]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>БАЛАНС: <span id="txt-money" class="hud-value" style="color:#00ffcc; text-shadow:0 0 5px #00ffcc;">400</span>$</div>
                <div id="weather-widget">☀️ МОНИТОРИНГ ЯСНЫЙ</div>
                <div>РЕЗЕРВ БПЛА: <span id="txt-drones" class="hud-value" style="color:#ffcc00; text-shadow:0 0 5px #ffcc00;">0</span> ЕД</div>
            </div>
            <div class="hp-mini-wrapper">
                <div class="hp-mini-block">
                    <span>СЕКТОР А: <span id="lbl-hp">100%</span></span>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player"></div></div>
                </div>
                <div class="hp-mini-block" style="justify-content: flex-end; text-align: right;">
                    <div class="hp-bar-container" style="margin-right: 8px;"><div id="bar-enemy" class="hp-bar-fill hp-enemy"></div></div>
                    <span>СЕКТОР Б: <span id="lbl-enemy-hp">100%</span></span>
                </div>
            </div>
        </div>

        <div id="map">
            <div id="weather-overlay"></div>
            <div id="time-overlay"></div>
        </div>

        <div id="bottom-ui-wrapper" class="ui-collapsed">
            <button id="toggle-ui-btn" onclick="toggleUIPanel()">⚡ СИСТЕМА УПРАВЛЕНИЯ ОГНЕМ</button>
            <div id="inner-ui-content">
                
                <div id="target-selector-panel">
                    <div id="target-title-text" style="font-size: 11px; font-weight: bold;">КУРС НА ЦЕЛЬ:</div>
                    <div class="target-grid" id="target-buttons-container"></div>
                </div>

                <div id="log-container">
                    <div id="log-panel"></div>
                </div>

                <div id="control-panel">
                    <div class="btn-row">
                        <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ПРОМ-ОБЪЕКТ ($500) <span id="factory-counter">0/10</span></button>
                        <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] РЛС ПВО ($750) <span id="pvo-counter">0/5</span></button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 УДАРНАЯ ПАРА (-$250)</button>
                        <button class="btn btn-purple" id="btn-bomber-mode" onclick="toggleBomberMode()">💥 СТРАТЕГ. АВИАЦИЯ (-$2200)</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-red" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">🚀 ОРЕШНИК (-$3800)</button>
                        <button class="btn btn-blue" id="btn-repair-mode" onclick="toggleRepairMode()">🛠️ ВОССТАНОВЛЕНИЕ (-$2400)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 46.97, lng: 31.99, name: 'Николаев', hp: 100 },
                { lat: 48.62, lng: 22.28, name: 'Ужгород', hp: 100 },
                { lat: 50.91, lng: 34.80, name: 'Сумы', hp: 100 },
                { lat: 47.84, lng: 35.13, name: 'Запорожье', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'С.-Петерб.', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 50.59, lng: 36.58, name: 'Белгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодар', hp: 100 },
                { lat: 44.61, lng: 33.52, name: 'Севастоп.', hp: 100 },
                { lat: 48.01, lng: 37.80, name: 'Донецк', hp: 100 },
                { lat: 45.04, lng: 41.97, name: 'Ставрополь', hp: 100 }, 
                { lat: 51.73, lng: 36.19, name: 'Курск', hp: 100 },
                { lat: 48.57, lng: 39.31, name: 'Луганск', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 400, droneInventory = 0, currentMode = null;
        let enemyMoney = 400;

        let playerDrones = [], enemyDrones = []; 
        let playerFactories = [], playerPVO = [];
        let enemyFactories = [], enemyPVO = []; 
        let missiles = [];
        let map, selectedFactory = null;
        
        const MAX_PVO_LIMIT = 5;
        const MAX_FACTORY_LIMIT = 10; 
        let currentWeather = 'clear'; 
        let currentPeriod = 'day';     
        let aiActive = false;
        let safeStartCountdown = 15; 

        // НЕОНОВЫЕ ВЕКТОРНЫЕ СИЛУЭТЫ
        const SHAHED_SVG = `<svg viewBox="0 0 100 100" width="22" height="22" style="fill: #ff0055; filter: drop-shadow(0 0 5px #ff0055);"><path d="M50,5 L95,85 L70,85 L50,65 L30,85 L5,85 Z"/></svg>`;
        const PLAYER_DRONE_SVG = `<svg viewBox="0 0 100 100" width="20" height="20" style="fill: #00ffcc; filter: drop-shadow(0 0 5px #00ffcc);"><path d="M50,5 L90,85 L50,60 L10,85 Z"/></svg>`;
        const HEAVY_SVG = `<svg viewBox="0 0 100 100" width="28" height="28" style="fill: #ff3c00; filter: drop-shadow(0 0 8px #ff0000); animation: pulse 0.4s infinite alternate;"><path d="M50,2 L65,35 L98,50 L65,65 L50,98 L35,65 L2,50 L35,35 Z"/></svg>`;
        const SUB_MISSILE_SVG = `<svg viewBox="0 0 100 100" width="18" height="18" style="fill: #ff3300; filter: drop-shadow(0 0 6px #ff5500);"><path d="M50,5 L85,85 L50,65 L15,85 Z"/></svg>`;
        const BOMBER_SVG = `<svg viewBox="0 0 100 100" width="26" height="26" style="fill: #b026ff; filter: drop-shadow(0 0 6px #b026ff);"><path d="M50,5 L95,55 L50,40 L5,55 Z"/></svg>`;

        function toggleUIPanel() {
            document.getElementById('bottom-ui-wrapper').classList.toggle('ui-collapsed');
        }

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([50.5, 34.5], 5);
            
            // Абсолютно черная минималистичная подложка карты для контраста неона
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                opacity: 0.7
            }).addTo(map);

            renderOperationalRadar();
            setupRadarClicks();

            setInterval(economyCycle, 2000);
            setInterval(radarTick, 30); // Сверхплавный рендеринг физики
            setInterval(enemyAILogic, 2500); 
            setInterval(changeWeatherCycle, 40000);

            addLog(`МОНИТОР: СИНХРОНИЗАЦИЯ... ОЖИДАНИЕ ${safeStartCountdown} СЕК.`, 'system');
            let countdownTimer = setInterval(() => {
                safeStartCountdown -= 5;
                if (safeStartCountdown > 0) {
                    addLog(`ДО СТАРТА ОПЕРАЦИИ ВРАГА: ${safeStartCountdown} СЕК.`, 'system');
                } else {
                    aiActive = true;
                    addLog("⚠️ СИСТЕМА: СЕКТОР ПРОТИВНИКА АКТИВИРОВАН. БОЕВАЯ ГОТОВНОСТЬ.", 'enemy');
                    clearInterval(countdownTimer);
                }
            }, 5000);

            updateUIButtons();
        }

        function changeWeatherCycle() {
            const weathers = ['clear', 'rain', 'fog'];
            const periods = ['day', 'night'];
            currentWeather = weathers[Math.floor(Math.random() * weathers.length)];
            currentPeriod = periods[Math.floor(Math.random() * periods.length)];

            const wOverlay = document.getElementById('weather-overlay');
            const tOverlay = document.getElementById('time-overlay');
            wOverlay.className = ''; 
            
            let wText = '☀️ МОНИТОР: ЯСНО';
            if (currentWeather === 'rain') { wOverlay.classList.add('weather-rain'); wText = '🌧️ МОНИТОР: ОСАДКИ'; }
            else if (currentWeather === 'fog') { wOverlay.classList.add('weather-fog'); wText = '🌫️ МОНИТОР: ТУМАН'; }

            if (currentPeriod === 'night') {
                tOverlay.style.background = 'rgba(2, 4, 12, 0.5)';
                wText += ' | НОЧНОЙ РЕЖИМ';
            } else {
                tOverlay.style.background = 'rgba(0,0,0,0)';
                wText += ' | ДНЕВНОЙ РЕЖИМ';
            }
            document.getElementById('weather-widget').innerText = wText;
        }

        function renderOperationalRadar() {
            CITIES[playerFaction].forEach(c => {
                let html = `<div class="city-dot"></div><div class="city-label">${c.name}</div>`;
                let icon = L.divIcon({ className: 'city-marker', html: html, iconSize: [30, 30] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if (currentMode === 'repair_sector') executeSectorRepair(c);
                });
                playerPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.3, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0, circle: null });
            });

            CITIES[enemyFaction].forEach(c => {
                let html = `<div class="city-dot"></div><div class="city-label">${c.name}</div>`;
                let icon = L.divIcon({ className: 'city-marker enemy', html: html, iconSize: [30, 30] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    handleTargetSelection({lat: c.lat, lng: c.lng, name: c.name, type: 'city'});
                });
                enemyPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 1.5, ammo: 3, maxAmmo: 3, lastShot: 0, isCityRadar: true, circle: null });
            });
        }

        function updateTargetPanelGrid() {
            const container = document.getElementById('target-buttons-container');
            const title = document.getElementById('target-title-text');
            container.innerHTML = '';

            if (currentMode === 'repair_sector') {
                title.innerText = "ИНЖЕНЕРНЫЙ ВЫБОР СЕКТОРA ДЛЯ РЕМОНТА:";
                title.style.color = "#00ffcc";
                CITIES[playerFaction].forEach(city => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.innerText = `${city.name} (${city.hp}%)`;
                    btn.onclick = () => executeSectorRepair(city);
                    container.appendChild(btn);
                });
            } else {
                title.innerText = "ЗАДАНИЕ ТРАЕКТОРИИ УДАРА:";
                title.style.color = "#ff0055";
                
                CITIES[enemyFaction].forEach(city => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.innerText = city.name;
                    btn.onclick = () => handleTargetSelection({lat: city.lat, lng: city.lng, name: city.name, type: 'city'});
                    container.appendChild(btn);
                });

                enemyFactories.forEach((fac, idx) => {
                    const btn = document.createElement('button'); btn.className = 'target-btn';
                    btn.style.borderColor = '#ff0055'; btn.style.color = '#ff4d88';
                    btn.innerText = `Завод #${idx + 1}`;
                    btn.onclick = () => handleTargetSelection({lat: fac.lat, lng: fac.lng, name: `Завод #${idx + 1}`, type: 'factory', id: fac.id});
                    container.appendChild(btn);
                });
            }
        }

        function handleTargetSelection(targetObj) {
            if (currentMode === 'attack_target' && selectedFactory) dispatchDroneStrike(selectedFactory, targetObj);
            else if (currentMode === 'heavy_missile') dispatchHeavyStrike(targetObj);
            else if (currentMode === 'bomber_strike') dispatchBomberStrike(targetObj);
        }

        function toggleRepairMode() {
            if (money < 2400) return; 
            if (currentMode === 'repair_sector') { dropModes(); return; }
            dropModes(); currentMode = 'repair_sector';
            document.getElementById('btn-repair-mode').classList.add('active');
            CITIES[playerFaction].forEach(c => {
                if(c.markerInstance && c.markerInstance.getElement()) c.markerInstance.getElement().classList.add('repair-highlight');
            });
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function executeSectorRepair(city) {
            if (money < 2400 || city.hp >= 100) return; 
            money -= 2400; city.hp = Math.min(100, city.hp + 25);
            addLog(`🛠️ Ремонт системы [${city.name}]: +25% структур`, 'system');

            let pMarker = L.marker([city.lat + 0.04, city.lng], { icon: L.divIcon({ className: 'heal-popup', html: `+25%` }) }).addTo(map);
            setTimeout(() => map.removeLayer(pMarker), 600);
            dropModes(); recalcRadarHUD();
        }

        function toggleBuildMode(mode) {
            if (mode === 'factory' && (money < 500 || playerFactories.length >= MAX_FACTORY_LIMIT)) return;
            if (mode === 'pvo' && (money < 750 || getPlacedPVOCount() >= MAX_PVO_LIMIT)) return;
            let last = currentMode; dropModes();
            if (last !== mode) {
                currentMode = mode;
                document.getElementById(`btn-${mode}`).classList.add('active');
            }
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') { dropModes(); return; }
            if (money < 250 || droneInventory < 2) return;
            dropModes(); currentMode = 'attack_source';
            document.getElementById('btn-attack-mode').classList.add('active');
            addLog("Выберите ваш пром-объект на тактической карте для пуска.");
        }

        function toggleBomberMode() {
            if (currentMode === 'bomber_strike') { dropModes(); return; }
            if (money < 2200) return;
            dropModes(); currentMode = 'bomber_strike';
            document.getElementById('btn-bomber-mode').classList.add('active');
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function toggleHeavyMissileMode() {
            if (currentMode === 'heavy_missile') { dropModes(); return; }
            if (money < 3800) return;
            dropModes(); currentMode = 'heavy_missile';
            document.getElementById('btn-heavy-mode').classList.add('active');
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function showTargetSelector(show) {
            document.getElementById('target-selector-panel').style.display = show ? 'block' : 'none';
        }

        function dropModes() {
            CITIES[playerFaction].forEach(c => {
                if(c.markerInstance && c.markerInstance.getElement()) c.markerInstance.getElement().classList.remove('repair-highlight');
            });
            currentMode = null; selectedFactory = null;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            showTargetSelector(false); updateUIButtons();
        }

        function getPlacedPVOCount() { return playerPVO.filter(p => !p.isCityRadar).length; }

        function updateUIButtons() {
            let pvoCount = getPlacedPVOCount();
            let factoryCount = playerFactories.length;
            
            document.getElementById('pvo-counter').innerText = `${pvoCount}/${MAX_PVO_LIMIT}`;
            document.getElementById('factory-counter').innerText = `${factoryCount}/${MAX_FACTORY_LIMIT}`;
            
            document.getElementById('btn-factory').classList.toggle('disabled', money < 500 || factoryCount >= MAX_FACTORY_LIMIT);
            document.getElementById('btn-pvo').classList.toggle('disabled', money < 750 || pvoCount >= MAX_PVO_LIMIT);
            document.getElementById('btn-attack-mode').classList.toggle('disabled', money < 250 || droneInventory < 2);
            document.getElementById('btn-bomber-mode').classList.toggle('disabled', money < 2200);
            document.getElementById('btn-heavy-mode').classList.toggle('disabled', money < 3800);
            document.getElementById('btn-repair-mode').classList.toggle('disabled', money < 2400); 
        }

        function setupRadarClicks() {
            map.on('click', function(e) {
                if (currentMode === 'attack_target' || currentMode === 'heavy_missile' || currentMode === 'bomber_strike' || currentMode === 'repair_sector') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 500 && playerFactories.length < MAX_FACTORY_LIMIT) {
                    money -= 500;
                    let icon = L.divIcon({ className: 'build-marker', html: 'ПРОМ', iconSize: [36, 16] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    let fObj = { id: Math.random().toString(36).substr(2, 5), lat, lng, marker: m };
                    m.on('click', function(event) { 
                        L.DomEvent.stopPropagation(event);
                        if (currentMode === 'attack_source') selectFactoryForLaunch(fObj); 
                    });
                    playerFactories.push(fObj);
                    dropModes();
                } else if (currentMode === 'pvo' && money >= 750 && getPlacedPVOCount() < MAX_PVO_LIMIT) {
                    money -= 750;
                    let icon = L.divIcon({ className: 'build-marker', html: 'РЛС', iconSize: [36, 16] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    
                    let visualCircle = L.circle([lat, lng], {
                        radius: 145000, color: '#00ffcc', weight: 1, fillOpacity: 0.02, dashArray: '4,4'
                    }).addTo(map);

                    playerPVO.push({ lat: lat, lng: lng, marker: m, rangeDist: 2.1, ammo: 6, maxAmmo: 6, lastShot: 0, isCityRadar: false, circle: visualCircle });
                    dropModes();
                }
            });
        }

        function selectFactoryForLaunch(fObj) {
            selectedFactory = fObj; currentMode = 'attack_target';
            updateTargetPanelGrid(); showTargetSelector(true);
        }

        function dispatchDroneStrike(source, targetObj) {
            money -= 250; droneInventory -= 2;
            for(let i=0; i<2; i++) injectAirTarget(source, targetObj, playerDrones, true, 'drone');
            dropModes();
        }

        function dispatchBomberStrike(targetObj) {
            money -= 2200;
            injectAirTarget(CITIES[playerFaction][0], targetObj, playerDrones, true, 'bomber');
            dropModes();
        }

        function dispatchHeavyStrike(targetObj) {
            money -= 3800;
            injectAirTarget(CITIES[playerFaction][0], targetObj, playerDrones, true, 'heavy');
            dropModes();
        }

        function enemyAILogic() {
            if (!aiActive) return;
            
            enemyMoney += 250 + (enemyFactories.length * 60);

            if (enemyMoney >= 1400 && enemyFactories.length < 5) {
                enemyMoney -= 500;
                let randomCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let fLat = randomCity.lat + (Math.random() - 0.5) * 0.2;
                let fLng = randomCity.lng + (Math.random() - 0.5) * 0.2;
                let icon = L.divIcon({ className: 'build-marker enemy-factory', html: 'В.ПРОМ', iconSize: [42, 16] });
                let m = L.marker([fLat, fLng], { icon: icon }).addTo(map);
                
                enemyFactories.push({ id: Math.random().toString(36).substr(2, 5), lat: fLat, lng: fLng, marker: m });
                addLog(`⚠️ МОНИТОР: Зафиксирован новый промышленный узел в тылу врага`, 'enemy');
            }

            let brokenCity = CITIES[playerFaction].find(c => c.hp > 0 && c.hp < 50);
            let randomCityTarget = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
            let source = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];

            let target = { lat: randomCityTarget.lat, lng: randomCityTarget.lng, name: randomCityTarget.name, type: 'city' };

            if (playerFactories.length >= 1 && enemyMoney >= 3800) {
                enemyMoney -= 3800;
                let targetFactory = playerFactories[Math.floor(Math.random() * playerFactories.length)];
                addLog(`🚨 ВНИМАНИЕ: СТРАТЕГИЧЕСКИЙ ЗАПУСК КРК «ОРЕШНИК» ПРОТИВНИКА!`, 'enemy');
                injectAirTarget(source, {lat: targetFactory.lat, lng: targetFactory.lng, name: 'Пром-Узел', type: 'factory', id: targetFactory.id}, enemyDrones, false, 'heavy');
                return; 
            }

            if (brokenCity && enemyMoney >= 2200) {
                enemyMoney -= 2200;
                addLog(`⚠️ ТАКТИКА ВРАГА: Вылет тяжелых бомбардировщиков на [${brokenCity.name}].`, 'enemy');
                injectAirTarget(source, {lat: brokenCity.lat, lng: brokenCity.lng, name: brokenCity.name, type: 'city'}, enemyDrones, false, 'bomber');
                return;
            }

            if (enemyMoney >= 900) {
                enemyMoney -= 250;
                injectAirTarget(source, target, enemyDrones, false, 'drone');
            }
        }

        function injectAirTarget(start, targetObj, collection, isPlayer, type) {
            let dLng = targetObj.lng - start.lng, dLat = targetObj.lat - start.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);
            
            let speed = type === 'heavy' ? 0.016 : (type === 'bomber' ? 0.003 : 0.0042);
            if (type === 'heavy_sub') speed = 0.045; // Сверхзвуковые блоки валят бешено
            if (currentWeather === 'rain') speed *= 0.8;

            let svgMarkup = (type === 'drone') ? (isPlayer ? PLAYER_DRONE_SVG : SHAHED_SVG) : (type === 'heavy' ? HEAVY_SVG : (type === 'heavy_sub' ? SUB_MISSILE_SVG : BOMBER_SVG));
            let modelHtml = `<div class="drone-container"><div class="rotator" style="transform: rotate(${angle}deg);">${svgMarkup}</div></div>`;

            let marker = L.marker([start.lat, start.lng], {
                icon: L.divIcon({ className: 'custom-track', html: modelHtml, iconSize: [28, 28], iconAnchor: [14, 14] })
            }).addTo(map);

            collection.push({
                id: Math.random().toString(36).substr(2, 9), marker: marker, type: type, hp: type === 'bomber' ? 4 : 1,
                lat: start.lat, lng: start.lng, targetLat: targetObj.lat, targetLng: targetObj.lng, 
                targetName: targetObj.name, targetType: targetObj.type || 'city', targetId: targetObj.id || null,
                currentLat: start.lat, currentLng: start.lng, progress: 0, speed: speed, trails: []
            });
            updateUIButtons();
        }

        function economyCycle() {
            money += 90 + (playerFactories.length * 60);
            playerFactories.forEach(() => droneInventory++);
            
            let all = [...CITIES['UA'], ...CITIES['RU']];
            all.forEach(c => { if(c.hp > 0 && c.hp < 100) c.hp = Math.min(100, c.hp + 1); });
            
            playerPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });

            CITIES[playerFaction].forEach(c => {
                if (c.markerInstance) {
                    c.markerInstance.setIcon(L.divIcon({ className: 'city-marker', html: `<div class="city-dot"></div><div class="city-label">${c.name} [${c.hp}%]</div>`, iconSize:[30,30] }));
                }
            });

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
            updateUIButtons();
        }

        function radarTick() {
            processTracks(playerDrones, true);
            processTracks(enemyDrones, false);
            processInterceptors();
        }

        function processTracks(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i]; d.progress += d.speed;

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                d.currentLat = cLat; d.currentLng = cLng; d.marker.setLatLng([cLat, cLng]);

                // 🔥 ЭПИЧЕСКОЕ РАЗДЕЛЕНИЕ «ОРЕШНИКА» (на 78% пути)
                if (d.type === 'heavy' && d.progress >= 0.78) {
                    addLog(isPlayer ? `🚀 СИСТЕМА: Разведение боевых блоков разделяющейся головной части!` : `🔴 КРИТИЧЕСКАЯ УГРОЗА: БЛОКИ ОРЕШНИКА ВЫШЛИ ИЗ АТМОСФЕРЫ!`, 'enemy');
                    
                    // Эффект ослепительной неоновой вспышки разведения
                    let megaBurst = L.marker([cLat, cLng], {
                        icon: L.divIcon({ className: 'separation-mega-burst', iconSize: [60, 60], iconAnchor: [30, 30] })
                    }).addTo(map);
                    setTimeout(() => map.removeLayer(megaBurst), 600);

                    // Тряска экрана интерфейса
                    triggerScreenFlash();

                    // Выбрасываем сразу 6 скоростных суб-боеголовок с разбросом
                    for (let k = 0; k < 6; k++) {
                        let offsetLat = (Math.random() - 0.5) * 0.14;
                        let offsetLng = (Math.random() - 0.5) * 0.14;
                        
                        injectAirTarget(
                            { lat: cLat, lng: cLng },
                            { lat: d.targetLat + offsetLat, lng: d.targetLng + offsetLng, name: d.targetName, type: d.targetType, id: d.targetId },
                            list,
                            isPlayer,
                            'heavy_sub'
                        );
                    }
                    
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1);
                    continue;
                }

                // КИНЕМАТОГРАФИЧНЫЙ ХВОСТ ИЗ ПЛАЗМЕННЫХ ИСКР
                if (d.type === 'heavy_sub') {
                    // Создаем неоновый плазменный след с градиентом размеров
                    let spark = L.marker([cLat, cLng], {
                        icon: L.divIcon({ className: 'custom-spark', html: `<div class="heavy-plasma-core"></div>`, iconSize:[10,10], iconAnchor:[5,5] })
                    }).addTo(map);
                    d.trails.push(spark);
                    
                    if (d.trails.length > 18) {
                        map.removeLayer(d.trails.shift());
                    }
                    
                    // Масштабируем и затеняем хвост к концу, создавая эффект реактивной стрелы
                    d.trails.forEach((t, idx) => {
                        let el = t.getElement();
                        if (el) {
                            let scale = idx / d.trails.length;
                            el.style.opacity = scale * 0.9;
                            el.style.transform = `scale(${0.4 + scale * 0.8})`;
                        }
                    });
                } else {
                    // Хвост для обычных БПЛА
                    if (Math.random() > 0.6) {
                        let dot = L.circle([cLat, cLng], { radius: 300, color: isPlayer ? '#00ffcc' : '#ff0055', weight: 0, fillOpacity: 0.25 }).addTo(map);
                        d.trails.push(dot); if (d.trails.length > 4) map.removeLayer(d.trails.shift());
                    }
                }

                // ПРИЛЕТ В ЦЕЛЬ
                if (d.progress >= 1) {
                    let dmg = d.type === 'heavy_sub' ? 25 : (d.type === 'bomber' ? 40 : 15);
                    
                    // Жесткий взрыв с тряской
                    triggerCyberExplosion(d.targetLat, d.targetLng, d.type === 'heavy_sub' ? '#ff3c00' : (isPlayer ? '#00ffcc' : '#ff0055'));
                    if (d.type === 'heavy_sub') triggerScreenFlash();

                    applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, d.targetLat, d.targetLng, dmg, d.targetType, d.targetId, isPlayer);
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1); continue;
                }

                // ЗОНА ПЕРЕХВАТА ПВО
                if (!isPlayer) {
                    playerPVO.forEach(pvo => {
                        let approxDist = Math.pow(cLat - pvo.lat, 2) + Math.pow(cLng - pvo.lng, 2);
                        let range = pvo.rangeDist; 
                        if (currentWeather === 'fog') range *= 0.7;

                        if (approxDist <= Math.pow(range, 2) && !pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 900)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, true);
                        }
                    });
                }
            }
        }

        function fireInterceptor(pvo, target, isPlayerPVO) {
            let dLng = target.currentLng - pvo.lng, dLat = target.currentLat - pvo.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);

            let interceptorSVG = `<svg viewBox="0 0 100 100" class="pvo-interceptor-svg" width="14" height="14"><path d="M50,5 L70,50 L50,40 L30,50 Z"/></svg>`;
            let modelHtml = `<div class="pvo-missile-container"><div style="transform: rotate(${angle}deg); display:flex;">${interceptorSVG}</div></div>`;

            let marker = L.marker([pvo.lat, pvo.lng], {
                icon: L.divIcon({ className: 'custom-interceptor', html: modelHtml, iconSize: [16, 16], iconAnchor: [8, 8] })
            }).addTo(map);

            missiles.push({ 
                marker: marker, lat: pvo.lat, lng: pvo.lng, droneId: target.id, 
                targetCollection: isPlayerPVO ? enemyDrones : playerDrones, progress: 0, speed: 0.22, 
                interceptorTrails: [] 
            });
        }

        function processInterceptors() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.progress += m.speed;
                let drone = m.targetCollection.find(d => d.id === m.droneId);

                if (!drone || m.progress >= 1) { 
                    map.removeLayer(m.marker); 
                    m.interceptorTrails.forEach(t => map.removeLayer(t));
                    missiles.splice(i, 1); 
                    continue; 
                }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                let dLng = drone.currentLng - mLat, dLat = drone.currentLat - mLng;
                let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);
                let interceptorSVG = `<svg viewBox="0 0 100 100" class="pvo-interceptor-svg" width="14" height="14"><path d="M50,5 L70,50 L50,40 L30,50 Z"/></svg>`;
                m.marker.setIcon(L.divIcon({
                    className: 'custom-interceptor',
                    html: `<div class="pvo-missile-container"><div style="transform: rotate(${angle}deg); display:flex;">${interceptorSVG}</div></div>`,
                    iconSize: [16, 16], iconAnchor: [8, 8]
                }));

                // ШЛЕЙФ ИЗ РАССЕИВАЮЩЕГОСЯ ОБЪЕМНОГО ДЫМА
                let smoke = L.circle([mLat, mLng], {
                    radius: 200, color: '#64748b', fillColor: '#cbd5e1', fillOpacity: 0.4, weight: 0
                }).addTo(map);
                
                if (smoke.getElement()) smoke.getElement().style.filter = "blur(2px)";
                m.interceptorTrails.push(smoke);

                if (m.interceptorTrails.length > 14) {
                    map.removeLayer(m.interceptorTrails.shift());
                }
                m.interceptorTrails.forEach((t, idx) => {
                    let r = idx / m.interceptorTrails.length;
                    t.setStyle({ fillOpacity: r * 0.3, radius: 100 + (r * 150) });
                });

                // МГНОВЕННОЕ ОБНАРУЖЕНИЕ И ПЕРЕХВАТ
                if (Math.abs(mLat - drone.currentLat) < 0.08 && Math.abs(mLng - drone.currentLng) < 0.08) {
                    // Неоновая вспышка купола ПВО
                    let pvoBlast = L.marker([mLat, mLng], {
                        icon: L.divIcon({ className: 'pvo-cyber-blast', iconSize: [50, 50], iconAnchor: [25, 25] })
                    }).addTo(map);
                    setTimeout(() => map.removeLayer(pvoBlast), 400);

                    map.removeLayer(m.marker);
                    m.interceptorTrails.forEach(t => map.removeLayer(t));
                    missiles.splice(i, 1);
                    
                    let targetChance = 0.85;
                    if (drone.type === 'heavy') targetChance = 0.08; // Практически несбиваемый
                    if (drone.type === 'heavy_sub') targetChance = 0.001; 
                    if (currentPeriod === 'night' && drone.type === 'drone') targetChance = 0.55;

                    if (Math.random() <= targetChance) {
                        drone.hp--;
                        if (drone.hp <= 0) {
                            map.removeLayer(drone.marker); 
                            drone.trails.forEach(t => map.removeLayer(t));
                            m.targetCollection.splice(m.targetCollection.indexOf(drone), 1);
                            
                            let reward = drone.type === 'heavy' ? 500 : (drone.type === 'bomber' ? 350 : 80);
                            money += reward;
                            addLog(`🎯 РЛС: Воздушная цель ликвидирована. Грант: +$${reward}`, 'system');
                        }
                    } else if (drone.type === 'heavy_sub' || drone.type === 'heavy') {
                        addLog(`⚡ СВЕРХЗВУК: Боевой блок проигнорировал кинетический перехват!`, 'enemy');
                    }
                    break;
                }
            }
        }

        function applyRadarDamage(faction, cityName, lat, lng, dmg, targetType, targetId, isPlayerAttacking) {
            if (targetType === 'factory' || cityName === 'Пром-Узел' || cityName === 'Завод') {
                if (!isPlayerAttacking) {
                    let closeFactory = playerFactories.find(f => f.id === targetId || (Math.abs(f.lat - lat) < 0.06 && Math.abs(f.lng - lng) < 0.06));
                    if (closeFactory) {
                        map.removeLayer(closeFactory.marker);
                        playerFactories.splice(playerFactories.indexOf(closeFactory), 1);
                        addLog(`💥 ТАКТИКА: Пром-объект уничтожен точечным ударом!`, 'enemy');
                        recalcRadarHUD();
                    }
                } else {
                    let closeEnemyFactory = enemyFactories.find(f => f.id === targetId || (Math.abs(f.lat - lat) < 0.06 && Math.abs(f.lng - lng) < 0.06));
                    if (closeEnemyFactory) {
                        map.removeLayer(closeEnemyFactory.marker);
                        enemyFactories.splice(enemyFactories.indexOf(closeEnemyFactory), 1);
                        money += 600; 
                        addLog(`💥 ДЕСТРУКЦИЯ: База производства врага ликвидирована! (+$600)`, 'system');
                    }
                }
                return;
            }

            let city = CITIES[faction].find(c => c.name === cityName);
            if (city) {
                city.hp = Math.max(0, city.hp - dmg);
                
                const mapEl = document.getElementById('map');
                mapEl.classList.add('shake-hit');
                setTimeout(() => mapEl.removeClassName ? mapEl.removeClassName('shake-hit') : mapEl.classList.remove('shake-hit'), 250);

                let pMarker = L.marker([city.lat + 0.04, city.lng], { icon: L.divIcon({ className: 'damage-popup', html: `-${dmg}%` }) }).addTo(map);
                setTimeout(() => map.removeLayer(pMarker), 500);
                
                if (faction !== playerFaction) {
                    let attackReward = Math.round(dmg * 8); 
                    money += attackReward;
                    addLog(`Успешное попадание по сектору: +$${attackReward}`, 'system');
                }
                recalcRadarHUD();
            }
        }

        function recalcRadarHUD() {
            let pTotal = 0, eTotal = 0;
            CITIES[playerFaction].forEach(c => pTotal += c.hp);
            CITIES[enemyFaction].forEach(c => eTotal += c.hp);
            let pAvg = Math.round(pTotal / CITIES[playerFaction].length);
            let eAvg = Math.round(eTotal / CITIES[enemyFaction].length);

            document.getElementById('lbl-hp').innerText = pAvg + "%";
            document.getElementById('lbl-enemy-hp').innerText = eAvg + "%";
            document.getElementById('bar-player').style.width = pAvg + "%";
            document.getElementById('bar-enemy').style.width = eAvg + "%";

            if (pAvg <= 0) { alert("Критическое повреждение сети. Сектор потерян."); location.reload(); }
            if (eAvg <= 0) { alert("Миссия выполнена. Оборона противника полностью уничтожена!"); location.reload(); }
        }

        function triggerCyberExplosion(lat, lng, color) {
            let blast = L.circle([lat, lng], {
                radius: 100, color: '#fff', fillColor: color, fillOpacity: 0.9, weight: 2
            }).addTo(map);
            
            let r = 100;
            let loop = setInterval(() => {
                r += 3200;
                blast.setRadius(r);
                blast.setStyle({ fillOpacity: 0.8 * (1 - r/28000), weight: 3 * (1 - r/28000) });
                if (r >= 28000) { clearInterval(loop); map.removeLayer(blast); }
            }, 25);
        }

        function triggerScreenFlash() {
            const overlay = document.getElementById('screen-flash-overlay');
            overlay.style.opacity = '0.4';
            setTimeout(() => overlay.style.opacity = '0', 80);
        }

        function addLog(text, type = '') {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div'); entry.className = `log-entry ${type}`; entry.innerText = `> ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
