<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Управления Нодой</title>
    
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #121214;
            --border-color: #27272a;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .app-container {
            width: 100%;
            max-width: 360px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Шапка с индикацией */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Главный счетчик */
        .counter-section {
            text-align: center;
            padding: 20px 0;
        }

        .counter-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .counter-value {
            font-size: 42px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
        }

        /* Панель характеристик */
        .specs-grid {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .spec-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--panel-bg);
            font-size: 13px;
        }

        .spec-label {
            color: var(--text-muted);
        }

        .spec-value {
            font-weight: 500;
        }

        /* Управляющие кнопки */
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-action {
            background: var(--accent-blue);
            color: #ffffff;
        }

        .btn-action.running {
            background: #dc2626;
        }

        .btn-upgrade {
            background: #ffffff;
            color: #000000;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .info-text {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Шапка -->
        <div class="status-header">
            <div class="status-info">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Процесс остановлен</span>
            </div>
            <div class="user-id">id: kaoface</div>
        </div>

        <!-- Счетчик баланса -->
        <div class="counter-section">
            <div class="counter-label">Вырабатываемый баланс</div>
            <div class="counter-value" id="balance-display">0.0000</div>
        </div>

        <!-- Конфигурация пула -->
        <div class="specs-grid">
            <div class="spec-row">
                <span class="spec-label">Текущая скорость</span>
                <span class="spec-value" id="speed-display">0.0000 ★/с</span>
            </div>
            <div class="spec-row">
                <span class="spec-label">Режим аккаунта</span>
                <span class="spec-value" style="color: #ef4444;">Базовый (Ограниченный)</span>
            </div>
            <div class="spec-row">
                <span class="spec-label">Доступ к выводу</span>
                <span class="spec-value">Требуется лицензия</span>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="controls-group">
            <button class="btn btn-action" id="toggle-btn" onclick="toggleMining()">Запустить генерацию</button>
            <button class="btn btn-upgrade" onclick="openUpgradeModal()">Купить улучшение (Скорость х10)</button>
            <button class="btn btn-secondary" onclick="attemptWithdrawal()">Вывести накопленное</button>
        </div>

        <div class="info-text">
            Для разблокировки вывода средств и снятия лимитов базового аккаунта требуется активация коммерческой лицензии у администратора сети.
        </div>

    </div>

    <script>
        let session = {
            balance: parseFloat(localStorage.getItem('session_bal')) || 0.0000,
            baseSpeed: 0.0018,
            isRunning: false,
            intervalId: null
        };

        const balanceDisplay = document.getElementById('balance-display');
        const speedDisplay = document.getElementById('speed-display');
        const toggleBtn = document.getElementById('toggle-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateUI() {
            balanceDisplay.innerText = session.balance.toFixed(4);
            if (session.isRunning) {
                speedDisplay.innerText = `+${session.baseSpeed.toFixed(4)} ★/с`;
                toggleBtn.innerText = "Остановить генерацию";
                toggleBtn.classList.add('running');
                statusDot.classList.add('active');
                statusText.innerText = "Генерация активна";
            } else {
                speedDisplay.innerText = "0.0000 ★/с";
                toggleBtn.innerText = "Запустить генерацию";
                toggleBtn.classList.remove('running');
                statusDot.classList.remove('active');
                statusText.innerText = "Процесс остановлен";
            }
        }

        function toggleMining() {
            if (session.isRunning) {
                clearInterval(session.intervalId);
                session.isRunning = false;
            } else {
                session.isRunning = true;
                session.intervalId = setInterval(() => {
                    session.balance += session.baseSpeed;
                    balanceDisplay.innerText = session.balance.toFixed(4);
                    localStorage.setItem('session_bal', session.balance);
                }, 1000);
            }
            updateUI();
        }

        function openUpgradeModal() {
            let confirmation = confirm(
                "ПОВЫШЕНИЕ СКОРОСТИ ДО КУРСА Х10\n\n" +
                "Вы переходите к приобретению пакета «Про-Валидатор».\n" +
                "• Скорость увеличивается до +0.0180 ★/с\n" +
                "• Автоматически снимается лимит на вывод средств\n\n" +
                "Связаться с администратором @markplau для оплаты и активации?"
            );
            if (confirmation) {
                window.location.href = "https://t.me/markplau";
            }
        }

        function attemptWithdrawal() {
            alert(
                "ОТКАЗ В ОБРАБОТКЕ ТРАНЗАКЦИИ\n\n" +
                "Ошибка кода: 403 (Лицензия отсутствует).\n\n" +
                "Вывод средств на базовых аккаунтах заблокирован. Для разблокировки баланса необходимо приобрести любое коммерческое улучшение или лицензию у администратора."
            );
            window.location.href = "https://t.me/markplau";
        }

        updateUI();
    </script>
</body>
</html>
