<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram NFT Premium</title>
    <style>
        :root {
            --tg-bg: #000000;
            --tg-card: #1c1c1e;
            --tg-secondary: #2c2c2e;
            --tg-blue: #007aff;
            --tg-text: #ffffff;
            --tg-hint: #8e8e93;
            --star-gold: #febd2d;
            
            --rarity-common: #8e8e93;
            --rarity-rare: #007aff;
            --rarity-epic: #af52de;
            --rarity-legend: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .balance-pill {
            background: var(--tg-card);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            border: 1px solid #333;
        }

        /* --- ROULETTE --- */
        .case-info { text-align: center; margin-top: 20px; }
        .case-info h1 { font-size: 24px; margin: 0; }
        .case-info p { color: var(--tg-hint); font-size: 14px; }

        .roulette-box {
            position: relative;
            margin: 30px 0;
            height: 160px;
            overflow: hidden;
            background: linear-gradient(90deg, #000 0%, #111 50%, #000 100%);
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--star-gold);
            z-index: 5;
            box-shadow: 0 0 15px var(--star-gold);
            transform: translateX(-50%);
        }

        .track {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
        }

        /* --- NFT CARDS --- */
        .nft-mini {
            min-width: 120px;
            height: 140px;
            background: var(--tg-card);
            margin: 0 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .nft-mini .icon { font-size: 50px; margin-bottom: 8px; }
        .nft-mini .label { font-size: 10px; color: var(--tg-hint); text-transform: uppercase; }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid #333;
        }

        .nav-item {
            text-align: center;
            color: var(--tg-hint);
            font-size: 11px;
            text-decoration: none;
        }

        .nav-item.active { color: var(--tg-blue); }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 4px; font-style: normal; }

        /* --- SCREENS --- */
        .screen {
            display: none;
            height: calc(100vh - 150px);
            overflow-y: auto;
            padding: 16px;
        }

        .screen.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .inventory-card {
            background: var(--tg-card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #333;
            padding-bottom: 12px;
            position: relative;
        }

        .inv-img-box {
            height: 130px;
            background: #232325;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .inv-info { padding: 10px; }
        .inv-name { font-weight: 600; font-size: 14px; }
        .inv-model { color: var(--tg-hint); font-size: 12px; }

        /* --- MODAL (image_5.png STYLE) --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--tg-bg);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-nft-preview {
            width: 100%;
            height: 250px;
            background: radial-gradient(circle, #333 0%, #111 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .nft-stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .nft-stats-table td {
            padding: 12px;
            border-bottom: 0.5px solid #333;
            font-size: 15px;
        }

        .stat-label { color: var(--tg-hint); }
        .stat-value { text-align: right; font-weight: 500; }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            background: var(--tg-blue);
            color: white;
            transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* --- WIN ANIMATION (image_4.png STYLE) --- */
        #win-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .win-card {
            background: var(--tg-card);
            width: 200px;
            height: 240px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--tg-blue);
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; font-size: 20px;">BAZA <span style="color:var(--tg-blue)">SHOP</span></div>
    <div class="balance-pill">
        <span id="stars-balance">1000</span> <span style="color:var(--star-gold)">⭐️</span>
    </div>
</div>

<!-- SECTION: CASE -->
<div id="screen-cases" class="screen active">
    <div class="case-info">
        <h1>Chill Flame Case</h1>
        <p>Содержит редкие факелы и лампы</p>
    </div>

    <div class="roulette-box">
        <div class="pointer"></div>
        <div class="track" id="roulette-track"></div>
    </div>

    <button class="btn-main" onclick="startSpin()">Открыть за 100 ⭐️</button>
</div>

<!-- SECTION: INVENTORY -->
<div id="screen-inventory" class="screen">
    <h2 style="margin-bottom: 20px;">Мои предметы</h2>
    <div class="grid" id="inventory-grid"></div>
</div>

<!-- MODAL: SALE (image_5.png style) -->
<div class="modal" id="nft-modal">
    <div class="modal-content">
        <div class="modal-nft-preview">
            <div class="close-btn" onclick="closeModal()">✕</div>
            <span id="modal-icon">🔥</span>
        </div>
        
        <h2 id="modal-name" style="text-align: center; margin: 0;">Chill Flame</h2>
        <p id="modal-model-sub" style="text-align: center; color: var(--tg-hint); margin-top: 5px;">Olympia</p>

        <table class="nft-stats-table">
            <tr><td class="stat-label">Владелец</td><td class="stat-value">Вы</td></tr>
            <tr><td class="stat-label">Модель</td><td class="stat-value" id="stat-model">Olympia</td></tr>
            <tr><td class="stat-label">Узор</td><td class="stat-value">Light Bulb 0.4%</td></tr>
            <tr><td class="stat-label">Фон</td><td class="stat-value" id="stat-bg">Cappuccino</td></tr>
        </table>

        <button class="btn-main" id="sell-btn" style="background: #fff; color: #000;">Продать за ⭐️ <span id="sell-price">381</span></button>
    </div>
</div>

<!-- WIN OVERLAY (image_4.png style) -->
<div id="win-screen">
    <h1 style="color: var(--star-gold); margin-bottom: 30px; letter-spacing: 1px;">ВЫ ВЫБИЛИ NFT!</h1>
    <div class="win-card" id="win-card-content">
        <!-- Content injects here -->
    </div>
    <button class="btn-main" style="width: 200px; margin-top: 40px;" onclick="closeWin()">ЗАБРАТЬ</button>
</div>

<nav class="nav-bar">
    <a href="javascript:void(0)" class="nav-item active" onclick="showTab('cases', this)"><i>📦</i>Кейсы</a>
    <a href="javascript:void(0)" class="nav-item" onclick="showTab('inventory', this)"><i>🎒</i>Инвентарь</a>
    <a href="javascript:void(0)" class="nav-item"><i>🏦</i>Маркет</a>
</nav>

<script>
    const NFT_DATA = [
        { name: "Chill Flame", model: "Olympia", icon: "🔥", rarity: "common", chance: 70, price: 80, bg: "Cappuccino" },
        { name: "Blue Torch", model: "Tactical", icon: "💎", rarity: "rare", chance: 20, price: 350, bg: "Deep Ocean" },
        { name: "Lava Lamp", model: "Retro", icon: "🏮", rarity: "epic", chance: 8, price: 900, bg: "Cyber" },
        { name: "Golden Star", model: "Legendary", icon: "⭐️", rarity: "legend", chance: 2, price: 4500, bg: "Gold Mine" }
    ];

    let balance = 1000;
    let inventory = [];
    let selectedNFTIndex = null;

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'inventory') renderInventory();
    }

    function initTrack() {
        const track = document.getElementById('roulette-track');
        track.innerHTML = '';
        for(let i=0; i<60; i++) {
            const nft = NFT_DATA[Math.floor(Math.random() * NFT_DATA.length)];
            track.innerHTML += `
                <div class="nft-mini">
                    <div class="icon">${nft.icon}</div>
                    <div class="label">${nft.model}</div>
                </div>
            `;
        }
    }

    function startSpin() {
        if(balance < 100) return alert("Мало звезд!");
        balance -= 100;
        updateBalance();

        const track = document.getElementById('roulette-track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';

        const rand = Math.random() * 100;
        let cumulative = 0;
        let winner = NFT_DATA[0];
        for(let n of NFT_DATA) {
            cumulative += n.chance;
            if(rand <= cumulative) { winner = n; break; }
        }

        const cards = track.querySelectorAll('.nft-mini');
        const winIndex = 50;
        cards[winIndex].innerHTML = `<div class="icon">${winner.icon}</div><div class="label">${winner.model}</div>`;
        
        setTimeout(() => {
            const cardWidth = 136; // 120 + 16 margin
            const targetPos = (winIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
            track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
            track.style.transform = `translateX(-${targetPos}px)`;
        }, 50);

        setTimeout(() => showWin(winner), 5500);
    }

    function showWin(nft) {
        inventory.push(nft);
        const winScreen = document.getElementById('win-screen');
        const winCard = document.getElementById('win-card-content');
        
        const glowColor = nft.rarity === 'legend' ? 'var(--rarity-legend)' : 'var(--tg-blue)';
        winCard.style.boxShadow = `0 0 40px ${glowColor}`;
        
        winCard.innerHTML = `
            <div style="font-size:12px; color:var(--tg-hint); margin-bottom:10px;">${nft.model}</div>
            <div style="font-size:80px; margin-bottom:10px;">${nft.icon}</div>
            <div style="font-weight:bold;">${nft.name}</div>
        `;
        winScreen.style.display = 'flex';
    }

    function closeWin() { document.getElementById('win-screen').style.display = 'none'; }

    function renderInventory() {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = inventory.map((nft, i) => `
            <div class="inventory-card" onclick="openNFTDetails(${i})">
                <div class="inv-img-box">${nft.icon}</div>
                <div class="inv-info">
                    <div class="inv-name">${nft.name}</div>
                    <div class="inv-model">${nft.model}</div>
                </div>
            </div>
        `).join('');
    }

    function openNFTDetails(index) {
        selectedNFTIndex = index;
        const nft = inventory[index];
        document.getElementById('modal-icon').innerText = nft.icon;
        document.getElementById('modal-name').innerText = nft.name;
        document.getElementById('modal-model-sub').innerText = nft.model;
        document.getElementById('stat-model').innerText = nft.model;
        document.getElementById('stat-bg').innerText = nft.bg;
        document.getElementById('sell-price').innerText = nft.price;
        
        const glow = nft.rarity === 'legend' ? 'orange' : (nft.rarity === 'epic' ? 'purple' : 'white');
        document.querySelector('.modal-nft-preview').style.boxShadow = `inset 0 0 50px ${glow}`;

        document.getElementById('nft-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('nft-modal').style.display = 'none'; }

    document.getElementById('sell-btn').onclick = () => {
        const nft = inventory[selectedNFTIndex];
        balance += nft.price;
        inventory.splice(selectedNFTIndex, 1);
        updateBalance();
        closeModal();
        renderInventory();
    };

    function updateBalance() { document.getElementById('stars-balance').innerText = balance; }

    initTrack();
</script>
</body>
</html>
