<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Светский Клин — Web3 Elite</title>
    <style>
        :root {
            --bg-main: #070b19;
            --bg-glow: radial-gradient(circle at 50% 30%, #1e295d 0%, #070b19 70%);
            --card-active: rgba(255, 255, 255, 0.09);
            --card-disabled: rgba(255, 255, 255, 0.02);
            --accent-gold: #f59e0b;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --text-gold: #fbbf24;
            --neon-blue: #38bdf8;
            --profit-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-image: var(--bg-glow);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER & STATS --- */
        .app-header {
            text-align: center;
            margin-top: 5px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px var(--gold-glow));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-panel {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-icon {
            font-size: 20px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- BALANCE --- */
        .balance-section {
            text-align: center;
            margin: 5px 0;
        }

        .balance-amount {
            font-size: 46px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .gold-coin {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--gold-glow), inset 0 2px 4px rgba(255,255,255,0.4);
        }

        /* --- CLICKER AREA --- */
        .clicker-container {
            display: flex;
            justify-content: center;
            position: relative;
            margin: 10px 0;
        }

        .main-sphere {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1e3a8a 0%, #0f172a 70%, #020617 100%);
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2), inset 0 4px 20px rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            position: relative;
        }

        .main-sphere:active {
            transform: scale(0.96);
            border-color: var(--accent-gold);
            box-shadow: 0 0 50px var(--gold-glow);
        }

        .wedge-element {
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 70px solid var(--accent-gold);
            filter: drop-shadow(0 0 15px var(--gold-glow));
            transform: translateY(-10px);
            transition: transform 0.05s ease;
        }

        .main-sphere:active .wedge-element {
            transform: translateY(-10px) scale(0.9);
        }

        /* --- ENERGY BAR --- */
        .energy-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px 16px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
        }

        .energy-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .energy-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--neon-blue), #60a5fa);
            box-shadow: 0 0 8px rgba(56,189,248,0.5);
            transition: width 0.1s linear;
        }

        /* --- TABS SYSTEM --- */
        .tabs-menu {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* --- CARD GRID (BRIGHT & CRISP) --- */
        .upgrades-container {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .upgrades-container.active {
            display: grid;
        }

        .card {
            background: var(--card-active);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        .card:hover {
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.14);
            transform: translateY(-2px);
        }

        .card.disabled {
            background: var(--card-disabled);
            border-color: rgba(255,255,255,0.03);
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon-box {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-meta {
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .card-level {
            font-size: 11px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .card-profit-row {
            font-size: 11px;
            color: var(--profit-green);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin-top: auto;
        }

        .card-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .price-title {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
        }

        .price-val {
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* --- FLOATING TEXT --- */
        .floating-num {
            position: absolute;
            color: #ffffff;
            font-size: 30px;
            font-weight: 900;
            pointer-events: none;
            z-index: 1000;
            animation: floatAndFade 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            text-shadow: 0 0 8px rgba(56,189,248,0.6);
        }

        @keyframes floatAndFade {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-120px) scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Заголовок -->
        <header class="app-header">
            <h1 class="app-title">Светский Клин</h1>
        </header>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-panel">
                <div class="stat-icon">⚡</div>
                <div class="stat-info">
                    <span class="stat-label">За клик</span>
                    <span class="stat-value" id="pqc-txt">+1</span>
                </div>
            </div>
            <div class="stat-panel">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">Доход в сек</span>
                    <span class="stat-value" id="pps-txt">+0</span>
                </div>
            </div>
        </div>

        <!-- Баланс -->
        <div class="balance-section">
            <div class="balance-amount">
                <div class="gold-coin"></div>
                <span id="balance-val">0</span>
            </div>
        </div>

        <!-- Клик Зона -->
        <div class="clicker-container" id="click-zone">
            <div class="main-sphere" id="sphere-btn">
                <div class="wedge-element"></div>
            </div>
        </div>

        <!-- Энергия -->
        <div class="energy-container">
            <div class="energy-header">
                <span>Энергия</span>
                <span><span id="energy-current">1000</span>/<span id="energy-max">1000</span></span>
            </div>
            <div class="energy-bar-outer">
                <div class="energy-bar-inner" id="energy-fill"></div>
            </div>
        </div>

        <!-- Табы -->
        <nav class="tabs-menu">
            <button class="tab-btn active" onclick="switchTab('biz')">Бизнес</button>
            <button class="tab-btn" onclick="switchTab('invest')">Инвестиции</button>
            <button class="tab-btn" onclick="switchTab('power')">Влияние</button>
        </nav>

        <!-- КАТЕГОРИЯ: БИЗНЕС -->
        <div class="upgrades-container active" id="tab-biz"></div>

        <!-- КАТЕГОРИЯ: ИНВЕСТИЦИИ -->
        <div class="upgrades-container" id="tab-invest"></div>

        <!-- КАТЕГОРИЯ: ВЛИЯНИЕ -->
        <div class="upgrades-container" id="tab-power"></div>
    </div>

    <script>
        // База данных улучшений (12 штук)
        const dbUpgrades = [
            // Бизнес
            { id: 0, tab: 'biz', name: 'Кофейный Бренд', icon: '☕', baseCost: 40, costMult: 1.3, profit: 1, level: 0 },
            { id: 1, tab: 'biz', name: 'Сеть Бутиков', icon: '👜', baseCost: 350, costMult: 1.32, profit: 8, level: 0 },
            { id: 2, tab: 'biz', name: 'Частная Авиация', icon: '🛩️', baseCost: 2000, costMult: 1.35, profit: 45, level: 0 },
            { id: 3, tab: 'biz', name: 'IT Конгломерат', icon: '🌐', baseCost: 15000, costMult: 1.4, profit: 260, level: 0 },
            // Инвестиции
            { id: 4, tab: 'invest', name: 'Венчурный Фонд', icon: '📊', baseCost: 100, costMult: 1.28, profit: 3, level: 0 },
            { id: 5, tab: 'invest', name: 'Акции Техногигантов', icon: '💎', baseCost: 800, costMult: 1.33, profit: 22, level: 0 },
            { id: 6, tab: 'invest', name: 'Крипто Хедж-фонд', icon: '🪙', baseCost: 5000, costMult: 1.36, profit: 110, level: 0 },
            { id: 7, tab: 'invest', name: 'Недвижимость в Дубае', icon: '🏙️', baseCost: 45000, costMult: 1.42, profit: 950, level: 0 },
            // Влияние
            { id: 8, tab: 'power', name: 'Элитный Чат', icon: '💬', baseCost: 60, costMult: 1.25, profit: 2, level: 0 },
            { id: 9, tab: 'power', name: 'Медиа-Империя', icon: '📢', baseCost: 1200, costMult: 1.34, profit: 35, level: 0 },
            { id: 10, tab: 'power', name: 'Синдикат Уолл-Стрит', icon: '🏛️', baseCost: 8000, costMult: 1.38, profit: 190, level: 0 },
            { id: 11, tab: 'power', name: 'Политическое Лобби', icon: '👑', baseCost: 95000, costMult: 1.45, profit: 2400, level: 0 }
        ];

        let state = {
            balance: 0,
            clickPower: 1,
            passiveIncomePerSec: 0,
            energy: 1000,
            maxEnergy: 1000,
            energyRegen: 2,
            upgrades: JSON.parse(JSON.stringify(dbUpgrades))
        };

        const SAVE_KEY = 'svet_klin_pro_v3';
        let uiBalance = 0;

        // DOM элементы
        const balanceVal = document.getElementById('balance-val');
        const pqcTxt = document.getElementById('pqc-txt');
        const ppsTxt = document.getElementById('pps-txt');
        const sphereBtn = document.getElementById('sphere-btn');
        const clickZone = document.getElementById('click-zone');
        const energyCurrent = document.getElementById('energy-current');
        const energyMax = document.getElementById('energy-max');
        const energyFill = document.getElementById('energy-fill');

        function init() {
            loadGame();
            renderCards();
            recalculateStats();
            uiBalance = state.balance;
            
            // Основные циклы
            startPassiveIncomeLoop();
            startRegenEnergyLoop();
            renderLoop();

            setInterval(saveGame, 4000);
        }

        // Рендеринг карт в контейнеры
        function renderCards() {
            ['biz', 'invest', 'power'].forEach(tab => {
                const container = document.getElementById(`tab-${tab}`);
                container.innerHTML = '';
                
                const filtered = state.upgrades.filter(u => u.tab === tab);
                filtered.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `card-${up.id}`;
                    card.onclick = () => buyUpgrade(up.id);

                    const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));

                    card.innerHTML = `
                        <div class="card-top">
                            <div class="card-icon-box">${up.icon}</div>
                            <div class="card-meta">
                                <span class="card-title">${up.name}</span>
                                <span class="card-level" id="lvl-txt-${up.id}">Лвл ${up.level}</span>
                            </div>
                        </div>
                        <div class="card-profit-row">
                            <span>+$${up.profit}/сек</span>
                        </div>
                        <div class="card-divider"></div>
                        <div class="card-price-row">
                            <span class="price-title">Цена</span>
                            <span class="price-val" id="cost-txt-${up.id}">${cost.toLocaleString()}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // Пересчет экономики
        function recalculateStats() {
            let passive = 0;
            state.upgrades.forEach(up => {
                passive += up.level * up.profit;
            });
            state.passiveIncomePerSec = passive;
            state.maxEnergy = 1000 + (state.upgrades.filter(u => u.tab === 'power').reduce((acc, u) => acc + u.level, 0) * 150);
            state.clickPower = 1 + Math.floor(state.passiveIncomePerSec / 15);

            // Текстовые обновления
            pqcTxt.innerText = `+${state.clickPower}`;
            ppsTxt.innerText = `+${state.passiveIncomePerSec.toLocaleString()}`;
            energyMax.innerText = state.maxEnergy;
        }

        // Плавная отрисовка интерфейса
        function renderLoop() {
            const diff = state.balance - uiBalance;
            if (Math.abs(diff) > 0.2) {
                uiBalance += diff * 0.2;
            } else {
                uiBalance = state.balance;
            }
            balanceVal.innerText = Math.floor(uiBalance).toLocaleString('ru-RU');

            // Проверка доступности карт
            state.upgrades.forEach(up => {
                const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));
                const cardEl = document.getElementById(`card-${up.id}`);
                if (cardEl) {
                    if (state.balance < cost) {
                        cardEl.classList.add('disabled');
                    } else {
                        cardEl.classList.remove('disabled');
                    }
                }
            });

            // Энергия бар
            energyCurrent.innerText = Math.floor(state.energy);
            const pct = (state.energy / state.maxEnergy) * 100;
            energyFill.style.width = `${pct}%`;

            requestAnimationFrame(renderLoop);
        }

        // Пассивный доход (каждые 100мс для плавности)
        function startPassiveIncomeLoop() {
            let lastTime = Date.now();
            setInterval(() => {
                const now = Date.now();
                const dt = (now - lastTime) / 1000;
                state.balance += state.passiveIncomePerSec * dt;
                lastTime = now;
            }, 100);
        }

        // Регенерация энергии
        function startRegenEnergyLoop() {
            setInterval(() => {
                if (state.energy < state.maxEnergy) {
                    state.energy = Math.min(state.maxEnergy, state.energy + state.energyRegen);
                }
            }, 1000);
        }

        // Покупка улучшений
        function buyUpgrade(id) {
            const up = state.upgrades.find(u => u.id === id);
            const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));

            if (state.balance >= cost) {
                state.balance -= cost;
                up.level++;
                
                recalculateStats();
                
                // Динамическое обновление текста купленной карты
                const nextCost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));
                document.getElementById(`lvl-txt-${id}`).innerText = `Лвл ${up.level}`;
                document.getElementById(`cost-txt-${id}`).innerText = nextCost.toLocaleString();
            }
        }

        // Табы
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.upgrades-container').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // Клик логика
        function handleSphereClick(x, y) {
            if (state.energy >= state.clickPower) {
                state.energy -= state.clickPower;
                state.balance += state.clickPower;
                createFloatingNum(x, y, `+${state.clickPower}`);
            }
        }

        sphereBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleSphereClick(e.touches[0].clientX, e.touches[0].clientY);
        });

        sphereBtn.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return;
            handleSphereClick(e.clientX, e.clientY);
        });

        function createFloatingNum(clientX, clientY, text) {
            const rect = clickZone.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            const num = document.createElement('div');
            num.className = 'floating-num';
            num.innerText = text;
            num.style.left = `${x}px`;
            num.style.top = `${y}px`;

            clickZone.appendChild(num);
            num.addEventListener('animationend', () => num.remove());
        }

        // Сохранения
        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify({
                balance: state.balance,
                energy: state.energy,
                upgrades: state.upgrades.map(u => ({ id: u.id, level: u.level }))
            }));
        }

        function loadGame() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                state.balance = parsed.balance || 0;
                state.energy = parsed.energy || 1000;
                if (parsed.upgrades) {
                    parsed.upgrades.forEach(pu => {
                        const target = state.upgrades.find(u => u.id === pu.id);
                        if (target) target.level = pu.level || 0;
                    });
                }
            } catch(e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
