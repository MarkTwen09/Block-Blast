<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky in Flames - Mini 2D</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #00ff00;
            border-radius: 5px;
            pointer-events: none;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border: 2px solid #ff0000;
        }
        button {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background: #00ff00; color: #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div>СЧЕТ: <span id="score">0</span></div>
        <div>ПРОЧНОСТЬ БАЗЫ: <span id="health">100</span>%</div>
        <div>ЗАРЯДЫ ПВО: <span id="ammo">30</span></div>
    </div>

    <div id="game-over">
        <h1 style="color: #ff0000;">БАЗА УНИЧТОЖЕНА</h1>
        <p>Система ПВО пала. Рой дронов прорвал оборону.</p>
        <button onclick="resetGame()">Перезапустить систему</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Адаптация под размер экрана
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Игровые переменные
        let score = 0;
        let baseHealth = 100;
        let ammo = 30;
        let gameOver = false;

        const pvoStation = { x: canvas.width / 2, y: canvas.height - 30, r: 20 };
        let drones = [];
        let missiles = [];
        let explosions = [];

        // Управление кликом (Пуск ракеты)
        canvas.addEventListener('click', (e) => {
            if (gameOver || ammo <= 0) return;

            // Расчет угла полета ракеты к точке клика
            const targetX = e.clientX;
            const targetY = e.clientY;
            
            const startX = canvas.width / 2;
            const startY = canvas.height - 30;
            
            const angle = Math.atan2(targetY - startY, targetX - startX);
            
            missiles.push({
                x: startX,
                y: startY,
                targetX: targetX,
                targetY: targetY,
                speed: 7,
                dx: Math.cos(angle) * 7,
                dy: Math.sin(angle) * 7
            });

            ammo--;
            document.getElementById('ammo').innerText = ammo;
        });

        // Спавн дронов
        function spawnDrone() {
            if (gameOver) return;
            const x = Math.random() * (canvas.width - 40) + 20;
            const speed = Math.random() * 1.5 + 1; // Скорость падения
            drones.push({ x: x, y: 0, speed: speed, r: 12 });
            
            // Время между спавном уменьшается со временем (усложнение)
            setTimeout(spawnDrone, Math.max(800 - score * 5, 300));
        }
        spawnDrone();

        // Пассивное пополнение припасов (Логистика)
        setInterval(() => {
            if (!gameOver && ammo < 50) {
                ammo += 5;
                if (ammo > 50) ammo = 50;
                document.getElementById('ammo').innerText = ammo;
            }
        }, 3000); // Раз в 3 секунды подвозят 5 ракет

        // Главный игровой цикл
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка базы/города снизу
            ctx.fillStyle = '#333';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            // Отрисовка ПВО
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height - 20, 25, Math.PI, 0);
            ctx.fill();

            // Обновление и отрисовка ракет
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.x += m.dx;
                m.y += m.dy;

                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.dx * 2, m.y - m.dy * 2);
                ctx.stroke();

                // Проверяем достижение цели (дистанция до точки клика)
                let distToTarget = Math.hypot(m.x - m.targetX, m.y - m.targetY);
                if (distToTarget < 10 || m.y < 0) {
                    explosions.push({ x: m.targetX, y: m.targetY, r: 5, maxR: 40 });
                    missiles.splice(i, 1);
                }
            }

            // Обновление и отрисовка взрывов
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                exp.r += 2;

                ctx.fillStyle = `rgba(255, 100, 0, ${1 - exp.r / exp.maxR})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.r, 0, Math.PI * 2);
                ctx.fill();

                // Проверка коллизии взрыва с дронами
                for (let j = drones.length - 1; j >= 0; j--) {
                    let d = drones[j];
                    let dist = Math.hypot(d.x - exp.x, d.y - exp.y);
                    if (dist < exp.r + d.r) {
                        drones.splice(j, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                }

                if (exp.r >= exp.maxR) {
                    explosions.splice(i, 1);
                }
            }

            // Обновление и отрисовка дронов
            for (let i = drones.length - 1; i >= 0; i--) {
                let d = drones[i];
                d.y += d.speed;

                // Рисуем дрон (схематичный силуэт)
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
                // Крылья
                ctx.fillRect(d.x - 20, d.y - 2, 40, 4);

                // Дрон долетел до земли
                if (d.y > canvas.height - 20) {
                    drones.splice(i, 1);
                    baseHealth -= 10;
                    document.getElementById('health').innerText = baseHealth;

                    if (baseHealth <= 0) {
                        endGame();
                    }
                }
            }

            if (!gameOver) {
                requestAnimationFrame(update);
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
        }

        function resetGame() {
            score = 0;
            baseHealth = 100;
            ammo = 30;
            drones = [];
            missiles = [];
            explosions = [];
            gameOver = false;
            document.getElementById('score').innerText = score;
            document.getElementById('health').innerText = baseHealth;
            document.getElementById('ammo').innerText = ammo;
            document.getElementById('game-over').style.display = 'none';
            update();
        }

        // Старт игры
        update();
    </script>
</body>
</html>
