<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Ultimate</title>
    <style>
        body { background: #0a0a0f; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 30px; text-align: center; z-index: 10; }
        #score { font-size: 60px; font-weight: 900; background: linear-gradient(to bottom, #fff, #7dd3fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(125,211,252,0.4)); }
        canvas { background: #16161e; border-radius: 16px; box-shadow: 0 0 40px rgba(0,0,0,0.8); margin-top: 130px; border: 2px solid #23232e; }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; padding: 18px 50px; color: white; font-size: 22px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 15px 25px rgba(59,130,246,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div id="best" style="color: #64748b; font-weight: bold;">BEST: 0</div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 50px; margin: 0; background: linear-gradient(to right, #f87171, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ФИНИШ!</h1>
        <p id="final-score" style="font-size: 24px; margin: 20px 0;">Счёт: 0</p>
        <button class="btn" onclick="resetGame()">ЕЩЁ РАЗ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Константы
const GRID = 7; 
const CELL = 48;
const GAP = 5;
const BOARD_X = 15;
const BOARD_Y = 20;
canvas.width = (CELL + GAP) * GRID + BOARD_X * 2;
canvas.height = canvas.width + 180;

let score = 0;
let best = localStorage.getItem('bb_best') || 0;
document.getElementById('best').innerText = `BEST: ${best}`;

let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [];
let dragging = null;
let particles = [];
let animations = []; // Для эффектов "всплытия" очков

const COLORS = {
    r: "#ff4d4d", g: "#4ade80", b: "#3b82f6", y: "#facc15", p: "#a855f7", c: "#22d3ee", o: "#fb923c"
};

const SHAPES = [
    {m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1]], c:'b'}, {m:[[1],[1],[1]], c:'c'},
    {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'}
];

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12 - 3;
        this.life = 1.0;
        this.gravity = 0.25;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.vy += this.gravity;
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function spawn() {
    shapes = [];
    for(let i=0; i<3; i++) {
        let s = SHAPES[Math.floor(Math.random()*SHAPES.length)];
        shapes.push({
            ...s, x: 30 + i*110, y: canvas.height - 120,
            ox: 30 + i*110, oy: canvas.height - 120,
            scale: 0.5, targetScale: 0.5
        });
    }
}

function checkLines() {
    let rClear = [], cClear = [];
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rClear.push(r);
    for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cClear.push(c);

    rClear.forEach(r => {
        for(let c=0; c<GRID; c++) explode(c, r, board[r][c]);
        board[r].fill(null);
    });
    cClear.forEach(c => {
        for(let r=0; r<GRID; r++) {
            if(board[r][c]) explode(c, r, board[r][c]);
            board[r][c] = null;
        }
    });

    if(rClear.length || cClear.length) {
        let pts = (rClear.length + cClear.length) * 100;
        score += pts;
        updateScore();
    }
}

function explode(gx, gy, color) {
    let px = BOARD_X + gx*(CELL+GAP) + CELL/2;
    let py = BOARD_Y + gy*(CELL+GAP) + CELL/2;
    for(let i=0; i<15; i++) particles.push(new Particle(px, py, color));
}

function updateScore() {
    document.getElementById('score').innerText = score;
    if(score > best) {
        best = score;
        localStorage.setItem('bb_best', best);
        document.getElementById('best').innerText = `BEST: ${best}`;
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Сетка
    for(let r=0; r<GRID; r++){
        for(let c=0; c<GRID; c++){
            ctx.fillStyle = board[r][c] ? COLORS[board[r][c]] : "#1e1e2a";
            ctx.beginPath();
            ctx.roundRect(BOARD_X + c*(CELL+GAP), BOARD_Y + r*(CELL+GAP), CELL, CELL, 8);
            ctx.fill();
            if(board[r][c]) {
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillRect(BOARD_X + c*(CELL+GAP), BOARD_Y + r*(CELL+GAP), CELL, CELL/3);
            }
        }
    }

    // Фигуры
    shapes.forEach(s => {
        s.scale += (s.targetScale - s.scale) * 0.2;
        ctx.fillStyle = COLORS[s.c];
        let sz = CELL * s.scale;
        let g = GAP * s.scale;
        s.m.forEach((row, ri) => {
            row.forEach((v, ci) => {
                if(v) {
                    ctx.beginPath();
                    ctx.roundRect(s.x + ci*(sz+g), s.y + ri*(sz+g), sz, sz, 6);
                    ctx.fill();
                }
            });
        });
    });

    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    requestAnimationFrame(draw);
}

// Управление (Touch + Mouse)
let startX, startY;
const handleDown = (e) => {
    let rect = canvas.getBoundingClientRect();
    let x = (e.clientX || e.touches[0].clientX) - rect.left;
    let y = (e.clientY || e.touches[0].clientY) - rect.top;
    shapes.forEach(s => {
        if(x > s.x && x < s.x + 80 && y > s.y && y < s.y + 80) {
            dragging = s;
            s.targetScale = 1.0;
            startX = x - s.x; startY = y - s.y;
        }
    });
};

const handleMove = (e) => {
    if(!dragging) return;
    let rect = canvas.getBoundingClientRect();
    dragging.x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left - startX;
    dragging.y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top - startY;
};

const handleUp = () => {
    if(!dragging) return;
    let gx = Math.round((dragging.x - BOARD_X) / (CELL+GAP));
    let gy = Math.round((dragging.y - BOARD_Y) / (CELL+GAP));

    let can = true;
    if(gx >= 0 && gy >= 0 && gx + dragging.m[0].length <= GRID && gy + dragging.m.length <= GRID) {
        dragging.m.forEach((row, r) => row.forEach((v, c) => {
            if(v && board[gy+r][gx+c]) can = false;
        }));
    } else can = false;

    if(can) {
        dragging.m.forEach((row, r) => row.forEach((v, c) => {
            if(v) board[gy+r][gx+c] = dragging.c;
        }));
        score += 10; updateScore();
        shapes = shapes.filter(s => s !== dragging);
        if(shapes.length === 0) spawn();
        checkLines();
        if(shapes.every(s => !canFit(s))) {
             document.getElementById('game-over').style.display = 'flex';
             document.getElementById('final-score').innerText = `Счёт: ${score}`;
        }
    } else {
        dragging.x = dragging.ox; dragging.y = dragging.oy; dragging.targetScale = 0.5;
    }
    dragging = null;
};

function canFit(s) {
    for(let r=0; r<=GRID-s.m.length; r++) {
        for(let c=0; c<=GRID-s.m[0].length; c++) {
            let ok = true;
            s.m.forEach((row, ri) => row.forEach((v, ci) => {
                if(v && board[r+ri][c+ci]) ok = false;
            }));
            if(ok) return true;
        }
    }
    return false;
}

function resetGame() {
    board = Array(GRID).fill().map(() => Array(GRID).fill(null));
    score = 0; updateScore();
    document.getElementById('game-over').style.display = 'none';
    spawn();
}

canvas.addEventListener('mousedown', handleDown);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleUp);
canvas.addEventListener('touchstart', handleDown);
window.addEventListener('touchmove', handleMove);
window.addEventListener('touchend', handleUp);

spawn();
draw();
</script>
</body>
</html>
