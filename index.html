<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Tactical Air Defense</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #020502; color: #00ff66;
        }
        #map {
            width: 100%; height: 100%;
            filter: invert(100%) hue-rotate(195deg) brightness(75%) contrast(125%) saturate(140%);
            background: #000;
        }
        /* Экран выбора фракции */
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a1a0a 0%, #010401 100%); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 3px solid #00ff66; box-sizing: border-box;
        }
        .faction-btn {
            background: #001f00; border: 2px solid #00ff66; padding: 15px 35px;
            color: #00ff66; font-size: 18px; cursor: pointer; margin: 12px;
            font-weight: bold; width: 240px; text-shadow: 0 0 5px #00ff66;
        }
        .faction-btn:hover { background: #00ff66; color: #000; box-shadow: 0 0 20px #00ff66; }

        /* Интерфейс управления */
        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px;
            z-index: 1000; background: rgba(2, 6, 2, 0.9); border: 2px solid #00ff66;
            padding: 10px; display: flex; justify-content: space-between;
            font-size: 11px; font-weight: bold; pointer-events: none;
        }
        #hud-top span { color: #fff; text-shadow: 0 0 3px #fff; }

        #control-panel {
            position: absolute; bottom: 12px; left: 12px; right: 12px;
            z-index: 1000; display: flex; flex-direction: column; gap: 6px;
        }
        .btn-row { display: flex; gap: 6px; width: 100%; }
        .btn {
            flex: 1; background: rgba(2,6,2,0.9); color: #00ff66; border: 2px solid #00ff66;
            padding: 12px 5px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold;
        }
        .btn.active { background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66; }
        .btn-attack { border-color: #ff3333; color: #ff3333; background: rgba(25,0,0,0.5); }
        .btn-attack:hover { background: #ff3333; color: #000; }

        #log-panel {
            position: absolute; bottom: 125px; left: 12px; right: 12px; z-index: 1000;
            height: 55px; background: rgba(0,4,0,0.85); border: 1px solid #00ff66;
            padding: 6px; font-size: 9px; overflow: hidden; 
            display: flex; flex-direction: column-reverse; pointer-events: none;
        }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #00ff66; padding-left: 4px; }
        .log-entry.enemy { border-left-color: #ff3333; color: #ff5555; }
        
        /* Иконки через чистый CSS (чтобы не зависеть от внешних картинок) */
        .icon-uav { text-shadow: 0 0 5px #00ff00; font-size: 14px; text-align: center; font-weight: bold; }
        .icon-uav-enemy { text-shadow: 0 0 5px #ff0000; font-size: 14px; text-align: center; font-weight: bold; }
        .icon-structure { font-size: 18px; text-align: center; }
    </style>
</head>
<body>

    <div id="faction-screen">
        <h1 style="letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px #00ff66;">SKY IN FLAMES</h1>
        <p style="color: #88ff88; font-size: 11px; margin-top: 0; letter-spacing: 2px;">TACTICAL BATTLE SYSTEM v4.0</p>
        <button class="faction-btn" onclick="selectFaction('UA')">УКРАИНА [UA]</button>
        <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#3366ff; color:#3366ff;">РОССИЯ [RU]</button>
    </div>

    <div id="hud-top">
        <div>БЮДЖЕТ: <span id="txt-money">600</span>$</div>
        <div>НА СКЛАДЕ: <span id="txt-drones">0</span> БПЛА</div>
        <div>ОБОРОНА СТРАНЫ: <span id="txt-hp">100%</span></div>
    </div>

    <div id="log-panel"></div>

    <div id="control-panel">
        <div class="btn-row">
            <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД (200$)</button>
            <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО (250$)</button>
        </div>
        <button class="btn btn-attack" onclick="launchDroneSwarm()">ЗАПУСТИТЬ РОЙ (ОТ 1 ЕД. + 10$ ЗА ДРОН)</button>
    </div>

    <div id="map"></div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'Санкт-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов-на-Дону', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 56.32, lng: 44.00, name: 'Нижний Новгород', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 600; // Реальный бюджет ИИ бота
        
        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyFactories = [], enemyPVO = [], enemyDrones = [];
        let map;

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 5, maxZoom: 8 }).setView([53.0, 34.0], window.innerWidth < 600 ? 5 : 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            spawnCities();
            setupMapClicks();
            
            // Запуск циклов
            setInterval(economyTick, 2500); // Ресурсы раз в 2.5 сек
            setInterval(tacticalTick, 50);   // Логика перемещения БПЛА
            setInterval(enemyAI, 6000);      // Бот думает и строит/атакует раз в 6 секунд

            addLog("Развернут командный терминал ПВО и БПЛА.");
        }

        function spawnCities() {
            // Союзные города
            CITIES[playerFaction].forEach(c => {
                let cityIcon = L.divIcon({ className: 'icon-structure', html: '🏢', iconSize: [20, 20] });
                L.marker([c.lat, c.lng], { icon: cityIcon }).addTo(map).bindPopup(`<b>${c.name} (Союзник)</b>`);
            });
            // Вражеские города
            CITIES[enemyFaction].forEach(c => {
                let cityIcon = L.divIcon({ className: 'icon-structure', html: '🏭', iconSize: [20, 20] });
                L.marker([c.lat, c.lng], { icon: cityIcon }).addTo(map).bindPopup(`<b>${c.name} (Враг)</b>`);
            });
        }

        function toggleBuildMode(mode) {
            if (currentMode === mode) currentMode = null;
            else {
                currentMode = mode;
                addLog(`Укажите координаты на карте для постройки.`);
            }
            document.getElementById('btn-factory').classList.toggle('active', currentMode === 'factory');
            document.getElementById('btn-pvo').classList.toggle('active', currentMode === 'pvo');
        }

        function setupMapClicks() {
            map.on('click', function(e) {
                if (!currentMode) return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 200) {
                    money -= 200;
                    let icon = L.divIcon({ className: 'icon-structure', html: '🛠️', iconSize: [20, 20] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map).bindPopup("Завод БПЛА");
                    playerFactories.push({ lat, lng, marker: m });
                    addLog("Построен сборочный цех БПЛА.");
                } else if (currentMode === 'pvo' && money >= 250) {
                    money -= 250;
                    let icon = L.divIcon({ className: 'icon-structure', html: '📡', iconSize: [20, 20] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map).bindPopup("Батарея ПВО (Ракет: 8/8)");
                    let r = L.circle([lat, lng], { radius: 90000, color: '#00ffff', fillColor: '#00ffff', fillOpacity: 0.03, weight: 1, dashArray: '3,3' }).addTo(map);
                    playerPVO.push({ lat, lng, marker: m, range: r, ammo: 8, maxAmmo: 8, reloadTimer: 0 });
                    addLog("Система ПВО развернута на боевой радиус 90км.");
                } else {
                    addLog("Недостаточно средств!");
                }
                toggleBuildMode(null);
            });
        }

        // Запуск роя игрока
        function launchDroneSwarm() {
            if (droneInventory <= 0) { addLog("На складах нет готовых БПЛА."); return; }
            
            let launchCost = droneInventory * 10; // 10$ за запуск одного дрона на топливо
            if (money < launchCost) {
                addLog(`Недостаточно средств на запуск роя! Нужно ${launchCost}$.`);
                return;
            }

            money -= launchCost;
            addLog(`Запуск штурмовой группы: ${droneInventory} БПЛА направлены на врага (-${launchCost}$)`);

            const start = playerFactories.length > 0 ? playerFactories[Math.floor(Math.random() * playerFactories.length)] : CITIES[playerFaction][0];

            for(let i=0; i < droneInventory; i++) {
                let targetCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                createDroneTrack(start, targetCity, playerDrones, true);
            }
            droneInventory = 0;
        }

        // ИНТЕЛЛЕКТУАЛЬНЫЙ БОТ (ИИ ВРАГА)
        function enemyAI() {
            // 1. Пассивный доход бота
            enemyMoney += 40 + (enemyFactories.length * 15);

            // 2. Логика обороны ИИ: Если у него мало ПВО, он строит ПВО возле своих случайных городов
            if (enemyPVO.length < 3 && enemyMoney >= 250) {
                enemyMoney -= 250;
                let targetCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                // Смещение, чтобы не строить прямо на городе
                let lat = targetCity.lat + (Math.random() - 0.5) * 0.2;
                let lng = targetCity.lng + (Math.random() - 0.5) * 0.2;
                
                let icon = L.divIcon({ className: 'icon-structure', html: '📡', iconSize: [20, 20] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                let r = L.circle([lat, lng], { radius: 90000, color: '#ff3333', fillColor: '#ff3333', fillOpacity: 0.02, weight: 1, dashArray: '3,3' }).addTo(map);
                
                enemyPVO.push({ lat, lng, marker: m, range: r, ammo: 8, maxAmmo: 8, reloadTimer: 0 });
                addLog("Разведка: Враг укрепил сектор ПВО.", true);
                return;
            }

            // 3. Логика экономики ИИ: Бот строит заводы, если оборона в норме
            if (enemyFactories.length < 4 && enemyMoney >= 200 && Math.random() > 0.4) {
                enemyMoney -= 200;
                let targetCity = CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)];
                let lat = targetCity.lat + (Math.random() - 0.5) * 0.3;
                let lng = targetCity.lng + (Math.random() - 0.5) * 0.3;

                let icon = L.divIcon({ className: 'icon-structure', html: '🛠️', iconSize: [20, 20] });
                let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                enemyFactories.push({ lat, lng, marker: m, droneStock: 0 });
                addLog("Разведка: Замечено строительство завода БПЛА врага.", true);
                return;
            }

            // 4. Логика атаки ИИ: Бот копит дроны на своих заводах и атакует роем
            enemyFactories.forEach(f => f.droneStock++);
            let totalEnemyDrones = enemyFactories.reduce((acc, f) => acc + f.droneStock, 0);

            if (totalEnemyDrones >= 4 && enemyMoney >= (totalEnemyDrones * 10)) {
                enemyMoney -= (totalEnemyDrones * 10);
                addLog(`РЛС: Враг поднял в воздух рой из ${totalEnemyDrones} ударных БПЛА!`, true);

                enemyFactories.forEach(f => {
                    for (let i = 0; i < f.droneStock; i++) {
                        let targetCity = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                        createDroneTrack(f, targetCity, enemyDrones, false);
                    }
                    f.droneStock = 0;
                });
            }
        }

        function createDroneTrack(start, target, collection, isPlayer) {
            // Настоящие маркеры-стрелочки БПЛА треугольной формы (▲ / ▼)
            let droneSymbol = isPlayer ? '▲' : '▼';
            let cssClass = isPlayer ? 'icon-uav' : 'icon-uav-enemy';
            
            let droneIcon = L.divIcon({ className: cssClass, html: droneSymbol, iconSize: [12, 12] });
            let marker = L.marker([start.lat, start.lng], { icon: droneIcon }).addTo(map);
            
            let curveIntensity = (Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1); 

            collection.push({
                marker: marker, lat: start.lat, lng: start.lng,
                targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                progress: 0,
                speed: 0.0018 + (Math.random() * 0.0008), 
                curve: curveIntensity
            });
        }

        function economyTick() {
            money += 35 + (playerFactories.length * 10);
            playerFactories.forEach(() => droneInventory++);
            
            // Механика перезарядки ПВО (Союзного и Вражеского)
            reloadPVOSystem(playerPVO);
            reloadPVOSystem(enemyPVO);

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
        }

        function reloadPVOSystem(pvoList) {
            pvoList.forEach(p => {
                if (p.ammo < p.maxAmmo) {
                    p.reloadTimer++;
                    if (p.reloadTimer >= 3) { // 1 ракета раз в 7.5 секунд
                        p.ammo++;
                        p.reloadTimer = 0;
                        if (p.marker.getPopup()) p.marker.setPopupContent(`Батарея ПВО (Ракет: ${p.ammo}/${p.maxAmmo})`);
                    }
                }
            });
        }

        function tacticalTick() {
            // Обсчет полета наших дронов и перехват их ПВО ВРАГА
            processDrones(playerDrones, enemyPVO, true);
            // Обсчет полета вражеских дронов и перехват их НАШИМ ПВО
            processDrones(enemyDrones, playerPVO, false);
        }

        function processDrones(droneList, pvoList, isPlayer) {
            for (let i = droneList.length - 1; i >= 0; i--) {
                let d = droneList[i];
                d.progress += d.speed;

                if (d.progress >= 1) { // Удар по городу
                    createExplosion(d.targetLat, d.targetLng, '#ff1111', 25000);
                    map.removeLayer(d.marker);
                    droneList.splice(i, 1);
                    
                    if (!isPlayer) damagePlayerCity(d.targetName);
                    else addLog(`Бомбардировка: цель в г. ${d.targetName} успешно поражена!`);
                    continue;
                }

                // Координаты по дуге
                let currentLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let currentLng = d.lng + (d.targetLng - d.lng) * d.progress;
                let offset = Math.sin(d.progress * Math.PI) * d.curve;
                currentLat += offset; currentLng -= offset;

                d.marker.setLatLng([currentLat, currentLng]);

                // Проверка перехвата системами ПВО
                let intercepted = false;
                for (let j = pvoList.length - 1; j >= 0; j--) {
                    let pvo = pvoList[j];
                    if (pvo.ammo > 0 && map.distance([currentLat, currentLng], [pvo.lat, pvo.lng]) <= 90000) {
                        pvo.ammo--; // Тратим ракету ПВО
                        if (pvo.marker.getPopup()) pvo.marker.setPopupContent(`Батарея ПВО (Ракет: ${pvo.ammo}/${pvo.maxAmmo})`);
                        
                        createExplosion(currentLat, currentLng, '#00ffff', 15000);
                        map.removeLayer(d.marker);
                        droneList.splice(i, 1);
                        intercepted = true;
                        
                        if (isPlayer) addLog("Потеря: наш дрон сбит системой ПВО врага.", true);
                        else addLog("ПВО: Воздушная цель уничтожена.");
                        break;
                    }
                }
                if (intercepted) continue;
            }
        }

        function damagePlayerCity(name) {
            let city = CITIES[playerFaction].find(c => c.name === name);
            if (city) {
                city.hp -= 8;
                if (city.hp < 0) city.hp = 0;
                addLog(`Удар: Поражен г. ${name}! Целостность: ${city.hp}%`, true);
                
                let total = 0;
                CITIES[playerFaction].forEach(c => total += c.hp);
                let avg = Math.round(total / 5);
                document.getElementById('txt-hp').innerText = avg + "%";
                
                if (avg <= 0) {
                    alert("Все оборонные центры уничтожены. Капитуляция.");
                    location.reload();
                }
            }
        }

        function createExplosion(lat, lng, color, maxRadius) {
            let exp = L.circle([lat, lng], { radius: 1000, color: color, fillColor: color, fillOpacity: 0.6 }).addTo(map);
            let r = 1000;
            let int = setInterval(() => {
                r += 5000; exp.setRadius(r);
                if(r > maxRadius) { clearInterval(int); map.removeLayer(exp); }
            }, 30);
        }

        function addLog(text, isEnemy = false) {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${isEnemy ? 'enemy' : ''}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
