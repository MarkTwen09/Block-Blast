<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast: Pro Max</title>
    <style>
        :root { --bg: #08080e; --panel: #12121e; --accent: #a78bfa; }
        body { 
            background: var(--bg); color: white; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; touch-action: none;
        }
        #header { margin-top: env(safe-area-inset-top, 40px); text-align: center; z-index: 10; }
        #score { font-size: 90px; font-weight: 900; background: linear-gradient(#fff, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
        #streak-ui { color: #fbbf24; font-weight: bold; font-size: 20px; height: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        canvas { 
            background: var(--panel); border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 2px solid #232336; touch-action: none; margin-top: 20px;
        }
        #footer { height: calc(env(safe-area-inset-bottom, 20px) + 140px); width: 100%; }
        
        #game-over { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn { background: #6d28d9; border: none; padding: 18px 50px; color: white; font-size: 20px; border-radius: 40px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="streak-ui"></div>
        <div id="score">0</div>
        <div id="best" style="opacity: 0.5;">BEST: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="footer"></div>

    <div id="game-over">
        <h1 style="font-size: 50px; color: #f87171;">FINISH</h1>
        <p id="final-score" style="font-size: 30px;">0</p>
        <button class="btn" onclick="resetGame()">PLAY AGAIN</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Конфиг под iPhone 17 Pro
const GRID = 8;
let CELL = Math.floor(window.innerWidth * 0.11);
const GAP = 4;
const BOARD_PAD = 10;
canvas.width = (CELL + GAP) * GRID + BOARD_PAD * 2;
canvas.height = canvas.width + 160;

let score = 0, best = localStorage.getItem('bb_pro_best') || 0, streak = 0;
let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [], dragging = null, particles = [], dragOff = {x:0, y:0};

const COLORS = {
    r: "#ff4d4d", g: "#4ade80", b: "#3b82f6", y: "#facc15", p: "#a855f7", c: "#22d3ee", o: "#fb923c"
};

const SHAPES_LIB = [
    {m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1,1]], c:'b'}, {m:[[1,1,1]], c:'c'},
    {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'},
    {m:[[1,1],[1,0],[1,0]], c:'y'}, {m:[[1,1,1],[1,0,0]], c:'b'}
];

function spawn() {
    shapes = [];
    const step = canvas.width / 3;
    for(let i=0; i<3; i++) {
        let validShape = null;
        // Умная генерация: пытаемся найти фигуру, которая влезет на поле
        for(let attempt=0; attempt<10; attempt++) {
            let s = SHAPES_LIB[Math.floor(Math.random()*SHAPES_LIB.length)];
            if (canFitAnywhere(s)) { validShape = s; break; }
            if (attempt === 9) validShape = s; // Если совсем туго, даем рандом
        }
        
        let w = validShape.m[0].length * (CELL * 0.5);
        shapes.push({
            ...validShape, 
            x: (step * i) + (step - w)/2, y: canvas.height - 120,
            ox: (step * i) + (step - w)/2, oy: canvas.height - 120,
            scale: 0.5, targetScale: 0.5
        });
    }
    if (shapes.every(s => !canFitAnywhere(s))) showGameOver();
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Сетка
    for(let r=0; r<GRID; r++) {
        for(let c=0; c<GRID; c++) {
            ctx.fillStyle = board[r][c] ? COLORS[board[r][c]] : "#1a1a2e";
            ctx.beginPath();
            ctx.roundRect(BOARD_PAD + c*(CELL+GAP), BOARD_PAD + r*(CELL+GAP), CELL, CELL, 10);
            ctx.fill();
        }
    }

    // Ghost Block (Фантомная тень)
    if(dragging) {
        let gx = Math.round((dragging.x - BOARD_PAD) / (CELL+GAP));
        let gy = Math.round((dragging.y - BOARD_PAD) / (CELL+GAP));
        if(canPlace(dragging, gx, gy)) {
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = COLORS[dragging.c];
            dragging.m.forEach((row, ri) => row.forEach((v, ci) => {
                if(v) {
                    ctx.beginPath();
                    ctx.roundRect(BOARD_PAD + (gx+ci)*(CELL+GAP), BOARD_PAD + (gy+ri)*(CELL+GAP), CELL, CELL, 10);
                    ctx.fill();
                }
            }));
            ctx.globalAlpha = 1;
        }
    }

    // Фигуры
    shapes.forEach(s => {
        s.scale += (s.targetScale - s.scale) * 0.2;
        ctx.fillStyle = COLORS[s.c];
        let sz = CELL * s.scale, g = GAP * s.scale;
        s.m.forEach((row, ri) => row.forEach((v, ci) => {
            if(v) {
                ctx.beginPath();
                ctx.roundRect(s.x + ci*(sz+g), s.y + ri*(sz+g), sz, sz, 8);
                ctx.fill();
            }
        }));
    });

    requestAnimationFrame(draw);
}

// Вспомогательная логика
function canPlace(shape, gx, gy) {
    if(gx < 0 || gy < 0 || gx + shape.m[0].length > GRID || gy + shape.m.length > GRID) return false;
    for(let r=0; r<shape.m.length; r++) {
        for(let c=0; c<shape.m[0].length; c++) {
            if(shape.m[r][c] && board[gy+r][gx+c]) return false;
        }
    }
    return true;
}

function canFitAnywhere(shape) {
    for(let r=0; r<=GRID-shape.m.length; r++) {
        for(let c=0; c<=GRID-shape.m[0].length; c++) {
            if(canPlace(shape, c, r)) return true;
        }
    }
    return false;
}

function checkLines() {
    let rows = [], cols = [];
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rows.push(r);
    for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cols.push(c);

    if(rows.length || cols.length) {
        streak++;
        document.getElementById('streak-ui').innerText = streak > 1 ? `STREAK x${streak}!` : "";
        rows.forEach(r => board[r].fill(null));
        cols.forEach(c => board.forEach(r => r[c] = null));
        score += (rows.length + cols.length) * 150 * streak;
        updateScore();
    } else {
        streak = 0;
        document.getElementById('streak-ui').innerText = "";
    }
}

function updateScore() {
    document.getElementById('score').innerText = score;
    if(score > best) {
        best = score;
        localStorage.setItem('bb_pro_best', best);
        document.getElementById('best').innerText = `BEST: ${best}`;
    }
}

// Touch события
const getPos = (e) => {
    let r = canvas.getBoundingClientRect();
    let cx = e.touches ? e.touches[0].clientX : e.clientX;
    let cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) * (canvas.width/r.width), y: (cy - r.top) * (canvas.height/r.height) };
};

canvas.addEventListener('touchstart', e => {
    let p = getPos(e);
    shapes.forEach(s => {
        if(p.x > s.x-20 && p.x < s.x+80 && p.y > s.y-20 && p.y < s.y+100) {
            dragging = s; s.targetScale = 1.0;
            dragOff.x = p.x - s.x; dragOff.y = p.y - s.y;
        }
    });
});

window.addEventListener('touchmove', e => {
    if(!dragging) return;
    if(e.cancelable) e.preventDefault();
    let p = getPos(e);
    dragging.x = p.x - dragOff.x;
    dragging.y = p.y - dragOff.y;
}, {passive: false});

window.addEventListener('touchend', () => {
    if(!dragging) return;
    let gx = Math.round((dragging.x - BOARD_PAD) / (CELL+GAP));
    let gy = Math.round((dragging.y - BOARD_PAD) / (CELL+GAP));

    if(canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row, r) => row.forEach((v, c) => {
            if(v) board[gy+r][gx+c] = dragging.c;
        }));
        score += 20; updateScore();
        shapes = shapes.filter(s => s !== dragging);
        if(shapes.length === 0) spawn();
        checkLines();
    } else {
        dragging.x = dragging.ox; dragging.y = dragging.oy; dragging.targetScale = 0.5;
    }
    dragging = null;
});

function showGameOver() {
    document.getElementById('final-score').innerText = score;
    document.getElementById('game-over').style.display = 'flex';
}

function resetGame() {
    board = Array(GRID).fill().map(() => Array(GRID).fill(null));
    score = 0; streak = 0; updateScore();
    document.getElementById('game-over').style.display = 'none';
    spawn();
}

document.getElementById('best').innerText = `BEST: ${best}`;
spawn();
draw();
</script>
</body>
</html>
