<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kao Space Clicker</title>
    
    <style>
        :root {
            --bg-black: #050505;
            --neon-blue: #0076ff;
            --neon-glow: 0 0 20px rgba(0, 118, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-line: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 16px;
            overflow: hidden;
        }

        .header {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
        }

        .user-id {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Главный счетчик */
        .score-container {
            text-align: center;
            margin-top: 10px;
        }

        .score-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .score-value {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Кнопка-кликер с физикой */
        .clicker-box {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .click-coin {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #111 0%, #000 100%);
            border: 2px solid var(--border-line);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            position: relative;
        }

        .click-coin:active {
            transform: scale(0.95);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 118, 255, 0.2);
        }

        .coin-icon {
            font-size: 72px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        /* Вылетающий текст +1 при тапе */
        .tap-pop {
            position: absolute;
            color: var(--neon-blue);
            font-size: 24px;
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: var(--neon-glow);
        }

        /* Панель заданий (Твоя монетизация) */
        .task-panel {
            width: 100%;
            max-width: 360px;
            background: var(--card-bg);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 16px;
        }

        .task-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            transition: background 0.2s;
        }

        .task-item:active {
            background: rgba(255,255,255,0.05);
        }

        .task-info h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .task-info p {
            font-size: 11px;
            color: var(--neon-blue);
        }

        .task-reward {
            font-size: 12px;
            font-weight: 700;
            background: rgba(0, 118, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 8px;
            border-radius: 8px;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }
    </style>
</head>
<body>

    <!-- Хедер -->
    <div class="header">
        <div class="brand">KAO PROJECT</div>
        <div class="user-id">id: kaoface</div>
    </div>

    <!-- Баланс монет -->
    <div class="score-container">
        <div class="score-title">Баланс монет</div>
        <div class="score-value" id="game-balance">0</div>
    </div>

    <!-- Зона кликера -->
    <div class="clicker-box" id="click-zone">
        <div class="click-coin" id="coin-trigger">
            <div class="coin-icon">🦅</div>
        </div>
    </div>

    <!-- Квесты для трафика -->
    <div class="task-panel">
        <div class="task-title">Квесты на ускорение (Заработок)</div>
        <div class="task-list">
            
            <div class="task-item" onclick="openQuest('https://t.me/твой_канал_новости')">
                <div class="task-info">
                    <h4>Подписка на CH P | Nevinka</h4>
                    <p>Свежие новости города</p>
                </div>
                <div class="task-reward">+5,000 M</div>
            </div>

            <div class="task-item" onclick="openQuest('https://t.me/твой_шоп_аккаунты')">
                <div class="task-info">
                    <h4>Открыть Baza Shop</h4>
                    <p>Маркет цифровых товаров</p>
                </div>
                <div class="task-reward">+10,000 M</div>
            </div>

        </div>
    </div>

    <script>
        let gameState = {
            balance: parseInt(localStorage.getItem('k_bal')) || 0,
            clickPower: 1
        };

        const balanceDisplay = document.getElementById('game-balance');
        const coinTrigger = document.getElementById('coin-trigger');
        const clickZone = document.getElementById('click-zone');

        function updateDisplay() {
            balanceDisplay.innerText = gameState.balance.toLocaleString();
        }

        // Логика клика
        coinTrigger.addEventListener('click', (e) => {
            gameState.balance += gameState.clickPower;
            updateDisplay();
            localStorage.setItem('k_bal', gameState.balance);

            // Создаем красивый вылетающий текст +1 на месте клика
            createPopup(e.clientX, e.clientY);
        });

        function createPopup(x, y) {
            const pop = document.createElement('div');
            pop.className = 'tap-pop';
            pop.innerText = `+${gameState.clickPower}`;
            
            // Корректируем координаты относительно экрана
            pop.style.left = `${x - 15}px`;
            pop.style.top = `${y - 30}px`;

            document.body.appendChild(pop);

            // Удаляем элемент после завершения анимации
            setTimeout(() => {
                pop.remove();
            }, 600);
        }

        function openQuest(url) {
            window.open(url, '_blank');
            // Начисление бонуса за переход
            gameState.balance += 5000;
            updateDisplay();
            localStorage.setItem('k_bal', gameState.balance);
        }

        updateDisplay();
    </script>
</body>
</html>
