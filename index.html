<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarsCase Pro</title>
    <style>
        :root {
            --bg: #000000;
            --gold: #fcc21b;
            --blue: #248bf2;
            --card: #141414;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            user-select: none;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-pill {
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex; gap: 10px;
            font-weight: 800;
        }

        /* SCREENS */
        .screen { display: none; height: calc(100vh - 160px); overflow-y: auto; padding: 20px; }
        .screen.active { display: block; }

        /* CASE CARD */
        .case-preview {
            background: var(--card); border-radius: 32px;
            padding: 40px 20px; text-align: center;
            border: 1px solid #222; margin-top: 40px;
        }

        /* ROULETTE (ВИДЕО СТИЛЬ) */
        .roulette-wrap {
            position: relative; background: var(--gold);
            height: 140px; margin: 40px -20px;
            overflow: hidden; display: flex; align-items: center;
        }
        .track {
            display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1);
            padding-left: 50%;
        }
        .r-item { min-width: 110px; height: 110px; margin: 0 10px; display: flex; justify-content: center; }
        .r-item img { height: 100%; object-fit: contain; }

        .pointer {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            z-index: 10;
        }
        .p-top { top: 0; border-top: 25px solid #000; }
        .p-bottom { bottom: 0; border-bottom: 25px solid #000; }

        /* COINFLIP */
        .coin-box { text-align: center; margin-top: 30px; }
        .coin-img {
            width: 160px; height: 160px; margin: 0 auto 30px;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .coin-btns { display: flex; gap: 12px; margin-bottom: 20px; }
        .c-btn {
            flex: 1; padding: 18px; border-radius: 16px; border: 1px solid #333;
            background: #111; color: #fff; font-weight: bold;
        }
        .c-btn.active { border-color: var(--gold); background: rgba(252, 194, 27, 0.1); }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-win { background: #1c1c1e; width: 85%; border-radius: 32px; padding: 30px; text-align: center; }

        .btn-action {
            width: 100%; padding: 20px; border-radius: 18px; border: none;
            font-size: 16px; font-weight: 800; margin-top: 10px;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-dark { background: #2c2c2e; color: #fff; }

        /* NAV */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #080808; display: flex; border-top: 1px solid #1a1a1a;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 11px; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 20px;">Mark</div>
        <div class="balance-pill"><span id="stars">1053</span> <span style="color:var(--gold)">⭐️</span></div>
    </div>

    <div id="sc-main" class="screen active">
        <div class="case-preview" onclick="toSpin()">
            <img src="https://files.catbox.moe/u0q0z3.png" style="width: 140px;">
            <h2 style="margin: 20px 0;">ПРЕМИУМ КЕЙС</h2>
            <div style="background: #1a1a1a; padding: 12px 30px; border-radius: 16px; font-weight: bold;">149 ⭐️</div>
        </div>
    </div>

    <div id="sc-spin" class="screen">
        <div class="roulette-wrap">
            <div class="pointer p-top"></div>
            <div class="pointer p-bottom"></div>
            <div class="track" id="track"></div>
        </div>
        <button class="btn-action btn-gold" id="spin-btn">ОТКРЫТЬ ЗА 149 ⭐️</button>
    </div>

    <div id="sc-coin" class="screen">
        <div class="coin-box">
            <img src="https://files.catbox.moe/p9o4b7.png" id="coin-visual" class="coin-img">
            <div class="coin-btns">
                <button class="c-btn active" id="b-orel" onclick="selSide('orel')">ОРЕЛ</button>
                <button class="c-btn" id="b-reshka" onclick="selSide('reshka')">РЕШКА</button>
            </div>
            <button class="btn-action btn-gold" onclick="playCoin()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div id="sc-inv" class="screen">
        <h2 style="text-align: center;">ИНВЕНТАРЬ</h2>
        <div id="inv-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div class="modal" id="win-modal">
        <div class="modal-win">
            <img id="win-img" src="" style="width: 130px; margin-bottom: 20px;">
            <h2 id="win-name" style="margin: 0;">Item Name</h2>
            <p id="win-price" style="color: var(--gold); font-weight: bold;">0 ⭐️</p>
            <button class="btn-action btn-gold" onclick="sell()">ПРОДАТЬ ПРЕДМЕТ</button>
            <button class="btn-action btn-dark" onclick="keep()">ЗАКРЫТЬ (В ИНВЕНТАРЬ)</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('main', this)">🏠<br>ГЛАВНАЯ</div>
        <div class="nav-item" onclick="showTab('coin', this)">🪙<br>ОРЕЛ/РЕШКА</div>
        <div class="nav-item" onclick="showTab('inv', this)">🎒<br>ИНВЕНТАРЬ</div>
    </nav>

<script>
    const ITEMS = [
        { name: "Mini Oscar", price: 20887, img: "https://files.catbox.moe/u0q0z3.png" },
        { name: "Diamond Ring", price: 5210, img: "https://files.catbox.moe/p9o4b7.png" },
        { name: "Bling Binky", price: 6290, img: "https://files.catbox.moe/7x7v2n.png" }
    ];

    let balance = 1053;
    let inventory = [];
    let curSide = 'orel';
    let lastDrop = null;

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        document.getElementById('sc-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'inv') renderInv();
    }

    function toSpin() {
        showTab('spin', document.querySelectorAll('.nav-item')[0]);
        const track = document.getElementById('track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        track.innerHTML = '';
        for(let i=0; i<60; i++) {
            const it = ITEMS[Math.floor(Math.random() * ITEMS.length)];
            track.innerHTML += `<div class="r-item"><img src="${it.img}"></div>`;
        }
    }

    document.getElementById('spin-btn').onclick = () => {
        if(balance < 149) return alert("Мало звёзд!");
        balance -= 149; updateUI();
        
        const winIdx = 50;
        lastDrop = ITEMS[Math.floor(Math.random() * ITEMS.length)];
        const track = document.getElementById('track');
        track.querySelectorAll('.r-item')[winIdx].innerHTML = `<img src="${lastDrop.img}">`;
        
        track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
        track.style.transform = `translateX(-${winIdx * 130}px)`;

        setTimeout(() => {
            document.getElementById('win-img').src = lastDrop.img;
            document.getElementById('win-name').innerText = lastDrop.name;
            document.getElementById('win-price').innerText = lastDrop.price + " ⭐️";
            document.getElementById('win-modal').style.display = 'flex';
        }, 5500);
    };

    function selSide(s) {
        curSide = s;
        document.getElementById('b-orel').classList.toggle('active', s === 'orel');
        document.getElementById('b-reshka').classList.toggle('active', s === 'reshka');
    }

    function playCoin() {
        const visual = document.getElementById('coin-visual');
        visual.style.transform = "rotateY(720deg) scale(1.1)";
        setTimeout(() => {
            const win = Math.random() > 0.5;
            visual.style.transform = "rotateY(0deg) scale(1)";
            alert(win ? "Победа!" : "Проигрыш!");
        }, 600);
    }

    function sell() { balance += lastDrop.price; closeWin(); }
    function keep() { inventory.push(lastDrop); closeWin(); }
    function closeWin() { document.getElementById('win-modal').style.display = 'none'; updateUI(); showTab('main', document.querySelectorAll('.nav-item')[0]); }
    function updateUI() { document.getElementById('stars').innerText = balance; }
    function renderInv() {
        const g = document.getElementById('inv-grid');
        g.innerHTML = inventory.map(i => `
            <div style="background:#111; padding:20px; border-radius:20px; text-align:center; border:1px solid #222;">
                <img src="${i.img}" style="width:70px;">
                <div style="font-size:12px; margin-top:10px;">${i.name}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
