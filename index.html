<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Stars NFT Case</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #181c22;
            --accent: #0088cc;
            --star-gold: #febd2d;
            --common: #8e8e93;
            --rare: #007aff;
            --epic: #af52de;
            --legendary: #ff9500;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Шапка с балансом */
        .header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .balance-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            border: 1px solid rgba(254, 189, 45, 0.3);
        }

        /* Контейнер рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 160px;
            margin: 40px 0;
            background: var(--card-bg);
            border-top: 2px solid #2c3139;
            border-bottom: 2px solid #2c3139;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Указатель (центр рулетки) */
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--star-gold);
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--star-gold);
        }

        .roulette-track {
            display: flex;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            will-change: transform;
        }

        .item {
            min-width: 120px;
            height: 120px;
            margin: 10px;
            background: #232931;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--common);
        }

        .item img { width: 60px; height: 60px; object-fit: contain; }
        
        /* Цвета редкости */
        .item.common { border-color: var(--common); }
        .item.rare { border-color: var(--rare); }
        .item.epic { border-color: var(--epic); }
        .item.legendary { border-color: var(--legendary); background: radial-gradient(circle, #3d2f1a 0%, #232931 100%); }

        /* Кнопки */
        .controls {
            text-align: center;
            margin-bottom: 40px;
        }

        .btn-open {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }

        .btn-open:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
        .btn-open:active { transform: scale(0.95); }

        /* Инвентарь */
        .inventory-title { width: 90%; max-width: 500px; margin-bottom: 15px; }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            width: 90%;
            max-width: 500px;
            padding-bottom: 50px;
        }

        .inv-item {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #2c3139;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Эффект победы */
        .win-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Baza Shop NFT</h2>
        <div class="balance-badge">
            <span id="stars-balance">1000</span> <span style="color:var(--star-gold)">⭐️</span>
        </div>
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <div class="controls">
        <button class="btn-open" id="spin-btn">Открыть за 100 ⭐️</button>
        <p id="status-msg" style="color: #888; margin-top: 15px;">Испытай удачу!</p>
    </div>

    <h3 class="inventory-title">Твои NFT</h3>
    <div class="inventory-grid" id="inventory"></div>

    <div class="win-overlay" id="win-screen">
        <h1 style="color: var(--star-gold);">ПОЗДРАВЛЯЕМ!</h1>
        <div id="win-card-container"></div>
        <button class="btn-open" style="margin-top:20px;" onclick="closeWin()">Забрать</button>
    </div>

    <script>
        const itemsData = [
            { id: 1, name: "Chill Flame", img: "🔥", rarity: "common", price: 50, chance: 60 },
            { id: 2, name: "L.A. Torch", img: "🔦", rarity: "rare", price: 150, chance: 25 },
            { id: 3, name: "Lava Lamp", img: "🌋", rarity: "epic", price: 400, chance: 10 },
            { id: 4, name: "Crypto King", img: "👑", rarity: "legendary", price: 1500, chance: 5 }
        ];

        let stars = 1000;
        const track = document.getElementById('track');
        const btn = document.getElementById('spin-btn');
        const balanceEl = document.getElementById('stars-balance');
        const invGrid = document.getElementById('inventory');

        // Создание элементов для рулетки
        function createTrackItems() {
            track.innerHTML = '';
            // Создаем 50 элементов для эффекта долгой прокрутки
            for (let i = 0; i < 60; i++) {
                const randomItem = itemsData[Math.floor(Math.random() * itemsData.length)];
                const div = document.createElement('div');
                div.className = `item ${randomItem.rarity}`;
                div.innerHTML = `<span style="font-size:40px">${randomItem.img}</span>`;
                track.appendChild(div);
            }
        }

        function spin() {
            if (stars < 100) return;

            stars -= 100;
            balanceEl.innerText = stars;
            btn.disabled = true;
            
            createTrackItems();
            
            // Определяем, что выпадет (математика шансов)
            const rand = Math.random() * 100;
            let cumulative = 0;
            let winningNFT = itemsData[0];
            for (let item of itemsData) {
                cumulative += item.chance;
                if (rand <= cumulative) {
                    winningNFT = item;
                    break;
                }
            }

            // Заменяем 55-й элемент в рулетке на наш выигрышный
            const targetIndex = 55; 
            const items = track.querySelectorAll('.item');
            items[targetIndex].className = `item ${winningNFT.rarity}`;
            items[targetIndex].innerHTML = `<span style="font-size:40px">${winningNFT.img}</span>`;

            // Расчет смещения (120px ширина + 20px margin)
            const itemWidth = 140;
            const centerOffset = (window.innerWidth > 600 ? 600 : window.innerWidth) / 2;
            const finalPosition = (targetIndex * itemWidth) - centerOffset + (itemWidth / 2);

            track.style.transition = '5s cubic-bezier(0.15, 0, 0.15, 1)';
            track.style.transform = `translateX(-${finalPosition}px)`;

            // Финал анимации
            setTimeout(() => {
                showWin(winningNFT);
                addToInventory(winningNFT);
                btn.disabled = false;
                // Сброс позиции без анимации для следующего раза
                track.style.transition = 'none';
            }, 5500);
        }

        function showWin(nft) {
            const winScreen = document.getElementById('win-screen');
            const container = document.getElementById('win-card-container');
            container.innerHTML = `
                <div class="item ${nft.rarity}" style="width:200px; height:200px; transform:scale(1.2)">
                    <span style="font-size:80px">${nft.img}</span>
                    <p>${nft.name}</p>
                </div>
            `;
            winScreen.style.display = 'flex';
        }

        function closeWin() {
            document.getElementById('win-screen').style.display = 'none';
            track.style.transform = `translateX(0)`;
        }

        function addToInventory(nft) {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.innerHTML = `
                <div style="font-size:24px">${nft.img}</div>
                <div>${nft.name}</div>
                <div style="color:var(--star-gold); font-size:10px; margin-top:5px;">+${nft.price} ⭐️</div>
            `;
            invGrid.prepend(div);
        }

        btn.addEventListener('click', spin);
        createTrackItems(); // Начальное заполнение
    </script>
</body>
</html>
