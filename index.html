<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Custom Drone Integration</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --glow-ua: #00f2fe;
            --glow-ru: #ff0055;
            --glow-pvo: #38bdf8;
            --bg-cyber: rgba(10, 15, 30, 0.85);
            --border-cyber: 1px solid rgba(56, 189, 248, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            background: #060913; color: #00f2fe; -webkit-user-select: none; user-select: none;
        }
        
        #viewport-wrapper { width: 100%; height: 100%; transition: transform 0.1s ease; }
        #map { width: 100%; height: 100%; background: #05070f; }
        
        #monitor-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
        }

        /* Экран выбора фракции */
        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070f; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: var(--bg-cyber); border: 1px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15); border-radius: 4px; padding: 30px;
            text-align: center; max-width: 400px; width: 100%; backdrop-filter: blur(10px);
        }
        .faction-btn {
            background: transparent; border: 1px solid var(--glow-ua); padding: 14px;
            color: var(--glow-ua); font-size: 12px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; letter-spacing: 2px; font-family: inherit; transition: all 0.3s;
        }
        .faction-btn:hover { background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 20px var(--glow-ua); }

        /* HUD */
        #hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
            background: var(--bg-cyber); border: var(--border-cyber);
            backdrop-filter: blur(12px); border-radius: 4px; padding: 12px; font-size: 11px; pointer-events: none;
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .hud-value { font-weight: bold; color: #fff; text-shadow: 0 0 8px var(--glow-ua); }
        .hp-bar-container { width: 100%; background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; overflow: hidden; margin-top: 3px; }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.5s; }
        .hp-player { background: var(--glow-ua); }
        .hp-enemy { background: var(--glow-ru); }

        /* Логгер */
        #log-container {
            position: absolute; bottom: 185px; left: 12px; right: 12px; z-index: 1010;
            background: var(--bg-cyber); border: var(--border-cyber); border-radius: 4px; overflow: hidden;
        }
        #log-header {
            background: rgba(255,255,255,0.03); padding: 8px 12px; font-size: 10px; font-weight: bold;
            color: #64748b; border-bottom: var(--border-cyber); cursor: pointer; display: flex; justify-content: space-between;
        }
        #log-panel { height: 60px; padding: 6px 12px; font-size: 10px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 2px; color: var(--glow-ua); }
        .log-entry.enemy { color: var(--glow-ru); }

        /* Управление */
        #control-panel { position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn {
            background: rgba(15, 23, 42, 0.7); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
            padding: 13px 4px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; font-family: inherit;
        }
        .btn.active { background: rgba(0, 242, 254, 0.1); color: #fff; border-color: var(--glow-ua); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .btn.disabled { opacity: 0.15; cursor: not-allowed; }
        .btn-orange { border-color: rgba(249, 115, 22, 0.4); color: #f97316; }
        .btn-orange.active { background: rgba(249,115,22,0.15); border-color: #f97316; box-shadow: 0 0 15px #f97316; }

        /* СТИЛИЗАЦИЯ ВСТРОЕННОЙ ИЗ Скриншота PNG КАРТИНКИ */
        .custom-png-drone-ru {
            width: 32px;
            height: 32px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* Из-за того что дрон на исходном фото наклонен влево-вверх, добавляем базовую компенсацию -45 градусов */
            transform-origin: center center;
        }

        /* Дефолтный синий маркер для UA, если картинки нет */
        .neon-uav-player {
            width: 0; height: 0;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 14px solid var(--glow-ua);
            filter: drop-shadow(0 0 5px var(--glow-ua));
        }

        .city-marker {
            background: rgba(6, 9, 19, 0.85); border: 1px solid rgba(56, 189, 248, 0.4);
            color: #e2e8f0; font-size: 9px; font-weight: bold; border-radius: 2px; padding: 3px 6px; white-space: nowrap;
        }
        .city-marker.enemy { border-color: rgba(255, 0, 85, 0.4); color: #fecdd3; }
        .build-marker { background: #060913; border: 1px solid var(--glow-pvo); color: var(--glow-pvo); font-size: 8px; padding: 0 2px; }
    </style>
</head>
<body>

    <div id="monitor-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h2 style="letter-spacing: 2px; margin: 0 0 20px 0; font-size: 14px; color: #fff;">ВЫБОР КОМАНДНОГО ПУНКТА</h2>
            <button class="faction-btn" onclick="selectFaction('UA')">СТОРОНА А [СИННИЕ]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:var(--glow-ru); color:var(--glow-ru);">СТОРОНА Б [КРАСНЫЕ]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>БАЛАНС: <span id="txt-money" class="hud-value">600</span>$</div>
                <div>АНГАР БПЛА: <span id="txt-drones" class="hud-value">0</span> ЕД</div>
            </div>
            <div class="hud-row" style="margin-top: 4px;">
                <div style="width: 48%;">
                    <div style="font-size:9px; color:#64748b;">СТРУКТУРА БАЗ: <span id="lbl-hp">100%</span></div>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player"></div></div>
                </div>
                <div style="width: 48%; text-align: right;">
                    <div style="font-size:9px; color:#64748b;">ЦЕЛИ ПРОТИВНИКА: <span id="lbl-enemy-hp">100%</span></div>
                    <div class="hp-bar-container" style="margin-left: auto;"><div id="bar-enemy" class="hp-bar-fill hp-enemy"></div></div>
                </div>
            </div>
        </div>

        <div id="log-container">
            <div id="log-header">
                <span>📟 МОНИТОР СЕТИ РАДАРОВ</span>
            </div>
            <div id="log-panel"></div>
        </div>

        <div id="control-panel">
            <div class="btn-row">
                <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] СБОРОЧНЫЙ ЗАВ ($400)</button>
                <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] БАТАРЕЯ ПВО ($500)</button>
            </div>
            <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 ЗАПУСТИТЬ ПАРУ БПЛА (-$150)</button>
        </div>

        <div id="map"></div>
    </div>
