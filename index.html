<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Mining Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #000000;
            --card-gray: #0b0c0e;
            --border-soft: rgba(255, 255, 255, 0.04);
            --accent-blue: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text-white: #ffffff;
            --text-muted: #6e6e73;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            overflow: hidden;
        }

        .app-wrapper {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            justify-content: space-between;
        }

        /* Верхняя панель статуса */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
        }

        .network-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: #30d158;
            border-radius: 50%;
            box-shadow: 0 0 8px #30d158;
        }

        .version {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Главный блок баланса (Дорогой минимализм) */
        .main-balance-card {
            background: linear-gradient(180deg, #07080a 0%, var(--card-gray) 100%);
            border: 1px solid var(--border-soft);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin-top: 10px;
        }

        .balance-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .balance-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .star-icon {
            color: #ffb800;
            font-size: 38px;
            text-shadow: 0 0 20px rgba(255, 184, 0, 0.3);
        }

        .income-rate {
            font-size: 14px;
            font-weight: 500;
            color: #30d158;
            background: rgba(48, 209, 88, 0.06);
            padding: 6px 14px;
            border-radius: 100px;
            display: inline-block;
        }

        /* Центральный простой блок управления */
        .mining-control-panel {
            background: var(--card-gray);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-white);
        }

        .panel-status {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        /* Основные кнопки действий */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: var(--text-white);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:active {
            transform: scale(0.98);
            background-color: #0066d6;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-white);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 8px;
        }

        .btn-outline:active {
            background: rgba(255,255,255,0.02);
        }

        /* Сноска о безопасности */
        .info-footer {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            padding: 0 8px;
            margin-bottom: 20px;
        }

        /* Анимация плавного свечения карты */
        @keyframes pulseBorder {
            0% { border-color: var(--border-soft); }
            50% { border-color: rgba(0, 122, 255, 0.15); }
            100% { border-color: var(--border-soft); }
        }
        
        .main-balance-card {
            animation: pulseBorder 4s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- Верхняя инфо-панель -->
        <div class="status-header">
            <div class="network-status">
                <div class="live-dot"></div>
                <span>Сервер: Активен</span>
            </div>
            <div class="version">Secure Connection</div>
        </div>

        <!-- Секция Баланса -->
        <div class="main-balance-card">
            <div class="balance-label">Текущий баланс звезд</div>
            <div class="balance-value">
                <span class="star-icon">★</span>
                <span id="balance-text">0.0000</span>
            </div>
            <div class="income-rate" id="speed-badge">Скорость: +0.0000 ★/сек</div>
        </div>

        <!-- Простая панель управления майнингом -->
        <div class="mining-control-panel">
            <div class="panel-info">
                <div class="panel-title">Управление мощностью</div>
                <div class="panel-status" id="status-text">Остановлен</div>
            </div>
            
            <!-- Одна понятная кнопка включения/прокачки -->
            <button class="btn btn-primary" id="action-btn" onclick="handleMiningButton()">Запустить майнинг-сервер</button>
        </div>

        <!-- Нижний блок вывода и правил -->
        <div>
            <button class="btn btn-outline" onclick="requestWithdraw()">Вывести на Telegram Wallet</button>
            <div style="height: 16px;"></div>
            <div class="info-footer">
                Минимальный лимит на обработку транзакции смарт-контракта составляет 50 ★. Начисление происходит в фоновом режиме на базе выделенных мощностей Telegram WebApps.
            </div>
        </div>

    </div>

    <script>
        // Простая и понятная логика данных
        let userAsset = {
            balance: parseFloat(localStorage.getItem('p_star_bal')) || 0.0000,
            speed: parseFloat(localStorage.getItem('p_star_spd')) || 0.0000,
            isActive: localStorage.getItem('p_star_active') === 'true'
        };

        const balanceText = document.getElementById('balance-text');
        const speedBadge = document.getElementById('speed-badge');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');

        // Константы для симуляции (Сделано намного медленнее)
        const baseMiningSpeed = 0.0015; // Медленная скорость начисления в секунду

        function updateDisplay() {
            balanceText.innerText = userAsset.balance.toFixed(4);
            
            if (userAsset.isActive) {
                speedBadge.innerText = `Скорость: +${baseMiningSpeed.toFixed(4)} ★/сек`;
                speedBadge.style.color = "#30d158";
                speedBadge.style.background = "rgba(48, 209, 88, 0.06)";
                actionBtn.innerText = "Сервер работает (Увеличить хэшрейт)";
                statusText.innerText = "В СЕТИ";
                statusText.style.color = "#30d158";
            } else {
                speedBadge.innerText = "Майнинг приостановлен";
                speedBadge.style.color = "var(--text-muted)";
                speedBadge.style.background = "rgba(255,255,255,0.02)";
                actionBtn.innerText = "Запустить майнинг-сервер";
                statusText.innerText = "Остановлен";
                statusText.style.color = "var(--text-muted)";
            }
        }

        function handleMiningButton() {
            if (!userAsset.isActive) {
                // Если был выключен — включаем
                userAsset.isActive = true;
                userAsset.speed = baseMiningSpeed;
            } else {
                // Если уже включен — имитируем улучшение / масштабирование
                alert("Для увеличения базовой скорости майнинга требуется привязка активного Telegram Premium аккаунта пула.");
            }
            saveState();
            updateDisplay();
        }

        // Плавное, медленное обновление баланса (раз в секунду, чтобы цифры шли весомо)
        setInterval(() => {
            if (userAsset.isActive) {
                userAsset.balance += baseMiningSpeed;
                updateDisplay();
                saveState();
            }
        }, 1000);

        function requestWithdraw() {
            if (userAsset.balance < 50) {
                alert(`Ошибка верификации транзакции.\n\nМинимальный лимит на вывод: 50.0000 ★\nВаш текущий баланс: ${userAsset.balance.toFixed(4)} ★\n\nПродолжайте майнинг до достижения лимита.`);
            } else {
                alert(`Запрос на вывод ${userAsset.balance.toFixed(4)} ★ отправлен в процессинг Telegram Wallet. Ожидайте подтверждения сети.`);
                userAsset.balance = 0;
                userAsset.isActive = false;
                userAsset.speed = 0;
                saveState();
                updateDisplay();
            }
        }

        function saveState() {
            localStorage.setItem('p_star_bal', userAsset.balance);
            localStorage.setItem('p_star_spd', userAsset.speed);
            localStorage.setItem('p_star_active', userAsset.isActive);
        }

        // Инициализация при загрузке
        updateDisplay();
    </script>
</body>
</html>
