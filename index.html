<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Elite APK</title>
    <style>
        :root { --bg: #050509; --panel: rgba(11, 11, 20, 0.95); --violet: #a78bfa; --gold: #ffd700; --rainbow: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); }
        body { 
            background: var(--bg); color: white; display: flex; flex-direction: column; 
            align-items: center; font-family: -apple-system, sans-serif; margin: 0; 
            overflow: hidden; touch-action: none; height: 100vh; width: 100vw;
        }

        /* --- ЗАСТАВКА С ИКОНКОЙ --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .icon-main {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 18px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
            animation: iconFloat 2s infinite ease-in-out;
        }
        .splash-title {
            margin-top: 30px; font-size: 28px; font-weight: 900; letter-spacing: 5px;
            color: var(--gold); text-transform: uppercase;
        }
        @keyframes iconFloat {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-15px); }
        }

        /* --- ХИРУРГИЧЕСКОЕ ОБНОВЛЕНИЕ: РАДУЖНОЕ СИЯНИЕ --- */
        .grid-clear-line {
            position: relative;
        }
        .grid-clear-line::after {
            content: ''; position: absolute; inset: -5px;
            background: var(--rainbow);
            filter: blur(15px); opacity: 0; z-index: 5;
            transition: opacity 0.1s;
        }
        .grid-clear-line.active::after {
            opacity: 0.6; animation: rainbowFade 0.4s forwards;
        }

        @keyframes rainbowFade {
            0% { opacity: 0.6; }
            100% { opacity: 0; }
        }

        /* --- ХИРУРГИЧЕСКОЕ ОБНОВЛЕНИЕ: КОМБО ТЕКСТ --- */
        #combo-popup {
            position: fixed; top: 30%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 48px; font-weight: 900;
            background: var(--rainbow);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; z-index: 200; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #combo-popup.active {
            opacity: 1; transform: translate(-50%, -50%) scale(1);
        }

        #ambient-bg { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(109,40,217,0.15), transparent 40%); }
        #header { margin-top: env(safe-area-inset-top, 20px); text-align: center; width: 100%; }
        #score { font-size: 64px; font-weight: 900; background: linear-gradient(#fff, var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        canvas { 
            background: var(--panel); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.05); max-width: 95vw; margin-top: 5px;
        }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .btn { background: #6d28d9; border: none; padding: 15px 40px; color: white; font-size: 18px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="splash">
        <div class="icon-main"></div>
        <div class="splash-title">Block Snap</div>
    </div>

    <div id="combo-popup">COMBO x2</div>

    <div id="ambient-bg"></div>
    <div id="header">
        <div id="score">0</div>
        <div style="font-size: 12px; opacity: 0.4;">BEST: <span id="best-val">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="game-over">
        <h1 style="color: #ff4d4d;">ФИНИШ</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 900; margin-bottom: 20px;">0</div>
        <button class="btn" onclick="resetGame()">ЗАНОВО</button>
    </div>

<script>
// ЗАПУСК И ЗАСТАВКА
window.addEventListener('load', () => {
    setTimeout(() => {
        const s = document.getElementById('splash');
        s.style.opacity = '0';
        setTimeout(() => s.style.visibility = 'hidden', 800);
    }, 2000);
});

// ЗВУКОВОЙ ДВИЖОК
const AudioEngine = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        try {
            this.init(); const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
            osc.connect(g); g.connect(this.ctx.destination);
            if(type==='pick'){ osc.frequency.setValueAtTime(400,now); g.gain.setValueAtTime(0.1,now); g.gain.linearRampToValueAtTime(0,now+0.1); osc.start(); osc.stop(now+0.1); }
            if(type==='place'){ osc.type='triangle'; osc.frequency.setValueAtTime(150,now); g.gain.setValueAtTime(0.2,now); g.gain.linearRampToValueAtTime(0,now+0.1); osc.start(); osc.stop(now+0.1); }
            if(type==='clear'){ osc.frequency.setValueAtTime(800,now); g.gain.setValueAtTime(0.1,now); g.gain.linearRampToValueAtTime(0,now+0.3); osc.start(); osc.stop(now+0.3); }
        } catch(e){}
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 8;
let CELL = Math.floor(window.innerWidth * 0.11);
const GAP = 5, BOARD_PAD = 10;
canvas.width = (CELL + GAP) * GRID + BOARD_PAD * 2;
canvas.height = canvas.width + 150;

let score = 0, best = localStorage.getItem('bb_apk_best') || 0;
document.getElementById('best-val').innerText = best;
let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [], dragging = null, dragOff = {x:0, y:0}, dragStartTime = 0, bestMove = null;

const COLORS = { r: "#ff4d4d", g: "#4ade80", b: "#3b82f6", y: "#facc15", p: "#a855f7", c: "#22d3ee", o: "#fb923c" };

// ХИРУРГИЧЕСКОЕ ОБНОВЛЕНИЕ: ДОБАВЛЯЕМ ЛИНИЮ-ФЕЙК ДЛЯ ЭФФЕКТОВ
function createClearEffectLine() {
    const line = document.createElement('div');
    line.className = 'grid-clear-line';
    line.style.position = 'fixed';
    line.style.pointerEvents = 'none';
    line.style.zIndex = '4';
    document.body.appendChild(line);
    return line;
}
const clearLineEffect = createClearEffectLine();

function drawBlock(x, y, size, colorKey, alpha = 1, special = null) {
    ctx.save(); ctx.globalAlpha = alpha;
    if(special==='hint'){ ctx.shadowBlur=15; ctx.shadowColor="#ffd700"; ctx.fillStyle="rgba(255,215,0,0.4)"; }
    else if(special==='danger'){ ctx.fillStyle="rgba(255, 77, 77, 0.5)"; }
    else { ctx.fillStyle = COLORS[colorKey]; }
    ctx.beginPath(); ctx.roundRect(x, y, size, size, 8); ctx.fill(); ctx.restore();
}

function findBestMove(shape) {
    let maxL = -1; let target = null;
    for(let r=0; r<=GRID-shape.m.length; r++) {
        for(let c=0; c<=GRID-shape.m[0].length; c++) {
            if(canPlace(shape, c, r)) {
                let l = simulateLines(shape, c, r);
                if(l > maxL) { maxL = l; target = {x:c, y:r}; }
            }
        }
    }
    return { pos: target };
}

function simulateLines(sh, gx, gy) {
    let t = board.map(row => [...row]);
    sh.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v) t[gy+r][gx+c]='t'; }));
    let cnt = 0;
    for(let r=0; r<GRID; r++) if(t[r].every(v=>v)) cnt++;
    for(let c=0; c<GRID; c++) if(t.every(r=>r[c])) cnt++;
    return cnt;
}

function spawn() {
    shapes = []; const step = canvas.width/3;
    const defs = [{m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1,1]], c:'b'}, {m:[[1,1,1]], c:'c'}, {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'}];
    for(let i=0; i<3; i++) {
        let p = defs[Math.floor(Math.random()*defs.length)];
        let w = p.m[0].length*(CELL*0.5);
        shapes.push({ ...p, x:(step*i)+(step-w)/2, y:canvas.height-110, ox:(step*i)+(step-w)/2, oy:canvas.height-110, scale:0.5, targetScale:0.5 });
    }
    checkGameOver();
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    for(let r=0; r<GRID; r++) for(let c=0; c<GRID; c++) {
        let bx=BOARD_PAD+c*(CELL+GAP), by=BOARD_PAD+r*(CELL+GAP);
        if(board[r][c]) drawBlock(bx, by, CELL, board[r][c]);
        else { ctx.fillStyle="rgba(255,255,255,0.03)"; ctx.beginPath(); ctx.roundRect(bx, by, CELL, CELL, 8); ctx.fill(); }
    }
    if(dragging) {
        let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
        let canBe = findBestMove(dragging).pos !== null;
        if(Date.now()-dragStartTime > 1500 && bestMove?.pos) {
            let p = Math.abs(Math.sin(Date.now()/200))*0.3;
            dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(BOARD_PAD+(bestMove.pos.x+ci)*(CELL+GAP), BOARD_PAD+(bestMove.pos.y+ri)*(CELL+GAP), CELL, dragging.c, 0.2+p, 'hint'); }));
        }
        if(canPlace(dragging, gx, gy)) {
            dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(BOARD_PAD+(gx+ci)*(CELL+GAP), BOARD_PAD+(gy+ri)*(CELL+GAP), CELL, dragging.c, 0.3); }));
        }
        dragging.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(dragging.x+ci*(CELL+GAP), dragging.y+ri*(CELL+GAP), CELL, dragging.c, 1, canBe?null:'danger'); }));
    }
    shapes.forEach(s => { if(s!==dragging) { s.scale+=(s.targetScale-s.scale)*0.2; let sz=CELL*s.scale, g=GAP*s.scale; s.m.forEach((row,ri)=>row.forEach((v,ci)=>{ if(v) drawBlock(s.x+ci*(sz+g), s.y+ri*(sz+g), sz, s.c); })); } });
    requestAnimationFrame(draw);
}

function canPlace(sh, gx, gy) {
    if(gx<0 || gy<0 || gx+sh.m[0].length>GRID || gy+sh.m.length>GRID) return false;
    for(let r=0; r<sh.m.length; r++) for(let c=0; c<sh.m[0].length; c++) if(sh.m[r][c] && board[gy+r][gx+c]) return false;
    return true;
}

const getP = e => {
    let r=canvas.getBoundingClientRect(); let cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*(canvas.width/r.width), y:(cy-r.top)*(canvas.height/r.height) };
};

canvas.addEventListener('touchstart', e => {
    let p=getP(e); AudioEngine.init();
    shapes.forEach(s => { if(p.x>s.x-20 && p.x<s.x+80 && p.y>s.y-20 && p.y<s.y+100) { dragging=s; s.targetScale=1; dragOff={x:p.x-s.x, y:p.y-s.y}; dragStartTime=Date.now(); bestMove=findBestMove(s); AudioEngine.play('pick'); if(navigator.vibrate) navigator.vibrate(10); } });
});

window.addEventListener('touchmove', e => {
    if(dragging){
        if(e.cancelable) e.preventDefault();
        let p=getP(e); let tx=p.x-dragOff.x, ty=p.y-dragOff.y;
        let gx=Math.round((tx-BOARD_PAD)/(CELL+GAP)), gy=Math.round((ty-BOARD_PAD)/(CELL+GAP));
        if(canPlace(dragging, gx, gy)) { dragging.x += (BOARD_PAD+gx*(CELL+GAP)-dragging.x)*0.3; dragging.y += (BOARD_PAD+gy*(CELL+GAP)-dragging.y)*0.3; }
        else { dragging.x=tx; dragging.y=ty; }
    }
}, {passive:false});

window.addEventListener('touchend', () => {
    if(!dragging) return;
    let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
    if(canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v) board[gy+r][gx+c]=dragging.c; }));
        AudioEngine.play('place'); if(navigator.vibrate) navigator.vibrate(30);
        score+=20; updateS(); shapes=shapes.filter(s=>s!==dragging); if(shapes.length===0) spawn();
        checkL(); checkGameOver();
    } else { dragging.x=dragging.ox; dragging.y=dragging.oy; dragging.targetScale=0.5; }
    dragging=null;
});

function checkL() {
    let rc=[], cc=[];
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rc.push(r);
    for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cc.push(c);
    
    // ХИРУРГИЧЕСКОЕ ОБНОВЛЕНИЕ: КОМБО ЭФФЕКТЫ
    const comboText = document.getElementById('combo-popup');
    if(rc.length > 1 || cc.length > 1 || (rc.length + cc.length) > 1) {
        let totalLines = rc.length + cc.length;
        comboText.innerText = `COMBO x${totalLines}`;
        comboText.classList.add('active');
        setTimeout(() => comboText.classList.remove('active'), 600);
        if(navigator.vibrate) navigator.vibrate([70, 40, 70]);
    }

    if(rc.length || cc.length) {
        AudioEngine.play('clear');
        const rect = canvas.getBoundingClientRect();

        rc.forEach(r => {
            // Эффект радужного сияния
            const by = rect.top + BOARD_PAD + r*(CELL+GAP);
            clearLineEffect.style.left = rect.left+'px';
            clearLineEffect.style.top = by+'px';
            clearLineEffect.style.width = rect.width+'px';
            clearLineEffect.style.height = CELL+'px';
            clearLineEffect.classList.add('active');
            setTimeout(() => clearLineEffect.classList.remove('active'), 400);

            board[r].fill(null);
        });
        
        cc.forEach(c => board.forEach(r => r[c]=null));
        
        score += (rc.length+cc.length)*150; updateS();
    }
}
function updateS() { document.getElementById('score').innerText=score; if(score>best){ best=score; localStorage.setItem('bb_apk_best', best); document.getElementById('best-val').innerText=best; } }
function checkGameOver() { if(shapes.length>0 && !shapes.some(s=>findBestMove(s).pos!==null)) document.getElementById('game-over').style.display='flex'; }
function resetGame() { board=board.map(r=>r.fill(null)); score=0; updateS(); document.getElementById('game-over').style.display='none'; spawn(); }

spawn(); draw();
</script>
</body>
</html>
