<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarsCase Pro</title>
    <style>
        :root {
            --bg: #080a0d;
            --card: #111419;
            --blue: #248bf2;
            --gold: #febd2d;
            --text: #ffffff;
            --hint: #6c7683;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-pill {
            background: #161b22;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #2d343d;
            display: flex; gap: 12px;
            font-weight: 800;
        }

        /* SCREENS */
        .screen { display: none; height: calc(100vh - 150px); overflow-y: auto; padding: 20px; }
        .screen.active { display: block; }

        /* CASE CARD (image_11.png style) */
        .case-box {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border: 1px solid #232a35;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .case-img { width: 180px; filter: drop-shadow(0 0 30px rgba(36,139,242,0.4)); }

        .price-btn {
            background: #1a1f26;
            padding: 12px 40px;
            border-radius: 16px;
            border: 1px solid #2d343d;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }

        /* COINFLIP (image_12.png style) */
        .coin-area { text-align: center; margin-top: 40px; }
        .coin {
            width: 150px; height: 150px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px;
            box-shadow: 0 0 40px rgba(254,189,45,0.3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .coin-btns { display: flex; gap: 15px; margin: 20px 0; }
        .side-btn {
            flex: 1; padding: 15px; border-radius: 15px;
            border: 1px solid #333; background: #161b22; color: white;
            font-weight: bold; cursor: pointer;
        }
        .side-btn.selected { border-color: var(--blue); background: rgba(36,139,242,0.1); }

        .bet-input {
            width: 100%; background: #161b22; border: 1px solid #333;
            padding: 15px; border-radius: 15px; color: white;
            text-align: center; font-size: 18px; margin-bottom: 15px;
        }

        /* INVENTORY */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .inv-item {
            background: var(--card); border: 1px solid #2d343d;
            border-radius: 20px; padding: 15px; text-align: center;
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: flex-end; z-index: 1000;
        }

        .modal-content {
            background: var(--bg); width: 100%; padding: 30px;
            border-radius: 30px 30px 0 0; border-top: 1px solid #333;
        }

        .btn-blue {
            width: 100%; padding: 20px; border-radius: 20px;
            background: var(--blue); border: none; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* NAV */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222;
        }

        .nav-item { color: var(--hint); text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; letter-spacing: 1px;">MARK</div>
        <div class="balance-pill">
            <span id="stars">1000</span> <span style="color:var(--gold)">⭐️</span>
        </div>
    </div>

    <div id="sc-cases" class="screen active">
        <div class="case-box" onclick="startOpening()">
            <img src="https://i.imgur.com/8QG3j8G.png" class="case-img">
            <div style="font-weight: 900; font-size: 20px; margin-top: 15px;">ПРЕМИУМ КЕЙС</div>
            <div class="price-btn">149 ⭐️</div>
        </div>
    </div>

    <div id="sc-coin" class="screen">
        <div class="coin-area">
            <div class="coin" id="coin-obj">🦅</div>
            <input type="number" class="bet-input" id="bet-amount" placeholder="Сумма ставки">
            <div class="coin-btns">
                <button class="side-btn" id="btn-heads" onclick="selectSide('heads')">ОРЕЛ</button>
                <button class="side-btn" id="btn-tails" onclick="selectSide('tails')">РЕШКА</button>
            </div>
            <button class="btn-blue" onclick="playCoin()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div id="sc-inv" class="screen">
        <h2 style="margin-bottom: 20px;">Мой инвентарь</h2>
        <div class="inv-grid" id="inv-grid"></div>
    </div>

    <div class="modal" id="drop-modal">
        <div class="modal-content">
            <div id="drop-icon" style="font-size: 80px; text-align: center; margin-bottom: 20px;">🔥</div>
            <h2 id="drop-name" style="text-align: center; margin: 0;">Chill Flame</h2>
            <div style="height: 1px; background: #333; margin: 20px 0;"></div>
            <button class="btn-blue" style="background: #fff; color: #000; margin-bottom: 10px;" onclick="sellDropped()">ПРОДАТЬ ЗА <span id="drop-price">381</span> ⭐️</button>
            <button class="btn-blue" style="background: transparent; border: 1px solid #333;" onclick="keepDropped()">ОСТАВИТЬ</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('cases', this)">🏠<br>ГЛАВНАЯ</div>
        <div class="nav-item" onclick="showTab('coin', this)">🪙<br>ОРЕЛ/РЕШКА</div>
        <div class="nav-item" onclick="showTab('inv', this)">🎒<br>ИНВЕНТАРЬ</div>
    </nav>

<script>
    let balance = 1000;
    let inventory = [];
    let selectedSide = 'heads';
    let lastDrop = null;

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sc-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'inv') renderInventory();
    }

    function selectSide(side) {
        selectedSide = side;
        document.getElementById('btn-heads').classList.toggle('selected', side === 'heads');
        document.getElementById('btn-tails').classList.toggle('selected', side === 'tails');
    }

    function playCoin() {
        let bet = parseInt(document.getElementById('bet-amount').value);
        if(!bet || bet > balance || bet <= 0) return alert("Некорректная ставка!");
        
        balance -= bet; updateUI();
        const coin = document.getElementById('coin-obj');
        coin.style.transform = "rotateY(720deg) scale(1.2)";
        
        setTimeout(() => {
            const isHeads = Math.random() > 0.5;
            coin.innerText = isHeads ? "🦅" : "⭐";
            coin.style.transform = "rotateY(0deg) scale(1)";
            
            const won = (isHeads && selectedSide === 'heads') || (!isHeads && selectedSide === 'tails');
            if(won) {
                balance += bet * 2;
                alert("Победа! + " + (bet * 2) + " ⭐️");
            } else {
                alert("Проигрыш!");
            }
            updateUI();
        }, 600);
    }

    function startOpening() {
        if(balance < 149) return alert("Недостаточно звезд!");
        balance -= 149; updateUI();
        
        // Симуляция выпадения
        const winner = { name: "Chill Flame", icon: "🔥", price: 381 };
        lastDrop = winner;
        
        setTimeout(() => {
            document.getElementById('drop-icon').innerText = winner.icon;
            document.getElementById('drop-name').innerText = winner.name;
            document.getElementById('drop-price').innerText = winner.price;
            document.getElementById('drop-modal').style.display = 'flex';
        }, 500);
    }

    function sellDropped() {
        balance += lastDrop.price;
        updateUI();
        closeModal();
    }

    function keepDropped() {
        inventory.push(lastDrop);
        closeModal();
    }

    function renderInventory() {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = inventory.map(it => `
            <div class="inv-item">
                <div style="font-size:40px;">${it.icon}</div>
                <div style="font-size:12px; margin-top:10px;">${it.name}</div>
            </div>
        `).join('');
    }

    function updateUI() { document.getElementById('stars').innerText = balance; }
    function closeModal() { document.getElementById('drop-modal').style.display = 'none'; }
</script>
</body>
</html>
