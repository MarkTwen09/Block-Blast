<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast: Ultimate Edition</title>
    <style>
        :root { --bg: #050509; --panel: rgba(11, 11, 20, 0.9); --violet: #a78bfa; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; height: 100vh; position: relative; }
        #ambient-bg { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(109, 40, 217, 0.15), transparent 40%), radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1), transparent 40%); filter: blur(60px); animation: moveBg 15s infinite alternate ease-in-out; }
        @keyframes moveBg { 0% { transform: scale(1); } 100% { transform: scale(1.2) translate(5%, 5%); } }
        #header { margin-top: env(safe-area-inset-top, 40px); text-align: center; z-index: 10; }
        #score { font-size: 72px; font-weight: 900; background: linear-gradient(#fff, var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 0; }
        #level-bar-wrap { width: 180px; height: 4px; background: rgba(255,255,255,0.1); margin: 8px auto; border-radius: 2px; }
        #level-bar-fill { width: 0%; height: 100%; background: var(--violet); box-shadow: 0 0 10px var(--violet); transition: 0.3s; }
        canvas { background: var(--panel); border-radius: 24px; box-shadow: 0 0 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); max-width: 92vw; margin-top: 10px; backdrop-filter: blur(10px); }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(20px); }
        .btn { background: #6d28d9; border: none; padding: 16px 45px; color: white; font-size: 18px; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ambient-bg"></div>
    <div id="header">
        <div id="score">0</div>
        <div id="level-bar-wrap"><div id="level-bar-fill"></div></div>
        <div id="best" style="font-size: 12px; opacity: 0.5;">BEST: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="game-over">
        <h1 style="color: #ff4d4d;">ФИНИШ</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 900;">0</div>
        <button class="btn" onclick="resetGame()">ЗАНОВО</button>
    </div>

<script>
// --- ЗВУКОВОЙ ДВИЖОК ---
const AudioEngine = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        this.init(); const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        if (type === 'pick') {
            osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'place') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'clear') {
            osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
            gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 8; let CELL = Math.floor(window.innerWidth * 0.11);
const GAP = 5, BOARD_PAD = 12;
canvas.width = (CELL + GAP) * GRID + BOARD_PAD * 2;
canvas.height = canvas.width + 160;

let score = 0, best = localStorage.getItem('bb_final_best') || 0;
let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [], particles = [], dragging = null, dragOff = {x:0, y:0};
let dragStartTime = 0, bestMove = null;

const COLORS = { r: "#ff4d4d", g: "#4ade80", b: "#3b82f6", y: "#facc15", p: "#a855f7", c: "#22d3ee", o: "#fb923c" };

function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

function drawBlock(x, y, size, colorKey, alpha = 1, special = null) {
    ctx.save(); ctx.globalAlpha = alpha;
    if (special === 'hint') {
        ctx.shadowBlur = 20; ctx.shadowColor = "#ffd700";
        ctx.fillStyle = "rgba(255, 215, 0, 0.5)";
    } else if (special === 'danger') {
        ctx.fillStyle = "rgba(255, 77, 77, 0.6)";
    } else {
        ctx.fillStyle = COLORS[colorKey];
        if (alpha === 1) { ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.3)"; }
    }
    ctx.beginPath(); ctx.roundRect(x, y, size, size, 8); ctx.fill(); ctx.restore();
}

function spawn() {
    shapes = []; const step = canvas.width / 3;
    const defs = [{m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1,1]], c:'b'}, {m:[[1,1,1]], c:'c'}, {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'}];
    for(let i=0; i<3; i++) {
        let p = defs[Math.floor(Math.random()*defs.length)];
        let w = p.m[0].length*(CELL*0.5);
        shapes.push({ ...p, x:(step*i)+(step-w)/2, y:canvas.height-125, ox:(step*i)+(step-w)/2, oy:canvas.height-125, scale:0.5, targetScale:0.5 });
    }
    checkGameOver();
}

function findBestMove(shape) {
    let maxLines = -1; let target = null;
    for (let r=0; r<=GRID-shape.m.length; r++) {
        for (let c=0; c<=GRID-shape.m[0].length; c++) {
            if (canPlace(shape, c, r)) {
                let lines = simulateLines(shape, c, r);
                if (lines > maxLines) { maxLines = lines; target = {x:c, y:r}; }
            }
        }
    }
    return { pos: target, lines: maxLines };
}

function simulateLines(shape, gx, gy) {
    let temp = board.map(row => [...row]);
    shape.m.forEach((row, r) => row.forEach((v, c) => { if(v) temp[gy+r][gx+c] = 't'; }));
    let count = 0;
    for(let r=0; r<GRID; r++) if(temp[r].every(v=>v)) count++;
    for(let c=0; c<GRID; c++) if(temp.every(r=>r[c])) count++;
    return count;
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    for(let r=0; r<GRID; r++){
        for(let c=0; c<GRID; c++){
            let bx=BOARD_PAD+c*(CELL+GAP), by=BOARD_PAD+r*(CELL+GAP);
            if(board[r][c]) drawBlock(bx, by, CELL, board[r][c]);
            else { ctx.fillStyle = "rgba(255,255,255,0.03)"; ctx.beginPath(); ctx.roundRect(bx, by, CELL, CELL, 10); ctx.fill(); }
        }
    }

    if(dragging) {
        let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
        let canBePlaced = findBestMove(dragging).pos !== null;
        let timeHeld = Date.now() - dragStartTime;

        if (timeHeld > 1500 && bestMove?.pos) {
            let pulse = Math.abs(Math.sin(Date.now()/200)) * 0.3;
            dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
                if(v) drawBlock(BOARD_PAD+(bestMove.pos.x+ci)*(CELL+GAP), BOARD_PAD+(bestMove.pos.y+ri)*(CELL+GAP), CELL, dragging.c, 0.2 + pulse, 'hint');
            }));
        }

        if(canPlace(dragging, gx, gy)) {
            dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
                if(v) drawBlock(BOARD_PAD+(gx+ci)*(CELL+GAP), BOARD_PAD+(gy+ri)*(CELL+GAP), CELL, dragging.c, 0.3);
            }));
        }

        dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
            if(v) drawBlock(dragging.x+ci*(CELL+GAP), dragging.y+ri*(CELL+GAP), CELL, dragging.c, 1, canBePlaced ? null : 'danger');
        }));
    }

    particles.forEach((p, i) => { 
        p.x+=p.vx; p.y+=p.vy; p.l-=0.02; ctx.fillStyle=`rgba(255,255,255,${p.l})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill(); if(p.l<=0) particles.splice(i,1);
    });

    shapes.forEach(s => {
        if(s === dragging) return;
        s.scale += (s.targetScale - s.scale) * 0.2;
        let sz=CELL*s.scale, g=GAP*s.scale;
        s.m.forEach((row, ri)=>row.forEach((v, ci)=>{ if(v) drawBlock(s.x+ci*(sz+g), s.y+ri*(sz+g), sz, s.c); }));
    });
    requestAnimationFrame(draw);
}

function canPlace(sh, gx, gy) {
    if(gx<0 || gy<0 || gx+sh.m[0].length>GRID || gy+sh.m.length>GRID) return false;
    for(let r=0; r<sh.m.length; r++) for(let c=0; c<sh.m[0].length; c++) if(sh.m[r][c] && board[gy+r][gx+c]) return false;
    return true;
}

const getPos = e => {
    let r=canvas.getBoundingClientRect(); let cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*(canvas.width/r.width), y:(cy-r.top)*(canvas.height/r.height) };
};

canvas.addEventListener('touchstart', e => {
    let p=getPos(e);
    shapes.forEach(s => {
        if(p.x>s.x-20 && p.x<s.x+80 && p.y>s.y-20 && p.y<s.y+100) { 
            dragging=s; s.targetScale=1.0; dragOff={x:p.x-s.x, y:p.y-s.y}; 
            dragStartTime = Date.now(); bestMove = findBestMove(s);
            AudioEngine.play('pick'); vibrate(10);
        }
    });
});

window.addEventListener('touchmove', e => {
    if(dragging){
        if(e.cancelable) e.preventDefault();
        let p=getPos(e); let tx = p.x-dragOff.x, ty = p.y-dragOff.y;
        let gx=Math.round((tx-BOARD_PAD)/(CELL+GAP)), gy=Math.round((ty-BOARD_PAD)/(CELL+GAP));
        if(canPlace(dragging, gx, gy)) {
            dragging.x += (BOARD_PAD + gx*(CELL+GAP) - dragging.x) * 0.3;
            dragging.y += (BOARD_PAD + gy*(CELL+GAP) - dragging.y) * 0.3;
        } else { dragging.x = tx; dragging.y = ty; }
    }
}, {passive:false});

window.addEventListener('touchend', () => {
    if(!dragging) return;
    let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
    if(canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v) board[gy+r][gx+c]=dragging.c; }));
        AudioEngine.play('place'); vibrate(30); score+=20; updateScore();
        shapes=shapes.filter(s=>s!==dragging); if(shapes.length===0) spawn();
        checkLines(); checkGameOver();
    } else { dragging.x=dragging.ox; dragging.y=dragging.oy; dragging.targetScale=0.5; }
    dragging=null; bestMove=null;
});

function checkLines() {
    let rc=[], cc=[];
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rc.push(r);
    for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cc.push(c);
    if(rc.length || cc.length) {
        AudioEngine.play('clear'); vibrate([50, 30, 50]);
        rc.forEach(r => { for(let c=0; c<GRID; c++){ board[r][c]=null; explode(c,r); } });
        cc.forEach(c => { for(let r=0; r<GRID; r++){ if(board[r][c]){ board[r][c]=null; explode(c,r); } } });
        score += (rc.length + cc.length) * 150; updateScore();
    }
}
function explode(gx, gy) {
    let px=BOARD_PAD+gx*(CELL+GAP)+CELL/2, py=BOARD_PAD+gy*(CELL+GAP)+CELL/2;
    for(let i=0; i<6; i++) particles.push({x:px, y:py, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:1});
}
function updateScore() {
    document.getElementById('score').innerText = score;
    document.getElementById('level-bar-fill').style.width = (score % 1000 / 10) + "%";
    if(score > best) { best = score; localStorage.setItem('bb_final_best', best); document.getElementById('best').innerText = `BEST: ${best}`; }
}
function checkGameOver() {
    const ok = shapes.some(s => findBestMove(s).pos !== null);
    if(!ok && shapes.length>0) document.getElementById('game-over').style.display='flex';
}
function resetGame() { board=board.map(r=>r.fill(null)); score=0; updateScore(); document.getElementById('game-over').style.display='none'; spawn(); }

spawn(); draw();
</script>
</body>
</html>
