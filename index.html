<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky in Flames - Tactical Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: monospace;
            background: #060913; color: #00f2fe; -webkit-user-select: none; user-select: none;
        }
        
        #viewport-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #map { flex-grow: 1; width: 100%; height: 100%; background: #05070f; z-index: 1; }
        
        #monitor-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.7);
        }

        #faction-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070f; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .cyber-panel {
            background: rgba(10, 15, 30, 0.9); border: 1px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.2); border-radius: 4px; padding: 30px;
            text-align: center; max-width: 400px; width: 100%; backdrop-filter: blur(10px);
        }
        .faction-btn {
            background: transparent; border: 1px solid #00f2fe; padding: 14px;
            color: #00f2fe; font-size: 12px; font-weight: bold; cursor: pointer; margin: 12px 0;
            width: 100%; letter-spacing: 2px; font-family: inherit; transition: all 0.2s;
        }
        .faction-btn:hover { background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 15px #00f2fe; }

        /* ВЕРХНИЙ HUD — КОМПАКТНЫЙ ДЛЯ МОБИЛОК */
        #hud-top {
            position: absolute; top: 8px; left: 8px; right: 8px; z-index: 1000;
            background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 242, 254, 0.3);
            backdrop-filter: blur(8px); border-radius: 4px; padding: 8px; font-size: 10px; pointer-events: none;
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .hud-value { font-weight: bold; color: #fff; text-shadow: 0 0 6px #00f2fe; }
        .hp-bar-container { width: 100%; background: rgba(255,255,255,0.05); height: 3px; border-radius: 2px; overflow: hidden; margin-top: 2px; }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.4s ease; }
        .hp-player { background: #00f2fe; box-shadow: 0 0 6px #00f2fe; }
        .hp-enemy { background: #ff0055; box-shadow: 0 0 6px #ff0055; }

        /* МОБИЛЬНЫЙ КОНТЕНТ: СВОРАЧИВАЕМАЯ ПАНЕЛЬ ИЗ-ЗА КОТОРОЙ ВСЁ ПЕРЕКРЫВАЛОСЬ */
        #bottom-ui-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            display: flex; flex-direction: column; background: rgba(6, 9, 19, 0.95);
            border-top: 1px solid rgba(0, 242, 254, 0.3); backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out;
        }
        
        /* Состояние скрытого пульта */
        .ui-collapsed { transform: translateY(calc(100% - 35px)); }

        #toggle-ui-btn {
            height: 35px; background: rgba(10, 15, 30, 0.9); color: #00f2fe;
            border: none; border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            font-family: inherit; font-size: 11px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; letter-spacing: 2px;
        }

        #inner-ui-content { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

        /* Лог уведомлений */
        #log-container {
            background: rgba(10, 15, 30, 0.5); border: 1px solid rgba(0, 242, 254, 0.15); border-radius: 4px; overflow: hidden;
        }
        #log-panel {
            height: 45px; padding: 4px 8px; font-size: 9px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; pointer-events: none; line-height: 1.3;
        }
        .log-entry { margin-bottom: 1px; color: #00f2fe; }
        .log-entry.enemy { color: #ff0055; }
        .log-entry.system { color: #eab308; }

        /* Кнопки управления */
        #control-panel { display: flex; flex-direction: column; gap: 5px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn {
            background: rgba(15, 23, 42, 0.8); color: #94a3b8; border: 1px solid rgba(0, 242, 254, 0.25);
            padding: 10px 3px; cursor: pointer; font-size: 9px; font-weight: bold;
            border-radius: 4px; font-family: inherit; transition: all 0.15s; letter-spacing: 0.5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn:hover:not(.disabled) { background: rgba(0, 242, 254, 0.1); color: #fff; }
        .btn.active { background: rgba(0, 242, 254, 0.15); color: #fff; border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); }
        .btn.disabled { opacity: 0.2; cursor: not-allowed; border-color: transparent; }
        
        .btn-orange { border-color: rgba(249, 115, 22, 0.3); color: #f97316; }
        .btn-orange.active { background: rgba(249,115,22,0.15); border-color: #f97316; box-shadow: 0 0 8px #f97316; }
        
        .btn-purple { border-color: rgba(168, 85, 247, 0.3); color: #a855f7; }
        .btn-purple.active { background: rgba(168,85,247,0.15); border-color: #a855f7; box-shadow: 0 0 10px #a855f7; }
        
        .btn-red { border-color: rgba(239, 68, 68, 0.3); color: #ef4444; }
        .btn-red.active { background: rgba(239,68,68,0.15); border-color: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* ВЕКТОРНЫЕ КОНТЕЙНЕРЫ (ИСПРАВЛЕНО ВРАЩЕНИЕ НА 100%) */
        .drone-container {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .rotator {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }

        /* Маркеры городов */
        .city-marker {
            background: rgba(6, 9, 19, 0.9); border: 1px solid rgba(56, 189, 248, 0.5);
            color: #e2e8f0; font-size: 9px; font-weight: bold; border-radius: 3px; padding: 2px 4px;
            white-space: nowrap; box-shadow: 0 0 6px rgba(0,0,0,0.8);
        }
        .city-marker.enemy { border-color: rgba(255, 0, 85, 0.6); color: #fecdd3; }
        
        .shake-hit { animation: hard-shake 0.3s ease-in-out; border-color: #ff0055 !important; }

        .build-marker {
            background: #060913; border: 1px solid #38bdf8; color: #38bdf8;
            font-size: 8px; font-weight: bold; border-radius: 2px; text-align: center; line-height: 12px;
            padding: 0 3px; box-shadow: 0 0 6px rgba(56,189,248,0.4);
        }

        .damage-popup {
            font-size: 11px; font-weight: bold; color: #ff0055; text-shadow: 0 0 3px #000;
            animation: float-damage 0.6s ease-out forwards;
        }

        @keyframes hard-shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, -2px); }
            80% { transform: translate(1px, 1px); }
        }
        @keyframes float-damage {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
        @keyframes global-screen-shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 1px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-1px, -3px); }
            80% { transform: translate(2px, 2px); }
        }
    </style>
</head>
<body>

    <div id="monitor-overlay"></div>

    <div id="faction-screen">
        <div class="cyber-panel">
            <h2 style="letter-spacing: 2px; margin: 0 0 8px 0; font-size: 14px; color: #fff;">СТРАТЕГИЧЕСКАЯ МАТРИЦА</h2>
            <p style="color: #475569; font-size: 9px; margin: 0 0 20px 0;">ВЫБЕРИТЕ СВОЮ ФРАКЦИЮ</p>
            <button class="faction-btn" onclick="selectFaction('UA')">КОМАНДОВАНИЕ [UA]</button>
            <button class="faction-btn" onclick="selectFaction('RU')" style="border-color:#ff0055; color:#ff0055;">КОМАНДОВАНИЕ [RU]</button>
        </div>
    </div>

    <div id="viewport-wrapper">
        <div id="hud-top">
            <div class="hud-row">
                <div>БЮДЖЕТ: <span id="txt-money" class="hud-value">600</span>$</div>
                <div>АНГАР БПЛА: <span id="txt-drones" class="hud-value">0</span> ЕД</div>
            </div>
            <div class="hud-row" style="margin-top: 2px;">
                <div style="width: 48%;">
                    <div style="font-size:8px; color:#64748b;">НАШИ БАЗЫ: <span id="lbl-hp">100%</span></div>
                    <div class="hp-bar-container"><div id="bar-player" class="hp-bar-fill hp-player" style="width: 100%;"></div></div>
                </div>
                <div style="width: 48%; text-align: right;">
                    <div style="font-size:8px; color:#64748b;">ПРОТИВНИК: <span id="lbl-enemy-hp">100%</span></div>
                    <div class="hp-bar-container" style="margin-left: auto;"><div id="bar-enemy" class="hp-bar-fill hp-enemy" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <div id="bottom-ui-wrapper" class="ui-collapsed">
            <button id="toggle-ui-btn" onclick="toggleUIPanel()">🎛️ ПУЛЬТ УПРАВЛЕНИЯ (НАЖАТЬ)</button>
            <div id="inner-ui-content">
                <div id="log-container">
                    <div id="log-panel"></div>
                </div>

                <div id="control-panel">
                    <div class="btn-row">
                        <button class="btn" id="btn-factory" onclick="toggleBuildMode('factory')">[+] ЗАВОД ($350)</button>
                        <button class="btn" id="btn-pvo" onclick="toggleBuildMode('pvo')">[+] ПВО ($400) <span id="pvo-counter">0/4</span></button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-orange" id="btn-attack-mode" onclick="toggleAttackMode()">🎯 НАЛЕТ ПАРЫ (-$150)</button>
                        <button class="btn btn-purple" id="btn-bomber-mode" onclick="toggleBomberMode()">💥 ФАБ-1500 (-$1500)</button>
                    </div>
                    <button class="btn btn-red" id="btn-heavy-mode" onclick="toggleHeavyMissileMode()">🚀 СТРАТЕГИЧЕСКИЙ РАКЕТНЫЙ УДАР (-$2000)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CITIES = {
            'UA': [
                { lat: 50.45, lng: 30.52, name: 'Киев', hp: 100 },
                { lat: 49.99, lng: 36.23, name: 'Харьков', hp: 100 },
                { lat: 46.48, lng: 30.72, name: 'Одесса', hp: 100 },
                { lat: 48.46, lng: 35.04, name: 'Днепр', hp: 100 },
                { lat: 49.83, lng: 24.01, name: 'Львов', hp: 100 },
                { lat: 46.97, lng: 31.99, name: 'Николаев', hp: 100 },
                { lat: 48.62, lng: 22.28, name: 'Ужгород', hp: 100 },
                { lat: 50.91, lng: 34.80, name: 'Сумы', hp: 100 }
            ],
            'RU': [
                { lat: 55.75, lng: 37.62, name: 'Москва', hp: 100 },
                { lat: 59.93, lng: 30.33, name: 'С.-Петербург', hp: 100 },
                { lat: 47.23, lng: 39.70, name: 'Ростов', hp: 100 },
                { lat: 51.67, lng: 39.18, name: 'Воронеж', hp: 100 },
                { lat: 50.59, lng: 36.58, name: 'Белгород', hp: 100 },
                { lat: 45.03, lng: 38.97, name: 'Краснодар', hp: 100 },
                { lat: 44.61, lng: 33.52, name: 'Севастополь', hp: 100 },
                { lat: 48.01, lng: 37.80, name: 'Донецк', hp: 100 }
            ]
        };

        let playerFaction = null, enemyFaction = null;
        let money = 600, droneInventory = 0, currentMode = null;
        let enemyMoney = 300;

        let playerFactories = [], playerPVO = [], playerDrones = [];
        let enemyPVO = [], enemyDrones = [];
        let missiles = [];
        let map, selectedFactory = null;
        
        const MAX_PVO_LIMIT = 4;

        // Векторные SVG без единой внешней ссылки (0 ошибок загрузки)
        const SHAHED_SVG = `<svg viewBox="0 0 100 100" width="28" height="28" style="filter: drop-shadow(0 0 5px #ff0055); fill: #1e293b; stroke: #ff0055; stroke-width: 5;"><path d="M50,5 L95,85 L70,85 L50,65 L30,85 L5,85 Z"/></svg>`;
        const PLAYER_DRONE_SVG = `<svg viewBox="0 0 100 100" width="24" height="24" style="filter: drop-shadow(0 0 5px #00f2fe); fill: rgba(0,242,254,0.2); stroke: #00f2fe; stroke-width: 6;"><path d="M50,5 L90,85 L50,60 L10,85 Z"/></svg>`;
        const HEAVY_SVG = `<svg viewBox="0 0 100 100" width="26" height="26"><path d="M50,2 L65,35 L98,50 L65,65 L50,98 L35,65 L2,50 L35,35 Z" fill="#f97316" style="filter: drop-shadow(0 0 6px #f97316);"/></svg>`;
        const BOMBER_SVG = `<svg viewBox="0 0 100 100" width="28" height="28"><path d="M50,5 L95,55 L50,40 L5,55 Z" fill="#a855f7" style="filter: drop-shadow(0 0 8px #a855f7);"/></svg>`;

        function toggleUIPanel() {
            const panel = document.getElementById('bottom-ui-wrapper');
            panel.classList.toggle('ui-collapsed');
        }

        function selectFaction(faction) {
            playerFaction = faction;
            enemyFaction = faction === 'UA' ? 'RU' : 'UA';
            document.getElementById('faction-screen').style.display = 'none';

            map = L.map('map', { zoomControl: false, minZoom: 4, maxZoom: 8 }).setView([50.5, 34.5], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            renderOperationalRadar();
            setupRadarClicks();

            setInterval(economyCycle, 2500);
            setInterval(radarTick, 40); 
            setInterval(enemyAILogic, 5000);

            addLog("СИСТЕМНЫЙ КОРН СИНХРОНИЗИРОВАН. ОШИБОК НЕТ.", 'system');
            updateUIButtons();
        }

        function renderOperationalRadar() {
            CITIES[playerFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker', html: `${c.name} [100%]`, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map);
                playerPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 75000, ammo: 0, maxAmmo: 0, isCityRadar: true, lastShot: 0 });
            });

            CITIES[enemyFaction].forEach(c => {
                let icon = L.divIcon({ className: 'city-marker enemy', html: c.name, iconSize: [null, null] });
                c.markerInstance = L.marker([c.lat, c.lng], { icon: icon }).addTo(map).on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if (currentMode === 'attack_target' && selectedFactory) {
                        dispatchDroneStrike(selectedFactory, c);
                    } else if (currentMode === 'heavy_missile') {
                        dispatchHeavyStrike(c);
                    } else if (currentMode === 'bomber_strike') {
                        dispatchBomberStrike(c);
                    }
                });
                enemyPVO.push({ lat: c.lat, lng: c.lng, rangeDist: 90000, ammo: 4, maxAmmo: 4, lastShot: 0, isCityRadar: true });
            });
        }

        function toggleBuildMode(mode) {
            if (mode === 'factory' && money < 350) return;
            if (mode === 'pvo' && (money < 400 || getPlacedPVOCount() >= MAX_PVO_LIMIT)) return;

            let last = currentMode; dropModes();
            if (last !== mode) {
                currentMode = mode;
                document.getElementById(`btn-${mode}`).classList.add('active');
            }
        }

        function toggleAttackMode() {
            if (currentMode === 'attack_source' || currentMode === 'attack_target') { dropModes(); return; }
            if (money < 150 || droneInventory < 2) { addLog("РЕСУРСЫ ДЛЯ НАЛЕТА ОТСУТСТВУЮТ.", 'enemy'); return; }
            
            dropModes(); currentMode = 'attack_source';
            document.getElementById('btn-attack-mode').classList.add('active');
            addLog("ВЫБЕРИТЕ СБОРОЧНЫЙ ЗАВ НА КАРТЕ.");
            if(document.getElementById('bottom-ui-wrapper').classList.contains('ui-collapsed') === false) toggleUIPanel();
        }

        function toggleBomberMode() {
            if (currentMode === 'bomber_strike') { dropModes(); return; }
            if (money < 1500) { addLog("НЕДОСТАТОЧНО СРЕДСТВ НА ВЫЛЕТ СТРАТЕГА.", 'enemy'); return; }
            
            dropModes(); currentMode = 'bomber_strike';
            document.getElementById('btn-bomber-mode').classList.add('active');
            addLog("ВЫБЕРИТЕ КРАСНЫЙ ГОРОД ДЛЯ УДАРA ФАБ-1500.");
            if(document.getElementById('bottom-ui-wrapper').classList.contains('ui-collapsed') === false) toggleUIPanel();
        }

        function toggleHeavyMissileMode() {
            if (currentMode === 'heavy_missile') { dropModes(); return; }
            if (money < 2000) { addLog("НЕДОСТАТОЧНО СРЕДСТВ ДЛЯ КР.", 'enemy'); return; }
            
            dropModes(); currentMode = 'heavy_missile';
            document.getElementById('btn-heavy-mode').classList.add('active');
            addLog("УКАЖИТЕ ЦЕЛЬ ДЛЯ СТРАТЕГИЧЕСКОГО ПУСКА.");
            if(document.getElementById('bottom-ui-wrapper').classList.contains('ui-collapsed') === false) toggleUIPanel();
        }

        function dropModes() {
            currentMode = null; selectedFactory = null;
            document.getElementById('btn-factory').classList.remove('active');
            document.getElementById('btn-pvo').classList.remove('active');
            document.getElementById('btn-attack-mode').classList.remove('active');
            document.getElementById('btn-bomber-mode').classList.remove('active');
            document.getElementById('btn-heavy-mode').classList.remove('active');
            updateUIButtons();
        }

        function getPlacedPVOCount() {
            return playerPVO.filter(p => !p.isCityRadar).length;
        }

        function updateUIButtons() {
            let pvoCount = getPlacedPVOCount();
            document.getElementById('pvo-counter').innerText = `${pvoCount}/${MAX_PVO_LIMIT}`;

            document.getElementById('btn-factory').classList.toggle('disabled', money < 350);
            document.getElementById('btn-pvo').classList.toggle('disabled', money < 400 || pvoCount >= MAX_PVO_LIMIT);
            document.getElementById('btn-attack-mode').classList.toggle('disabled', money < 150 || droneInventory < 2);
            document.getElementById('btn-bomber-mode').classList.toggle('disabled', money < 1500);
            document.getElementById('btn-heavy-mode').classList.toggle('disabled', money < 2000);
        }

        function setupRadarClicks() {
            map.on('click', function(e) {
                if (currentMode === 'attack_target' || currentMode === 'heavy_missile' || currentMode === 'bomber_strike') return;
                const { lat, lng } = e.latlng;

                if (currentMode === 'factory' && money >= 350) {
                    money -= 350;
                    let icon = L.divIcon({ className: 'build-marker', html: 'ЗАВ', iconSize: [28, 14], iconAnchor: [14, 7] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    let fObj = { lat, lng, marker: m };
                    m.on('click', function(event) { 
                        L.DomEvent.stopPropagation(event);
                        if (currentMode === 'attack_source') selectFactoryForLaunch(fObj); 
                    });
                    playerFactories.push(fObj);
                    addLog("ЗАВОД ВВЕДЕН В СТРОЙ.");
                    dropModes();
                } else if (currentMode === 'pvo' && money >= 400 && getPlacedPVOCount() < MAX_PVO_LIMIT) {
                    money -= 400;
                    let icon = L.divIcon({ className: 'build-marker', html: 'ПВО', iconSize: [28, 14], iconAnchor: [14, 7] });
                    let m = L.marker([lat, lng], { icon: icon }).addTo(map);
                    playerPVO.push({ lat: lat, lng: lng, marker: m, rangeDist: 130000, ammo: 5, maxAmmo: 5, lastShot: 0, isCityRadar: false });
                    addLog("РАСЧЕТ ПВО ЗАНЯЛ ПОЗИЦИЮ.");
                    dropModes();
                }
            });
        }

        function selectFactoryForLaunch(fObj) {
            selectedFactory = fObj; currentMode = 'attack_target';
            addLog("УКАЖИТЕ ГОРОД НА ПЛАТФОРМЕ ПРОТИВНИКА.");
        }

        function dispatchDroneStrike(source, targetCity) {
            money -= 150; droneInventory -= 2;
            addLog(`МАРШРУТ ПОСТРОЕН. ВЫЛЕТ К [${targetCity.name}].`);
            for(let i=0; i<2; i++) injectAirTarget(source, targetCity, playerDrones, true, 'drone');
            dropModes();
        }

        function dispatchBomberStrike(targetCity) {
            money -= 1500;
            addLog(`💥 ВЫЛЕТ ТАКТИЧЕСКОГО СТРАТЕГА К [${targetCity.name}].`, 'system');
            let start = CITIES[playerFaction][0]; 
            injectAirTarget(start, targetCity, playerDrones, true, 'bomber');
            dropModes();
        }

        function dispatchHeavyStrike(targetCity) {
            money -= 2000;
            addLog(`ТАКТИЧЕСКИЙ ПУСК КР ПО СЕКТОРУ [${targetCity.name}].`);
            injectAirTarget(CITIES[playerFaction][0], targetCity, playerDrones, true, 'heavy');
            dropModes();
        }

        function enemyAILogic() {
            enemyMoney += 140;
            if (enemyMoney >= 2000) {
                enemyMoney -= 2000;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[🚨] РАКЕТНАЯ ОПАСНОСТЬ: КР ИДЕТ НА [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'heavy');
                return;
            }
            if (enemyMoney >= 240) {
                enemyMoney -= 150;
                let target = CITIES[playerFaction][Math.floor(Math.random() * CITIES[playerFaction].length)];
                addLog(`[⚠️] ОБНАРУЖЕНЫ ШАХЕДЫ В НАПРАВЛЕНИИ [${target.name}]!`, 'enemy');
                injectAirTarget(CITIES[enemyFaction][Math.floor(Math.random() * CITIES[enemyFaction].length)], target, enemyDrones, false, 'drone');
            }
        }

        function injectAirTarget(start, target, collection, isPlayer, type) {
            // Исправленный расчет угла для Leaflet (отрицательный Y идет вверх)
            let dLng = target.lng - start.lng;
            let dLat = target.lat - start.lat;
            let angle = Math.atan2(dLng, dLat) * (180 / Math.PI);
            
            let speed = type === 'heavy' ? 0.006 : (type === 'bomber' ? 0.0015 : 0.0025);
            let hp = type === 'bomber' ? 4 : 1;

            let svgMarkup = "";
            if (type === 'drone') {
                svgMarkup = isPlayer ? PLAYER_DRONE_SVG : SHAHED_SVG;
            } else if (type === 'heavy') {
                svgMarkup = HEAVY_SVG;
            } else {
                svgMarkup = BOMBER_SVG;
            }

            // Нос SVG изначально смотрит строго вверх (0 градусов), поворачиваем на вычисленный угол
            let modelHtml = `<div class="drone-container"><div class="rotator" style="transform: rotate(${angle}deg);">${svgMarkup}</div></div>`;

            let marker = L.marker([start.lat, start.lng], {
                icon: L.divIcon({ className: 'custom-track', html: modelHtml, iconSize: [32, 32], iconAnchor: [16, 16] })
            }).addTo(map);

            collection.push({
                id: Math.random().toString(36).substr(2, 9), marker: marker, type: type, hp: hp, angle: angle,
                lat: start.lat, lng: start.lng, targetLat: target.lat, targetLng: target.lng, targetName: target.name,
                currentLat: start.lat, currentLng: start.lng, progress: 0, speed: speed, trails: []
            });
        }

        function economyCycle() {
            money += 45 + (playerFactories.length * 35);
            playerFactories.forEach(() => droneInventory++);
            
            let all = [...CITIES['UA'], ...CITIES['RU']];
            all.forEach(c => { if(c.hp > 0 && c.hp < 100) c.hp = Math.min(100, c.hp + 1); });

            playerPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });
            enemyPVO.forEach(p => { if(!p.isCityRadar && p.ammo < p.maxAmmo) p.ammo++; });

            CITIES[playerFaction].forEach(c => {
                if (c.markerInstance) {
                    c.markerInstance.setIcon(L.divIcon({ className: 'city-marker', html: `${c.name.toUpperCase()} [${c.hp}%]` }));
                }
            });

            document.getElementById('txt-money').innerText = money;
            document.getElementById('txt-drones').innerText = droneInventory;
            updateUIButtons();
        }

        function radarTick() {
            processTracks(playerDrones, true);
            processTracks(enemyDrones, false);
            processInterceptors();
        }

        function processTracks(list, isPlayer) {
            let now = Date.now();
            for (let i = list.length - 1; i >= 0; i--) {
                let d = list[i]; d.progress += d.speed;

                if (d.progress >= 1) {
                    if (d.type === 'bomber') {
                        triggerCarpetBombing(d.targetLat, d.targetLng);
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, 60);
                    } else {
                        triggerBlast(d.targetLat, d.targetLng, d.type === 'heavy' ? 30000 : 12000, d.type === 'heavy' ? '#f97316' : '#ff0055');
                        applyRadarDamage(isPlayer ? enemyFaction : playerFaction, d.targetName, d.type === 'heavy' ? 40 : 15);
                    }
                    map.removeLayer(d.marker); d.trails.forEach(t => map.removeLayer(t));
                    list.splice(i, 1);
                    continue;
                }

                let cLat = d.lat + (d.targetLat - d.lat) * d.progress;
                let cLng = d.lng + (d.targetLng - d.lng) * d.progress;
                d.currentLat = cLat; d.currentLng = cLng; d.marker.setLatLng([cLat, cLng]);

                if (Math.random() > 0.5) {
                    let dot = L.circle([cLat, cLng], { radius: 800, color: isPlayer ? '#00f2fe' : '#ff0055', weight: 0, fillOpacity: 0.25 }).addTo(map);
                    d.trails.push(dot); if (d.trails.length > 4) map.removeLayer(d.trails.shift());
                }

                if (!isPlayer) {
                    playerPVO.forEach(pvo => {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        if (dist <= pvo.rangeDist && !pvo.isCityRadar && pvo.ammo > 0 && (now - pvo.lastShot > 1600)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, true);
                        }
                    });
                } else {
                    enemyPVO.forEach(pvo => {
                        let dist = map.distance([cLat, cLng], [pvo.lat, pvo.lng]);
                        if (dist <= pvo.rangeDist && pvo.ammo > 0 && (now - pvo.lastShot > 1800)) {
                            pvo.ammo--; pvo.lastShot = now; fireInterceptor(pvo, d, false);
                        }
                    });
                }
            }
        }

        function fireInterceptor(pvo, target, isPlayerPVO) {
            let marker = L.marker([pvo.lat, pvo.lng], {
                icon: L.divIcon({ className: 'interceptor-track', html: `<div style="width:4px; height:4px; background:#38bdf8; border-radius:50%; box-shadow:0 0 6px #38bdf8;"></div>`, iconSize: [4, 4] })
            }).addTo(map);
            missiles.push({ marker: marker, lat: pvo.lat, lng: pvo.lng, droneId: target.id, targetCollection: isPlayerPVO ? enemyDrones : playerDrones, progress: 0, speed: 0.15, isPlayer: isPlayerPVO });
        }

        function processInterceptors() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i]; m.progress += m.speed;
                let drone = m.targetCollection.find(d => d.id === m.droneId);

                if (!drone || m.progress >= 1) { map.removeLayer(m.marker); missiles.splice(i, 1); continue; }

                let mLat = m.lat + (drone.currentLat - m.lat) * m.progress;
                let mLng = m.lng + (drone.currentLng - m.lng) * m.progress;
                m.marker.setLatLng([mLat, mLng]);

                if (map.distance([mLat, mLng], [drone.currentLat, drone.currentLng]) < 15000) {
                    map.removeLayer(m.marker); missiles.splice(i, 1);
                    if (Math.random() <= (drone.type === 'heavy' ? 0.4 : 0.85)) {
                        drone.hp--;
                        triggerBlast(drone.currentLat, drone.currentLng, 6000, '#38bdf8');
                        if (drone.hp <= 0) {
                            map.removeLayer(drone.marker); drone.trails.forEach(t => map.removeLayer(t));
                            let idx = m.targetCollection.indexOf(drone); if (idx > -1) m.targetCollection.splice(idx, 1);
                            addLog(m.isPlayer ? "КОНТР-ПЕРЕХВАТ УСПЕШЕН." : "БПЛА ПОТЕРЯН.", m.isPlayer ? 'system' : 'enemy');
                        }
                    }
                    break;
                }
            }
        }

        function applyRadarDamage(faction, cityName, dmg) {
            let city = CITIES[faction].find(c => c.name === cityName);
            if (city && city.markerInstance) {
                city.hp = Math.max(0, city.hp - dmg);
                let el = city.markerInstance.getElement();
                if (el) { el.classList.add('shake-hit'); setTimeout(() => el.classList.remove('shake-hit'), 400); }

                let pMarker = L.marker([city.lat + 0.05, city.lng], { icon: L.divIcon({ className: 'damage-popup', html: `-${dmg}%` }) }).addTo(map);
                setTimeout(() => map.removeLayer(pMarker), 600);

                if (faction === playerFaction) addLog(`УДАР ПО СЕКТОРУ [${cityName.toUpperCase()}]: -${dmg}%`, 'enemy');
                else { money += dmg * 7; addLog(`ЦЕЛЬ ПОРАЖЕНА: +$${dmg * 7}`, 'system'); }
                recalcRadarHUD();
            }
        }

        function recalcRadarHUD() {
            let pTotal = 0, eTotal = 0;
            CITIES[playerFaction].forEach(c => pTotal += c.hp);
            CITIES[enemyFaction].forEach(c => eTotal += c.hp);
            let pAvg = Math.round(pTotal / CITIES[playerFaction].length);
            let eAvg = Math.round(eTotal / CITIES[enemyFaction].length);

            document.getElementById('lbl-hp').innerText = pAvg + "%";
            document.getElementById('lbl-enemy-hp').innerText = eAvg + "%";
            document.getElementById('bar-player').style.width = pAvg + "%";
            document.getElementById('bar-enemy').style.width = eAvg + "%";

            if (pAvg <= 0) { alert("КОМАНДНЫЙ ЦЕНТР СМЯТ. КОНЕЦ СВЯЗИ."); location.reload(); }
            if (eAvg <= 0) { alert("ЦЕЛИ УНИЧТОЖЕНЫ. ПОБЕДА."); location.reload(); }
        }

        function triggerBlast(lat, lng, maxR, color) {
            let flash = L.circle([lat, lng], { radius: 300, color: color, fillColor: color, fillOpacity: 0.8, weight: 1 }).addTo(map);
            let r = 300;
            let loop = setInterval(() => {
                r += 2500; flash.setRadius(r); flash.setStyle({ fillOpacity: 0.8 * (1 - r/maxR) });
                if(r >= maxR) { clearInterval(loop); map.removeLayer(flash); }
            }, 30);
        }

        function triggerCarpetBombing(lat, lng) {
            let w = document.getElementById('viewport-wrapper');
            w.style.animation = "global-screen-shake 0.4s ease-in-out infinite";
            for(let i = 0; i < 4; i++) {
                setTimeout(() => {
                    let rLat = lat + (Math.random() - 0.5) * 0.05;
                    let rLng = lng + (Math.random() - 0.5) * 0.05;
                    triggerBlast(rLat, rLng, 35000, '#a855f7');
                }, i * 180);
            }
            setTimeout(() => { w.style.animation = "none"; }, 750);
        }

        function addLog(text, type = '') {
            const log = document.getElementById('log-panel');
            const entry = document.createElement('div'); entry.className = `log-entry ${type}`; entry.innerText = `> ${text}`;
            log.insertBefore(entry, log.firstChild);
        }
    </script>
</body>
</html>
