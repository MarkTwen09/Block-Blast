<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Светский Клин — Web3 Elite</title>
    <style>
        :root {
            --bg-main: #050814;
            --bg-glow: radial-gradient(circle at 50% 40%, #131b3d 0%, #050814 70%);
            --card-active: rgba(255, 255, 255, 0.08);
            --card-disabled: rgba(255, 255, 255, 0.02);
            --accent-gold: #f59e0b;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --neon-blue: #00f0ff;
            --profit-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-image: var(--bg-glow);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 16px;
            perspective: 1000px; /* Для 3D эффектов */
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER & STATS --- */
        .app-header {
            text-align: center;
            margin-top: 5px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(245, 158, 11, 0.3));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-icon { font-size: 20px; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 14px; font-weight: 700; color: #fff; }

        /* --- БАЛАНС И МОНЕТА --- */
        .balance-section {
            text-align: center;
            margin: 5px 0;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        /* Премиальная монета */
        .premium-coin {
            width: 42px;
            height: 42px;
            background: radial-gradient(circle at 30% 30%, #ffe082 0%, #ffb300 70%, #ff8f00 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 
                0 0 20px rgba(255, 179, 0, 0.4),
                inset 0 2px 4px rgba(255,255,255,0.6),
                inset 0 -4px 8px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: coinShine 4s ease-in-out infinite;
        }

        .premium-coin::after {
            content: '⚜';
            font-size: 22px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        @keyframes coinShine {
            0%, 100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.2); transform: scale(1.03); }
        }

        /* --- КЛИКЕР ЗОНА 3D --- */
        .clicker-container {
            display: flex;
            justify-content: center;
            position: relative;
            margin: 15px 0;
            perspective: 800px;
        }

        .sphere-wrapper {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #172554 0%, #0f172a 60%, #020617 100%);
            border: 3px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 15px 45px rgba(0,0,0,0.6),
                0 0 30px rgba(0, 240, 255, 0.1),
                inset 0 4px 20px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, border-color 0.2s;
            position: relative;
        }

        /* Эффект свечения задника сферы */
        .sphere-glow {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Квантовый кристаллический клин */
        .crystal-wedge {
            width: 80px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(30px);
            z-index: 2;
            pointer-events: none;
            filter: drop-shadow(0 0 20px var(--gold-glow));
        }

        /* Левая грань клина */
        .crystal-wedge::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 40px; height: 100px;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            clip-path: polygon(100% 0, 100% 100%, 0 85%);
            -webkit-clip-path: polygon(100% 0, 100% 100%, 0 85%);
            opacity: 0.95;
        }

        /* Правая грань клина (чуть темнее для объема) */
        .crystal-wedge::after {
            content: '';
            position: absolute;
            top: 0; left: 40px;
            width: 40px; height: 100px;
            background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%);
            clip-path: polygon(0 0, 100% 85%, 0 100%);
            -webkit-clip-path: polygon(0 0, 100% 85%, 0 100%);
            opacity: 0.85;
        }

        /* --- ЭНЕРГИЯ --- */
        .energy-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 16px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .energy-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
        .energy-bar-outer { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
        .energy-bar-inner {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, var(--neon-blue), #3b82f6);
            box-shadow: 0 0 10px rgba(0,240,255,0.4);
            transition: width 0.1s linear;
        }

        /* --- ТАБЫ --- */
        .tabs-menu {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .tab-btn {
            background: transparent; border: none; color: var(--text-muted);
            padding: 10px; font-size: 12px; font-weight: 700; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .tab-btn.active { background: rgba(255, 255, 255, 0.07); color: #fff; }

        /* --- КАРТОЧКИ --- */
        .upgrades-container { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .upgrades-container.active { display: grid; }

        .card {
            background: var(--card-active);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; padding: 14px;
            display: flex; flex-direction: column; gap: 10px;
            cursor: pointer; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
        }

        .card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.12); transform: translateY(-2px); }
        .card.disabled { background: var(--card-disabled); border-color: rgba(255,255,255,0.02); opacity: 0.3; cursor: not-allowed; transform: none !important; }
        .card-top { display: flex; align-items: center; gap: 10px; }
        .card-icon-box { width: 38px; height: 38px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .card-meta { display: flex; flex-direction: column; }
        .card-title { font-size: 12px; font-weight: 700; color: #fff; line-height: 1.2; }
        .card-level { font-size: 11px; color: var(--accent-gold); font-weight: 600; }
        .card-profit-row { font-size: 11px; color: var(--profit-green); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .card-divider { height: 1px; background: rgba(255,255,255,0.06); margin-top: auto; }
        .card-price-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .price-title { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
        .price-val { font-weight: 700; color: #fff; }

        /* --- ЭФФЕКТЫ КЛИКА --- */
        .floating-num {
            position: absolute; color: #fff; font-size: 32px; font-weight: 900;
            pointer-events: none; z-index: 1000;
            animation: floatOut 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .sparkle {
            position: absolute; width: 6px; height: 6px;
            background: #fff; border-radius: 50%; pointer-events: none; z-index: 999;
            box-shadow: 0 0 8px var(--accent-gold);
            animation: sparkOut 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes floatOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-100px) scale(0.7); }
        }

        @keyframes sparkOut {
            0% { opacity: 1; transform: translate(-50%, -50%) translate(0, 0); }
            100% { opacity: 0; transform: translate(-50%, -50%) translate(var(--mx), var(--my)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Заголовок -->
        <header class="app-header">
            <h1 class="app-title">Светский Клин</h1>
        </header>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-panel">
                <div class="stat-icon">⚡</div>
                <div class="stat-info">
                    <span class="stat-label">За клик</span>
                    <span class="stat-value" id="pqc-txt">+1</span>
                </div>
            </div>
            <div class="stat-panel">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <span class="stat-label">Доход в сек</span>
                    <span class="stat-value" id="pps-txt">+0</span>
                </div>
            </div>
        </div>

        <!-- Баланс -->
        <div class="balance-section">
            <div class="balance-amount">
                <div class="premium-coin"></div>
                <span id="balance-val">0</span>
            </div>
        </div>

        <!-- Клик Зона (3D сфера и кристалл) -->
        <div class="clicker-container" id="click-zone">
            <div class="sphere-wrapper" id="sphere-btn">
                <div class="sphere-glow"></div>
                <div class="crystal-wedge"></div>
            </div>
        </div>

        <!-- Энергия -->
        <div class="energy-container">
            <div class="energy-header">
                <span>Энергия</span>
                <span><span id="energy-current">1000</span>/<span id="energy-max">1000</span></span>
            </div>
            <div class="energy-bar-outer">
                <div class="energy-bar-inner" id="energy-fill"></div>
            </div>
        </div>

        <!-- Табы -->
        <nav class="tabs-menu">
            <button class="tab-btn active" onclick="switchTab('biz', event)">Бизнес</button>
            <button class="tab-btn" onclick="switchTab('invest', event)">Инвестиции</button>
            <button class="tab-btn" onclick="switchTab('power', event)">Влияние</button>
        </nav>

        <div class="upgrades-container active" id="tab-biz"></div>
        <div class="upgrades-container" id="tab-invest"></div>
        <div class="upgrades-container" id="tab-power"></div>
    </div>

    <script>
        const dbUpgrades = [
            { id: 0, tab: 'biz', name: 'Кофейный Бренд', icon: '☕', baseCost: 40, costMult: 1.3, profit: 1, level: 0 },
            { id: 1, tab: 'biz', name: 'Сеть Бутиков', icon: '👜', baseCost: 350, costMult: 1.32, profit: 8, level: 0 },
            { id: 2, tab: 'biz', name: 'Частная Авиация', icon: '🛩️', baseCost: 2000, costMult: 1.35, profit: 45, level: 0 },
            { id: 3, tab: 'biz', name: 'IT Конгломерат', icon: '🌐', baseCost: 15000, costMult: 1.4, profit: 260, level: 0 },
            { id: 4, tab: 'invest', name: 'Венчурный Фонд', icon: '📊', baseCost: 100, costMult: 1.28, profit: 3, level: 0 },
            { id: 5, tab: 'invest', name: 'Акции Техногигантов', icon: '💎', baseCost: 800, costMult: 1.33, profit: 22, level: 0 },
            { id: 6, tab: 'invest', name: 'Крипто Хедж-фонд', icon: '🪙', baseCost: 5000, costMult: 1.36, profit: 110, level: 0 },
            { id: 7, tab: 'invest', name: 'Недвижимость в Дубае', icon: '🏙️', baseCost: 45000, costMult: 1.42, profit: 950, level: 0 },
            { id: 8, tab: 'power', name: 'Элитный Чат', icon: '💬', baseCost: 60, costMult: 1.25, profit: 2, level: 0 },
            { id: 9, tab: 'power', name: 'Медиа-Империя', icon: '📢', baseCost: 1200, costMult: 1.34, profit: 35, level: 0 },
            { id: 10, tab: 'power', name: 'Синдикат Уолл-Стрит', icon: '🏛️', baseCost: 8000, costMult: 1.38, profit: 190, level: 0 },
            { id: 11, tab: 'power', name: 'Политическое Лобби', icon: '👑', baseCost: 95000, costMult: 1.45, profit: 2400, level: 0 }
        ];

        let state = {
            balance: 0, clickPower: 1, passiveIncomePerSec: 0,
            energy: 1000, maxEnergy: 1000, energyRegen: 2,
            upgrades: JSON.parse(JSON.stringify(dbUpgrades))
        };

        const SAVE_KEY = 'svet_klin_pro_v4';
        let uiBalance = 0;

        const balanceVal = document.getElementById('balance-val');
        const pqcTxt = document.getElementById('pqc-txt');
        const ppsTxt = document.getElementById('pps-txt');
        const sphereBtn = document.getElementById('sphere-btn');
        const clickZone = document.getElementById('click-zone');
        const energyCurrent = document.getElementById('energy-current');
        const energyMax = document.getElementById('energy-max');
        const energyFill = document.getElementById('energy-fill');

        function init() {
            loadGame();
            renderCards();
            recalculateStats();
            uiBalance = state.balance;
            
            startPassiveIncomeLoop();
            startRegenEnergyLoop();
            renderLoop();

            setInterval(saveGame, 4000);
        }

        function renderCards() {
            ['biz', 'invest', 'power'].forEach(tab => {
                const container = document.getElementById(`tab-${tab}`);
                container.innerHTML = '';
                state.upgrades.filter(u => u.tab === tab).forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `card-${up.id}`;
                    card.onclick = () => buyUpgrade(up.id);
                    const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));

                    card.innerHTML = `
                        <div class="card-top">
                            <div class="card-icon-box">${up.icon}</div>
                            <div class="card-meta">
                                <span class="card-title">${up.name}</span>
                                <span class="card-level" id="lvl-txt-${up.id}">Лвл ${up.level}</span>
                            </div>
                        </div>
                        <div class="card-profit-row"><span>+$${up.profit}/сек</span></div>
                        <div class="card-divider"></div>
                        <div class="card-price-row">
                            <span class="price-title">Цена</span>
                            <span class="price-val" id="cost-txt-${up.id}">${cost.toLocaleString()}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function recalculateStats() {
            let passive = 0;
            state.upgrades.forEach(up => { passive += up.level * up.profit; });
            state.passiveIncomePerSec = passive;
            state.maxEnergy = 1000 + (state.upgrades.filter(u => u.tab === 'power').reduce((acc, u) => acc + u.level, 0) * 150);
            state.clickPower = 1 + Math.floor(state.passiveIncomePerSec / 15);

            pqcTxt.innerText = `+${state.clickPower}`;
            ppsTxt.innerText = `+${state.passiveIncomePerSec.toLocaleString()}`;
            energyMax.innerText = state.maxEnergy;
        }

        function renderLoop() {
            const diff = state.balance - uiBalance;
            uiBalance += diff * 0.2;
            if (Math.all ? Math.abs(diff) < 0.1 : false) uiBalance = state.balance;
            balanceVal.innerText = Math.floor(uiBalance).toLocaleString('ru-RU');

            state.upgrades.forEach(up => {
                const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));
                const cardEl = document.getElementById(`card-${up.id}`);
                if (cardEl) {
                    if (state.balance < cost) cardEl.classList.add('disabled');
                    else cardEl.classList.remove('disabled');
                }
            });

            energyCurrent.innerText = Math.floor(state.energy);
            energyFill.style.width = `${(state.energy / state.maxEnergy) * 100}%`;

            requestAnimationFrame(renderLoop);
        }

        function startPassiveIncomeLoop() {
            let lastTime = Date.now();
            setInterval(() => {
                const now = Date.now();
                state.balance += state.passiveIncomePerSec * ((now - lastTime) / 1000);
                lastTime = now;
            }, 100);
        }

        function startRegenEnergyLoop() {
            setInterval(() => {
                if (state.energy < state.maxEnergy) state.energy = Math.min(state.maxEnergy, state.energy + state.energyRegen);
            }, 1000);
        }

        function buyUpgrade(id) {
            const up = state.upgrades.find(u => u.id === id);
            const cost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));

            if (state.balance >= cost) {
                state.balance -= cost;
                up.level++;
                recalculateStats();
                const nextCost = Math.floor(up.baseCost * Math.pow(up.costMult, up.level));
                document.getElementById(`lvl-txt-${id}`).innerText = `Лвл ${up.level}`;
                document.getElementById(`cost-txt-${id}`).innerText = nextCost.toLocaleString();
            }
        }

        function switchTab(tabId, e) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.upgrades-container').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // Умная логика клика с 3D Tilt расчётом угла наклона
        function processClick(clientX, clientY) {
            if (state.energy < state.clickPower) return;

            state.energy -= state.clickPower;
            state.balance += state.clickPower;

            const rect = sphereBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Расчет отклонения в зависимости от точки тача
            const tiltX = ((clientY - centerY) / (rect.height / 2)) * -25; // макс 25 градусов
            const tiltY = ((clientX - centerX) / (rect.width / 2)) * 25;

            // Наклоняем сферу
            sphereBtn.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(0.95)`;
            sphereBtn.style.borderColor = 'var(--accent-gold)';

            setTimeout(() => {
                sphereBtn.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                sphereBtn.style.borderColor = 'rgba(255, 255, 255, 0.08)';
            }, 80);

            // Вызов частиц и цифр
            createFX(clientX, clientY);
        }

        function createFX(clientX, clientY) {
            const rect = clickZone.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            // Цифра
            const num = document.createElement('div');
            num.className = 'floating-num';
            num.innerText = `+${state.clickPower}`;
            num.style.left = `${x}px`;
            num.style.top = `${y}px`;
            clickZone.appendChild(num);
            num.addEventListener('animationend', () => num.remove());

            // Искры (6 штук)
            for (let i = 0; i < 6; i++) {
                const spark = document.createElement('div');
                spark.className = 'sparkle';
                spark.style.left = `${x}px`;
                spark.style.top = `${y}px`;
                
                // Случайное направление разлета
                const mx = (Math.random() - 0.5) * 160 + 'px';
                const my = (Math.random() - 0.5) * 160 - 40 + 'px'; // Чуть больше вверх
                spark.style.setProperty('--mx', mx);
                spark.style.setProperty('--my', my);

                clickZone.appendChild(spark);
                spark.addEventListener('animationend', () => spark.remove());
            }
        }

        sphereBtn.addEventListener('touchstart', (e) => { e.preventDefault(); processClick(e.touches[0].clientX, e.touches[0].clientY); });
        sphereBtn.addEventListener('mousedown', (e) => { if ('ontouchstart' in window) return; processClick(e.clientX, e.clientY); });

        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify({
                balance: state.balance, energy: state.energy,
                upgrades: state.upgrades.map(u => ({ id: u.id, level: u.level }))
            }));
        }

        function loadGame() {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                state.balance = parsed.balance || 0;
                state.energy = parsed.energy || 1000;
                if (parsed.upgrades) {
                    parsed.upgrades.forEach(pu => {
                        const target = state.upgrades.find(u => u.id === pu.id);
                        if (target) target.level = pu.level || 0;
                    });
                }
            } catch(e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
