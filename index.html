<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast: AI Ghost Hint</title>
    <style>
        :root { --bg: #050509; --panel: rgba(11, 11, 20, 0.9); --violet: #a78bfa; --gold: #ffd700; --danger: #ff4d4d; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; height: 100vh; }
        #ambient-bg { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(109, 40, 217, 0.1), transparent 40%); filter: blur(60px); }
        #header { margin-top: env(safe-area-inset-top, 40px); text-align: center; }
        #score { font-size: 72px; font-weight: 900; background: linear-gradient(#fff, var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 0; }
        canvas { background: var(--panel); border-radius: 24px; box-shadow: 0 0 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); max-width: 92vw; margin-top: 10px; }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(20px); }
        .btn { background: #6d28d9; border: none; padding: 16px 45px; color: white; font-size: 18px; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ambient-bg"></div>
    <div id="header">
        <div id="score">0</div>
        <div id="best" style="font-size: 12px; opacity: 0.5;">BEST: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="game-over">
        <h1 style="color: var(--danger);">КОНЕЦ ИГРЫ</h1>
        <div id="final-score" style="font-size: 48px; font-weight: 900;">0</div>
        <button class="btn" onclick="resetGame()">ИГРАТЬ СНОВА</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 8; let CELL = Math.floor(window.innerWidth * 0.11);
const GAP = 5, BOARD_PAD = 12;
canvas.width = (CELL + GAP) * GRID + BOARD_PAD * 2;
canvas.height = canvas.width + 160;

let score = 0, best = localStorage.getItem('bb_ai_best') || 0;
let board = Array(GRID).fill().map(() => Array(GRID).fill(null));
let shapes = [], dragging = null, dragOff = {x:0, y:0};
let dragStartTime = 0, bestMove = null;

const COLORS = { r: "#ff4d4d", g: "#4ade80", b: "#3b82f6", y: "#facc15", p: "#a855f7", c: "#22d3ee", o: "#fb923c" };

// --- ЛОГИКА ПОДСКАЗОК ---
function findBestMove(shape) {
    let maxLines = -1;
    let targetPos = null;
    for (let r = 0; r <= GRID - shape.m.length; r++) {
        for (let c = 0; c <= GRID - shape.m[0].length; c++) {
            if (canPlace(shape, c, r)) {
                let lines = simulateLines(shape, c, r);
                if (lines > maxLines) {
                    maxLines = lines;
                    targetPos = {x: c, y: r};
                }
            }
        }
    }
    return { pos: targetPos, lines: maxLines };
}

function simulateLines(shape, gx, gy) {
    let tempBoard = board.map(row => [...row]);
    shape.m.forEach((row, r) => row.forEach((v, c) => { if(v) tempBoard[gy+r][gx+c] = 'test'; }));
    let count = 0;
    for(let r=0; r<GRID; r++) if(tempBoard[r].every(v=>v)) count++;
    for(let c=0; c<GRID; c++) if(tempBoard.every(r=>r[c])) count++;
    return count;
}

function drawBlock(x, y, size, colorKey, alpha = 1, special = null) {
    ctx.save();
    ctx.globalAlpha = alpha;
    if (special === 'hint') {
        ctx.shadowBlur = 20; ctx.shadowColor = "#ffd700";
        ctx.fillStyle = "rgba(255, 215, 0, 0.4)";
    } else if (special === 'danger') {
        ctx.fillStyle = "rgba(255, 77, 77, 0.6)";
    } else {
        ctx.fillStyle = COLORS[colorKey];
    }
    ctx.beginPath(); ctx.roundRect(x, y, size, size, 8); ctx.fill();
    ctx.restore();
}

function spawn() {
    shapes = []; const step = canvas.width / 3;
    const defs = [{m:[[1,1],[1,1]], c:'o'}, {m:[[1,1,1,1]], c:'b'}, {m:[[1,1,1]], c:'c'}, {m:[[1,1,0],[0,1,1]], c:'r'}, {m:[[1,1,1],[0,1,0]], c:'p'}, {m:[[1]], c:'g'}];
    for(let i=0; i<3; i++) {
        let p = defs[Math.floor(Math.random()*defs.length)];
        let w = p.m[0].length*(CELL*0.5);
        shapes.push({ ...p, x:(step*i)+(step-w)/2, y:canvas.height-125, ox:(step*i)+(step-w)/2, oy:canvas.height-125, scale:0.5, targetScale:0.5 });
    }
    checkGameOver();
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    
    // Поле
    for(let r=0; r<GRID; r++){
        for(let c=0; c<GRID; c++){
            let bx=BOARD_PAD+c*(CELL+GAP), by=BOARD_PAD+r*(CELL+GAP);
            if(board[r][c]) drawBlock(bx, by, CELL, board[r][c]);
            else { ctx.fillStyle = "rgba(255,255,255,0.03)"; ctx.beginPath(); ctx.roundRect(bx, by, CELL, CELL, 10); ctx.fill(); }
        }
    }

    if(dragging) {
        let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
        let canBePlacedAnywhere = findBestMove(dragging).pos !== null;
        
        // 1. Подсказка "Лучшее место" (пульсация золотом)
        let timeHeld = Date.now() - dragStartTime;
        if (timeHeld > 1500 && bestMove && bestMove.pos) {
            let pulse = Math.abs(Math.sin(Date.now()/200)) * 0.4;
            dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
                if(v) drawBlock(BOARD_PAD+(bestMove.pos.x+ci)*(CELL+GAP), BOARD_PAD+(bestMove.pos.y+ri)*(CELL+GAP), CELL, dragging.c, 0.2 + pulse, 'hint');
            }));
        }

        // 2. Стандартная тень
        if(canPlace(dragging, gx, gy)) {
            dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
                if(v) drawBlock(BOARD_PAD+(gx+ci)*(CELL+GAP), BOARD_PAD+(gy+ri)*(CELL+GAP), CELL, dragging.c, 0.2);
            }));
        }

        // 3. Рисуем саму фигуру в руке (с проверкой на Deadlock)
        let sz=CELL;
        dragging.m.forEach((row, ri)=>row.forEach((v, ci)=>{
            if(v) drawBlock(dragging.x+ci*(sz+GAP), dragging.y+ri*(sz+GAP), sz, dragging.c, 1, canBePlacedAnywhere ? null : 'danger');
        }));
    }

    // Фигуры снизу (если не тащим)
    shapes.forEach(s => {
        if(s === dragging) return;
        s.scale += (s.targetScale - s.scale) * 0.2;
        let sz=CELL*s.scale, g=GAP*s.scale;
        s.m.forEach((row, ri)=>row.forEach((v, ci)=>{ if(v) drawBlock(s.x+ci*(sz+g), s.y+ri*(sz+g), sz, s.c); }));
    });

    requestAnimationFrame(draw);
}

function canPlace(sh, gx, gy) {
    if(gx<0 || gy<0 || gx+sh.m[0].length>GRID || gy+sh.m.length>GRID) return false;
    for(let r=0; r<sh.m.length; r++) for(let c=0; c<sh.m[0].length; c++) if(sh.m[r][c] && board[gy+r][gx+c]) return false;
    return true;
}

canvas.addEventListener('touchstart', e => {
    let r=canvas.getBoundingClientRect(); let cx=e.touches[0].clientX, cy=e.touches[0].clientY;
    let px=(cx-r.left)*(canvas.width/r.width), py=(cy-r.top)*(canvas.height/r.height);
    
    shapes.forEach(s => {
        if(px>s.x-20 && px<s.x+80 && py>s.y-20 && py<s.y+100) { 
            dragging=s; s.targetScale=1.0; dragOff={x:px-s.x, y:py-s.y}; 
            dragStartTime = Date.now();
            bestMove = findBestMove(s); // Считаем лучший ход сразу при взятии
        }
    });
});

window.addEventListener('touchmove', e => {
    if(dragging){
        if(e.cancelable) e.preventDefault();
        let r=canvas.getBoundingClientRect(); let cx=e.touches[0].clientX, cy=e.touches[0].clientY;
        let px=(cx-r.left)*(canvas.width/r.width), py=(cy-r.top)*(canvas.height/r.height);
        
        let tx = px-dragOff.x, ty = py-dragOff.y;
        let gx=Math.round((tx-BOARD_PAD)/(CELL+GAP)), gy=Math.round((ty-BOARD_PAD)/(CELL+GAP));
        
        if(canPlace(dragging, gx, gy)) {
            dragging.x += (BOARD_PAD + gx*(CELL+GAP) - dragging.x) * 0.3;
            dragging.y += (BOARD_PAD + gy*(CELL+GAP) - dragging.y) * 0.3;
        } else { dragging.x = tx; dragging.y = ty; }
    }
}, {passive:false});

window.addEventListener('touchend', () => {
    if(!dragging) return;
    let gx=Math.round((dragging.x-BOARD_PAD)/(CELL+GAP)), gy=Math.round((dragging.y-BOARD_PAD)/(CELL+GAP));
    if(canPlace(dragging, gx, gy)) {
        dragging.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v) board[gy+r][gx+c]=dragging.c; }));
        score+=20; updateScore();
        shapes=shapes.filter(s=>s!==dragging); if(shapes.length===0) spawn();
        checkLines(); checkGameOver();
    } else { dragging.x=dragging.ox; dragging.y=dragging.oy; dragging.targetScale=0.5; }
    dragging=null; bestMove=null;
});

function checkLines() {
    let rc=[], cc=[];
    for(let r=0; r<GRID; r++) if(board[r].every(v=>v)) rc.push(r);
    for(let c=0; c<GRID; c++) if(board.every(r=>r[c])) cc.push(c);
    rc.forEach(r => { for(let c=0; c<GRID; c++) board[r][c]=null; });
    cc.forEach(c => { for(let r=0; r<GRID; r++) board[r][c]=null; });
    if(rc.length || cc.length) { score += (rc.length + cc.length) * 150; updateScore(); }
}
function updateScore() { document.getElementById('score').innerText = score; if(score > best) { best = score; localStorage.setItem('bb_ai_best', best); document.getElementById('best').innerText = `BEST: ${best}`; } }
function checkGameOver() {
    const ok = shapes.some(s => findBestMove(s).pos !== null);
    if(!ok && shapes.length>0) document.getElementById('game-over').style.display='flex';
}
function resetGame() { board=board.map(r=>r.fill(null)); score=0; updateScore(); document.getElementById('game-over').style.display='none'; spawn(); }

spawn(); draw();
</script>
</body>
</html>
